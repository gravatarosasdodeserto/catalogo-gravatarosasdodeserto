<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Gravatá RD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfbf7;
            --surface: #ffffff;
            --text-primary: #1c1c1c;
            --text-secondary: #707070;
            --accent: #968369;
            --border: #eceae4;
            --radius: 20px;
            --shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        * { transition: all 0.3s ease; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-primary); 
            margin: 0; 
        }

        /* Header Sofisticado */
        .header { 
            height: 250px; 
            background: linear-gradient(rgba(255,255,255,0.1), rgba(255,255,255,0.1)), url('imagens/gravata-cabecalho.jpg') center/cover;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }

        .logo { width: 180px; z-index: 10; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.1)); }

        /* Filtros Modernos */
        .filters { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(15px); 
            padding: 20px 5%;
            display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }

        .filters input, .filters select {
            padding: 12px 20px; border-radius: 50px; border: 1px solid var(--border);
            background: var(--surface); outline: none; font-size: 14px; min-width: 200px;
        }

        /* Grid de Cards */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        #catalogo { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        .card { 
            background: var(--surface); border-radius: var(--radius); 
            overflow: hidden; border: 1px solid var(--border);
            box-shadow: var(--shadow); position: relative;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); }

        .img-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #f7f6f2; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .info { padding: 20px; text-align: center; }
        .info h3 { 
            font-family: 'Playfair Display', serif; font-size: 20px; 
            margin: 0 0 12px 0; color: var(--text-primary);
        }

        /* Tags de Informação */
        .tag-group { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag { 
            font-size: 10px; text-transform: uppercase; font-weight: 700; 
            letter-spacing: 0.5px; padding: 5px 12px; border-radius: 50px;
            background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border);
        }
        .tag-accent { background: var(--accent); color: white; border: none; }

        .stock-badge { 
            position: absolute; top: 15px; right: 15px; 
            background: rgba(255,255,255,0.9); padding: 5px 12px; 
            border-radius: 50px; font-size: 11px; font-weight: 600;
            backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .out-of-stock { opacity: 0.7; filter: grayscale(0.5); }
        .out-of-stock .stock-badge { background: #fee; color: #a33; }
    </style>
</head>
<body>

<header class="header"><img src="logo.png" class="logo"></header>

<div class="filters">
    <input type="text" id="search" placeholder="Procurar Rosa..." oninput="filtrar()">
    <select id="f_cores" onchange="filtrar()"><option value="">Todas as Cores</option></select>
    <select id="f_camadas" onchange="filtrar()"><option value="">Camadas</option></select>
</div>

<div class="container">
    <div id="catalogo"></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzgV_H5QLTNwJ12B-78q57qNnlaVi0vbxW3jIqdnp7YH1IKCdBdFthIHymlMM9Jusqktg/exec";
    let DADOS = [];

    async function carregar() {
        try {
            const r = await fetch(API + "?action=get&t=" + Date.now());
            const json = await r.json();
            
            // CORREÇÃO: Mapeando os dados na ordem correta da sua planilha
            DADOS = Object.keys(json).map(k => ({
                nome: k,
                camadas: json[k].camadas,
                cores: json[k].cores,
                padrao: json[k].padrao,
                especiais: json[k].especiais,
                qtd: parseInt(json[k].qtd) || 0,
                midia: json[k].midia
            }));

            popularFiltros();
            render(DADOS);
        } catch (e) { console.error("Erro ao carregar dados"); }
    }

    function render(lista) {
        const container = document.getElementById("catalogo");
        container.innerHTML = lista.map(d => {
            const emEstoque = d.qtd > 0;
            const foto = d.midia ? `https://drive.google.com/thumbnail?sz=w600&id=${d.midia}` : 'imagens/sem-foto.jpg';
            const tagsEspeciais = d.especiais ? d.especiais.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';
            
            return `
                <div class="card ${!emEstoque ? 'out-of-stock' : ''}">
                    <div class="stock-badge">${emEstoque ? d.qtd + ' em stock' : 'Esgotado'}</div>
                    <div class="img-container">
                        <img src="${foto}" onerror="this.src='imagens/sem-foto.jpg'">
                    </div>
                    <div class="info">
                        <h3>${d.nome}</h3>
                        <div class="tag-group">
                            <span class="tag tag-accent">${d.cores}</span>
                            <span class="tag">${d.camadas}</span>
                        </div>
                        <div class="tag-group" style="opacity:0.8">
                            ${tagsEspeciais}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function popularFiltros() {
        const cores = [...new Set(DADOS.map(d => d.cores))].filter(v => v).sort();
        const camadas = [...new Set(DADOS.map(d => d.camadas))].filter(v => v).sort();
        
        const fCores = document.getElementById("f_cores");
        const fCamadas = document.getElementById("f_camadas");

        cores.forEach(c => fCores.innerHTML += `<option value="${c}">${c}</option>`);
        camadas.forEach(c => fCamadas.innerHTML += `<option value="${c}">${c}</option>`);
    }

    function filtrar() {
        const busca = document.getElementById("search").value.toLowerCase();
        const cor = document.getElementById("f_cores").value;
        const camada = document.getElementById("f_camadas").value;

        const filtrados = DADOS.filter(d => {
            const matchNome = d.nome.toLowerCase().includes(busca);
            const matchCor = cor === "" || d.cores === cor;
            const matchCamada = camada === "" || d.camadas === camada;
            return matchNome && matchCor && matchCamada;
        });
        render(filtrados);
    }

    window.onload = carregar;
</script>
</body>
</html>
