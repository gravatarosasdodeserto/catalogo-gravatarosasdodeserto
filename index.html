<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravatá RD | Catálogo de IDs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e2a15; --accent: #a08c6b; --bg: #f9f7f2; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--primary); margin: 0; }
        .header { height: 200px; background: url('imagens/gravata-cabecalho.jpg') center/cover; position: relative; display: flex; align-items: center; justify-content: center; }
        .header::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        .logo { z-index: 10; width: 180px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2)); }
        .filters { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid #ddd; }
        select, input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 14px; min-width: 140px; }
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .img-container { width: 100%; aspect-ratio: 1/1; background: #eee; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 15px; }
        .info h3 { margin: 0 0 10px; font-size: 18px; color: var(--primary); }
        .tag { display: inline-block; background: #f0ede6; padding: 4px 10px; border-radius: 8px; font-size: 11px; margin: 2px; font-weight: 600; }
        .stock { position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: 600; }
        .out-of-stock { filter: grayscale(1); opacity: 0.7; }
        .loader { text-align: center; padding: 50px; font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>

<div class="header"><img src="logo.png" class="logo"></div>

<div class="filters">
    <input type="text" id="search" placeholder="Buscar ID..." oninput="filtrar()">
    <select id="f_cores" onchange="filtrar()"><option value="">Todas as Cores</option></select>
    <select id="f_camadas" onchange="filtrar()"><option value="">Todas as Camadas</option></select>
</div>

<div id="loading" class="loader">Carregando estoque...</div>
<main class="container" id="lista"></main>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzgV_H5QLTNwJ12B-78q57qNnlaVi0vbxW3jIqdnp7YH1IKCdBdFthIHymlMM9Jusqktg/exec";
    let DADOS = [];

    async function carregar() {
        try {
            const r = await fetch(API + "?action=get");
            const json = await r.json();
            DADOS = Object.keys(json).map(k => ({ nome: k, ...json[k] }));
            document.getElementById("loading").style.display = "none";
            popularFiltros();
            render(DADOS);
        } catch (e) {
            document.getElementById("loading").innerText = "Erro ao carregar dados.";
        }
    }

    function popularFiltros() {
        const cores = [...new Set(DADOS.map(d => d.cores))].filter(v => v && v !== "Não inf.").sort();
        const camadas = [...new Set(DADOS.map(d => d.camadas))].filter(v => v && v !== "Não inf.").sort();
        
        const selCor = document.getElementById("f_cores");
        const selCam = document.getElementById("f_camadas");

        selCor.innerHTML = '<option value="">Todas as Cores</option>';
        selCam.innerHTML = '<option value="">Todas as Camadas</option>';

        cores.forEach(c => selCor.innerHTML += `<option value="${c}">${c}</option>`);
        camadas.forEach(c => selCam.innerHTML += `<option value="${c}">${c}</option>`);
    }

    function render(lista) {
        const container = document.getElementById("lista");
        container.innerHTML = lista.map(d => {
            const foto = d.midia ? `https://drive.google.com/thumbnail?sz=w600&id=${d.midia}` : 'imagens/sem-foto.jpg';
            const emEstoque = parseInt(d.qtd) > 0;
            const tags = d.especiais ? d.especiais.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';
            
            return `
                <div class="card ${!emEstoque ? 'out-of-stock' : ''}">
                    <div class="stock">${emEstoque ? d.qtd + ' unid.' : 'Esgotado'}</div>
                    <div class="img-container">
                        <img src="${foto}" onerror="this.src='imagens/sem-foto.jpg'">
                    </div>
                    <div class="info">
                        <h3>${d.nome}</h3>
                        <div class="tag" style="background:var(--accent); color:white">${d.cores}</div>
                        <div class="tag">${d.camadas}</div>
                        <div style="margin-top:8px">${tags}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function filtrar() {
        const busca = document.getElementById("search").value.toLowerCase();
        const cor = document.getElementById("f_cores").value;
        const camada = document.getElementById("f_camadas").value;

        const filtrados = DADOS.filter(d => {
            const matchNome = d.nome.toLowerCase().includes(busca);
            const matchCor = cor === "" || d.cores === cor;
            const matchCamada = camada === "" || d.camadas === camada;
            return matchNome && matchCor && matchCamada;
        });
        render(filtrados);
    }

    carregar();
</script>
</body>
</html>
