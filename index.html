<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Flores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f8f5f0; /* FUNDO MAIS CLARO */
  margin: 0;
  padding-bottom: 140px;
}

/* HEADER */
.topbar {
  background: #3a3618;
  padding: 12px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  max-width: 600px;
  margin: auto;
  padding: 0 15px;
}

.logo img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.info-topo h1 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
  color: white;
}

.subtitulo {
  margin: 2px 0 0;
  font-size: 13px;
  color: #d6d6d6;
}

/* BUSCA */
.busca-container {
  max-width: 600px;
  margin: 10px auto;
  padding: 0 15px;
  display: flex;
  justify-content: center;
}

.busca {
  width: 100%;
  max-width: 500px;
  padding: 10px 15px;
  border-radius: 25px;
  border: 2px solid #3a3618;
  font-size: 14px;
  background: #f8f5f0;
  box-sizing: border-box;
}

.busca:focus {
  outline: none;
  border-color: #3a3618;
  box-shadow: 0 0 0 3px rgba(58,54,24,0.15);
}

/* TEXTO */
.instrucao {
  max-width: 600px;
  margin: 15px auto;
  padding: 15px;
  font-size: 14px;
  color: #444;
  line-height: 1.5;
  text-align: center;
  background: white;
  border-radius: 12px;
  border: 1px solid #e5e5e5;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* CATÁLOGO */
.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  border: 1px solid #eee;
  transition: all 0.2s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  backdrop-filter: blur(2px);
}

.item:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}

.item.selecionado {
  border: 2px solid #3a3618;
  transform: scale(1.04);
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

img, video {
  width: 100%;
  border-radius: 8px;
}

.item p {
  font-weight: 500;
  font-size: 14px;
  margin: 8px 0 0;
  text-align: center;
}

/* BOTÕES FLUTUANTES */
.botoes-acoes {
  position: fixed;
  bottom: 20px;
  right: 20px;
  left: 20px;
  max-width: 400px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;

  background: rgba(255, 255, 255, 0.9); /* FUNDO */
  padding: 10px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  backdrop-filter: blur(6px);
}

.botao-whatsapp {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  background: #3a3618;
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  font-weight: 500;
  transition: all 0.2s ease;
}

.botao-whatsapp:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.35);
}

.botao-whatsapp:active {
  transform: scale(0.97);
}

/* BOTÃO LIMPAR */
.botao-limpar {
  padding: 12px;
  font-size: 14px;
  background: white;
  color: #3a3618;
  border: 2px solid #3a3618;
  border-radius: 50px;
  cursor: pointer;
  font-weight: 500;
}

.botao-limpar:hover {
  background: #f7f7f7;
}
</style>

</head>
<body>

<div class="topbar">
  <div class="header">
    <div class="logo">
      <img src="logo.jpg" alt="Logo">
    </div>

    <div class="info-topo">
      <h1>Gravatá Rosas do Deserto</h1>
      <p class="subtitulo">Enxertos de Adenium Obesum</p>
    </div>
  </div>
</div>

<div class="busca-container">
  <input type="text" id="busca" class="busca" placeholder="Buscar por nome da flor...">
</div>

<p class="instrucao">
Escolha as ID(s) das flores que você gostou e envie sua seleção pelo WhatsApp para consultar valores, disponibilidade, fotos atualizadas e condições de envio dos enxertos.
</p>

<div class="catalogo" id="catalogo"></div>

<div class="botoes-acoes">
  <button class="botao-whatsapp" onclick="enviarWhatsApp()">
    Ver disponibilidade no WhatsApp (<span id="contador">0</span>)
  </button>

  <button class="botao-limpar" onclick="limparSelecao()">
    Limpar ID(s) selecionadas
  </button>
</div>

<script>
const flores = [/* ORIGINAL */
"AÇUCENA (MUTANTE)","AKACHI","AMATTA","ARYA","BLOODY MARY","BP-116",
"BRANCA DE NEVE","BRIDAL BOUQUET","CANAN 55","CANAN 170","CAPIXABA",
"CÉU ESTRELADO","CÉU ESTRELADO VARIEGATA","COPENHAGEN","DAFNE","COCA-COLA",
"DOUBLE STAR","DUQUESA","EGG ROLL","ELARA","ELLIE","EV19-XANADÚ",
"FERRARI","GOLDEN FAITH","GOLDEN PINK","GRAPE CHOCOLATE","GUARÁ",
"GTA-AIKA","GTA-BOLD","GTA-CANDY CRUSH","GTA-CÓSMICA","GTA-CREPÚSCULO",
"GTA-DESERT DOLL","GTA-DIANA","GTA-EMMA FROST","GTA-FAY","GTA-FLORZINHA",
"GTA-FLUTTERSHY","GTA-FRACTA","GTA-GOLDEN PINK","GTA-ICE DRAGON",
"GTA-KIMBERLY","GTA-LITTLE KISS","GTA-LOLLIPOP BLACK","GTA-LYSSA",
"GTA-LYTA","GTA-MISS GRAVATÁ","GTA-NYX","GTA-PERONA","GTA-PINK VENOM",
"GTA-PINKIE PIE","GTA-RED COMETS","GTA-RED STORM","GTA-RED WIDOW",
"GTA-SANSA","GTA-SHE HA","GTA-SUN CLUSTER","GTA-SWEET BLUSH",
"GTA-TRINITY","GTA-TRUE FAITH","GTA-YUNA","HELENA","INDIGO GLAZE",
"INFINITY","JHULLY","JULIUS CAESAR","KING OF KINGS","KINDLY","L-06",
"LAILA","LILAC FROST (MUTANTE)","LM-440","LM-50","LM2","LUNA",
"MAGNIFICAT","MARIA","MIDNIGHT","MỘNG CẦM","MORAN","NANCY","NEMO",
"NORALINE","NUSA","P-200","PATHUMMA","PEONY","PHARAOH","PURPLE BLUE",
"QUEEN RAY","RF-001","RF-002","RIHANNA","ROMANTIC EDGE","SANTA CLAUS",
"SATURNO","SENNA","SIENA","SOCHI","SOPHIA","STAR CLUSTER","SWALLOW",
"TC-04","THAMIRES","THE SECRET OF VICTORIA","TRIPLE WISH","TROPICAL","TS-69",
"TS-222","TS-330","TW4","UNPARALLELED","VARIEGATA","VAMPIRA",
"VIÚVA NEGRA","VOLCANO","W59","YÚ JIǍO"
];

const floresComVideo = [
  "AÇUCENA (MUTANTE)",
  "LILAC FROST (MUTANTE)"
];

const catalogo = document.getElementById("catalogo");

function renderCatalogo(lista) {
  catalogo.innerHTML = "";

  lista.forEach(nome => {
    let div = document.createElement("div");
    div.className = "item";
    div.setAttribute("data-id", nome);

    div.onclick = function() {
      div.classList.toggle("selecionado");
      atualizarContador();

      if (navigator.vibrate) {
        navigator.vibrate(50);
      }
    };

    let nomeImagem = nome
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/ /g, "-")
      .replace(/[()]/g, "");

    if (floresComVideo.includes(nome)) {
      div.innerHTML = `
        <video autoplay muted loop playsinline>
          <source src="imagens/${nomeImagem}.mp4" type="video/mp4">
        </video>
        <p>${nome} 🎥</p>
      `;
    } else {
      div.innerHTML = `
        <img loading="lazy" src="imagens/${nomeImagem}.jpg" alt="${nome}">
        <p>${nome}</p>
      `;
    }

    catalogo.appendChild(div);
  });
}

renderCatalogo(flores);

document.getElementById("busca").addEventListener("input", function() {
  let termo = this.value.toLowerCase();
  let filtradas = flores.filter(f => f.toLowerCase().includes(termo));
  renderCatalogo(filtradas);
});

function limparSelecao() {
  document.querySelectorAll(".item.selecionado").forEach(item => {
    item.classList.remove("selecionado");
  });
  atualizarContador();
}

function atualizarContador() {
  let total = document.querySelectorAll(".item.selecionado").length;
  document.getElementById("contador").innerText = total;
}

function enviarWhatsApp() {
  let selecionados = document.querySelectorAll(".item.selecionado");
  let ids = [];

  selecionados.forEach(item => {
    ids.push(item.getAttribute("data-id"));
  });

  if (ids.length === 0) {
    alert("Selecione pelo menos uma flor!");
    return;
  }

  let textoInicial = ids.length === 1
    ? "Tenho interesse no enxerto da seguinte flor:\n\n- "
    : "Tenho interesse nos enxertos das seguintes variedades:\n\n- ";

  let mensagem = "Olá! 😊\n\n" + textoInicial 
  + ids.join("\n- ") + 
  "\n\nPoderia me passar mais informações sobre valores, disponibilidade e envio?";

  let telefone = "5581992665421";
  let url = "https://wa.me/" + telefone + "?text=" + encodeURIComponent(mensagem);

  alert("Abrindo WhatsApp com sua seleção...");
  window.open(url, "_blank");
}
</script>

</body>
</html>
