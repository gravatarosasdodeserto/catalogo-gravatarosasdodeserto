<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Gravatá Rosas do Deserto</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --header-bg: #fcfaf7;
  --body-bg: #e5e0d8;
  --card-white: #ffffff;
  --card-selected: #cbc4b7;
  --text-main: #3a3618;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--body-bg);
  color: var(--text-main);
  margin: 0;
  padding-bottom: 230px;
}

/* ===== CABEÇALHO ===== */
.topbar {
  padding: 50px 0;
  position: sticky;
  top: 0;
  z-index: 900;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18);
  overflow: hidden;
  background-color: var(--header-bg);
  border-bottom: 2px solid #ffffff;
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('imagens/gravata-cabecalho.jpg');
  background-size: cover;
  background-position: top center;
  z-index: 1;
}

.white-frame {
  position: absolute;
  width: 100%;
  height: auto;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
}

.white-frame::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100px;
  background-color: rgba(255, 255, 255, 0.7);
}

.line-top,.line-bottom {
  position: absolute;
  width: 100%;
  height: 1px;
  background-color: #ffffff;
  z-index: 2;
}

.line-top { top: 0; transform: translateY(-50px); }
.line-bottom { bottom: 0; transform: translateY(50px); }

.logo { position: relative; z-index: 3; }
.logo img { width: 150px; height: auto; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4)); }

/* ===== BARRA DE FILTROS (FIXA) ===== */
.secao-filtros {
  position: sticky;
  top: 152px;
  z-index: 950;
  padding: 6px 15px;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  gap: 5px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.filtros-topo-wrapper {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    min-height: 28px;
}

.resumo-filtros {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    max-width: 75%;
}

.tag-filtro-ativa {
    font-size: 9px;
    background: rgba(58, 54, 24, 0.08);
    color: var(--text-main);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    text-transform: uppercase;
    white-space: nowrap;
}

.btn-abrir-filtros {
  background: var(--text-main);
  color: white;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 50px;
  border: none;
  font-weight: 600;
  font-size: 11px;
  cursor: pointer;
  height: 24px;
  flex-shrink: 0;
}

.btn-abrir-filtros svg { width: 12px; height: 12px; }

/* ===== TEXTO DE INSTRUÇÃO ===== */
.instrucao-texto {
    width: calc(100% - 40px);
    margin: 25px auto 10px;
    padding: 14px 18px;
    text-align: center;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 18px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}

.instrucao-texto p { margin: 0; font-size: 13px; font-weight: 500; }
.instrucao-texto span { display: block; margin-top: 5px; font-size: 11px; color: rgba(58, 54, 24, 0.65); }

.oculto { display: none!important; }

/* ===== DRAWER ===== */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; backdrop-filter: blur(3px); }
.drawer-filtros { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: var(--body-bg); z-index: 2001; transition: 0.3s; padding: 30px 20px; box-shadow: -5px 0 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow-y: auto; }
.drawer-filtros.active { right: 0; }
.fechar-drawer { background: none; border: none; font-size: 24px; cursor: pointer; text-align: right; margin-bottom: 20px; color: var(--text-main); }

.grupo-filtro { margin-bottom: 25px; }
.titulo-filtro { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 12px; opacity: 0.6; }
.opcoes-filtro { display: flex; flex-wrap: wrap; gap: 8px; }

.pill { padding: 6px 14px; background: #ffffff; border: 1px solid rgba(0,0,0,0.05); border-radius: 50px; font-size: 12px; cursor: pointer; }
.pill.active { background: var(--text-main); color: white; }

.wrapper-switch { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.1); }
.switch-disponivel { display: inline-flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.switch-disponivel input { display: none; }
.switch-disponivel .slider { width: 34px; height: 18px; background: #c7c1b5; border-radius: 20px; position: relative; transition: 0.3s; }
.switch-disponivel .slider::before { content: ""; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.3s; }
.switch-disponivel input:checked +.slider { background: var(--text-main); }
.switch-disponivel input:checked +.slider::before { transform: translateX(16px); }

/* ===== GRID ===== */
.catalogo {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 15px;
    width: 100%;
    padding: 0 20px;
    margin: 0;
}

.item { background: var(--card-white); padding: 10px; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.2s; }
.item.selecionado { background: var(--card-selected)!important; transform: scale(0.96); }
.item video,.item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 14px; }
.item p { text-align: center; font-size: 13px; font-weight: 600; margin: 10px 0 2px 0; }
.estoque-status { text-align: center; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.disponivel { color: #2d5a27; }
.encomenda { color: #8a8471; opacity: 0.7; }

/* ===== RODAPÉ ===== */
.rodape-acoes { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(229, 224, 216, 0.98); backdrop-filter: blur(12px); padding: 10px 20px 25px; z-index: 1000; border-top: 2px solid #ffffff; }
.container-rodape { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }

.caixa-selecao {
  display: none;
  background: #ffffff;
  padding: 6px 10px;
  border-radius: 15px;
  max-height: 70px;
  overflow-y: auto;
  border: 1px solid rgba(0,0,0,0.05);
  margin-bottom: 2px;
}
.topo-caixa { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 10px; font-weight: 600; }
.limpar { color: #8b2d2d; cursor: pointer; text-decoration: underline; }
.tag-item { font-size: 10px; background: #f0f0eb; padding: 4px 10px; border-radius: 8px; display: inline-flex; align-items: center; gap: 6px; margin: 0 4px 4px 0; }
.tag-item button { border: none; background: none; color: #8b2d2d; cursor: pointer; font-weight: bold; font-size: 12px; }

.campo-busca { width: 100%; padding: 12px 20px; border-radius: 50px; border: 1.5px solid rgba(0,0,0,0.1); background: white; outline: none; text-align: center; }
.btn-whatsapp { width: 100%; padding: 15px; background: var(--text-main); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
.vazio { grid-column: 1/-1; text-align: center; padding: 60px; opacity: 0.5; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><img src="logo.png"></div>
  <div class="white-frame">
    <div class="line-top"></div>
    <div class="line-bottom"></div>
  </div>
</div>

<div class="secao-filtros">
  <div class="filtros-topo-wrapper">
    <div class="resumo-filtros" id="listaFiltrosAtivos"></div>
    <button class="btn-abrir-filtros" onclick="toggleDrawer()">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 4.5H21M7 12H17M10 19.5H14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Filtrar</span>
    </button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>

<div class="drawer-filtros" id="drawer"></div>

<div class="instrucao-texto">
    <p>Selecione as ID's desejadas para solicitar informações sobre os enxertos.</p>
    <span>Variedades sem pronta entrega podem ser encomendadas sem custo.</span>
</div>

<div class="catalogo" id="gridCatalogo">
  <p style="text-align:center; grid-column: 1/-1; padding: 50px;">Carregando ID's...</p>
</div>

<div class="rodape-acoes">
  <div class="container-rodape">
    <div class="caixa-selecao" id="areaSelecao">
      <div class="topo-caixa">
        <span>ID's selecionadas:</span>
        <span class="limpar" onclick="limparTudo()">Limpar tudo</span>
      </div>
      <div id="containerTags"></div>
    </div>
    <input type="text" id="inputPesquisa" class="campo-busca" placeholder="Buscar ID pelo nome...">
    <button id="btnEnviar" class="btn-whatsapp oculto" onclick="enviarPedido()"></button>
  </div>
</div>

<script>
let estoque = {};
let selecionados = new Set();
let filtroTexto = "";
let apenasDisponiveis = false;
let filtrosAtivos = {}; 
let colunasDeFiltro = ["camadas", "cores", "padrao", "especiais"]; 

const urlPlanilha = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHtdljGrbqvDGysgNUi7MVlGI19jY6WYrIJSckkcX7ylbKP02BWqgt0qHPUTTxqg/pub?gid=1893895788&single=true&output=csv&t=' + Math.random();

const grid = document.getElementById("gridCatalogo");
const drawer = document.getElementById("drawer");
const inputPesquisa = document.getElementById("inputPesquisa");
const listaFiltrosAtivos = document.getElementById("listaFiltrosAtivos");

// FUNÇÃO DE LEITURA DE CSV ROBUSTA
function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
    const result = [];
    lines.forEach(line => {
        // Esta regex separa por vírgula mas ignora vírgulas dentro de aspas
        const cells = line.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$|\s*\r?\n)/g) || [];
        result.push(cells.map(c => c.trim().replace(/^"|"$/g, '')));
    });
    return result;
}

async function carregarEstoque() {
    try {
        const resp = await fetch(urlPlanilha);
        const text = await resp.text();
        const dadosCompletos = parseCSV(text);
        
        if (dadosCompletos.length < 1) return;

        const cabecalho = dadosCompletos.shift().map(h => 
            h.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        );

        const idxNome = cabecalho.indexOf('nome');
        const idxQtd = cabecalho.indexOf('qtd');
        const idxMidia = cabecalho.indexOf('midia');

        estoque = {};
        dadosCompletos.forEach(col => {
            const nomeOriginal = col[idxNome];
            if (!nomeOriginal) return;

            estoque[nomeOriginal] = {
                qtd: parseInt(col[idxQtd]) || 0,
                midia: col[idxMidia] || "", 
                filtros: {}
            };

            colunasDeFiltro.forEach(colNome => {
                const idxReal = cabecalho.indexOf(colNome);
                estoque[nomeOriginal].filtros[colNome] = idxReal !== -1 ? col[idxReal] : '';
            });
        });
        
        gerarInterfaceFiltros();
        montarCatalogo();
    } catch (e) {
        console.error("Erro:", e);
        grid.innerHTML = `<div class="vazio">Erro ao carregar dados.</div>`;
    }
}

function montarCatalogo() {
    grid.innerHTML = "";
    let itensExibidos = 0;

    // Ordena os nomes das rosas em ordem alfabética
    Object.keys(estoque).sort().forEach(nome => {
        const dados = estoque[nome];
        
        // --- LÓGICA DE FILTROS ---
        // Filtro de Pronta Entrega
        if (apenasDisponiveis && dados.qtd === 0) return;
        
        // Filtro de Pesquisa por texto
        if (filtroTexto && !nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(filtroTexto)) return;

        // Filtros de Categorias (Camadas, Cores, etc)
        let passaFiltro = true;
        for (let col in filtrosAtivos) {
            if (filtrosAtivos[col] && filtrosAtivos[col] !== "Todas") {
                const valorNoEstoque = dados.filtros[col] || "";
                // Verifica se o valor selecionado está contido na célula (suporta múltiplos valores com | ou /)
                if (!valorNoEstoque.includes(filtrosAtivos[col])) {
                    passaFiltro = false;
                    break;
                }
            }
        }
        if (!passaFiltro) return;

        itensExibidos++;

        // --- LÓGICA DE IMAGEM (O CORAÇÃO DO PROBLEMA) ---
        const idMidia = dados.midia ? dados.midia.trim() : "";
        let srcFinal = "";

        if (idMidia !== "") {
            // Se o dado na coluna 'Midia' começar com http, é o link completo do Drive
            // Caso contrário, assumimos que é apenas o ID e montamos o link de visualização
            srcFinal = idMidia.startsWith("http") 
                ? idMidia 
                : `https://drive.google.com/uc?export=view&id=${idMidia}`;
        } else {
            // Se a coluna Midia estiver vazia, tenta buscar na pasta 'imagens' do GitHub
            // Formata o nome: "Açucena (Mutante)" vira "acucena-mutante"
            const nomeFormatado = nome.toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/ /g, "-")
                .replace(/[()]/g, "");
            
            srcFinal = `imagens/${nomeFormatado}.jpg`;
        }

        // --- CRIAÇÃO DO CARD HTML ---
        const card = document.createElement("div");
        card.className = "item" + (selecionados.has(nome) ? " selecionado" : "");
        
        card.innerHTML = `
            <img src="${srcFinal}" 
                 alt="${nome}"
                 onerror="handleImageError(this, '${nome}')">
            <p>${nome}</p>
            <div class="estoque-status ${dados.qtd > 0 ? 'disponivel' : 'encomenda'}">
                ${dados.qtd > 0 ? 'Disponível: ' + dados.qtd : 'Por Encomenda'}
            </div>`;

        // Evento de clique para selecionar
        card.onclick = () => {
            if (selecionados.has(nome)) {
                selecionados.delete(nome);
            } else {
                selecionados.add(nome);
            }
            card.classList.toggle('selecionado');
            atualizarPainelAcoes();
        };

        grid.appendChild(card);
    });

    // Se nenhum item passar pelos filtros
    if (itensExibidos === 0) {
        grid.innerHTML = `<div class="vazio">Nenhuma ID encontrada com esses filtros.</div>`;
    }
}

function handleImageError(img, nomeOriginal) {
    // Se falhou o link do Drive ou o link minúsculo
    if (!img.src.includes('sem-foto.jpg')) {
        const nomeMaiusculo = nomeOriginal.toUpperCase().replace(/ /g, "-") + ".jpg";
        if (!img.dataset.triedUppercase) {
            img.dataset.triedUppercase = "true";
            img.src = `imagens/${nomeMaiusculo}`;
        } else {
            img.src = 'imagens/sem-foto.jpg';
        }
    }
}

function gerarInterfaceFiltros() {
    const headerHtml = `
        <button class="fechar-drawer" onclick="toggleDrawer()">✕</button>
        <div class="wrapper-switch">
            <label class="switch-disponivel">
                <input type="checkbox" id="checkProntaEntrega" ${apenasDisponiveis ? 'checked' : ''}>
                <span class="slider"></span>
                ID's pronta entrega
            </label>
        </div>`;
    
    let filtrosHtml = "";
    colunasDeFiltro.forEach(col => {
        const valoresUnicos = new Set();
        Object.values(estoque).forEach(item => {
            const campo = item.filtros[col];
            if (campo) {
                const partes = campo.split(/[|/]/); 
                partes.forEach(p => {
                    const formatado = p.trim();
                    if (formatado) valoresUnicos.add(formatado);
                });
            }
        });
        
        if (valoresUnicos.size > 0) {
            let titulo = col.charAt(0).toUpperCase() + col.slice(1);
            if(col === 'padrao') titulo = 'Padrão';

            filtrosHtml += `
                <div class="grupo-filtro">
                    <div class="titulo-filtro">${titulo}</div>
                    <div class="opcoes-filtro">
                        <div class="pill ${!filtrosAtivos[col] || filtrosAtivos[col] === 'Todas' ? 'active' : ''}" 
                             onclick="definirFiltro('${col}', 'Todas', this)">Todas</div>
                        ${Array.from(valoresUnicos).sort().map(val => `
                            <div class="pill ${filtrosAtivos[col] === val ? 'active' : ''}" 
                                 onclick="definirFiltro('${col}', '${val}', this)">${val}</div>
                        `).join('')}
                    </div>
                </div>`;
        }
    });

    drawer.innerHTML = headerHtml + filtrosHtml;
    document.getElementById("checkProntaEntrega").addEventListener("change", (e) => { 
        apenasDisponiveis = e.target.checked; 
        atualizarTagsFiltros();
        montarCatalogo(); 
    });
}

function definirFiltro(coluna, valor, elemento) {
    filtrosAtivos[coluna] = valor;
    const grupo = elemento.parentElement;
    grupo.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    elemento.classList.add('active');
    atualizarTagsFiltros();
    montarCatalogo();
}

function atualizarTagsFiltros() {
    listaFiltrosAtivos.innerHTML = "";
    if (apenasDisponiveis) {
        const tag = document.createElement("div");
        tag.className = "tag-filtro-ativa";
        tag.innerText = "PRONTA ENTREGA";
        listaFiltrosAtivos.appendChild(tag);
    }
    for (let col in filtrosAtivos) {
        if (filtrosAtivos[col] && filtrosAtivos[col] !== "Todas") {
            const tag = document.createElement("div");
            tag.className = "tag-filtro-ativa";
            tag.innerText = filtrosAtivos[col].toUpperCase();
            listaFiltrosAtivos.appendChild(tag);
        }
    }
}
function atualizarPainelAcoes() {
    const areaSelecao = document.getElementById("areaSelecao");
    const containerTags = document.getElementById("containerTags");
    const btnZap = document.getElementById("btnEnviar");
    containerTags.innerHTML = "";

    if (selecionados.size > 0) {
        areaSelecao.style.display = "block";
        selecionados.forEach(nome => {
            const tag = document.createElement("div");
            tag.className = "tag-item";
            tag.innerHTML = `${nome} <button onclick="event.stopPropagation(); removerItem('${nome}')">×</button>`;
            containerTags.appendChild(tag);
        });
        
        btnZap.classList.remove("oculto");
        if (selecionados.size === 1) {
            btnZap.innerHTML = "Solicitar informação sobre a ID selecionada";
        } else {
            btnZap.innerHTML = `Solicitar informações sobre as ${selecionados.size} IDs selecionadas`;
        }
    } else {
        areaSelecao.style.display = "none";
        btnZap.classList.add("oculto");
    }
}

function enviarPedido() {
    const ids = Array.from(selecionados);
    let mensagem = "";
    if (ids.length === 1) {
        mensagem = `Olá! Tenho interesse no enxerto da ID ${ids[0]} e queria saber mais informações e o valor.`;
    } else {
        mensagem = `Olá! Tenho interesse nos enxertos das IDs ${ids.join(", ")} e queria saber mais informações e valores.`;
    }
    window.open("https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem), "_blank");
}

function toggleDrawer() {
    document.getElementById('drawer').classList.toggle('active');
    document.getElementById('overlay').style.display = document.getElementById('drawer').classList.contains('active') ? 'block' : 'none';
}

function removerItem(nome) { selecionados.delete(nome); atualizarPainelAcoes(); montarCatalogo(); }
function limparTudo() { selecionados.clear(); atualizarPainelAcoes(); montarCatalogo(); }

inputPesquisa.addEventListener("input", (e) => { 
    filtroTexto = e.target.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
    montarCatalogo(); 
});

carregarEstoque();
</script>

</body>
</html>
