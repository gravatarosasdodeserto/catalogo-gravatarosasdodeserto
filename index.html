<style>
:root {
  --header-bg: #fcfaf7;
  --body-bg: #e5e0d8;
  --card-white: #ffffff;
  --card-selected: #cbc4b7;
  --text-main: #3a3618;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--body-bg);
  color: var(--text-main);
  margin: 0;
  padding-bottom: 230px;
}

/* ===== CABEÇALHO ===== */
.topbar {
  padding: 50px 0;
  position: sticky;
  top: 0;
  z-index: 900;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18);
  overflow: hidden;
  background-color: var(--header-bg);
  border-bottom: 2px solid #ffffff;
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('imagens/gravata-cabecalho.jpg');
  background-size: cover;
  background-position: top center;
  z-index: 1;
}

.white-frame {
  position: absolute;
  width: 100%;
  height: auto;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
}

.white-frame::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100px;
  background-color: rgba(255, 255, 255, 0.7);
}

.line-top,.line-bottom {
  position: absolute;
  width: 100%;
  height: 1px;
  background-color: #ffffff;
  z-index: 2;
}

.line-top { top: 0; transform: translateY(-50px); }
.line-bottom { bottom: 0; transform: translateY(50px); }

.logo { position: relative; z-index: 3; }
.logo img { width: 150px; height: auto; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4)); }

.btn-admin-setup {
  position: absolute;
  top: 15px;      /* Desci um pouco mais */
  right: 15px;
  z-index: 1100;  /* Aumentei o z-index para garantir que fique por cima de tudo */
  cursor: pointer;
  opacity: 1;     /* Totalmente visível agora */
  background: rgba(255, 255, 255, 0.8); /* Fundo branco semi-transparente para dar contraste */
  border: 1px solid var(--text-main);
  border-radius: 50%;
  width: 35px;
  height: 35px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.btn-admin-setup:hover {
  transform: scale(1.1);
  background: #ffffff;
}

.btn-admin-setup svg {
  fill: var(--text-main);
  width: 22px;
  height: 22px;
}

/* ===== BARRA DE FILTROS ===== */
.secao-filtros {
  position: sticky;
  top: 152px;
  z-index: 950;
  padding: 6px 15px;
  background: #ffffff;
  display: flex;
  flex-direction: column;
  gap: 5px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.filtros-topo-wrapper { display: flex; justify-content: space-between; align-items: center; width: 100%; min-height: 28px; }
.resumo-filtros { display: flex; flex-wrap: wrap; gap: 4px; max-width: 75%; }
.tag-filtro-ativa { font-size: 9px; background: rgba(58, 54, 24, 0.08); color: var(--text-main); padding: 2px 8px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }

.btn-abrir-filtros { background: var(--text-main); color: white; display: flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 50px; border: none; font-weight: 600; font-size: 11px; cursor: pointer; height: 24px; }
.btn-abrir-filtros svg { width: 12px; height: 12px; }

.instrucao-texto { width: calc(100% - 40px); margin: 25px auto 10px; padding: 14px 18px; text-align: center; background: rgba(255, 255, 255, 0.55); border-radius: 18px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 6px 20px rgba(0,0,0,0.06); }
.instrucao-texto p { margin: 0; font-size: 13px; font-weight: 500; }
.instrucao-texto span { display: block; margin-top: 5px; font-size: 11px; color: rgba(58, 54, 24, 0.65); }

.oculto { display: none!important; }

/* ===== DRAWER ===== */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; backdrop-filter: blur(3px); }
.drawer-filtros { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: var(--body-bg); z-index: 2001; transition: 0.3s; padding: 30px 20px; box-shadow: -5px 0 25px rgba(0,0,0,0.2); overflow-y: auto; }
.drawer-filtros.active { right: 0; }
.fechar-drawer { background: none; border: none; font-size: 24px; cursor: pointer; text-align: right; width: 100%; color: var(--text-main); }
.grupo-filtro { margin-bottom: 25px; }
.titulo-filtro { font-size: 11px; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; opacity: 0.6; }
.opcoes-filtro { display: flex; flex-wrap: wrap; gap: 8px; }
.pill { padding: 6px 14px; background: #ffffff; border: 1px solid rgba(0,0,0,0.05); border-radius: 50px; font-size: 12px; cursor: pointer; }
.pill.active { background: var(--text-main); color: white; }

/* ===== GRID ===== */
.catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; width: 100%; padding: 0 20px; }
.item { background: var(--card-white); padding: 10px; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.2s; }
.item.selecionado { background: var(--card-selected)!important; transform: scale(0.96); }
.item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 14px; }
.item p { text-align: center; font-size: 13px; font-weight: 600; margin: 10px 0 2px 0; }
.estoque-status { text-align: center; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.disponivel { color: #2d5a27; }
.encomenda { color: #8a8471; opacity: 0.7; }

/* ===== RODAPÉ ===== */
.rodape-acoes { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(229, 224, 216, 0.98); backdrop-filter: blur(12px); padding: 10px 20px 25px; z-index: 1000; border-top: 2px solid #ffffff; }
.container-rodape { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
.caixa-selecao { display: none; background: #ffffff; padding: 6px 10px; border-radius: 15px; max-height: 70px; overflow-y: auto; border: 1px solid rgba(0,0,0,0.05); }
.tag-item { font-size: 10px; background: #f0f0eb; padding: 4px 10px; border-radius: 8px; display: inline-flex; align-items: center; gap: 6px; margin: 0 4px 4px 0; }
.tag-item button { border: none; background: none; color: #8b2d2d; cursor: pointer; font-weight: bold; }
.campo-busca { width: 100%; padding: 12px 20px; border-radius: 50px; border: 1.5px solid rgba(0,0,0,0.1); outline: none; text-align: center; }
.btn-whatsapp { width: 100%; padding: 15px; background: var(--text-main); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
</style>
</head>

    </svg>
</button>

<div class="topbar">
  <div class="logo"><img src="logo.png"></div>
  <div class="white-frame">
    <div class="line-top"></div>
    <div class="line-bottom"></div>
  </div>
</div>

<div class="secao-filtros">
  <div class="filtros-topo-wrapper">
    <div class="resumo-filtros" id="listaFiltrosAtivos"></div>
    <button class="btn-abrir-filtros" onclick="toggleDrawer()">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 4.5H21M7 12H17M10 19.5H14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Filtrar</span>
    </button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="drawer-filtros" id="drawer"></div>

<div class="instrucao-texto">
    <p>Selecione as ID's desejadas para solicitar informações.</p>
    <span>Variedades sem estoque podem ser encomendadas.</span>
</div>

<div class="catalogo" id="gridCatalogo">
  <p style="text-align:center; grid-column: 1/-1; padding: 50px;">Carregando ID's...</p>
</div>

<div class="rodape-acoes">
  <div class="container-rodape">
    <div class="caixa-selecao" id="areaSelecao">
      <div id="containerTags"></div>
    </div>
    <input type="text" id="inputPesquisa" class="campo-busca" placeholder="Buscar ID pelo nome...">
    <button id="btnEnviar" class="btn-whatsapp oculto" onclick="enviarPedido()"></button>
  </div>
</div>

<script>
let estoque = {};
let selecionados = new Set();
let filtroTexto = "";
let filtrosAtivos = {};
let colunasDeFiltro = ["camadas", "cores", "padrao"];

const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv&t=" + Date.now();

const grid = document.getElementById("gridCatalogo");
const drawer = document.getElementById("drawer");
const inputPesquisa = document.getElementById("inputPesquisa");
const containerTags = document.getElementById("containerTags");
const areaSelecao = document.getElementById("areaSelecao");

// FUNÇÃO DE MÍDIA LIMPA (Sem setas ou quadrados pretos)
function getMidiaHTML(m) {
  if (!m || m.trim() === "" || m === "Não inf.") {
    return `<img src="imagens/sem-foto.jpg" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:14px;">`;
  }
  
  const id = m.trim();
  const thumbUrl = `https://drive.google.com/thumbnail?sz=w600&id=${id}`;
  const videoUrl = `https://drive.google.com/uc?export=download&id=${id}`;

  // Criamos o vídeo com um "ID" temporário baseado no ID do Drive para o vigia achá-lo
  return `
    <div class="media-box" style="position:relative; width:100%; aspect-ratio:1/1; overflow:hidden; border-radius:14px; background:#f0f0f0;">
      <img src="${thumbUrl}" style="width:100%; height:100%; object-fit:cover; display:block;" onerror="this.src='imagens/sem-foto.jpg'">
      
      <video 
        class="video-rosa"
        src="${videoUrl}" 
        loop muted playsinline preload="auto"
        style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0; transition: opacity 0.8s;" 
        onplaying="this.style.opacity=1"
        onerror="this.remove()">
      </video>
    </div>`;
}

// ESTE É O "VIGIA": Ele força o play em todos os vídeos a cada 1 segundo
setInterval(() => {
  const videos = document.querySelectorAll('.video-rosa');
  videos.forEach(v => {
    if (v.paused) {
      v.play().catch(() => { 
        // Se der erro (bloqueio do browser), ele tenta na próxima volta
      });
    }
  });
}, 1000);
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
  return lines.map(line => {
    const cells = line.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g) || [];
    return cells.map(c => c.replace(/^"|"$/g, '').trim());
  });
}

function toggleDrawer() {
  document.getElementById("drawer").classList.toggle("active");
  document.getElementById("overlay").style.display = 
    document.getElementById("drawer").classList.contains("active") ? "block" : "none";
}

async function carregarEstoque() {
  try {
    const resp = await fetch(urlPlanilha);
    const text = await resp.text();
    const dados = parseCSV(text);
    dados.shift(); 
    estoque = {};
    dados.forEach(l => {
      const nome = l[0];
      if (!nome) return;
      estoque[nome] = {
        camadas: l[1] || "Não inf.",
        cores: l[2] || "Não inf.",
        padrao: l[3] || "Não inf.",
        qtd: parseInt(l[5]) || 0,
        midia: l[6] || ""
      };
    });
    gerarInterfaceFiltros();
    montarCatalogo();
  } catch (e) { grid.innerHTML = "<p>Erro ao carregar ID's.</p>"; }
}

function gerarInterfaceFiltros() {
  drawer.innerHTML = '<button class="fechar-drawer" onclick="toggleDrawer()">&times;</button><h3>Filtros</h3>';
  colunasDeFiltro.forEach(col => {
    const valoresUnicos = new Set();
    Object.values(estoque).forEach(item => { if (item[col]) valoresUnicos.add(item[col]); });
    let html = `<div class="grupo-filtro"><p class="titulo-filtro">${col.toUpperCase()}</p><div class="opcoes-filtro">`;
    html += `<div class="pill ${!filtrosAtivos[col] ? 'active' : ''}" onclick="aplicarFiltro('${col}', '')">Todas</div>`;
    Array.from(valoresUnicos).sort().forEach(val => {
      html += `<div class="pill ${filtrosAtivos[col] === val ? 'active' : ''}" onclick="aplicarFiltro('${col}', '${val}')">${val}</div>`;
    });
    html += `</div></div>`;
    drawer.innerHTML += html;
  });
}

function aplicarFiltro(coluna, valor) {
  if (valor === "") delete filtrosAtivos[coluna];
  else filtrosAtivos[coluna] = valor;
  gerarInterfaceFiltros();
  montarCatalogo();
}

// MONTAGEM DO CATÁLOGO OTIMIZADA (Não apaga tudo ao selecionar)
function montarCatalogo() {
  grid.innerHTML = "";
  Object.keys(estoque).sort().forEach(nome => {
    const d = estoque[nome];
    if (filtroTexto && !nome.toLowerCase().includes(filtroTexto.toLowerCase())) return;
    let passa = true;
    for (let f in filtrosAtivos) { if (d[f] !== filtrosAtivos[f]) passa = false; }
    if (!passa) return;

    const card = document.createElement("div");
    card.className = "item" + (selecionados.has(nome) ? " selecionado" : "");
    card.id = "card_" + nome.replace(/\W/g, "_"); // ID único para cada card
    card.innerHTML = `
      ${getMidiaHTML(d.midia)}
      <p>${nome}</p>
      <div class="estoque-status ${d.qtd > 0 ? 'disponivel' : 'encomenda'}">
        ${d.qtd > 0 ? 'Disponível' : 'Por Encomenda'}
      </div>`;
    
    card.onclick = () => {
      if (selecionados.has(nome)) {
        selecionados.delete(nome);
        card.classList.remove("selecionado");
      } else {
        selecionados.add(nome);
        card.classList.add("selecionado");
      }
      atualizarPainelAcoes();
    };
    grid.appendChild(card);
  });
}

function atualizarPainelAcoes() {
  const btn = document.getElementById("btnEnviar");
  if (selecionados.size > 0) {
    btn.classList.remove("oculto");
    areaSelecao.style.display = "block";
    btn.innerText = `Solicitar ${selecionados.size} ID's via WhatsApp`;
    atualizarTags();
  } else {
    btn.classList.add("oculto");
    areaSelecao.style.display = "none";
  }
}

function atualizarTags() {
  containerTags.innerHTML = "";
  selecionados.forEach(nome => {
    const tag = document.createElement("div");
    tag.className = "tag-item";
    tag.innerHTML = `${nome} <button onclick="removerSelecao('${nome}')">&times;</button>`;
    containerTags.appendChild(tag);
  });
}

function removerSelecao(nome) {
  selecionados.delete(nome);
  const card = document.getElementById("card_" + nome.replace(/\W/g, "_"));
  if (card) card.classList.remove("selecionado");
  atualizarPainelAcoes();
}

function enviarPedido() {
  const texto = "Olá! Tenho interesse nas seguintes IDs:\n\n- " + Array.from(selecionados).join("\n- ");
  window.open(`https://wa.me/5581985926880?text=${encodeURIComponent(texto)}`, '_blank');
}

inputPesquisa.oninput = (e) => { filtroTexto = e.target.value; montarCatalogo(); };
function acessarAdmin() { if (prompt("Senha:") === "123456") window.location.href = "admin.html"; }

carregarEstoque();

  Object.keys(estoque).sort().forEach(nome => {
    const d = estoque[nome];
    if (filtroTexto && !nome.toLowerCase().includes(filtroTexto.toLowerCase())) return;
    let passa = true;
    for (let f in filtrosAtivos) { if (d[f] !== filtrosAtivos[f]) passa = false; }
    if (!passa) return;

    const card = document.createElement("div");
    card.className = "item" + (selecionados.has(nome) ? " selecionado" : "");
    card.id = "card_" + nome.replace(/\W/g, "_");
    card.innerHTML = `
      ${getMidiaHTML(d.midia)}
      <p>${nome}</p>
      <div class="estoque-status ${d.qtd > 0 ? 'disponivel' : 'encomenda'}">
        ${d.qtd > 0 ? 'Disponível' : 'Por Encomenda'}
      </div>`;
    
    card.onclick = () => {
      if (selecionados.has(nome)) {
        selecionados.delete(nome);
        card.classList.remove("selecionado");
      } else {
        selecionados.add(nome);
        card.classList.add("selecionado");
      }
      atualizarPainelAcoes();
    };
    grid.appendChild(card);
  });
}

function atualizarPainelAcoes() {
  const btn = document.getElementById("btnEnviar");
  if (selecionados.size > 0) {
    btn.classList.remove("oculto");
    areaSelecao.style.display = "block";
    btn.innerText = `Solicitar ${selecionados.size} ID's via WhatsApp`;
    atualizarTags();
  } else {
    btn.classList.add("oculto");
    areaSelecao.style.display = "none";
  }
}

function atualizarTags() {
  containerTags.innerHTML = "";
  selecionados.forEach(nome => {
    const tag = document.createElement("div");
    tag.className = "tag-item";
    tag.innerHTML = `${nome} <button onclick="removerSelecao('${nome}')">&times;</button>`;
    containerTags.appendChild(tag);
  });
}

function removerSelecao(nome) {
  selecionados.delete(nome);
  const card = document.getElementById("card_" + nome.replace(/\W/g, "_"));
  if (card) card.classList.remove("selecionado");
  atualizarPainelAcoes();
}

function enviarPedido() {
  const texto = "Olá! Tenho interesse nas seguintes IDs:\n\n- " + Array.from(selecionados).join("\n- ");
  window.open(`https://wa.me/5581985926880?text=${encodeURIComponent(texto)}`, '_blank');
}

inputPesquisa.oninput = (e) => { filtroTexto = e.target.value; montarCatalogo(); };
function acessarAdmin() { if (prompt("Senha:") === "123456") window.location.href = "admin.html"; }

carregarEstoque();
</script>
