<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Flores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: #f8f5f0;
  margin: 0;
  padding-bottom: 200px;
  overflow-x: hidden;
}

.topbar {
  background: #3a3618;
  padding: 12px 0 16px 0;
  position: relative;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  max-width: 600px;
  margin: auto;
  padding: 0 15px;
  position: relative;
  z-index: 1;
}

.logo img { width: 70px; }

.info-topo h1 { margin: 0 0 2px 0; color: white; font-size: 18px; }
.subtitulo { margin: 0; font-size: 13px; color: #d6d6d6; }

.topbar::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: 6px;
  height: 2px;
  background: #d6d6d6;
}

.instrucao {
  max-width: 600px;
  margin: 15px auto;
  padding: 15px;
  background: white;
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
  color: #444;
}

.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #eee;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.item:hover { transform: translateY(-3px); }
.item:active { transform: scale(0.97); }

.item.selecionado {
  background: rgba(58, 54, 24, 0.15);
  box-shadow: inset 0 4px 10px rgba(58, 54, 24, 0.2);
  border: none;
}

img, video { width: 100%; border-radius: 8px; }

.botoes-acoes {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px 15px 15px;
  background: #f8f5f0;
  box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.linha-rodape {
  height: 2px;
  background: #3a3618;
  width: calc(100% + 30px);
  margin-left: -15px;
}

.caixa-selecao {
  display: none;
  border-radius: 16px;
  padding: 10px;
  background: #fff;
}

.topo-caixa {
  display: flex;
  justify-content: space-between;
}

#listaSelecionadas {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.tag {
  display: flex;
  gap: 6px;
  font-size: 12px;
}

.tag button {
  background: none;
  border: none;
  cursor: pointer;
}

.botao-whatsapp {
  padding: 15px;
  background: #3a3618;
  color: white;
  border: none;
  border-radius: 50px;
}

.btn-limpar-tudo {
  color: #3a3618;
  font-size: 12px;
  cursor: pointer;
  font-weight: 500;
}
.busca {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: 2px solid #3a3618;
  text-align: center;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="header">
    <div class="logo"><img src="logo.jpg"></div>
    <div class="info-topo">
      <h1>Gravatá Rosas do Deserto</h1>
      <p class="subtitulo">Enxertos de Adenium Obesum</p>
    </div>
  </div>
</div>

<p class="instrucao">
Escolha as ID(s) das flores que você mais gostou

Depois é só clicar em <strong>“Ver disponibilidade”</strong> para falar direto no WhatsApp e receber informações de valores, fotos atualizadas e envio dos enxertos.
</p>

<div class="catalogo" id="catalogo"></div>

<div class="botoes-acoes">

  <div class="linha-rodape"></div>

  <div class="caixa-selecao">
    <div class="topo-caixa">
      <h3>ID's selecionadas:</h3>
      <span class="btn-limpar-tudo" onclick="limparSelecao()">Limpar</span>
    </div>
    <div id="listaSelecionadas"></div>
  </div>

  <input type="text" id="busca" class="busca" placeholder="Buscar...">

  <button class="botao-whatsapp" onclick="enviarWhatsApp()">
    Ver disponibilidade (<span id="contador">0</span>)
  </button>

</div>

<script>
const flores = [
"AÇUCENA (MUTANTE)","AKACHI","AMATTA","ARYA","BLOODY MARY","BP-116",
"BRANCA DE NEVE","BRIDAL BOUQUET","CANAN 55","CANAN 170","CAPIXABA",
"CÉU ESTRELADO","CÉU ESTRELADO VARIEGATA","COPENHAGEN","DAFNE","DIỆU CHÂU","COCA-COLA",
"DOUBLE STAR","DUQUESA","EGG ROLL","ELARA","ELLIE","EV19-XANADÚ",
"FERRARI","GOLDEN FAITH","GRAPE CHOCOLATE","GUARÁ PITANGA",
"GTA-AIKA","GTA-BOLD","GTA-CANDY CRUSH","GTA-CÓSMICA","GTA-CREPÚSCULO",
"GTA-DESERT DOLL","GTA-DIANA","GTA-EMMA FROST","GTA-FAY","GTA-FLORZINHA",
"GTA-FLUTTERSHY","GTA-FRACTA","GTA-GOLDEN PINK","GTA-ICE DRAGON",
"GTA-KIMBERLY","GTA-LITTLE KISS","GTA-LOLLIPOP BLACK","GTA-LYSSA",
"GTA-LYTA","GTA-MISS GRAVATÁ","GTA-NYX","GTA-PERONA","GTA-PINK VENOM",
"GTA-PINKIE PIE","GTA-RED COMETS","GTA-RED STORM","GTA-RED WIDOW",
"GTA-SANSA","GTA-SHE HA","GTA-SUN CLUSTER","GTA-SWEET BLUSH",
"GTA-TRINITY","GTA-TRUE FAITH","GTA-YUNA","HELENA","INDIGO GLAZE",
"INFINITY","JHULLY","JULIUS CAESAR","KING OF KINGS","KINDLY","L-06",
"LAILA","LILAC FROST (MUTANTE)","LM-440","LM-50","LM2","LUNA",
"MAGNIFICAT","MARIA","MIDNIGHT","MỘNG CẦM","MORAN","NANCY","NEMO",
"NORALINE","NUSA","P-200","PATHUMMA","PEONY","PHARAOH","PURPLE BLUE",
"QUEEN RAY","RF-001","RF-002","RIHANNA","ROMANTIC EDGE","SANTA CLAUS",
"SATURNO","SENNA","SIENA","SOCHI","SOPHIA","STAR CLUSTER","SWALLOW",
"RC-04","THAMIRES","THE SECRET OF VICTORIA","TRIPLE WISH","TROPICAL","TS-69",
"TS-222","TS-330","TW4","UNPARALLELED","VARIEGATA","VAMPIRA",
"VIÚVA NEGRA","VOLCANO","W59","YÚ JIǍO"
];

const catalogo = document.getElementById("catalogo");
const buscaInput = document.getElementById("busca");
let selecionados = new Set();

function gerarNomeArquivo(nome){
  return nome.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/ /g, "-")
    .replace(/[()]/g, "");
}

function renderCatalogo(){
  catalogo.innerHTML = "";
  flores.forEach(nome=>{
    const div = document.createElement("div");
    div.className = "item";
    div.dataset.id = nome;
    if(selecionados.has(nome)) div.classList.add("selecionado");

    const arquivo = gerarNomeArquivo(nome);

    if(nome === "AÇUCENA (MUTANTE)" || nome === "LILAC FROST (MUTANTE)"){
      div.innerHTML = `
        <video autoplay muted loop playsinline preload="metadata">
          <source src="imagens/${arquivo}.mp4" type="video/mp4">
        </video>
        <p>${nome}</p>
      `;
    } else {
      div.innerHTML = `
        <img loading="lazy" src="imagens/${arquivo}.jpg"
        onerror="this.onerror=null; this.src='imagens/sem-foto.jpg'">
        <p>${nome}</p>
      `;
    }

    div.onclick = ()=>{
      selecionados.has(nome) ? selecionados.delete(nome) : selecionados.add(nome);
      atualizar();
    };

    catalogo.appendChild(div);
  });
}

function atualizar(){
  const caixa = document.querySelector(".caixa-selecao");
  const lista = document.getElementById("listaSelecionadas");

  caixa.style.display = selecionados.size ? "block" : "none";
  lista.innerHTML = "";

  selecionados.forEach(nome=>{
    const tag = document.createElement("div");
    tag.className = "tag";

    const texto = document.createElement("span");
    texto.textContent = nome;

    const btn = document.createElement("button");
    btn.textContent = "✕";
    btn.onclick = () => removerItem(nome);

    tag.append(texto, btn);
    lista.appendChild(tag);
  });

  document.getElementById("contador").innerText = selecionados.size;

  document.querySelectorAll(".item").forEach(div=>{
    div.classList.toggle("selecionado", selecionados.has(div.dataset.id));
  });
}

function removerItem(nome){
  selecionados.delete(nome);
  atualizar();
}

function limparSelecao(){
  selecionados.clear();
  atualizar();
}

buscaInput.addEventListener("input", ()=>{
  const termo = buscaInput.value.toLowerCase();
  document.querySelectorAll(".item").forEach(div=>{
    div.style.display = div.dataset.id.toLowerCase().includes(termo) ? "block" : "none";
  });
});

function enviarWhatsApp(){
  if(!selecionados.size) return alert("Selecione algo");
  const mensagem = "Olá! Tenho interesse em:\n- " + [...selecionados].join("\n- ");
  window.open("https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem));
}

renderCatalogo();
</script>

</body>
</html>
