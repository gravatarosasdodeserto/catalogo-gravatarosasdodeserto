
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo - Gravatá Rosa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f8f5f0;color:#3a3618}
.header{background:#434019;color:#f3efe9;padding:20px;text-align:center}
.header h1{font-size:28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:20px;max-width:1200px;margin:auto}
.card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 6px 14px rgba(0,0,0,0.1);cursor:pointer}
.card img{width:100%;height:280px;object-fit:cover}
.card-body{padding:15px}
.card h3{font-size:18px;margin-bottom:5px}
.card p{font-size:14px;color:#666}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center}
.modal-content{background:white;border-radius:12px;max-width:500px;width:90%;max-height:90vh;overflow:auto}
.modal video{width:100%;max-height:400px;background:#000}
.modal-body{padding:20px}
.close{float:right;font-size:28px;cursor:pointer;color:#999}
</style>
</head>
<body>
<div class="header"><h1>Catálogo Gravatá Rosa</h1></div>
<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-body">
      <span class="close" onclick="fecharModal()">&times;</span>
      <h2 id="modalNome"></h2>
      <video id="modalVideo" controls></video>
      <p id="modalEstoque"></p>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACY4dN_xmN06571jZyY34Oz_xXkvdOdtk",
  authDomain: "gravata-rosas.firebaseapp.com",
  projectId: "gravata-rosas",
  storageBucket: "gravata-rosas.firebasestorage.app",
  messagingSenderId: "72580333369",
  appId: "1:72580333369:web:5f17bdc737bd3401fd72e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function carregarCatalogo(){
  const grid = document.getElementById('grid');
  grid.innerHTML = 'Carregando...';
  
  const querySnapshot = await getDocs(collection(db, "catalogo"));
  grid.innerHTML = '';
  
  if(querySnapshot.empty){
    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center">Nenhuma ID cadastrada ainda.</p>';
    return;
  }
  
  querySnapshot.forEach((doc) => {
    const f = doc.data();
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => abrirModal(f);
    
    const img = f.fotoBase64 || 'https://via.placeholder.com/280x280?text=Sem+Foto';
    card.innerHTML = `
      <img src="${img}" alt="${f.nome}">
      <div class="card-body">
        <h3>${f.nome}</h3>
        <p>Estoque: ${f.estoque || 0}</p>
      </div>
    `;
    grid.appendChild(card);
  });
}

window.abrirModal = function(f){
  document.getElementById('modalNome').textContent = f.nome;
  document.getElementById('modalEstoque').textContent = `Estoque: ${f.estoque || 0}`;
  const video = document.getElementById('modalVideo');
  if(f.videoBase64){
    video.src = f.videoBase64;
    video.style.display = 'block';
  } else {
    video.style.display = 'none';
  }
  document.getElementById('modal').style.display = 'flex';
}

window.fecharModal = function(){
  document.getElementById('modal').style.display = 'none';
  document.getElementById('modalVideo').pause();
}

carregarCatalogo();
</script>
</body>
</html>
