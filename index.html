<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Gravatá Rosas do Deserto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #fcfaf7;
            --body-bg: #e5e0d8;
            --card-white: #ffffff;
            --card-selected: #cbc4b7;
            --text-main: #3a3618;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 230px;
        }

        /* ===== CABEÇALHO ===== */
        .topbar {
            padding: 50px 0;
            position: sticky;
            top: 0;
            z-index: 900;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18);
            overflow: hidden;
            background-color: var(--header-bg);
            border-bottom: 2px solid #ffffff;
        }

        .topbar::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('imagens/gravata-cabecalho.jpg');
            background-size: cover;
            background-position: top center;
            z-index: 1;
        }

        .logo { position: relative; z-index: 3; }
       .logo img { 
    width: 150px; 
    height: auto; 
    filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4)); 
    cursor: pointer; /* Adicione isso aqui */
}

        /* ===== SEÇÃO DE FILTROS (BARRA DE TAGS) ===== */
        .secao-filtros {
            position: sticky;
            top: 152px;
            z-index: 950;
            padding: 8px 15px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            min-height: 45px;
        }

        .filtros-topo-wrapper { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        .resumo-filtros { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 4px; 
            max-width: 75%; 
        }

        /* TAGS ATIVAS DO SITE ANTIGO */
        .tag-filtro-ativa { 
            font-size: 9px; 
            background: rgba(58, 54, 24, 0.08); 
            color: var(--text-main); 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-weight: 700; 
            text-transform: uppercase;
            white-space: nowrap;
        }

        .btn-abrir-filtros { 
            background: var(--text-main); 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            padding: 4px 12px; 
            border-radius: 50px; 
            border: none; 
            font-weight: 600; 
            font-size: 11px; 
            cursor: pointer; 
            height: 28px;
            flex-shrink: 0;
        }
        .btn-abrir-filtros svg { width: 12px; height: 12px; }

        /* ===== INSTRUÇÕES ===== */
        .instrucao-texto {
            width: calc(100% - 40px);
            margin: 25px auto 10px;
            padding: 14px 18px;
            text-align: center;
            background: rgba(255, 255, 255, 0.55);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
        }
        .instrucao-texto p { margin: 0; font-size: 13px; font-weight: 500; }
        .instrucao-texto span { display: block; margin-top: 5px; font-size: 11px; color: rgba(58, 54, 24, 0.65); }

        /* ===== GRID ===== */
        .catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            padding: 0 20px;
        }

        .item { background: var(--card-white); padding: 10px; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.2s; }
        .item.selecionado { background: var(--card-selected)!important; transform: scale(0.96); }
        .item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 14px; display: block; }
        .item p { text-align: center; font-size: 13px; font-weight: 600; margin: 10px 0 2px 0; }
        
        .estoque-status { text-align: center; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .disponivel { color: #2d5a27; }
        .encomenda { color: #8a8471; opacity: 0.7; }

        /* ===== RODAPÉ ===== */
        .rodape-acoes { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(229, 224, 216, 0.98); backdrop-filter: blur(12px); padding: 10px 20px 25px; z-index: 1000; border-top: 2px solid #ffffff; }
        .container-rodape { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
        .caixa-selecao { display: none; background: #ffffff; padding: 6px 10px; border-radius: 15px; max-height: 70px; overflow-y: auto; border: 1px solid rgba(0,0,0,0.05); }
        .tag-item { font-size: 10px; background: #f0f0eb; padding: 4px 10px; border-radius: 8px; display: inline-flex; align-items: center; gap: 6px; margin: 0 4px 4px 0; }
        .tag-item button { border: none; background: none; color: #8b2d2d; cursor: pointer; font-weight: bold; }
        .campo-busca { width: 100%; padding: 12px 20px; border-radius: 50px; border: 1.5px solid rgba(0,0,0,0.1); outline: none; text-align: center; }
        .btn-whatsapp { width: 100%; padding: 15px; background: var(--text-main); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
        .oculto { display: none!important; }

        /* ===== DRAWER ===== */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; backdrop-filter: blur(3px); }
        .drawer-filtros { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: var(--body-bg); z-index: 2001; transition: 0.3s; padding: 30px 20px; overflow-y: auto; }
        .drawer-filtros.active { right: 0; }
        .fechar-drawer { background: none; border: none; font-size: 24px; cursor: pointer; text-align: right; width: 100%; color: var(--text-main); margin-bottom: 10px; }
        .pill { padding: 6px 14px; background: #ffffff; border: 1px solid rgba(0,0,0,0.05); border-radius: 50px; font-size: 12px; cursor: pointer; margin: 4px; display: inline-block; }
        .pill.active { background: var(--text-main); color: white; }
    </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <img src="logo.png" onclick="acessarAdmin()">
  </div>
</div>

<div class="secao-filtros">
  <div class="filtros-topo-wrapper">
    <div class="resumo-filtros" id="listaFiltrosAtivos"></div>
    <button class="btn-abrir-filtros" onclick="toggleDrawer()">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 4.5H21M7 12H17M10 19.5H14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Filtrar</span>
    </button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="drawer-filtros" id="drawer"></div>

<div class="instrucao-texto">
    <p>Selecione as ID's desejadas para solicitar informações sobre os enxertos.</p>
    <span>Variedades sem pronta entrega podem ser encomendadas sem custo.</span>
</div>

<div class="catalogo" id="gridCatalogo">
  <p style="text-align:center; grid-column: 1/-1; padding: 50px;">Carregando ID's...</p>
</div>

<div class="rodape-acoes">
  <div class="container-rodape">
    <div class="caixa-selecao" id="areaSelecao">
      <div id="containerTags"></div>
    </div>
    <input type="text" id="inputPesquisa" class="campo-busca" placeholder="Buscar ID pelo nome...">
    <button id="btnEnviar" class="btn-whatsapp oculto" onclick="enviarPedido()"></button>
  </div>
</div>

<script>
let estoque = {};
let selecionados = new Set();
let filtroTexto = "";
let filtrosAtivos = {};
let colunasDeFiltro = ["camadas", "cores", "padrao"];

const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv&t=" + Date.now();

const grid = document.getElementById("gridCatalogo");
const drawer = document.getElementById("drawer");
const inputPesquisa = document.getElementById("inputPesquisa");
const containerTags = document.getElementById("containerTags");
const areaSelecao = document.getElementById("areaSelecao");
const listaFiltrosAtivos = document.getElementById("listaFiltrosAtivos");

function getMidiaHTML(m) {
  if (!m || m.trim() === "" || m === "Não inf.") {
    return `<img src="imagens/sem-foto.jpg">`;
  }
  const id = m.trim();
  const imgUrl = `https://drive.google.com/thumbnail?sz=w600&id=${id}`;
  return `<img src="${imgUrl}" onerror="this.src='imagens/sem-foto.jpg'">`;
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
  return lines.map(line => {
    const cells = line.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g) || [];
    return cells.map(c => c.replace(/^"|"$/g, '').trim());
  });
}

function toggleDrawer() {
  document.getElementById("drawer").classList.toggle("active");
  document.getElementById("overlay").style.display = 
    document.getElementById("drawer").classList.contains("active") ? "block" : "none";
}

async function carregarEstoque() {
  try {
    const resp = await fetch(urlPlanilha);
    const text = await resp.text();
    const dados = parseCSV(text);
    dados.shift(); 
    estoque = {};
    dados.forEach(l => {
      const nome = l[0];
      if (!nome) return;
      estoque[nome] = {
        camadas: l[1] || "Não inf.",
        cores: l[2] || "Não inf.",
        padrao: l[3] || "Não inf.",
        qtd: parseInt(l[5]) || 0,
        midia: l[6] || ""
      };
    });
    gerarInterfaceFiltros();
    montarCatalogo();
  } catch (e) { grid.innerHTML = "<p>Erro ao carregar ID's.</p>"; }
}

function gerarInterfaceFiltros() {
  drawer.innerHTML = '<button class="fechar-drawer" onclick="toggleDrawer()">&times;</button><h3 style="margin-top:0">Filtros</h3>';
  colunasDeFiltro.forEach(col => {
    const valoresUnicos = new Set();
    Object.values(estoque).forEach(item => { if (item[col]) valoresUnicos.add(item[col]); });
    let html = `<div><p style="font-size:11px; font-weight:700; margin-bottom:10px;">${col.toUpperCase()}</p>`;
    html += `<div class="pill ${!filtrosAtivos[col] ? 'active' : ''}" onclick="aplicarFiltro('${col}', '')">Todas</div>`;
    Array.from(valoresUnicos).sort().forEach(val => {
      html += `<div class="pill ${filtrosAtivos[col] === val ? 'active' : ''}" onclick="aplicarFiltro('${col}', '${val}')">${val}</div>`;
    });
    html += `</div><br>`;
    drawer.innerHTML += html;
  });
}

function aplicarFiltro(coluna, valor) {
  if (valor === "" || valor === "Todas") delete filtrosAtivos[coluna];
  else filtrosAtivos[coluna] = valor;
  
  gerarInterfaceFiltros();
  atualizarTagsFiltros(); // ATUALIZA A BARRA DE CIMA
  montarCatalogo();
}

// FUNÇÃO PARA MOSTRAR OS FILTROS IGUAL AO SITE ANTIGO
function atualizarTagsFiltros() {
    listaFiltrosAtivos.innerHTML = "";
    for (let col in filtrosAtivos) {
        if (filtrosAtivos[col]) {
            const tag = document.createElement("div");
            tag.className = "tag-filtro-ativa";
            tag.innerText = filtrosAtivos[col].toUpperCase();
            listaFiltrosAtivos.appendChild(tag);
        }
    }
}

function montarCatalogo() {
  grid.innerHTML = "";
  Object.keys(estoque).sort().forEach(nome => {
    const d = estoque[nome];
    if (filtroTexto && !nome.toLowerCase().includes(filtroTexto.toLowerCase())) return;
    let passa = true;
    for (let f in filtrosAtivos) { if (d[f] !== filtrosAtivos[f]) passa = false; }
    if (!passa) return;

    const card = document.createElement("div");
    card.className = "item" + (selecionados.has(nome) ? " selecionado" : "");
    card.id = "card_" + nome.replace(/\W/g, "_");
    card.innerHTML = `
      ${getMidiaHTML(d.midia)}
      <p>${nome}</p>
      <div class="estoque-status ${d.qtd > 0 ? 'disponivel' : 'encomenda'}">
        ${d.qtd > 0 ? 'Disponível' : 'Por Encomenda'}
      </div>`;
    
    card.onclick = () => {
      if (inputPesquisa.value !== "") {
        inputPesquisa.value = "";
        filtroTexto = "";
        if (selecionados.has(nome)) selecionados.delete(nome); else selecionados.add(nome);
        montarCatalogo(); 
      } else {
        if (selecionados.has(nome)) {
          selecionados.delete(nome);
          card.classList.remove("selecionado");
        } else {
          selecionados.add(nome);
          card.classList.add("selecionado");
        }
      }
      atualizarPainelAcoes();
    };
    grid.appendChild(card);
  });
}

function atualizarPainelAcoes() {
  const btn = document.getElementById("btnEnviar");
  if (selecionados.size > 0) {
    btn.classList.remove("oculto");
    areaSelecao.style.display = "block";
    
    if (selecionados.size === 1) {
      btn.innerText = "Solicitar informação sobre a ID selecionada";
    } else {
      btn.innerText = `Solicitar informações sobre as ${selecionados.size} IDs selecionadas`;
    }
    atualizarTags();
  } else {
    btn.classList.add("oculto");
    areaSelecao.style.display = "none";
  }
}

function atualizarTags() {
  containerTags.innerHTML = "";
  selecionados.forEach(nome => {
    const tag = document.createElement("div");
    tag.className = "tag-item";
    tag.innerHTML = `${nome} <button onclick="removerSelecao('${nome}')">&times;</button>`;
    containerTags.appendChild(tag);
  });
}

function removerSelecao(nome) {
  selecionados.delete(nome);
  montarCatalogo();
  atualizarPainelAcoes();
}

function enviarPedido() {
  const ids = Array.from(selecionados);
  let mensagem = "";
  if (ids.length === 1) {
    mensagem = `Olá! Tenho interesse no enxerto da ID ${ids[0]} e queria saber mais informações e o valor.`;
  } else {
    mensagem = `Olá! Tenho interesse nos enxertos das IDs ${ids.join(", ")} e queria saber mais informações e valores.`;
  }
  window.open("https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem), "_blank");
}

inputPesquisa.oninput = (e) => { filtroTexto = e.target.value; montarCatalogo(); };
carregarEstoque();

function acessarAdmin() {
  // Pede a senha para evitar que curiosos entrem
  const senha = prompt("Acesso Restrito. Digite a senha:");
  if (senha === "123456") { // Você pode mudar a senha aqui
    window.location.href = "admin.html";
  } else if (senha !== null) {
    alert("Senha incorreta!");
  }
}

</script>
</body>
</html>
