<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Flores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: #f8f5f0;
  margin: 0;
  padding-bottom: 200px;
}

.topbar {
  background: #3a3618;
  padding: 12px 0;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  max-width: 600px;
  margin: auto;
  padding: 0 15px;
}

.logo img { width: 70px; }

.info-topo h1 { margin: 0; color: white; font-size: 18px; }
.subtitulo { margin: 0; font-size: 13px; color: #d6d6d6; }

.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.item:hover {
  transform: translateY(-3px);
}

.item.selecionado {
  background: rgba(58,54,24,0.15);
}

.item p {
  text-align: center;
  font-size: 14px;
  margin: 8px 0 2px 0;
  font-weight: 500;
}

.estoque {
  text-align: center;
  font-size: 12px;
  color: #3a3618;
  margin-bottom: 4px;
}

img { width: 100%; border-radius: 8px; }

.botoes-acoes {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #f8f5f0;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* CAIXA SELECIONADOS */
.caixa-selecao {
  display: none;
  background: white;
  padding: 10px;
  border-radius: 12px;
}

.topo-caixa {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.topo-caixa span {
  font-size: 13px;
  font-weight: 500;
}

.limpar {
  font-size: 12px;
  color: #3a3618;
  cursor: pointer;
}

/* TAGS */
#listaSelecionadas {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag {
  font-size: 11px;
  font-weight: 500;
  background: #f3efe9;
  border-radius: 20px;
  padding: 4px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
  border: 1px solid rgba(58,54,24,0.08);
}

.tag button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: #3a3618;
  opacity: 0.7;
  transition: 0.2s;
}

.tag button:hover {
  opacity: 1;
  transform: scale(1.2);
}

/* BUSCA */
.busca {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: 2px solid #3a3618;
  text-align: center;
  background: #f8f5f0;
}

/* BOTÃO */
.botao-whatsapp {
  width: 100%;
  padding: 14px;
  background: #3a3618;
  color: white;
  border: none;
  border-radius: 30px;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="header">
    <div class="logo"><img src="logo.jpg"></div>
    <div class="info-topo">
      <h1>Gravatá Rosas do Deserto</h1>
      <p class="subtitulo">Enxertos de Adenium Obesum</p>
    </div>
  </div>
</div>

<div class="catalogo" id="catalogo"></div>

<div class="botoes-acoes">

  <div class="caixa-selecao">
    <div class="topo-caixa">
      <span>ID's selecionadas:</span>
      <span class="limpar" onclick="limparSelecao()">Limpar tudo</span>
    </div>
    <div id="listaSelecionadas"></div>
  </div>

  <input type="text" id="busca" class="busca" placeholder="Buscar por ID...">

  <button class="botao-whatsapp" onclick="enviarWhatsApp()">
    Pedir informações (<span id="contador">0</span>)
  </button>

</div>

<script>
const flores = [
"AÇUCENA (MUTANTE)","AKACHI","AMATTA","ARYA","BLOODY MARY","BP-116",
"BRANCA DE NEVE","BRIDAL BOUQUET","CANAN 55","CANAN 170","CAPIXABA",
"CÉU ESTRELADO","CÉU ESTRELADO VARIEGATA","COPENHAGEN","DAFNE","DIỆU CHÂU","COCA-COLA",
"DOUBLE STAR","DUQUESA","EGG ROLL","ELARA","ELLIE","EV19-XANADÚ",
"FERRARI","GOLDEN FAITH","GRAPE CHOCOLATE","GUARÁ PITANGA",
"GTA-AIKA","GTA-BOLD","GTA-CANDY CRUSH","GTA-CÓSMICA","GTA-CREPÚSCULO",
"GTA-DESERT DOLL","GTA-DIANA","GTA-EMMA FROST","GTA-FAY","GTA-FLORZINHA",
"GTA-FLUTTERSHY","GTA-FRACTA","GTA-GOLDEN PINK","GTA-ICE DRAGON",
"GTA-KIMBERLY","GTA-LITTLE KISS","GTA-LOLLIPOP BLACK","GTA-LYSSA",
"GTA-LYTA","GTA-MISS GRAVATÁ","GTA-NYX","GTA-PERONA","GTA-PINK VENOM",
"GTA-PINKIE PIE","GTA-RED COMETS","GTA-RED STORM","GTA-RED WIDOW",
"GTA-SANSA","GTA-SHE HA","GTA-SUN CLUSTER","GTA-SWEET BLUSH",
"GTA-TRINITY","GTA-TRUE FAITH","GTA-YUNA","HELENA","INDIGO GLAZE",
"INFINITY","JHULLY","JULIUS CAESAR","KING OF KINGS","KINDLY","L-06",
"LAILA","LILAC FROST (MUTANTE)","LM-440","LM-50","LM2","LUNA",
"MAGNIFICAT","MARIA","MIDNIGHT","MỘNG CẦM","MORAN","NANCY","NEMO",
"NORALINE","NUSA","P-200","PATHUMMA","PEONY","PHARAOH","PURPLE BLUE",
"QUEEN RAY","RF-001","RF-002","RIHANNA","ROMANTIC EDGE","SANTA CLAUS",
"SATURNO","SENNA","SIENA","SOCHI","SOPHIA","STAR CLUSTER","SWALLOW",
"RC-04","THAMIRES","THE SECRET OF VICTORIA","TRIPLE WISH","TROPICAL","TS-69",
"TS-222","TS-330","TW4","UNPARALLELED","VARIEGATA","VAMPIRA",
"VIÚVA NEGRA","VOLCANO","W59","YÚ JIǍO"
];

const estoque = {};
flores.forEach(nome => estoque[nome] = 0);

const catalogo = document.getElementById("catalogo");
const buscaInput = document.getElementById("busca");
let selecionados = new Set();

function gerarNomeArquivo(nome){
  return nome.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/ /g, "-")
    .replace(/[()]/g, "");
}

function renderCatalogo(){
  catalogo.innerHTML = "";

  flores.forEach(nome=>{
    let div = document.createElement("div");
    div.className = "item";

    if(selecionados.has(nome)) div.classList.add("selecionado");

    let arquivo = gerarNomeArquivo(nome);
    let qtd = estoque[nome];

    let texto = qtd > 0
      ? `Enxertos disponíveis: ${qtd} (envio imediato)`
      : `Enxertos disponíveis: 0 (pode encomendar)`;

    div.innerHTML = `
      <img src="imagens/${arquivo}.jpg" onerror="this.src='imagens/sem-foto.jpg'">
      <p>${nome}</p>
      <div class="estoque">${texto}</div>
    `;

    div.onclick = ()=>{
      if(selecionados.has(nome)) selecionados.delete(nome);
      else selecionados.add(nome);

      atualizar();
      buscaInput.value = "";
      mostrarTodas();
    };

    catalogo.appendChild(div);
  });
}

function atualizar(){
  const caixa = document.querySelector(".caixa-selecao");
  const lista = document.getElementById("listaSelecionadas");

  lista.innerHTML = "";

  if(selecionados.size > 0){
    caixa.style.display = "block";

    selecionados.forEach(nome=>{
      let tag = document.createElement("div");
      tag.className = "tag";
      tag.innerHTML = `
        ${nome}
        <button onclick="removerItem('${nome}')">×</button>
      `;
      lista.appendChild(tag);
    });
  } else {
    caixa.style.display = "none";
  }

  const total = selecionados.size;
document.getElementById("contador").innerText = total;

const botao = document.querySelector(".botao-whatsapp");

if(total === 1){
  botao.innerHTML = `Pedir informações do <span id="contador">${total}</span> selecionado`;
} else {
  botao.innerHTML = `Pedir informações dos <span id="contador">${total}</span> selecionados`;
}
  renderCatalogo();
}

function removerItem(nome){
  selecionados.delete(nome);
  atualizar();
}

function limparSelecao(){
  selecionados.clear();
  atualizar();
}

function mostrarTodas(){
  document.querySelectorAll(".item").forEach(div=>div.style.display="block");
}

buscaInput.addEventListener("input", ()=>{
  let termo = buscaInput.value.toLowerCase();

  document.querySelectorAll(".item").forEach(div=>{
    div.style.display = div.innerText.toLowerCase().includes(termo) ? "block" : "none";
  });
});

function enviarWhatsApp(){
  if(selecionados.size === 0){
    alert("Selecione pelo menos uma flor!");
    return;
  }

  let ids = Array.from(selecionados);

  let texto = ids.length === 1
    ? "Tenho interesse em adquirir enxerto da seguinte variedade:\n\n- "
    : "Tenho interesse em adquirir enxertos das seguintes variedades:\n\n- ";

  let mensagem = [
    "Olá!",
    "",
    texto + ids.join("\n- "),
    "",
    "Poderia me dar mais informações? Tenho a seguinte duvida...?"
  ].join("\n");

  let url = "https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}

renderCatalogo();
</script>

</body>
</html>
