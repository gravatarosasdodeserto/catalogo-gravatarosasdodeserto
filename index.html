<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Gravatá RD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfbf7;
            --surface: #ffffff;
            --text-primary: #2e2a15;
            --text-secondary: #7d6e53;
            --accent: #a08c6b;
            --accent-dark: #7d6e53;
            --border: #eceae4;
            --radius: 12px;
            --premium-grad: linear-gradient(135deg, #a08c6b 0%, #7d6e53 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text-primary); overflow-x: hidden; }

        /* --- HEADER --- */
        header { 
            height: 180px; 
            background: url('imagens/gravata-cabecalho.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-box {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 35px;
            border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }
        .logo { width: 130px; display: block; }

        /* --- BUSCA --- */
        .search-container {
            padding: 20px;
            background: var(--bg);
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--border);
        }
        .search-box {
            width: 100%; max-width: 600px; padding: 12px 25px;
            border-radius: 50px; border: 1px solid var(--border);
            background: var(--surface); outline: none; font-size: 15px;
        }

        /* --- DRAWER (GAVETA) --- */
        .sidebar { 
            position: fixed; left: -320px; top: 0; width: 320px; height: 100%;
            background: var(--surface); z-index: 3000; padding: 35px 25px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.3); 
            z-index: 2999; display: none; backdrop-filter: blur(3px);
        }
        .overlay.active { display: block; }

        .filter-section { margin-bottom: 30px; }
        .filter-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        .check-group { display: flex; flex-direction: column; gap: 12px; }
        .check-item { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 13px; color: var(--text-secondary); }
        .check-item input { accent-color: var(--accent); width: 18px; height: 18px; }

        /* --- ACTION BAR RODAPÉ --- */
        .action-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 550px;
            background: rgba(46, 42, 21, 0.98);
            backdrop-filter: blur(15px);
            padding: 10px 10px 10px 25px;
            border-radius: 100px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .btn-filter {
            background: none; border: none; color: white; font-weight: 500;
            font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .btn-request {
            background: var(--premium-grad); color: white; padding: 12px 28px;
            border-radius: 50px; font-size: 13px; font-weight: 600; text-decoration: none;
            display: none; border: none; cursor: pointer;
            box-shadow: 0 4px 15px rgba(125, 110, 83, 0.4);
        }

        /* --- GRID --- */
        .container { max-width: 1400px; margin: auto; padding: 25px 15px 130px; }
        #catalogo { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
        }
        .card { 
            background: var(--surface); border-radius: var(--radius); overflow: hidden; 
            border: 1px solid var(--border); cursor: pointer; position: relative; transition: 0.3s;
        }
        .card.selected { border: 3px solid var(--accent); transform: scale(0.98); }
        .img-container { width: 100%; aspect-ratio: 1/1; background: #f7f6f2; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 12px; text-align: center; }
        .info h3 { font-size: 14px; font-weight: 500; letter-spacing: 0.5px; }
        
        .badge { 
            position: absolute; top: 8px; right: 8px; padding: 3px 8px; border-radius: 50px;
            font-size: 8px; font-weight: 700; background: rgba(255,255,255,0.9);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        @media (max-width: 600px) {
            #catalogo { grid-template-columns: 1fr 1fr; gap: 10px; }
            .action-bar { padding-left: 15px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<aside class="sidebar" id="sidebar">
    <h2 style="font-size: 1.2rem; margin-bottom: 30px; font-weight: 600;">Filtros de Luxo</h2>
    
    <div class="filter-section">
        <div class="filter-title">Cores (Múltiplo)</div>
        <div class="check-group" id="container-cores"></div>
    </div>

    <div class="filter-section">
        <div class="filter-title">Camadas (Único)</div>
        <div class="check-group" id="container-camadas"></div>
    </div>

    <div class="filter-section">
        <div class="filter-title">Padrão (Único)</div>
        <div class="check-group" id="container-padrao"></div>
    </div>

    <div class="filter-section">
        <div class="filter-title">Padroes Especiais (Múltiplo)</div>
        <div class="check-group" id="container-especiais"></div>
    </div>

    <button onclick="toggleMenu()" style="width:100%; background:var(--text-primary); color:white; border:none; padding:15px; border-radius:8px; font-weight:600; cursor:pointer; margin-top:10px;">APLICAR FILTROS</button>
</aside>

<header>
    <div class="logo-box"><img src="logo.png" class="logo"></div>
</header>

<div class="search-container">
    <input type="text" id="search" class="search-box" placeholder="Procurar Rosa ou ID..." oninput="filtrar()">
</div>

<main class="container">
    <div id="catalogo"></div>
</main>

<div class="action-bar">
    <button class="btn-filter" onclick="toggleMenu()">
        <span style="font-size:18px">≡</span> FILTRAR
    </button>
    <div id="info-selecao" style="color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 300;">
        Escolha suas preferidas
    </div>
    <button class="btn-request" id="btn-whats" onclick="enviarPedido()">
        SOLICITAR (<span id="count">0</span>)
    </button>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzgV_H5QLTNwJ12B-78q57qNnlaVi0vbxW3jIqdnp7YH1IKCdBdFthIHymlMM9Jusqktg/exec";
    let DADOS = [], SELECIONADOS = new Set(), DADOS_FILTRADOS = [];

    async function carregar() {
        try {
            const r = await fetch(API + "?action=get&t=" + Date.now());
            const json = await r.json();
            DADOS = Object.keys(json).map(k => ({
                nome: k, camadas: json[k].camadas, cores: json[k].cores,
                padrao: json[k].padrao, especiais: json[k].especiais,
                qtd: parseInt(json[k].qtd) || 0, midia: json[k].midia
            }));
            DADOS_FILTRADOS = [...DADOS];
            popularFiltros();
            render();
        } catch (e) { console.error("Erro na carga"); }
    }

    function popularFiltros() {
        const preencher = (id, chave, isRadio = false) => {
            const container = document.getElementById(id);
            container.innerHTML = "";
            let itens = [];
            
            // Tratamento especial para colunas que podem ter múltiplos valores separados por vírgula (Cores e Especiais)
            if (chave === 'cores' || chave === 'especiais') {
                let todosValores = [];
                DADOS.forEach(d => {
                    if(d[chave]) d[chave].split(',').forEach(v => todosValores.push(v.trim()));
                });
                itens = [...new Set(todosValores)];
            } else {
                itens = [...new Set(DADOS.map(d => d[chave]))];
            }

            itens.filter(v => v).sort().forEach(val => {
                const type = isRadio ? 'radio' : 'checkbox';
                const nameAttr = isRadio ? `name="${chave}"` : "";
                container.innerHTML += `
                    <label class="check-item">
                        <input type="${type}" ${nameAttr} value="${val}" onchange="filtrar()"> ${val}
                    </label>
                `;
            });
        };

        preencher('container-cores', 'cores'); // Checkbox
        preencher('container-camadas', 'camadas', true); // Radio
        preencher('container-padrao', 'padrao', true); // Radio
        preencher('container-especiais', 'especiais'); // Checkbox
    }

    function render() {
        const container = document.getElementById("catalogo");
        container.innerHTML = DADOS_FILTRADOS.map(d => {
            const sel = SELECIONADOS.has(d.nome);
            const foto = d.midia ? `https://drive.google.com/thumbnail?sz=w600&id=${d.midia}` : 'imagens/sem-foto.jpg';
            return `
                <div class="card ${sel ? 'selected' : ''}" onclick="toggleSelecao('${d.nome}')">
                    <div class="badge" style="color:${d.qtd > 0 ? '#28a745' : '#a08c6b'}">${d.qtd > 0 ? 'DISPONÍVEL' : 'ENCOMENDAR'}</div>
                    <div class="img-container"><img src="${foto}" loading="lazy"></div>
                    <div class="info">
                        <h3>${d.nome}</h3>
                    </div>
                </div>`;
        }).join('');
    }

    function toggleSelecao(nome) {
        if (SELECIONADOS.has(nome)) SELECIONADOS.delete(nome); else SELECIONADOS.add(nome);
        const count = SELECIONADOS.size;
        document.getElementById('btn-whats').style.display = count > 0 ? 'block' : 'none';
        document.getElementById('info-selecao').style.display = count > 0 ? 'none' : 'block';
        document.getElementById('count').innerText = count;
        render();
    }

    function filtrar() {
        const busca = document.getElementById("search").value.toLowerCase();
        
        // Captura valores dos filtros
        const getChecks = id => [...document.querySelectorAll(`#${id} input:checked`)].map(i => i.value);
        
        const coresSel = getChecks('container-cores');
        const camadasSel = getChecks('container-camadas');
        const padraoSel = getChecks('container-padrao');
        const especiaisSel = getChecks('container-especiais');

        DADOS_FILTRADOS = DADOS.filter(d => {
            const matchBusca = d.nome.toLowerCase().includes(busca);
            
            // Lógica acumulativa para cores (se a flor tem QUALQUER uma das cores selecionadas)
            const matchCores = coresSel.length === 0 || coresSel.some(c => d.cores && d.cores.includes(c));
            
            // Lógica única para camadas e padrão
            const matchCamadas = camadasSel.length === 0 || camadasSel.includes(d.camadas);
            const matchPadrao = padraoSel.length === 0 || padraoSel.includes(d.padrao);

            // Lógica acumulativa para especiais
            const matchEsp = especiaisSel.length === 0 || especiaisSel.some(e => d.especiais && d.especiais.includes(e));

            return matchBusca && matchCores && matchCamadas && matchPadrao && matchEsp;
        });
        render();
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function enviarPedido() {
        const saudacao = "Olá, Gravatá RD! 👋";
        const corpo = `Gostaria de solicitar informações sobre estas IDs que selecionei no catálogo:\n\n*${Array.from(SELECIONADOS).join(', ')}*`;
        const url = `https://wa.me/5581992665421?text=${encodeURIComponent(saudacao + "\n\n" + corpo)}`;
        window.open(url, '_blank');
    }

    window.onload = carregar;
</script>
</body>
</html>
