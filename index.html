<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Flores | Gravatá</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== PALETA DE CORES CONTRASTANTE ===== */
:root {
  --header-bg: #fcfaf7;    /* Mais claro (Pérola) */
  --body-bg: #e5e0d8;      /* Mais escuro (Fendi/Areia Escuro) */
  --text-main: #3a3618;    /* Verde Oliva Profundo */
  --card-bg: #ffffff;      /* Branco puro para os produtos */
  --accent: #4a4521;
}

* { 
  box-sizing: border-box; 
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--body-bg);
  color: var(--text-main);
  margin: 0;
  /* Espaço exato para o novo rodapé sólido */
  padding-bottom: 180px; 
  line-height: 1.5;
  /* Sombra interna no topo do corpo para marcar a divisão */
  box-shadow: inset 0 10px 15px -10px rgba(0,0,0,0.1);
}

/* ===== HEADER CLARO E DEFINIDO ===== */
.topbar {
  background: var(--header-bg);
  padding: 35px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  /* Borda inferior sutil para nitidez */
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('imagens/folhas-topo.png');
  background-size: cover;
  background-position: center;
  opacity: 1;
  z-index: 1;
}

.header {
  position: relative;
  z-index: 3;
}

.logo img {
  width: 145px;
  height: auto;
  display: block;
}

/* ===== CONTEÚDO ===== */
.instrucoes {
  max-width: 600px;
  margin: 40px auto 20px;
  padding: 0 25px;
  text-align: center;
}

.instrucoes p {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
  color: var(--text-main);
}

.instrucoes span {
  font-size: 13px;
  opacity: 0.7;
  display: block;
  margin-top: 6px;
}

.filtro-disponivel {
  max-width: 600px;
  margin: 0 auto 30px;
  display: flex;
  justify-content: center;
}

.switch-disponivel {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-main);
  background: rgba(255, 255, 255, 0.3);
  padding: 8px 16px;
  border-radius: 50px;
  cursor: pointer;
}

.switch-disponivel input { display: none; }

.switch-disponivel .slider {
  position: relative;
  width: 38px;
  height: 20px;
  background: #c7c1b5;
  border-radius: 20px;
  transition: 0.3s;
}

.switch-disponivel .slider::before {
  content: "";
  position: absolute;
  width: 14px;
  height: 14px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

.switch-disponivel input:checked + .slider { background: var(--text-main); }
.switch-disponivel input:checked + .slider::before { transform: translateX(18px); }

/* ===== GRID DE ITENS ===== */
.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap: 20px;
  padding: 0 20px;
  max-width: 1100px;
  margin: 0 auto;
}

.item {
  background: var(--card-bg);
  padding: 12px;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
  transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  border: 1px solid rgba(0,0,0,0.02);
}

.item:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 35px rgba(58, 54, 24, 0.15);
}

.item video, .item img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 14px;
  background: #f9f9f9;
}

.item p {
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  margin: 12px 0 2px 0;
}

.estoque {
  text-align: center;
  font-size: 11px;
  color: #8a8471;
  font-weight: 500;
}

.item.selecionado {
  background: #fff;
  outline: 3px solid var(--text-main);
}

/* ===== RODAPÉ SÓLIDO E FIXO ===== */
.botoes-acoes {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  /* Fundo sólido acompanhando o corpo, mas com leve transparência */
  background-color: rgba(229, 224, 216, 0.98); 
  backdrop-filter: blur(5px);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
  /* Preenchimento interno para os elementos */
  padding: 15px 20px 20px 20px; 
  /* Borda superior para definir o início do rodapé */
  border-top: 1px solid rgba(0,0,0,0.1);
  box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
}

/* Centraliza o conteúdo do rodapé em telas grandes */
.botoes-acoes > * {
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.caixa-selecao {
  display: none;
  background: white;
  padding: 12px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  max-height: 100px;
  overflow-y: auto;
  width: 100%;
}

.topo-caixa {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 8px;
}

.limpar { color: #8b2d2d; cursor: pointer; }

#listaSelecionadas { display: flex; flex-wrap: wrap; gap: 6px; }

.tag {
  font-size: 10px;
  background: #f0f0eb;
  border-radius: 6px;
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.tag button {
  background: none; border: none; font-weight: bold; cursor: pointer; color: #8b2d2d; font-size: 12px; padding: 0;
}

.busca {
  width: 100%;
  padding: 14px 20px;
  border-radius: 50px;
  border: 1px solid rgba(0,0,0,0.1);
  background: white;
  font-family: inherit;
  font-size: 14px;
  outline: none;
}

.botao-whatsapp {
  width: 100%;
  padding: 16px;
  background: var(--text-main);
  color: white;
  border: none;
  border-radius: 50px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.botao-whatsapp:hover { background: #2d2a16; }

.oculto { display: none; }

.nada-encontrado {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 0;
  color: #8a8471;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
.item { animation: fadeInUp 0.5s ease backwards; }
</style>
</head>

<body>

<div class="topbar">
  <div class="header">
    <div class="logo">
      <img src="logo.png" alt="Gravatá Rosas do Deserto">
    </div>
  </div>
</div>

<div class="instrucoes">
  <p>Catálogo de Variedades</p>
  <span>Selecione as ID's desejadas para consultar via WhatsApp.</span>
</div>

<div class="filtro-disponivel">
  <label class="switch-disponivel">
    <input type="checkbox" id="filtroDisponivel">
    <span class="slider"></span>
    Apenas Pronta Entrega
  </label>
</div>

<div class="catalogo" id="catalogo"></div>

<div class="botoes-acoes">
  <div class="caixa-selecao">
    <div class="topo-caixa">
      <span>Itens Selecionados</span>
      <span class="limpar" onclick="limparSelecao()">Limpar tudo</span>
    </div>
    <div id="listaSelecionadas"></div>
  </div>

  <input type="text" id="busca" class="busca" placeholder="Pesquisar ID ou nome...">

  <button class="botao-whatsapp oculto" onclick="enviarWhatsApp()">
    Solicitar informações
  </button>
</div>

<script>
/* SISTEMA ORIGINAL MANTIDO INTEGRALMENTE */
const flores = [
"AÇUCENA (MUTANTE)","AKACHI","AMATTA","ARYA","BLOODY MARY","BP-116",
"BRANCA DE NEVE","BRIDAL BOUQUET","CANAN 55","CANAN 170","CAPIXABA",
"CÉU ESTRELADO","CÉU ESTRELADO VARIEGATA","COPENHAGEN","DAFNE","DIỆU CHÂU","COCA-COLA",
"DOUBLE STAR","DUQUESA","EGG ROLL","ELARA","ELLIE","EV19-XANADÚ",
"FERRARI","GOLDEN FAITH","GRAPE CHOCOLATE","GUARÁ PITANGA",
"GTA-AIKA","GTA-BOLD","GTA-CANDY CRUSH","GTA-CÓSMICA","GTA-CREPÚSCULO",
"GTA-DESERT DOLL","GTA-DIANA","GTA-EMMA FROST","GTA-FAY","GTA-FLORZINHA",
"GTA-FLUTTERSHY","GTA-FRACTA","GTA-GOLDEN PINK","GTA-ICE DRAGON",
"GTA-KIMBERLY","GTA-LITTLE KISS","GTA-LOLLIPOP BLACK","GTA-LYSSA",
"GTA-LYTA","GTA-MISS GRAVATÁ","GTA-NYX","GTA-PERONA","GTA-PINK VENOM",
"GTA-PINKIE PIE","GTA-RED COMETS","GTA-RED STORM","GTA-RED WIDOW",
"GTA-SANSA","GTA-SHE HA","GTA-SUN CLUSTER","GTA-SWEET BLUSH",
"GTA-TRINITY","GTA-TRUE FAITH","GTA-YUNA","HELENA","INDIGO GLAZE",
"INFINITY","JHULLY","JULIUS CAESAR","KING OF KINGS","KINDLY","L-06",
"LAILA","LILAC FROST (MUTANTE)","LM-440","LM-50","LM-02","LUNA",
"MAGNIFICAT","MARIA","MIDNIGHT","MỘNG CẦM","MORAN","NANCY","NEMO",
"NORALINE","NUSA","P-200","PATHUMMA","PEONY","PHARAOH","PURPLE BLUE",
"QUEEN RAY","RF-001","RF-002","RIHANNA","ROMANTIC EDGE","SANTA CLAUS",
"SATURNO","SENNA","SIENA","SOCHI","SOPHIA","STAR CLUSTER","SWALLOW",
"RC-04","THAMIRES","THE SECRET OF VICTORIA","TRIPLE WISH","TROPICAL","TS-69",
"TS-222","TS-330","TW4","UNPARALLELED","VARIEGATA","VAMPIRA",
"VIÚVA NEGRA","VOLCANO","W59","YÚ JIǍO"
];

const estoque = {
  "AÇUCENA (MUTANTE)": 1, "AKACHI": 0, "AMATTA": 1, "ARYA": 0, "BLOODY MARY": 0, "BP-116": 0, "BRANCA DE NEVE": 0, "BRIDAL BOUQUET": 0, "CANAN 55": 0, "CANAN 170": 0, "CAPIXABA": 0, "CÉU ESTRELADO": 2, "CÉU ESTRELADO VARIEGATA": 0, "COPENHAGEN": 0, "DAFNE": 0, "DIỆU CHÂU": 0, "COCA-COLA": 0, "DOUBLE STAR": 0, "DUQUESA": 0, "EGG ROLL": 0, "ELARA": 0, "ELLIE": 0, "EV19-XANADÚ": 0, "FERRARI": 0, "GOLDEN FAITH": 0, "GRAPE CHOCOLATE": 0, "GUARÁ PITANGA": 0, "GTA-AIKA": 0, "GTA-BOLD": 0, "GTA-CANDY CRUSH": 0, "GTA-CÓSMICA": 0, "GTA-CREPÚSCULO": 0, "GTA-DESERT DOLL": 0, "GTA-DIANA": 0, "GTA-EMMA FROST": 0, "GTA-FAY": 0, "GTA-FLORZINHA": 0, "GTA-FLUTTERSHY": 0, "GTA-FRACTA": 0, "GTA-GOLDEN PINK": 0, "GTA-ICE DRAGON": 0, "GTA-KIMBERLY": 0, "GTA-LITTLE KISS": 0, "GTA-LOLLIPOP BLACK": 0, "GTA-LYSSA": 0, "GTA-LYTA": 0, "GTA-MISS GRAVATÁ": 0, "GTA-NYX": 0, "GTA-PERONA": 0, "GTA-PINK VENOM": 0, "GTA-PINKIE PIE": 0, "GTA-RED COMETS": 0, "GTA-RED STORM": 0, "GTA-RED WIDOW": 0, "GTA-SANSA": 0, "GTA-SHE HA": 0, "GTA-SUN CLUSTER": 0, "GTA-SWEET BLUSH": 0, "GTA-TRINITY": 0, "GTA-TRUE FAITH": 0, "GTA-YUNA": 0, "HELENA": 0, "INDIGO GLAZE": 0, "INFINITY": 0, "JHULLY": 0, "JULIUS CAESAR": 0, "KING OF KINGS": 0, "KINDLY": 0, "L-06": 0, "LAILA": 0, "LILAC FROST (MUTANTE)": 0, "LM-440": 0, "LM-50": 0, "LM-02": 0, "LUNA": 0, "MAGNIFICAT": 0, "MARIA": 0, "MIDNIGHT": 0, "MỘNG CẦM": 0, "MORAN": 0, "NANCY": 0, "NEMO": 0, "NORALINE": 0, "NUSA": 0, "P-200": 0, "PATHUMMA": 0, "PEONY": 0, "PHARAOH": 0, "PURPLE BLUE": 0, "QUEEN RAY": 0, "RF-001": 0, "RF-002": 0, "RIHANNA": 0, "ROMANTIC EDGE": 0, "SANTA CLAUS": 0, "SATURNO": 0, "SENNA": 0, "SIENA": 0, "SOCHI": 0, "SOPHIA": 0, "STAR CLUSTER": 0, "SWALLOW": 0, "RC-04": 0, "THAMIRES": 0, "THE SECRET OF VICTORIA": 0, "TRIPLE WISH": 0, "TROPICAL": 0, "TS-69": 0, "TS-222": 0, "TS-330": 0, "TW4": 0, "UNPARALLELED": 0, "VARIEGATA": 0, "VAMPIRA": 0, "VIÚVA NEGRA": 0, "VOLCANO": 0, "W59": 0, "YÚ JIǍO": 0
};

flores.forEach(nome => { if (!(nome in estoque)) estoque[nome] = 0; });

const catalogo = document.getElementById("catalogo");
const buscaInput = document.getElementById("busca");
const filtroDisponivel = document.getElementById("filtroDisponivel");
let selecionados = new Set();
let apenasDisponiveis = false;
let termoBusca = "";

filtroDisponivel.addEventListener("change", () => {
  apenasDisponiveis = filtroDisponivel.checked;
  renderCatalogo();
});

buscaInput.addEventListener("input", ()=>{
  termoBusca = buscaInput.value.toLowerCase();
  renderCatalogo();
});

function gerarNomeArquivo(nome){
  return nome.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/ /g, "-")
    .replace(/[()]/g, "");
}

function renderCatalogo(){
  catalogo.innerHTML = "";
  let encontrados = 0;

  flores.forEach(nome=>{
    let qtd = estoque[nome];
    if(apenasDisponiveis && qtd === 0) return;
    if(termoBusca && !nome.toLowerCase().includes(termoBusca)) return;
    encontrados++;

    let div = document.createElement("div");
    div.className = "item";
    div.setAttribute("data-nome", nome);
    if(selecionados.has(nome)) div.classList.add("selecionado");

    let arquivo = gerarNomeArquivo(nome);
    let texto = qtd > 0 ? `Pronta Entrega (${qtd})` : `Sob encomenda`;

    let media = document.createElement("video");
    media.src = `imagens/${arquivo}.mp4`;
    media.poster = `imagens/${arquivo}.jpg`;
    media.muted = true; media.loop = true; media.playsInline = true;
    media.autoplay = true; media.preload = "auto";

    media.onerror = function(){
      let img = document.createElement("img");
      img.src = `imagens/${arquivo}.jpg`;
      img.onerror = function(){ this.src = 'imagens/sem-foto.jpg'; };
      this.replaceWith(img);
    };

    let p = document.createElement("p");
    p.textContent = nome;

    let est = document.createElement("div");
    est.className = "estoque";
    est.textContent = texto;

    div.appendChild(media);
    div.appendChild(p);
    div.appendChild(est);

    div.onclick = ()=>{
      if(selecionados.has(nome)) selecionados.delete(nome);
      else selecionados.add(nome);
      atualizar();
    };

    catalogo.appendChild(div);
  });
  
  if(encontrados === 0) {
    let msg = document.createElement("div");
    msg.className = "nada-encontrado";
    msg.innerText = "Nenhuma variedade encontrada";
    catalogo.appendChild(msg);
  }
}

function atualizar(){
  const caixa = document.querySelector(".caixa-selecao");
  const lista = document.getElementById("listaSelecionadas");
  lista.innerHTML = "";

  if(selecionados.size > 0){
    caixa.style.display = "block";
    selecionados.forEach(nome=>{
      let tag = document.createElement("div");
      tag.className = "tag";
      tag.innerHTML = `${nome} <button onclick="removerItem('${nome}')">×</button>`;
      lista.appendChild(tag);
    });
  } else {
    caixa.style.display = "none";
  }

  document.querySelectorAll(".item").forEach(div => {
    const nome = div.getAttribute("data-nome");
    div.classList.toggle("selecionado", selecionados.has(nome));
  });

  const total = selecionados.size;
  const botao = document.querySelector(".botao-whatsapp");

  if(total === 0){
    botao.classList.add("oculto");
  } else {
    botao.classList.remove("oculto");
    botao.innerHTML = `Consultar ${total} variedade${total > 1 ? 's' : ''}`;
  }
}

function removerItem(nome){ selecionados.delete(nome); atualizar(); }
function limparSelecao(){ selecionados.clear(); atualizar(); }

function enviarWhatsApp(){
  if(selecionados.size === 0) return;
  let ids = Array.from(selecionados);
  let mensagem = "Olá! Gostaria de informações sobre:\n\n- " + ids.join("\n- ");
  let url = "https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem);
  window.open(url, "_blank");
}

renderCatalogo();
atualizar();
</script>

</body>
</html>
