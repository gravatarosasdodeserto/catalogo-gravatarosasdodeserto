<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo | Gravatá Rosas do Deserto</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --header-bg: #fcfaf7;    
  --body-bg: #e5e0d8;      
  --card-white: #ffffff;    
  --card-selected: #cbc4b7; 
  --text-main: #3a3618;    
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--body-bg);
  color: var(--text-main);
  margin: 0;
  padding-bottom: 230px; 
}

/* ===== CABEÇALHO COM EFEITO SHOWROOM ===== */
.topbar {
  padding: 50px 0; 
  position: sticky;
  top: 0;
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18); 
  overflow: hidden;
  background-color: var(--header-bg);
  border-bottom: 2px solid #ffffff; 
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('imagens/gravata-cabecalho.jpg'); 
  background-size: cover;
  background-position: center;
  z-index: 1;
}

.white-frame {
  position: absolute;
  width: 100%;
  height: auto;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
}

.white-frame::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100px; 
  background-color: rgba(255, 255, 255, 0.7); 
}

.line-top {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 1px;
  background-color: #ffffff;
  transform: translateY(-50px); 
}

.line-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 1px;
  background-color: #ffffff;
  transform: translateY(50px); 
}

.logo { position: relative; z-index: 3; }
.logo img { 
  width: 170px; 
  height: auto;
  filter: drop-shadow(0 0 1px rgba(255,255,255,0.8)) drop-shadow(0 4px 15px rgba(0,0,0,0.4));
}

/* ===== PAINEL DE FILTROS ===== */
.container-filtros {
  max-width: 900px;
  margin: 20px auto;
  padding: 20px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 25px;
  backdrop-filter: blur(5px);
}

.grupo-filtro { margin-bottom: 20px; text-align: center; }
.titulo-filtro {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  margin-bottom: 10px;
  opacity: 0.6;
}

.scroll-filtros { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }

.pill {
  padding: 8px 18px;
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.05);
  border-radius: 50px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.pill.active { background: var(--text-main); color: white; border-color: var(--text-main); }

.wrapper-switch {
  display: flex; justify-content: center; margin-top: 15px;
  padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.05);
}

.switch-disponivel { display: inline-flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.switch-disponivel input { display: none; }
.switch-disponivel .slider { width: 34px; height: 18px; background: #c7c1b5; border-radius: 20px; position: relative; transition: 0.3s; }
.switch-disponivel .slider::before { content: ""; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.3s; }
.switch-disponivel input:checked + .slider { background: var(--text-main); }
.switch-disponivel input:checked + .slider::before { transform: translateX(16px); }

/* ===== GRID DO CATÁLOGO ===== */
.catalogo {
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap: 20px; padding: 0 20px; max-width: 1200px; margin: 0 auto;
}

@media (min-width: 1024px) { .catalogo { grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); } }

.item {
  background: var(--card-white);
  padding: 12px; border-radius: 20px; cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s;
}

.item.selecionado { background: var(--card-selected) !important; transform: scale(0.96); }
.item video, .item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 14px; }
.item p { text-align: center; font-size: 14px; font-weight: 600; margin: 12px 0 2px 0; }
.estoque-status { text-align: center; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.disponivel { color: #2d5a27; }
.encomenda { color: #8a8471; opacity: 0.7; }

/* ===== RODAPÉ ===== */
.rodape-acoes {
  position: fixed; bottom: 0; left: 0; width: 100%;
  background: rgba(229, 224, 216, 0.98); backdrop-filter: blur(12px);
  padding: 15px 20px 30px; z-index: 1000; border-top: 2px solid #ffffff; 
}

.container-rodape { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
.caixa-selecao { display: none; background: #ffffff; padding: 8px 12px; border-radius: 20px; max-height: 80px; overflow-y: auto; margin-bottom: 5px; }
.tag-item { font-size: 10px; background: #f0f0eb; padding: 6px 12px; border-radius: 10px; display: inline-flex; align-items: center; gap: 6px; margin: 0 4px 4px 0; }
.tag-item button { border: none; background: none; color: #8b2d2d; cursor: pointer; font-weight: bold; }
.campo-busca { width: 100%; padding: 15px 20px; border-radius: 50px; border: 1.5px solid rgba(0,0,0,0.1); background: white; outline: none; text-align: center; }
.btn-whatsapp { width: 100%; padding: 18px; background: var(--text-main); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
.oculto { display: none; }
.vazio { grid-column: 1/-1; text-align: center; padding: 60px; opacity: 0.5; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><img src="logo.png"></div>
  <div class="white-frame">
    <div class="line-top"></div>
    <div class="line-bottom"></div>
  </div>
</div>

<div class="container-filtros">
  <div class="grupo-filtro">
    <div class="titulo-filtro">Tipo e Camadas</div>
    <div class="scroll-filtros" id="filtroCategorias">
      <div class="pill active" onclick="filtrarCategoria('Todas', this)">Todas</div>
      <div class="pill" onclick="filtrarCategoria('Singela', this)">Singela</div>
      <div class="pill" onclick="filtrarCategoria('Dupla', this)">Dupla</div>
      <div class="pill" onclick="filtrarCategoria('Tripla+', this)">Tripla+</div>
      <div class="pill" onclick="filtrarCategoria('Mutante', this)">Mutante</div>
      <div class="pill" onclick="filtrarCategoria('Variegata', this)">Variegata</div>
    </div>
  </div>

  <div class="grupo-filtro">
    <div class="titulo-filtro">Famílias de Cores</div>
    <div class="scroll-filtros" id="filtroCores">
      <div class="pill active" onclick="filtrarCor('Todas', this)">Todas</div>
      <div class="pill" onclick="filtrarCor('Escuras', this)">Escuras</div>
      <div class="pill" onclick="filtrarCor('Claras', this)">Claras</div>
      <div class="pill" onclick="filtrarCor('Amarelas', this)">Amarelas</div>
      <div class="pill" onclick="filtrarCor('Vermelhas', this)">Vermelhas</div>
      <div class="pill" onclick="filtrarCor('Rosas', this)">Rosas</div>
      <div class="pill" onclick="filtrarCor('Matizadas', this)">Matizadas</div>
    </div>
  </div>

  <div class="wrapper-switch">
    <label class="switch-disponivel">
      <input type="checkbox" id="checkProntaEntrega">
      <span class="slider"></span>
      Ver apenas pronta entrega
    </label>
  </div>
</div>

<div class="catalogo" id="gridCatalogo"></div>

<div class="rodape-acoes">
  <div class="container-rodape">
    <div class="caixa-selecao" id="areaSelecao">
      <div id="containerTags"></div>
    </div>
    <input type="text" id="inputPesquisa" class="campo-busca" placeholder="Buscar ID pelo nome...">
    <button id="btnEnviar" class="btn-whatsapp oculto" onclick="enviarPedido()"></button>
  </div>
</div>

<script>
const estoque = { 
  "AÇUCENA (MUTANTE)": { qtd: 1, cat: "Mutante", cor: "Claras" }, 
  "CÉU ESTRELADO": { qtd: 2, cat: "Tripla+", cor: "Escuras" },
  "GTA-SUN CLUSTER": { qtd: 1, cat: "Tripla+", cor: "Amarelas" },
  "AKACHI": { qtd: 0, cat: "Dupla", cor: "Vermelhas" },
  "AMATTA": { qtd: 1, cat: "Dupla", cor: "Rosas" },
  "LH-20 (MOSAICO)": { qtd: 1, cat: "Singela", cor: "Matizadas" }, // Exemplo: Mosaico agora entra na forma real (Singela) e cor Matizada
  "BRANCA DE NEVE": { qtd: 5, cat: "Singela", cor: "Claras" },
  "VAMPIRA": { qtd: 0, cat: "Tripla+", cor: "Escuras" }
};

let selecionados = new Set();
let filtroTexto = "";
let apenasDisponiveis = false;
let categoriaAtiva = "Todas";
let corAtiva = "Todas";

const grid = document.getElementById("gridCatalogo");
const inputPesquisa = document.getElementById("inputPesquisa");
const checkProntaEntrega = document.getElementById("checkProntaEntrega");

inputPesquisa.addEventListener("input", (e) => { filtroTexto = e.target.value.toLowerCase(); montarCatalogo(); });
checkProntaEntrega.addEventListener("change", (e) => { apenasDisponiveis = e.target.checked; montarCatalogo(); });

function filtrarCategoria(cat, elemento) {
  categoriaAtiva = cat;
  document.querySelectorAll('#filtroCategorias .pill').forEach(p => p.classList.remove('active'));
  elemento.classList.add('active');
  montarCatalogo();
}

function filtrarCor(cor, elemento) {
  corAtiva = cor;
  document.querySelectorAll('#filtroCores .pill').forEach(p => p.classList.remove('active'));
  elemento.classList.add('active');
  montarCatalogo();
}

function formatarNomeArquivo(nome) { return nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ /g, "-").replace(/[()]/g, ""); }

function montarCatalogo() {
  grid.innerHTML = "";
  let itensExibidos = 0;
  Object.keys(estoque).sort().forEach(nome => {
    const dados = estoque[nome];
    if (apenasDisponiveis && dados.qtd === 0) return;
    if (categoriaAtiva !== "Todas" && dados.cat !== categoriaAtiva) return;
    if (corAtiva !== "Todas" && dados.cor !== corAtiva) return;
    if (filtroTexto && !nome.toLowerCase().includes(filtroTexto)) return;

    itensExibidos++;
    const nomeArquivo = formatarNomeArquivo(nome);
    const card = document.createElement("div");
    card.className = "item" + (selecionados.has(nome) ? " selecionado" : "");
    card.innerHTML = `
      <video src="imagens/${nomeArquivo}.mp4" poster="imagens/${nomeArquivo}.jpg" muted loop playsinline autoplay onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"></video>
      <img src="imagens/${nomeArquivo}.jpg" style="display:none" onerror="this.src='imagens/sem-foto.jpg'">
      <p>${nome}</p>
      <div class="estoque-status ${dados.qtd > 0 ? 'disponivel' : 'encomenda'}">
        ${dados.qtd > 0 ? 'Disponível: '+dados.qtd : 'Por Encomenda'}
      </div>`;
    
    card.onclick = () => { 
      if (selecionados.has(nome)) selecionados.delete(nome);
      else selecionados.add(nome);
      atualizarPainelAcoes(); 
      montarCatalogo(); 
    };
    grid.appendChild(card);
  });
  if (itensExibidos === 0) grid.innerHTML = `<div class="vazio">Nenhuma ID encontrada com esses filtros.</div>`;
}

function atualizarPainelAcoes() {
  const areaSelecao = document.getElementById("areaSelecao");
  const containerTags = document.getElementById("containerTags");
  const btnZap = document.getElementById("btnEnviar");
  containerTags.innerHTML = "";
  if (selecionados.size > 0) {
    areaSelecao.style.display = "block";
    selecionados.forEach(nome => {
      const tag = document.createElement("div");
      tag.className = "tag-item";
      tag.innerHTML = `${nome} <button onclick="event.stopPropagation(); removerItem('${nome}')">×</button>`;
      containerTags.appendChild(tag);
    });
    btnZap.classList.remove("oculto");
    btnZap.innerHTML = `Pedir informações (${selecionados.size})`;
  } else { 
    areaSelecao.style.display = "none"; 
    btnZap.classList.add("oculto"); 
  }
}

function removerItem(nome) { selecionados.delete(nome); atualizarPainelAcoes(); montarCatalogo(); }
function limparTudo() { selecionados.clear(); atualizarPainelAcoes(); montarCatalogo(); }

function enviarPedido() {
  const ids = Array.from(selecionados);
  const mensagem = `Olá!\n\nTenho interesse nas variedades:\n- ${ids.join("\n- ")}\n\nPoderia me passar mais informações?`;
  window.open("https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem), "_blank");
}
montarCatalogo();
</script>

</body>
</html>
