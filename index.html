<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo | Gravatá Rosas do Deserto</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --header-bg: #fcfaf7;
  --body-bg: #e5e0d8;
  --card-white: #ffffff;
  --card-selected: #cbc4b7;
  --text-main: #3a3618;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--body-bg);
  color: var(--text-main);
  margin: 0;
  padding-bottom: 230px;
}

/* ===== CABEÇALHO ===== */
.topbar {
  padding: 50px 0;
  position: sticky;
  top: 0;
  z-index: 900;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18);
  overflow: hidden;
  background-color: var(--header-bg);
  border-bottom: 2px solid #ffffff;
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('imagens/gravata-cabecalho.jpg');
  background-size: cover;
  background-position: center;
  z-index: 1;
}

.white-frame {
  position: absolute;
  width: 100%;
  height: auto;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
}

.white-frame::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100px;
  background-color: rgba(255, 255, 255, 0.7);
}

.line-top,.line-bottom {
  position: absolute;
  width: 100%;
  height: 1px;
  background-color: #ffffff;
  z-index: 2;
}

.line-top { top: 0; transform: translateY(-50px); }
.line-bottom { bottom: 0; transform: translateY(50px); }

.logo { position: relative; z-index: 3; }
.logo img { width: 150px; height: auto; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4)); }

/* ===== BARRA DE FILTROS ===== */
.secao-filtros {
  position: sticky;
  top: 152px;
  z-index: 950;
  padding: 4px 15px;
  background: #ffffff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  height: 32px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.status-filtro {
  font-size: 11px;
  font-weight: 600;
  background: rgba(58, 54, 24, 0.08);
  padding: 4px 12px;
  border-radius: 50px;
}

.btn-abrir-filtros {
  background: var(--text-main);
  color: white;
  padding: 4px 12px;
  border-radius: 50px;
  border: none;
  font-size: 11px;
  cursor: pointer;
}

/* ===== GRID ===== */
.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap: 15px;
  padding: 0 15px;
  max-width: 1200px;
  margin: 0 auto;
}

.item {
  background: var(--card-white);
  padding: 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}

.item.selecionado {
  background: var(--card-selected)!important;
  transform: scale(0.96);
}

.item video,.item img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 14px;
}

.item p {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
}

.estoque-status {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
}

.disponivel { color: #2d5a27; }
.encomenda { color: #8a8471; }

/* ===== RODAPÉ ===== */
.rodape-acoes {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(229,224,216,0.98);
  padding: 10px 20px 25px;
}

.caixa-selecao {
  display: none;
  background: white;
  padding: 6px;
  border-radius: 15px;
}

.tag-item {
  font-size: 10px;
  background: #f0f0eb;
  padding: 4px 10px;
  border-radius: 8px;
  margin: 2px;
}

.campo-busca {
  width: 100%;
  padding: 12px;
  border-radius: 50px;
}

.btn-whatsapp {
  width: 100%;
  padding: 15px;
  background: var(--text-main);
  color: white;
  border-radius: 50px;
}

.oculto { display:none; }
</style>
</head>

<body>

<div class="topbar">
  <div class="logo"><img src="logo.png"></div>
</div>

<div class="secao-filtros">
  <div id="statusFiltro" class="status-filtro" style="display:none;"></div>
  <button class="btn-abrir-filtros" onclick="toggleDrawer()">Filtrar</button>
</div>

<div class="catalogo" id="gridCatalogo"></div>

<div class="rodape-acoes">
  <div class="caixa-selecao" id="areaSelecao">
    <div id="containerTags"></div>
  </div>

  <input type="text" id="inputPesquisa" class="campo-busca" placeholder="Buscar ID pelo nome...">
  <button id="btnEnviar" class="btn-whatsapp oculto" onclick="enviarPedido()"></button>

t: "Dupla", cor: "Amarelas" }, "TS-69": { qtd: 1, cat: "Dupla", cor: "Matizadas" }, "TS-222": { qtd: 1, cat: "Dupla", cor: "Matizadas" }, "TS-330": { qtd: 1, cat: "Dupla", cor: "Matizadas" }, "TW4": { qtd: 1, cat: "Dupla", cor: "Matizadas" }, "UNPARALLELED": { qtd: 1, cat: "Tripla+", cor: "Matizadas" }, "VARIEGATA": { qtd: 1, cat: "Variegata", cor: "Rosas" }, "VAMPIRA": { qtd: 1, cat: "Tripla+", cor: "Escuras" }, "VIÚVA NEGRA": { qtd: 1, cat: "Tripla+", cor: "Escuras" }, "VOLCANO": { qtd: 1, cat: "Dupla", cor: "Vermelhas" }, "W59": { qtd: 1, cat: "Dupla", cor: "Matizadas" }, "YÚ JIǍO": { qtd: 1, cat: "Dupla", cor: "Claras" } };

let selecionados = new Set();
let filtroTexto = "";
let apenasDisponiveis = false;
let categoriaAtiva = "Todas";
let corAtiva = "Todas";

const grid = document.getElementById("gridCatalogo");
const statusFiltro = document.getElementById("statusFiltro");
const inputPesquisa = document.getElementById("inputPesquisa");
const checkProntaEntrega = document.getElementById("checkProntaEntrega");

function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('active');
  document.getElementById('overlay').style.display = document.getElementById('drawer').classList.contains('active')? 'block' : 'none';
}

// CORRIGIDO: Agora reseta os filtros quando busca
inputPesquisa.addEventListener("input", (e) => {
  filtroTexto = e.target.value.toLowerCase();

  // Se digitou algo, reseta os filtros do drawer
  if (filtroTexto.length > 0) {
    categoriaAtiva = "Todas";
    corAtiva = "Todas";
    apenasDisponiveis = false;
    checkProntaEntrega.checked = false;
    document.querySelectorAll('#filtroCategorias.pill').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('#filtroCores.pill').forEach(p => p.classList.remove('active'));
    document.querySelector('#filtroCategorias.pill').classList.add('active'); // CORRIGIDO: espaço adicionado
    document.querySelector('#filtroCores.pill').classList.add('active'); // CORRIGIDO: espaço adicionado
  }

  montarCatalogo();
});

checkProntaEntrega.addEventListener("change", (e) => { apenasDisponiveis = e.target.checked; montarCatalogo(); });

// CORRIGIDO: Agora desmarca se clicar de novo
function filtrarCategoria(cat, elemento) {
  if (categoriaAtiva === cat && cat !== "Todas") {
    categoriaAtiva = "Todas";
    document.querySelectorAll('#filtroCategorias.pill').forEach(p => p.classList.remove('active'));
    document.querySelector('#filtroCategorias.pill').classList.add('active');
  } else {
    categoriaAtiva = cat;
    document.querySelectorAll('#filtroCategorias.pill').forEach(p => p.classList.remove('active'));
    elemento.classList.add('active');
  }
  montarCatalogo();
}

// CORRIGIDO: Agora desmarca se clicar de novo
function filtrarCor(cor, elemento) {
  if (corAtiva === cor && cor !== "Todas") {
    corAtiva = "Todas";
    document.querySelectorAll('#filtroCores.pill').forEach(p => p.classList.remove('active'));
    document.querySelector('#filtroCores.pill').classList.add('active');
  } else {
    corAtiva = cor;
    document.querySelectorAll('#filtroCores.pill').forEach(p => p.classList.remove('active'));
    elemento.classList.add('active');
  }
  montarCatalogo();
}

function atualizarTextoFiltro() {
  let partes = [];
  if (apenasDisponiveis) partes.push("pronta entrega");
  if (categoriaAtiva!== "Todas") partes.push(categoriaAtiva.toLowerCase());
  if (corAtiva!== "Todas") partes.push(corAtiva.toLowerCase());

  if (partes.length > 0) {
    statusFiltro.innerText = "Exibindo apenas ID's " + partes.join(" e ");
    statusFiltro.style.display = 'inline-flex';
  } else {
    statusFiltro.style.display = 'none';
  }
}

function formatarNomeArquivo(nome) {
  return nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ /g, "-").replace(/[()]/g, "");
}

function montarCatalogo() {
  grid.innerHTML = "";
  let itensExibidos = 0;
  atualizarTextoFiltro();

  Object.keys(estoque).sort().forEach(nome => {
    const dados = estoque[nome];
    if (apenasDisponiveis && dados.qtd === 0) return;
    if (categoriaAtiva!== "Todas" && dados.cat!== categoriaAtiva) return;
    if (corAtiva!== "Todas" && dados.cor!== corAtiva) return;
    if (filtroTexto &&!nome.toLowerCase().includes(filtroTexto)) return;

    itensExibidos++;
    const nomeArquivo = formatarNomeArquivo(nome);
    const card = document.createElement("div");
    card.className = "item" + (selecionados.has(nome)? " selecionado" : "");
    card.innerHTML = `
      <video src="imagens/${nomeArquivo}.mp4" poster="imagens/${nomeArquivo}.jpg" muted loop playsinline autoplay onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"></video>
      <img src="imagens/${nomeArquivo}.jpg" style="display:none" onerror="this.src='imagens/sem-foto.jpg'">
      <p>${nome}</p>
      <div class="estoque-status ${dados.qtd > 0? 'disponivel' : 'encomenda'}">
        ${dados.qtd > 0? 'Disponível: '+dados.qtd : 'Por Encomenda'}
      </div>`;

    card.onclick = () => {
      if (selecionados.has(nome)) selecionados.delete(nome); else selecionados.add(nome);

      // Limpa a busca quando seleciona um card
      inputPesquisa.value = "";
      filtroTexto = "";

      atualizarPainelAcoes();
      montarCatalogo();
    };
    grid.appendChild(card);
  });
  if (itensExibidos === 0) grid.innerHTML = `<div class="vazio">Nenhuma ID encontrada com esses filtros.</div>`;
}

// VOLTOU: FUNÇÃO QUE MOSTRA AS TAGS
function atualizarPainelAcoes() {
  const areaSelecao = document.getElementById("areaSelecao");
  const containerTags = document.getElementById("containerTags");
  const btnZap = document.getElementById("btnEnviar");
  containerTags.innerHTML = "";

  if (selecionados.size > 0) {
    areaSelecao.style.display = "block";
    selecionados.forEach(nome => {
      const tag = document.createElement("div");
      tag.className = "tag-item";
      tag.innerHTML = `${nome} <button onclick="event.stopPropagation(); removerItem('${nome}')">×</button>`;
      containerTags.appendChild(tag);
    });
    btnZap.classList.remove("oculto");
    btnZap.innerHTML = `Enviar interesse via WhatsApp (${selecionados.size})`;
  } else {
    areaSelecao.style.display = "none";
    btnZap.classList.add("oculto");
  }
}

function enviarPedido() {
  const ids = Array.from(selecionados);
  const mensagem = `Olá, gostaria de saber a disponibilidade e valores das seguintes variedades:\n\n*IDs Selecionadas:*\n- ${ids.join("\n- ")}`;
  window.open("https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem), "_blank");
}

montarCatalogo();
</script>

</html>
