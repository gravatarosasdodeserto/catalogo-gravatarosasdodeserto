<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Flores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: #f8f5f0;
  margin: 0;
  padding-bottom: 200px;
  overflow-x: hidden;
}

.topbar {
  background: #3a3618;
  padding: 12px 0;
  position: relative;
}

/* Linhas decorativas dentro da barra escura */
.topbar::after {
  content: '';
  position: absolute;
  left: 15px;
  right: 15px;
  bottom: 0;
  height: 4px;
  background: linear-gradient(to bottom, #dadada 1px, #ffffff 1px);
  background-repeat: repeat-x;
  background-size: 1px 1px, 1px 3px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  max-width: 600px;
  margin: auto;
  padding: 0 15px;
}
.logo img { width: 70px; }
.info-topo h1 { margin: 0; margin-bottom: 2px; color: white; font-size: 18px; }
.subtitulo { margin: 0; font-size: 13px; color: #d6d6d6; }

.instrucao {
  max-width: 600px;
  margin: 15px auto;
  padding: 15px;
  background: white;
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
  line-height: 1.5;
  color: #444;
}

.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #eee;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 8px rgba(0,0,0,0.08);
}
.item p { text-align: center; font-size: 14px; margin-top: 8px; font-weight: 500; }

.item:hover { transform: translateY(-3px); box-shadow: 0 6px 14px rgba(0,0,0,0.12); }
.item:active { transform: scale(0.97); }

.item.selecionado {
  background: rgba(58, 54, 24, 0.15);
  box-shadow: inset 0 0 6px rgba(58, 54, 24, 0.4);
}

img, video { width: 100%; border-radius: 8px; }

.botoes-acoes {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px 15px 15px 15px;
  background: #f8f5f0;
  box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.caixa-selecao {
  display: none;
  border: none;
  border-radius: 16px;
  padding: 10px;
  background: rgba(58, 54, 24, 0.15);
}
.topo-caixa { display: flex; justify-content: space-between; align-items: center; }
.caixa-selecao h3 { margin: 0; font-size: 14px; }
.btn-limpar-tudo {
  background: none;
  border: none;
  color: #3a3618;
  font-size: 12px;
  cursor: pointer;
  font-weight: 500;
}
#listaSelecionadas {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: flex-start;
  margin-top: 8px;
}
.tag {
  background: transparent;
  border: none;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tag button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 12px;
  color: #3a3618;
}

.botao-whatsapp {
  width: 100%;
  padding: 15px;
  background: #3a3618;
  color: white;
  border: none;
  border-radius: 50px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.busca-container { display: flex; justify-content: center; }
.busca {
  width: 100%;
  max-width: 500px;
  padding: 12px;
  border-radius: 25px;
  border: 2px solid #3a3618;
  background: #f8f5f0;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="header">
    <div class="logo">
      <img src="logo.jpg">
    </div>
    <div class="info-topo">
      <h1>Gravatá Rosas do Deserto</h1>
      <p class="subtitulo">Enxertos de Adenium Obesum</p>
    </div>
  </div>
</div>

<p class="instrucao">
Escolha as ID(s) das flores que você mais gostou<br><br>
Depois é só clicar em <strong>“Ver disponibilidade”</strong> para falar direto no WhatsApp e receber informações de valores, fotos atualizadas e envio dos enxertos.
</p>

<div class="catalogo" id="catalogo"></div>

<div class="botoes-acoes">

  <div class="caixa-selecao">
    <div class="topo-caixa">
      <h3>ID's selecionadas:</h3>
      <button class="btn-limpar-tudo" onclick="limparSelecao()">Limpar tudo</button>
    </div>
    <div id="listaSelecionadas"></div>
  </div>

  <div class="busca-container">
    <input type="text" id="busca" class="busca" placeholder="Buscar por ID da flor...">
  </div>

  <button class="botao-whatsapp" onclick="enviarWhatsApp()">
    Ver disponibilidade (<span id="contador">0</span>)
  </button>

</div>

<script>
const flores = [
"AÇUCENA (MUTANTE)","AKACHI","AMATTA","ARYA","BLOODY MARY","BP-116",
"BRANCA DE NEVE","BRIDAL BOUQUET","CANAN 55","CANAN 170","CAPIXABA",
"CÉU ESTRELADO","CÉU ESTRELADO VARIEGATA","COPENHAGEN","DAFNE","DIỆU CHÂU","COCA-COLA",
"DOUBLE STAR","DUQUESA","EGG ROLL","ELARA","ELLIE","EV19-XANADÚ",
"FERRARI","GOLDEN FAITH","GRAPE CHOCOLATE","GUARÁ PITANGA",
"GTA-AIKA","GTA-BOLD","GTA-CANDY CRUSH","GTA-CÓSMICA","GTA-CREPÚSCULO",
"GTA-DESERT DOLL","GTA-DIANA","GTA-EMMA FROST","GTA-FAY","GTA-FLORZINHA",
"GTA-FLUTTERSHY","GTA-FRACTA","GTA-GOLDEN PINK","GTA-ICE DRAGON",
"GTA-KIMBERLY","GTA-LITTLE KISS","GTA-LOLLIPOP BLACK","GTA-LYSSA",
"GTA-LYTA","GTA-MISS GRAVATÁ","GTA-NYX","GTA-PERONA","GTA-PINK VENOM",
"GTA-PINKIE PIE","GTA-RED COMETS","GTA-RED STORM","GTA-RED WIDOW",
"GTA-SANSA","GTA-SHE HA","GTA-SUN CLUSTER","GTA-SWEET BLUSH",
"GTA-TRINITY","GTA-TRUE FAITH","GTA-YUNA","HELENA","INDIGO GLAZE",
"INFINITY","JHULLY","JULIUS CAESAR","KING OF KINGS","KINDLY","L-06",
"LAILA","LILAC FROST (MUTANTE)","LM-440","LM-50","LM2","LUNA",
"MAGNIFICAT","MARIA","MIDNIGHT","MỘNG CẦM","MORAN","NANCY","NEMO",
"NORALINE","NUSA","P-200","PATHUMMA","PEONY","PHARAOH","PURPLE BLUE",
"QUEEN RAY","RF-001","RF-002","RIHANNA","ROMANTIC EDGE","SANTA CLAUS",
"SATURNO","SENNA","SIENA","SOCHI","SOPHIA","STAR CLUSTER","SWALLOW",
"RC-04","THAMIRES","THE SECRET OF VICTORIA","TRIPLE WISH","TROPICAL","TS-69",
"TS-222","TS-330","TW4","UNPARALLELED","VARIEGATA","VAMPIRA",
"VIÚVA NEGRA","VOLCANO","W59","YÚ JIǍO"
];

const catalogo = document.getElementById("catalogo");
const buscaInput = document.getElementById("busca");
const floresComVideo = ["AÇUCENA (MUTANTE)","LILAC FROST (MUTANTE)"];
let selecionados = new Set();

function gerarNomeArquivo(nome){
  return nome.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/ /g, "-")
    .replace(/[()]/g, "");
}

function renderCatalogo(){
  catalogo.innerHTML = "";
  flores.forEach(nome=>{
    let div = document.createElement("div");
    div.className = "item";
    div.dataset.id = nome;
    if(selecionados.has(nome)) div.classList.add("selecionado");

    let arquivo = gerarNomeArquivo(nome);
    if(floresComVideo.includes(nome)){
      div.innerHTML = `<video autoplay muted loop playsinline preload="metadata"><source src="imagens/${arquivo}.mp4" type="video/mp4"></video><p>${nome}</p>`;
    } else {
      div.innerHTML = `<img loading="lazy" src="imagens/${arquivo}.jpg" onerror="this.onerror=null; this.src='imagens/sem-foto.jpg'"><p>${nome}</p>`;
    }

    div.addEventListener("click", ()=>{
      if(selecionados.has(nome)) selecionados.delete(nome);
      else selecionados.add(nome);

      atualizar();
      if(navigator.vibrate) navigator.vibrate([30,20,30]);
    });

    catalogo.appendChild(div);
  });
}

function atualizar(){
  const caixa = document.querySelector(".caixa-selecao");
  const lista = document.getElementById("listaSelecionadas");

  if(selecionados.size>0){
    caixa.style.display = "block";
    lista.innerHTML = "";
    selecionados.forEach(nome=>{
      const tag = document.createElement("div");
      tag.className = "tag";
      tag.innerHTML = `${nome} <button onclick="removerItem('${nome}')">✕</button>`;
      lista.appendChild(tag);
    });
  } else {
    caixa.style.display = "none";
  }

  document.getElementById("contador").innerText = selecionados.size;
  renderCatalogo();
}

function removerItem(nome){
  selecionados.delete(nome);
  atualizar();
}

function limparSelecao(){
  selecionados.clear();
  atualizar();
}

buscaInput.addEventListener("input", ()=>{
  const termo = normalizarTexto(buscaInput.value);
  document.querySelectorAll(".item").forEach(div=>{
    div.style.display = normalizarTexto(div.dataset.id).includes(termo) ? "block" : "none";
  });
});

function normalizarTexto(texto){
  return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g,"");
}

function enviarWhatsApp(){
  if(selecionados.size===0){ alert("Selecione pelo menos uma flor!"); return; }
  let ids = Array.from(selecionados);
  let texto = ids.length===1 ? "Tenho interesse no enxerto da seguinte flor:\n\n- " : "Tenho interesse nos enxertos das seguintes variedades:\n\n- ";
  let mensagem = ["Olá!","",""+texto+ids.join("\n- "),"","Poderia me informar valores, disponibilidade e condições de envio?"].join("\n");
  let url = "https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem);
  window.open(url, "_blank");
}

renderCatalogo();
atualizar();
</script>

</body>
</html>
