<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Flores</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  text-align: center;
  padding-bottom: 100px;
}

h1 {
  margin: 20px 10px 10px;
  font-size: 22px;
}

.instrucao {
  max-width: 600px;
  margin: 0 auto 15px;
  padding: 0 15px;
  font-size: 15px;
  color: #444;
}

.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: 0.2s;
}

.item:hover {
  transform: scale(1.03);
}

.item.selecionado {
  border: 2px solid #25D366;
  background: #eaffea;
}

img {
  width: 100%;
  border-radius: 8px;
}

.botao-whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  left: 20px;
  max-width: 400px;
  margin: auto;
  padding: 15px;
  font-size: 16px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
</style>

</head>
<body>

<h1>🌸 Catálogo de Identificação das Flores</h1>

<p class="subtitulo">Enxertos de Adenium Obesum</p>

<p class="instrucao">
Escolha as ID(s) das flores que você gostou e envie sua seleção pelo WhatsApp para consultar valores, disponibilidade, fotos atualizadas e condições de envio dos enxertos.<br><br>
📲 Atendimento rápido e direto pelo WhatsApp.
</p>

<div class="catalogo" id="catalogo"></div>

<button class="botao-whatsapp" onclick="enviarWhatsApp()">
📲 Solicitar informações (<span id="contador">0</span>)
</button>

<script>
const flores = [
"AÇUCENA (MUTANTE)","AKACHI","AMATTA","ARYA","BLOODY MARY","BP-116",
"BRANCA DE NEVE","BRIDAL BOUQUET","CANAN 55","CANAN 170","CAPIXABA",
"CÉU ESTRELADO","CÉU ESTRELADO VARIEGATA","COMPENHAGEN","DAFNE COCA-COLA",
"DOUBLE STAR","DUQUESA","EGG ROLL","ELARA","ELLIE","EV19-XANADÚ",
"FERRARI","GOLDEN FAITH","GOLDEN PINK","GRAPE CHOCOLATE","GUARÁ",
"GTA-AIKA","GTA-BOLD","GTA-CANDY CRUSH","GTA-CÓSMICA","GTA-CREPÚSCULO",
"GTA-DESERT DOLL","GTA-DIANA","GTA-EMMA FROST","GTA-FAY","GTA-FLORZINHA",
"GTA-FLUTTERSHY","GTA-FRACTA","GTA-GOLDEN PINK","GTA-ICE DRAGON",
"GTA-KIMBERLY","GTA-LITTLE KISS","GTA-LOLLIPOP BLACK","GTA-LYSSA",
"GTA-LYTA","GTA-MISS GRAVATÁ","GTA-NYX","GTA-PERONA","GTA-PINK VENOM",
"GTA-PINKIE PIE","GTA-RED COMETS","GTA-RED STORM","GTA-RED WIDOW",
"GTA-SANSA","GTA-SHE HA","GTA-SUN CLUSTER","GTA-SWEET BLUSH",
"GTA-TRINITY","GTA-TRUE FAITH","GTA-YUNA","HELENA","INDIGO GLAZE",
"INFINITY","JHULLY","JULIUS CAESAR","KING OF KINGS","KINDLY","L-06",
"LAILA","LILAC FROST (MUTANTE)","LM-440","LM-50","LM2","LUNA",
"MAGNIFICAT","MARIA","MIDNIGHT","MỘNG CẦM","MORAN","NANCY","NEMO",
"NORALINE","NUSA","P-200","PATHUMMA","PEONY","PHARAOH","PURPLE BLUE",
"QUEEN RAY","RF-001","RF-002","RIHANNA","ROMANTIC EDGE","SANSA",
"SATURNO","SENNA","SIENA","SOCHI","SOPHIA","STAR CLUSTER","SWALLOW",
"TC-04","THAMIRES","THE SECRET OF VICTORIA","TRIPLE WISH","TS-69",
"TS-222","TS-330","TW4","UNPARALLELED","VARIEGATA","VAMPIRA",
"VIÚVA NEGRA","VOLCANO","W59","YÚ JIǍO"
];

const catalogo = document.getElementById("catalogo");

flores.forEach(nome => {
  let div = document.createElement("div");
  div.className = "item";
  div.setAttribute("data-id", nome);

  div.onclick = function() {
    div.classList.toggle("selecionado");
    atualizarContador();
  };

  let nomeImagem = nome
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/ /g, "-")
    .replace(/[()]/g, "");

  div.innerHTML = `
    <img src="imagens/${nomeImagem}.jpg" alt="${nome}">
    <p>${nome}</p>
  `;

  catalogo.appendChild(div);
});

function atualizarContador() {
  let total = document.querySelectorAll(".item.selecionado").length;
  document.getElementById("contador").innerText = total;
}

function enviarWhatsApp() {
  let selecionados = document.querySelectorAll(".item.selecionado");
  let ids = [];

  selecionados.forEach(item => {
    ids.push(item.getAttribute("data-id"));
  });

  if (ids.length === 0) {
    alert("Selecione pelo menos uma flor!");
    return;
  }

  let textoInicial = "";

  if (ids.length === 1) {
    textoInicial = "Tenho interesse no enxerto da seguinte flor:\n\n- ";
  } else {
    textoInicial = "Tenho interesse nos enxertos das seguintes flores:\n\n- ";
  }

  let mensagem = "Olá! 😊\n\n" + textoInicial 
  + ids.join("\n- ") + 
  "\n\nPoderia me passar mais informações sobre valores, disponibilidade e envio?";

  let telefone = "5581992665421";
  let url = "https://wa.me/" + telefone + "?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}
</script>

</body>
</html>
