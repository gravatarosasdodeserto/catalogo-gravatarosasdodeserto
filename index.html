<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravatá RD | Catálogo de Rosas do Deserto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfbf7;
            --surface: #ffffff;
            --text-primary: #2e2a15;
            --text-secondary: #7d6e53;
            --accent: #a08c6b;
            --border: #eceae4;
            --radius: 12px;
            --premium-grad: linear-gradient(135deg, #a08c6b 0%, #7d6e53 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text-primary); overflow-x: hidden; }

        /* HEADER EXPANSÍVEL ORIGINAL */
        header { 
            height: 150px; 
            background: url('imagens/gravata-cabecalho.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
        }
        .header-stripe {
            width: 100%;
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px 0; border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; justify-content: center;
        }
        .logo { width: 110px; }

        @media (min-width: 1024px) {
            header { height: 350px; }
            .logo { width: 180px; }
            .header-stripe { padding: 40px 0; }
        }

        /* BARRA DE FILTROS ESCURA */
        .filter-bar {
            background: #2e2a15; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .filter-title { color: white; font-size: 13px; font-weight: 500; letter-spacing: 1px; }
        .btn-filter-trigger { 
            background: var(--premium-grad); color: white; border: none; 
            padding: 8px 18px; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer;
        }

        /* MENU LATERAL (DRAWER) */
        .drawer {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: var(--bg); z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: 0.4s ease-in-out; display: flex; flex-direction: column;
        }
        .drawer.active { right: 0; }
        .drawer-header { padding: 25px; background: #2e2a15; color: white; display: flex; justify-content: space-between; align-items: center; }
        .drawer-content { padding: 20px; overflow-y: auto; flex: 1; }

        .filter-section { margin-bottom: 25px; }
        .filter-section h4 { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
        .options-grid { display: grid; gap: 8px; }
        .option-item { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; color: var(--text-secondary); }

        /* GRID DE PRODUTOS */
        .catalog-container { max-width: 1400px; margin: auto; padding: 30px 15px; }
        .search-area { text-align: center; margin-bottom: 30px; }
        .search-box { width: 100%; max-width: 500px; padding: 12px 25px; border-radius: 50px; border: 1px solid var(--border); outline: none; }

        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        @media (min-width: 768px) { #grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; } }

        /* CARDS ORIGINAIS */
        .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        .card-body { padding: 15px; text-align: center; }
        .card-id { font-size: 16px; font-weight: 600; }
        .tag-esgotado { position: absolute; top: 10px; left: 10px; background: #e74c3c; color: white; padding: 4px 10px; border-radius: 40px; font-size: 10px; font-weight: 700; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="header-stripe"><img src="logo.png" class="logo"></div>
</header>

<div class="filter-bar">
    <span class="filter-title">NOSSA COLEÇÃO</span>
    <button class="btn-filter-trigger" onclick="toggleDrawer()">FILTRAR</button>
</div>

<div class="catalog-container">
    <div class="search-area">
        <input type="text" id="search" class="search-box" placeholder="Buscar ID..." oninput="filtrar()">
    </div>
    <div id="grid"></div>
</div>

<div class="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
    <div class="drawer-header">
        <span>FILTROS</span>
        <span style="cursor:pointer; font-size: 24px;" onclick="toggleDrawer()">&times;</span>
    </div>
    <div class="drawer-content">
        <div class="filter-section"><h4>Cores</h4><div class="options-grid" id="f-cores"></div></div>
        <div class="filter-section"><h4>Camadas</h4><div class="options-grid" id="f-camadas"></div></div>
        <div class="filter-section"><h4>Padrão de Pétala</h4><div class="options-grid" id="f-padrao"></div></div>
        <div class="filter-section"><h4>Especiais</h4><div class="options-grid" id="f-especiais"></div></div>
        <button class="btn-filter-trigger" style="width:100%; margin-top: 20px;" onclick="toggleDrawer()">VER RESULTADOS</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzgV_H5QLTNwJ12B-78q57qNnlaVi0vbxW3jIqdnp7YH1IKCdBdFthIHymlMM9Jusqktg/exec";
    let BANCO = [];

    async function carregarCatalogo() {
        try {
            const r = await fetch(`${API}?action=get&t=${Date.now()}`);
            const json = await r.json();
            BANCO = Object.keys(json).map(id => ({ id, ...json[id] }));
            
            gerarFiltros();
            filtrar();
        } catch (e) { console.error("Erro ao carregar", e); }
    }

    function gerarFiltros() {
        const categorias = { cores: 'f-cores', camadas: 'f-camadas', padrao: 'f-padrao', especiais: 'f-especiais' };
        
        Object.keys(categorias).forEach(cat => {
            let opcoes = [];
            BANCO.forEach(item => {
                if(item[cat]) item[cat].split(',').forEach(v => opcoes.push(v.trim()));
            });
            const unicas = [...new Set(opcoes)].filter(v => v !== "").sort();
            
            document.getElementById(categorias[cat]).innerHTML = unicas.map(opt => `
                <label class="option-item">
                    <input type="checkbox" class="chk-f" data-cat="${cat}" value="${opt}" onchange="filtrar()">
                    ${opt}
                </label>
            `).join('');
        });
    }

    function filtrar() {
        const busca = document.getElementById('search').value.toUpperCase();
        const ativos = {};
        document.querySelectorAll('.chk-f:checked').forEach(c => {
            const cat = c.dataset.cat;
            if(!ativos[cat]) ativos[cat] = [];
            ativos[cat].push(c.value);
        });

        const resultado = BANCO.filter(item => {
            const bateBusca = item.id.toUpperCase().includes(busca);
            const bateFiltros = Object.keys(ativos).every(cat => {
                const valsItem = (item[cat] || "").split(',').map(v => v.trim());
                return ativos[cat].some(a => valsItem.includes(a));
            });
            return bateBusca && bateFiltros;
        });

        renderizar(resultado);
    }

    function renderizar(lista) {
        document.getElementById('grid').innerHTML = lista.map(item => `
            <div class="card">
                ${item.qtd <= 0 ? '<div class="tag-esgotado">ESGOTADO</div>' : ''}
                <img src="${item.midia ? 'https://drive.google.com/thumbnail?sz=w600&id='+item.midia : 'imagens/sem-foto.jpg'}" loading="lazy">
                <div class="card-body"><div class="card-id">${item.id}</div></div>
            </div>
        `).join('');
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('active');
        document.querySelector('.overlay').classList.toggle('active');
    }

    window.onload = carregarCatalogo;
</script>
</body>
</html>
