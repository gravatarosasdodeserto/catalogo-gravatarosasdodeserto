<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravatá RD | Catálogo de Rosas do Deserto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* MANTENDO TODO O SEU VISUAL ORIGINAL */
        :root {
            --bg: #fcfbf7;
            --surface: #ffffff;
            --text-primary: #2e2a15;
            --text-secondary: #7d6e53;
            --accent: #a08c6b;
            --border: #eceae4;
            --radius: 12px;
            --premium-grad: linear-gradient(135deg, #a08c6b 0%, #7d6e53 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text-primary); overflow-x: hidden; }

        /* HEADER PREMIUM */
        header { 
            height: 150px; 
            background: url('imagens/gravata-cabecalho.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
            transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .header-stripe {
            width: 100%;
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px 0; border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; justify-content: center;
        }
        .logo { width: 110px; transition: width 0.6s ease; }

        @media (min-width: 1024px) {
            header { height: 350px; }
            .logo { width: 180px; }
            .header-stripe { padding: 40px 0; }
        }

        /* BARRA DE FILTROS (ESCURA) */
        .filter-bar {
            background: #2e2a15; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .filter-title { color: white; font-size: 13px; font-weight: 500; letter-spacing: 1px; }
        .btn-filter-trigger { 
            background: var(--premium-grad); color: white; border: none; 
            padding: 8px 18px; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer;
        }

        /* MENU LATERAL (DRAWER) */
        .drawer {
            position: fixed; top: 0; right: -320px; width: 300px; height: 100%;
            background: var(--bg); z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: 0.4s; display: flex; flex-direction: column;
        }
        .drawer.active { right: 0; }
        .drawer-header { padding: 25px; background: #2e2a15; color: white; display: flex; justify-content: space-between; }
        .drawer-content { padding: 20px; overflow-y: auto; flex: 1; }

        /* SEÇÕES DE FILTRO DENTRO DO MENU */
        .filter-section { margin-bottom: 25px; }
        .filter-section h4 { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .options-grid { display: grid; gap: 10px; }
        .option-item { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; color: var(--text-secondary); }

        /* GRID DE PRODUTOS */
        .catalog-container { max-width: 1400px; margin: auto; padding: 30px 15px 100px; }
        .search-area { text-align: center; margin-bottom: 30px; }
        .search-box { width: 100%; max-width: 500px; padding: 12px 25px; border-radius: 50px; border: 1px solid var(--border); outline: none; }

        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        @media (min-width: 768px) { #grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; } }

        /* CARDS */
        .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-body { padding: 15px; text-align: center; }
        .card-id { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .tag-indisponivel { position: absolute; top: 10px; left: 10px; background: #e74c3c; color: white; padding: 4px 10px; border-radius: 40px; font-size: 10px; font-weight: 700; }

        /* OVERLAY DO MENU */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="header-stripe">
        <img src="logo.png" class="logo">
    </div>
</header>

<div class="filter-bar">
    <span class="filter-title">COLLECTION MANAGEMENT</span>
    <button class="btn-filter-trigger" onclick="toggleDrawer()">FILTRAR</button>
</div>

<div class="catalog-container">
    <div class="search-area">
        <input type="text" id="search" class="search-box" placeholder="Buscar por ID..." oninput="aplicarFiltros()">
    </div>
    <div id="grid">
        </div>
</div>

<div class="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
    <div class="drawer-header">
        <span>FILTROS</span>
        <span style="cursor:pointer" onclick="toggleDrawer()">&times;</span>
    </div>
    <div class="drawer-content">
        <div class="filter-section">
            <h4>Cores</h4>
            <div class="options-grid" id="filtro-cores"></div>
        </div>
        <div class="filter-section">
            <h4>Camadas</h4>
            <div class="options-grid" id="filtro-camadas"></div>
        </div>
        <div class="filter-section">
            <h4>Padrão de Pétala</h4>
            <div class="options-grid" id="filtro-padrao"></div>
        </div>
        <div class="filter-section">
            <h4>Especiais</h4>
            <div class="options-grid" id="filtro-especiais"></div>
        </div>
        <button class="btn-filter-trigger" style="width:100%; margin-top: 20px;" onclick="toggleDrawer()">VER RESULTADOS</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzgV_H5QLTNwJ12B-78q57qNnlaVi0vbxW3jIqdnp7YH1IKCdBdFthIHymlMM9Jusqktg/exec";
    let DADOS_ORIGINAIS = [];

    async function inicializar() {
        try {
            const r = await fetch(`${API}?action=get&t=${Date.now()}`);
            const json = await r.json();
            // Converte o objeto da planilha em uma lista fácil de usar
            DADOS_ORIGINAIS = Object.keys(json).map(id => ({ id, ...json[id] }));
            
            gerarFiltrosDinamicos();
            aplicarFiltros();
        } catch (e) { console.error("Erro ao carregar catálogo", e); }
    }

    function gerarFiltrosDinamicos() {
        const categorias = {
            cores: 'filtro-cores',
            camadas: 'filtro-camadas',
            padrao: 'filtro-padrao',
            especiais: 'filtro-especiais'
        };

        Object.keys(categorias).forEach(cat => {
            // Varre o banco de dados e pega todas as opções únicas de cada categoria
            let listaBruta = [];
            DADOS_ORIGINAIS.forEach(item => {
                if (item[cat]) {
                    item[cat].split(',').forEach(val => listaBruta.push(val.trim()));
                }
            });

            const listaUnica = [...new Set(listaBruta)].filter(v => v !== "").sort();
            const container = document.getElementById(categorias[cat]);
            
            container.innerHTML = listaUnica.map(opcao => `
                <label class="option-item">
                    <input type="checkbox" class="chk-filtro" data-cat="${cat}" value="${opcao}" onchange="aplicarFiltros()">
                    ${opcao}
                </label>
            `).join('');
        });
    }

    function aplicarFiltros() {
        const busca = document.getElementById('search').value.toUpperCase();
        
        // Pega quais filtros estão marcados
        const selecionados = {};
        document.querySelectorAll('.chk-filtro:checked').forEach(chk => {
            const cat = chk.dataset.cat;
            if (!selecionados[cat]) selecionados[cat] = [];
            selecionados[cat].push(chk.value);
        });

        const filtrados = DADOS_ORIGINAIS.filter(item => {
            // Filtro de Texto
            const bateBusca = item.id.toUpperCase().includes(busca);
            
            // Filtros de Categoria (Lógica: dentro de uma categoria é "OU", entre categorias é "E")
            const bateCategorias = Object.keys(selecionados).every(cat => {
                const valoresDoItem = (item[cat] || "").split(',').map(v => v.trim());
                return selecionados[cat].some(s => valoresDoItem.includes(s));
            });

            return bateBusca && bateCategorias;
        });

        renderizarGrid(filtrados);
    }

    function renderizarGrid(lista) {
        const grid = document.getElementById('grid');
        grid.innerHTML = lista.map(item => `
            <div class="card">
                ${item.qtd <= 0 ? '<div class="tag-indisponivel">ESGOTADO</div>' : ''}
                <img src="${item.midia ? 'https://drive.google.com/thumbnail?sz=w600&id=' + item.midia : 'imagens/sem-foto.jpg'}" loading="lazy">
                <div class="card-body">
                    <div class="card-id">${item.id}</div>
                </div>
            </div>
        `).join('');
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('active');
        document.querySelector('.overlay').classList.toggle('active');
    }

    window.onload = inicializar;
</script>
</body>
</html>
