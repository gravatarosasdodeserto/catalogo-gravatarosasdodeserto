<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo | Gravatá Rosas do Deserto</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --header-bg: #fcfaf7;
  --body-bg: #e5e0d8;
  --card-white: #ffffff;
  --card-selected: #cbc4b7;
  --text-main: #3a3618;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--body-bg);
  color: var(--text-main);
  margin: 0;
  padding-bottom: 230px;
}

/* ===== CABEÇALHO ===== */
.topbar {
  padding: 50px 0;
  position: sticky;
  top: 0;
  z-index: 900;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18);
  overflow: hidden;
  background-color: var(--header-bg);
  border-bottom: 2px solid #ffffff;
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('imagens/gravata-cabecalho.jpg');
  background-size: cover;
  background-position: center;
  z-index: 1;
}

.white-frame {
  position: absolute;
  width: 100%;
  height: auto;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
}

.white-frame::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100px;
  background-color: rgba(255, 255, 255, 0.7);
}

.line-top,.line-bottom {
  position: absolute;
  width: 100%;
  height: 1px;
  background-color: #ffffff;
  z-index: 2;
}

.line-top { top: 0; transform: translateY(-50px); }
.line-bottom { bottom: 0; transform: translateY(50px); }

.logo { position: relative; z-index: 3; }
.logo img { width: 150px; height: auto; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4)); }

/* ===== BARRA DE FILTROS ===== */
.secao-filtros {
  position: sticky;
  top: 152px;
  z-index: 950;
  padding: 4px 15px;
  background: #ffffff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  height: 32px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.status-filtro {
  font-size: 11px;
  font-weight: 600;
  background: rgba(58, 54, 24, 0.08);
  padding: 4px 12px;
  border-radius: 50px;
}

.btn-abrir-filtros {
  background: var(--text-main);
  color: white;
  padding: 4px 12px;
  border-radius: 50px;
  border: none;
  font-size: 11px;
  cursor: pointer;
}

/* ===== GRID ===== */
.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap: 15px;
  padding: 0 15px;
  max-width: 1200px;
  margin: 0 auto;
}

.item {
  background: var(--card-white);
  padding: 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}

.item.selecionado {
  background: var(--card-selected)!important;
  transform: scale(0.96);
}

.item video,.item img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 14px;
}

.item p {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
}

.estoque-status {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
}

.disponivel { color: #2d5a27; }
.encomenda { color: #8a8471; }

/* ===== RODAPÉ ===== */
.rodape-acoes {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(229,224,216,0.98);
  padding: 10px 20px 25px;
}

.caixa-selecao {
  display: none;
  background: white;
  padding: 6px;
  border-radius: 15px;
}

.tag-item {
  font-size: 10px;
  background: #f0f0eb;
  padding: 4px 10px;
  border-radius: 8px;
  margin: 2px;
}

.campo-busca {
  width: 100%;
  padding: 12px;
  border-radius: 50px;
}

.btn-whatsapp {
  width: 100%;
  padding: 15px;
  background: var(--text-main);
  color: white;
  border-radius: 50px;
}

.oculto { display:none; }
</style>
</head>

<body>

<div class="topbar">
  <div class="logo"><img src="logo.png"></div>
</div>

<div class="secao-filtros">
  <div id="statusFiltro" class="status-filtro" style="display:none;"></div>
  <button class="btn-abrir-filtros" onclick="toggleDrawer()">Filtrar</button>
</div>

<div class="catalogo" id="gridCatalogo"></div>

<div class="rodape-acoes">
  <div class="caixa-selecao" id="areaSelecao">
    <div id="containerTags"></div>
  </div>

  <input type="text" id="inputPesquisa" class="campo-busca" placeholder="Buscar ID pelo nome...">
  <button id="btnEnviar" class="btn-whatsapp oculto" onclick="enviarPedido()"></button>

atizadas" }, "TROPICAL": { qtd: 1, cat: "Dupla", cor: "Amarelas" }, "TS-69": { qtd: 1, cat: "Dupla", cor: "Matizadas" }, "TS-222": { qtd: 1, cat: "Dupla", cor: "Matizadas" }, "TS-330": { qtd: 1, cat: "Dupla", cor: "Matizadas" }, "TW4": { qtd: 1, cat: "Dupla", cor: "Matizadas" }, "UNPARALLELED": { qtd: 1, cat: "Tripla+", cor: "Matizadas" }, "VARIEGATA": { qtd: 1, cat: "Variegata", cor: "Rosas" }, "VAMPIRA": { qtd: 1, cat: "Tripla+", cor: "Escuras" }, "VIÚVA NEGRA": { qtd: 1, cat: "Tripla+", cor: "Escuras" }, "VOLCANO": { qtd: 1, cat: "Dupla", cor: "Vermelhas" }, "W59": { qtd: 1, cat: "Dupla", cor: "Matizadas" }, "YÚ JIǍO": { qtd: 1, cat: "Dupla", cor: "Claras" } };

let selecionados = new Set();
let filtroTexto="";
let categoriaAtiva="Todas";
let corAtiva="Todas";
let apenasDisponiveis=false;

const grid=document.getElementById("gridCatalogo");
const inputPesquisa=document.getElementById("inputPesquisa");
const statusFiltro=document.getElementById("statusFiltro");

inputPesquisa.addEventListener("input",(e)=>{
  filtroTexto=e.target.value.toLowerCase();
  if(filtroTexto){
    categoriaAtiva="Todas";
    corAtiva="Todas";
  }
  montarCatalogo();
});

function montarCatalogo(){
  grid.innerHTML="";
  Object.keys(estoque).forEach(nome=>{
    if(filtroTexto && !nome.toLowerCase().includes(filtroTexto)) return;

    const card=document.createElement("div");
    card.className="item";
    card.innerHTML=`<p>${nome}</p>`;

    card.onclick=()=>{
      if(selecionados.has(nome)) selecionados.delete(nome);
      else selecionados.add(nome);
      atualizarPainelAcoes();
    };

    grid.appendChild(card);
  });
}

function atualizarPainelAcoes(){
  const area=document.getElementById("areaSelecao");
  const tags=document.getElementById("containerTags");
  const btn=document.getElementById("btnEnviar");

  tags.innerHTML="";

  if(selecionados.size){
    area.style.display="block";
    selecionados.forEach(n=>{
      const tag=document.createElement("div");
      tag.className="tag-item";
      tag.innerHTML=n;
      tags.appendChild(tag);
    });
    btn.classList.remove("oculto");
  }else{
    area.style.display="none";
    btn.classList.add("oculto");
  }
}

function enviarPedido(){
  const ids=[...selecionados];
  window.open("https://wa.me/?text="+ids.join(", "));
}

montarCatalogo();
