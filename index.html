<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Flores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding-bottom: 75px; /* AJUSTADO */

  background: url('imagens/fundo.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* HEADER */
.topbar {
  background: rgba(58,54,24,0.95);
  backdrop-filter: blur(6px);
  padding: 12px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  position: relative;
  z-index: 10;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  max-width: 600px;
  margin: auto;
  padding: 0 15px;
}

.logo img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.info-topo h1 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
  color: white;
}

.subtitulo {
  margin: 2px 0 0;
  font-size: 13px;
  color: #d6d6d6;
}

/* BUSCA */
.busca-container {
  max-width: 600px;
  margin: 10px auto;
  padding: 0 15px;
  display: flex;
  justify-content: center;
}

.busca {
  width: 100%;
  max-width: 500px;
  padding: 10px 15px;
  border-radius: 25px;
  border: 2px solid #3a3618;
  font-size: 14px;
  background: #f8f5f0;
  box-sizing: border-box;
}

.busca:focus {
  outline: none;
  border-color: #3a3618;
  box-shadow: 0 0 0 3px rgba(58,54,24,0.15);
}

/* TEXTO */
.instrucao {
  max-width: 600px;
  margin: 15px auto;
  padding: 15px;
  font-size: 14px;
  color: #444;
  line-height: 1.5;
  text-align: center;
  background: white;
  border-radius: 12px;
  border: 1px solid #e5e5e5;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* CATÁLOGO */
.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  border: 1px solid #eee;
  transition: all 0.2s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.item:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}

.item.selecionado {
  border: 2px solid #3a3618;
  transform: scale(1.04);
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

img, video {
  width: 100%;
  border-radius: 8px;
}

.item p {
  font-weight: 500;
  font-size: 14px;
  margin: 8px 0 0;
  text-align: center;
}

/* BOTÕES */
.botoes-acoes {
  position: fixed;
  bottom: 0px; /* COLADO NO FUNDO */
  right: 20px;
  left: 20px;
  max-width: 400px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;

  background: rgba(255,255,255,0.95);
  padding: 10px 10px 8px; /* ajuste fino */
  border-radius: 16px 16px 0 0; /* topo arredondado */
  box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
  backdrop-filter: blur(6px);
}

.botao-whatsapp {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  background: #3a3618;
  color: white;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  font-weight: 500;
}

.botao-whatsapp:active {
  transform: scale(0.97);
}

.botao-limpar {
  padding: 12px;
  font-size: 14px;
  background: white;
  color: #3a3618;
  border: 2px solid #3a3618;
  border-radius: 50px;
  cursor: pointer;
  font-weight: 500;
}

.botao-limpar:hover {
  background: #f7f7f7;
}
</style>

</head>
<body>

<div class="topbar">
  <div class="header">
    <div class="logo">
      <img src="logo.jpg" alt="Logo">
    </div>

    <div class="info-topo">
      <h1>Gravatá Rosas do Deserto</h1>
      <p class="subtitulo">Enxertos de Adenium Obesum</p>
    </div>
  </div>
</div>

<div class="busca-container">
  <input type="text" id="busca" class="busca" placeholder="Buscar por nome da flor...">
</div>

<p class="instrucao">
Escolha as ID(s) das flores que você gostou e envie sua seleção pelo WhatsApp para consultar valores, disponibilidade, fotos atualizadas e condições de envio dos enxertos.
</p>

<div class="catalogo" id="catalogo"></div>

<div class="botoes-acoes">
  <button class="botao-whatsapp" onclick="enviarWhatsApp()">
    Ver disponibilidade no WhatsApp (<span id="contador">0</span>)
  </button>

  <button class="botao-limpar" onclick="limparSelecao()">
    Limpar ID(s) selecionadas
  </button>
</div>

<script>
// seu JS original permanece igual
</script>

</body>
</html>
