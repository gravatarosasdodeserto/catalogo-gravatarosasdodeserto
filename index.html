<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Flores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f8f5f0;
  margin: 0;
  padding-bottom: 200px;
}

/* HEADER */
.topbar {
  background: #3a3618;
  padding: 12px 0;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  max-width: 600px;
  margin: auto;
  padding: 0 15px;
}

.logo img {
  width: 70px;
}

.info-topo h1 {
  margin: 0;
  color: white;
  font-size: 18px;
}

.subtitulo {
  font-size: 13px;
  color: #d6d6d6;
}

/* BUSCA */
.busca-container {
  max-width: 600px;
  margin: 10px auto;
  padding: 0 15px;
}

.busca {
  width: 100%;
  padding: 10px;
  border-radius: 25px;
  border: 2px solid #3a3618;
  background: #f8f5f0;
}

/* INSTRUÇÃO */
.instrucao {
  max-width: 600px;
  margin: 15px auto;
  padding: 15px;
  background: white;
  border-radius: 12px;
}

/* CATÁLOGO */
.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #eee;
  cursor: pointer;
}

.item.selecionado {
  border: 2px solid #3a3618;
}

/* IMAGENS */
img, video {
  width: 100%;
  border-radius: 8px;
}

/* CAIXA SELEÇÃO */
.caixa-selecao {
  position: fixed;
  bottom: 110px;
  left: 20px;
  right: 20px;
  max-width: 400px;
  margin: auto;
  border: 2px solid #3a3618;
  border-radius: 16px;
  padding: 10px;
  background: #f8f5f0;
  display: none;
}

.caixa-selecao h3 {
  margin: 0 0 5px;
  font-size: 14px;
}

/* BOTÕES */
.botoes-acoes {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px;
  background: #f8f5f0;
}

.botao-whatsapp {
  width: 100%;
  padding: 15px;
  background: #3a3618;
  color: white;
  border: none;
  border-radius: 50px;
}

.botao-limpar {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  background: white;
  border: 2px solid #3a3618;
}
</style>

</head>
<body>

<div class="topbar">
  <div class="header">
    <div class="logo">
      <img src="logo.jpg">
    </div>
    <div class="info-topo">
      <h1>Gravatá Rosas do Deserto</h1>
      <p class="subtitulo">Enxertos de Adenium Obesum</p>
    </div>
  </div>
</div>

<div class="busca-container">
  <input type="text" id="busca" class="busca" placeholder="Buscar por nome da flor...">
</div>

<p class="instrucao">
Escolha as ID(s) das flores e envie pelo WhatsApp.
</p>

<div class="catalogo" id="catalogo"></div>

<div class="caixa-selecao">
  <h3>ID's selecionadas:</h3>
  <div id="listaSelecionadas"></div>
</div>

<div class="botoes-acoes">
  <button class="botao-whatsapp" onclick="enviarWhatsApp()">
    Ver disponibilidade (<span id="contador">0</span>)
  </button>
  <button class="botao-limpar" onclick="limparSelecao()">
    Limpar ID(s)
  </button>
</div>

<script>
const flores = [
"AÇUCENA (MUTANTE)","AKACHI","AMATTA","ARYA","BLOODY MARY","BP-116",
"BRANCA DE NEVE","BRIDAL BOUQUET","CANAN 55","CANAN 170","CAPIXABA",
"CÉU ESTRELADO","CÉU ESTRELADO VARIEGATA","COPENHAGEN","DAFNE","COCA-COLA",
"DOUBLE STAR","DUQUESA","EGG ROLL","ELARA","ELLIE","EV19-XANADÚ",
"FERRARI","GOLDEN FAITH","GOLDEN PINK","GRAPE CHOCOLATE","GUARÁ",
"GTA-AIKA","GTA-BOLD","GTA-CANDY CRUSH","GTA-CÓSMICA","GTA-CREPÚSCULO",
"GTA-DESERT DOLL","GTA-DIANA","GTA-EMMA FROST","GTA-FAY","GTA-FLORZINHA",
"GTA-FLUTTERSHY","GTA-FRACTA","GTA-GOLDEN PINK","GTA-ICE DRAGON",
"GTA-KIMBERLY","GTA-LITTLE KISS","GTA-LOLLIPOP BLACK","GTA-LYSSA",
"GTA-LYTA","GTA-MISS GRAVATÁ","GTA-NYX","GTA-PERONA","GTA-PINK VENOM",
"GTA-PINKIE PIE","GTA-RED COMETS","GTA-RED STORM","GTA-RED WIDOW",
"GTA-SANSA","GTA-SHE HA","GTA-SUN CLUSTER","GTA-SWEET BLUSH",
"GTA-TRINITY","GTA-TRUE FAITH","GTA-YUNA","HELENA","INDIGO GLAZE",
"INFINITY","JHULLY","JULIUS CAESAR","KING OF KINGS","KINDLY","L-06",
"LAILA","LILAC FROST (MUTANTE)","LM-440","LM-50","LM2","LUNA",
"MAGNIFICAT","MARIA","MIDNIGHT","MỘNG CẦM","MORAN","NANCY","NEMO",
"NORALINE","NUSA","P-200","PATHUMMA","PEONY","PHARAOH","PURPLE BLUE",
"QUEEN RAY","RF-001","RF-002","RIHANNA","ROMANTIC EDGE","SANTA CLAUS",
"SATURNO","SENNA","SIENA","SOCHI","SOPHIA","STAR CLUSTER","SWALLOW",
"TC-04","THAMIRES","THE SECRET OF VICTORIA","TRIPLE WISH","TROPICAL","TS-69",
"TS-222","TS-330","TW4","UNPARALLELED","VARIEGATA","VAMPIRA",
"VIÚVA NEGRA","VOLCANO","W59","YÚ JIǍO"
];

const floresComVideo = [
"AÇUCENA (MUTANTE)",
"LILAC FROST (MUTANTE)"
];

const catalogo = document.getElementById("catalogo");

function gerarNomeArquivo(nome){
  return nome
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/ /g, "-")
    .replace(/[()]/g, "");
}

function renderCatalogo(lista){
  catalogo.innerHTML = "";

  lista.forEach(nome=>{
    let div = document.createElement("div");
    div.className = "item";
    div.setAttribute("data-id", nome);

    let arquivo = gerarNomeArquivo(nome);

    if(floresComVideo.includes(nome)){
      div.innerHTML = `
        <video autoplay muted loop playsinline>
          <source src="imagens/${arquivo}.mp4">
        </video>
        <p>${nome}</p>
      `;
    } else {
      div.innerHTML = `
        <img src="imagens/${arquivo}.jpg">
        <p>${nome}</p>
      `;
    }

    div.onclick = () => {
      div.classList.toggle("selecionado");
      atualizar();
    };

    catalogo.appendChild(div);
  });
}

function atualizar(){
  let selecionados = document.querySelectorAll(".item.selecionado");
  let total = selecionados.length;

  document.getElementById("contador").innerText = total;

  let caixa = document.querySelector(".caixa-selecao");

  if(total > 0){
    caixa.style.display = "block";

    document.getElementById("listaSelecionadas").innerHTML =
      [...selecionados].map(i=>i.dataset.id).join("<br>");
  } else {
    caixa.style.display = "none";
  }
}

function limparSelecao(){
  document.querySelectorAll(".item.selecionado").forEach(i=>i.classList.remove("selecionado"));
  atualizar();
}

document.getElementById("busca").addEventListener("input", function(){
  let termo = this.value.toLowerCase();
  let filtradas = flores.filter(f => f.toLowerCase().includes(termo));
  renderCatalogo(filtradas);
});

function enviarWhatsApp(){
  let selecionados = document.querySelectorAll(".item.selecionado");
  let ids = [...selecionados].map(i=>i.dataset.id);

  if(ids.length === 0){
    alert("Selecione pelo menos uma flor!");
    return;
  }

  let mensagem = "Olá!\n\nTenho interesse em:\n\n- " + ids.join("\n- ");
  let url = "https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}

renderCatalogo(flores);
</script>

</body>
</html>
