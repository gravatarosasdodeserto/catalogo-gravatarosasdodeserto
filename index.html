<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo | Gravatá Rosas do Deserto</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --header-bg: #fcfaf7;    
  --body-bg: #e5e0d8;      
  --card-white: #ffffff;    
  --card-selected: #cbc4b7; 
  --text-main: #3a3618;    
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--body-bg);
  color: var(--text-main);
  margin: 0;
  padding-bottom: 150px; 
}

/* ===== CABEÇALHO SHOWROOM ===== */
.topbar {
  padding: 50px 0; 
  position: sticky;
  top: 0;
  z-index: 900;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18); 
  overflow: hidden;
  background-color: var(--header-bg);
  border-bottom: 2px solid #ffffff; 
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('imagens/gravata-cabecalho.jpg'); 
  background-size: cover;
  background-position: center;
  z-index: 1;
}

.white-frame {
  position: absolute;
  width: 100%;
  height: auto;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
}

.white-frame::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100px; 
  background-color: rgba(255, 255, 255, 0.7); 
}

.line-top, .line-bottom {
  position: absolute;
  width: 100%;
  height: 1px;
  background-color: #ffffff;
  z-index: 2;
}

.line-top { top: 0; transform: translateY(-50px); }
.line-bottom { bottom: 0; transform: translateY(50px); }

.logo { position: relative; z-index: 3; }
.logo img { 
  width: 150px; 
  height: auto;
  filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4));
}

/* ===== ÁREA DE FILTROS E STATUS ===== */
.secao-filtros {
  position: sticky;
  top: 155px;
  z-index: 800;
  text-align: center;
  padding-top: 10px;
}

.btn-abrir-filtros {
  background: var(--text-main);
  color: white;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 25px;
  border-radius: 50px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.btn-abrir-filtros svg { width: 18px; height: 18px; fill: white; }

.status-filtro {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-main);
  background: rgba(255, 255, 255, 0.4);
  display: inline-block;
  padding: 5px 15px;
  border-radius: 20px;
  opacity: 0.8;
  margin-bottom: 10px;
}

.oculto { display: none !important; }

/* ===== MENU LATERAL (DRAWER) ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
  display: none;
  backdrop-filter: blur(3px);
}

.drawer-filtros {
  position: fixed;
  right: -300px;
  top: 0;
  width: 300px;
  height: 100%;
  background: var(--body-bg);
  z-index: 2001;
  transition: 0.3s;
  padding: 30px 20px;
  box-shadow: -5px 0 25px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
}

.drawer-filtros.active { right: 0; }
.fechar-drawer { background: none; border: none; font-size: 24px; cursor: pointer; text-align: right; margin-bottom: 20px; color: var(--text-main); }

.grupo-filtro { margin-bottom: 25px; }
.titulo-filtro { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 12px; opacity: 0.6; }
.opcoes-filtro { display: flex; flex-wrap: wrap; gap: 8px; }

.pill { padding: 6px 14px; background: #ffffff; border: 1px solid rgba(0,0,0,0.05); border-radius: 50px; font-size: 12px; cursor: pointer; }
.pill.active { background: var(--text-main); color: white; }

.wrapper-switch { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.1); }
.switch-disponivel { display: inline-flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
.switch-disponivel input { display: none; }
.switch-disponivel .slider { width: 34px; height: 18px; background: #c7c1b5; border-radius: 20px; position: relative; transition: 0.3s; }
.switch-disponivel .slider::before { content: ""; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.3s; }
.switch-disponivel input:checked + .slider { background: var(--text-main); }
.switch-disponivel input:checked + .slider::before { transform: translateX(16px); }

/* ===== GRID DO CATÁLOGO ===== */
.catalogo {
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap: 15px; padding: 0 15px; max-width: 1200px; margin: 10px auto;
}

.item { background: var(--card-white); padding: 10px; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.item.selecionado { background: var(--card-selected) !important; transform: scale(0.96); }
.item video, .item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 14px; }
.item p { text-align: center; font-size: 13px; font-weight: 600; margin: 10px 0 2px 0; }
.estoque-status { text-align: center; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.disponivel { color: #2d5a27; }
.encomenda { color: #8a8471; opacity: 0.7; }

/* ===== RODAPÉ ===== */
.rodape-acoes {
  position: fixed; bottom: 0; left: 0; width: 100%;
  background: rgba(229, 224, 216, 0.98); backdrop-filter: blur(12px);
  padding: 10px 20px 25px; z-index: 1000; border-top: 2px solid #ffffff; 
}

.container-rodape { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
.campo-busca { width: 100%; padding: 12px 20px; border-radius: 50px; border: 1.5px solid rgba(0,0,0,0.1); background: white; outline: none; text-align: center; }
.btn-whatsapp { width: 100%; padding: 15px; background: var(--text-main); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
.vazio { grid-column: 1/-1; text-align: center; padding: 60px; opacity: 0.5; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><img src="logo.png"></div>
  <div class="white-frame">
    <div class="line-top"></div>
    <div class="line-bottom"></div>
  </div>
</div>

<div class="secao-filtros">
    <button class="btn-abrir-filtros" onclick="toggleDrawer()">
      <svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h18V5H3zm0 7h12v-2H3v2z"/></svg>
      <span>Filtrar variedades</span>
    </button>
    <div id="statusFiltro" class="status-filtro oculto"></div>
</div>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>

<div class="drawer-filtros" id="drawer">
  <button class="fechar-drawer" onclick="toggleDrawer()">✕</button>
  
  <div class="wrapper-switch">
    <label class="switch-disponivel">
      <input type="checkbox" id="checkProntaEntrega">
      <span class="slider"></span>
      Ver apenas pronta entrega
    </label>
  </div>

  <div class="grupo-filtro">
    <div class="titulo-filtro">Tipo e Camadas</div>
    <div class="opcoes-filtro" id="filtroCategorias">
      <div class="pill active" onclick="filtrarCategoria('Todas', this)">Todas</div>
      <div class="pill" onclick="filtrarCategoria('Singela', this)">Singela</div>
      <div class="pill" onclick="filtrarCategoria('Dupla', this)">Dupla</div>
      <div class="pill" onclick="filtrarCategoria('Tripla+', this)">Tripla+</div>
      <div class="pill" onclick="filtrarCategoria('Mutante', this)">Mutante</div>
      <div class="pill" onclick="filtrarCategoria('Variegata', this)">Variegata</div>
    </div>
  </div>

  <div class="grupo-filtro">
    <div class="titulo-filtro">Famílias de Cores</div>
    <div class="opcoes-filtro" id="filtroCores">
      <div class="pill active" onclick="filtrarCor('Todas', this)">Todas as cores</div>
      <div class="pill" onclick="filtrarCor('Escuras', this)">Escuras</div>
      <div class="pill" onclick="filtrarCor('Claras', this)">Claras</div>
      <div class="pill" onclick="filtrarCor('Amarelas', this)">Amarelas</div>
      <div class="pill" onclick="filtrarCor('Vermelhas', this)">Vermelhas</div>
      <div class="pill" onclick="filtrarCor('Rosas', this)">Rosas</div>
      <div class="pill" onclick="filtrarCor('Matizadas', this)">Matizadas</div>
    </div>
  </div>
</div>

<div class="catalogo" id="gridCatalogo"></div>

<div class="rodape-acoes">
  <div class="container-rodape">
    <input type="text" id="inputPesquisa" class="campo-busca" placeholder="Buscar ID pelo nome...">
    <button id="btnEnviar" class="btn-whatsapp oculto" onclick="enviarPedido()"></button>
  </div>
</div>

<script>
// ESTOQUE COM NOMES ORIGINAIS PARA REVISÃO
const estoque = { 
  "AKACHI": { qtd: 0, cat: "Dupla", cor: "Vermelhas" },
  "AMATTA": { qtd: 1, cat: "Dupla", cor: "Rosas" },
  "ARYA": { qtd: 0, cat: "Tripla+", cor: "Claras" },
  "AÇUCENA (MUTANTE)": { qtd: 1, cat: "Mutante", cor: "Claras" },
  "BARBIE": { qtd: 0, cat: "Tripla+", cor: "Rosas" },
  "BLACK BIRD": { qtd: 1, cat: "Dupla", cor: "Escuras" },
  "BLACK WIDOW": { qtd: 0, cat: "Tripla+", cor: "Escuras" },
  "BLOODY MARY": { qtd: 2, cat: "Dupla", cor: "Vermelhas" },
  "BRANCA DE NEVE": { qtd: 5, cat: "Singela", cor: "Claras" },
  "BRIDAL BOUQUET": { qtd: 0, cat: "Tripla+", cor: "Claras" },
  "CÉU ESTRELADO": { qtd: 2, cat: "Tripla+", cor: "Escuras" },
  "CÉU ESTRELADO VARIEGATA": { qtd: 1, cat: "Variegata", cor: "Escuras" },
  "DARK KNIGHT": { qtd: 0, cat: "Dupla", cor: "Escuras" },
  "EGG ROLL": { qtd: 1, cat: "Tripla+", cor: "Amarelas" },
  "FANTASY": { qtd: 0, cat: "Dupla", cor: "Matizadas" },
  "GOLDEN DRAGON": { qtd: 1, cat: "Tripla+", cor: "Amarelas" },
  "GTA-LYSSA": { qtd: 0, cat: "Dupla", cor: "Escuras" },
  "GTA-RED COMETS": { qtd: 1, cat: "Dupla", cor: "Vermelhas" },
  "GTA-SUN CLUSTER": { qtd: 3, cat: "Tripla+", cor: "Amarelas" },
  "ICE PINK": { qtd: 0, cat: "Singela", cor: "Rosas" },
  "JULIET": { qtd: 1, cat: "Tripla+", cor: "Matizadas" },
  "LH-20 (MOSAICO)": { qtd: 1, cat: "Singela", cor: "Matizadas" },
  "L-14": { qtd: 0, cat: "Tripla+", cor: "Escuras" },
  "MAZARINE": { qtd: 1, cat: "Dupla", cor: "Escuras" },
  "MISS BRAZIL": { qtd: 0, cat: "Tripla+", cor: "Rosas" },
  "NIGHT CITY": { qtd: 1, cat: "Dupla", cor: "Escuras" },
  "OSCAR": { qtd: 0, cat: "Dupla", cor: "Vermelhas" },
  "PURPLE PANTHER": { qtd: 1, cat: "Dupla", cor: "Escuras" },
  "REVELATION": { qtd: 0, cat: "Tripla+", cor: "Matizadas" },
  "SHARON": { qtd: 1, cat: "Tripla+", cor: "Amarelas" },
  "SNOW WHITE": { qtd: 0, cat: "Singela", cor: "Claras" },
  "SUMMER": { qtd: 1, cat: "Dupla", cor: "Amarelas" },
  "VALENTINE": { qtd: 0, cat: "Tripla+", cor: "Vermelhas" },
  "VAMPIRA": { qtd: 1, cat: "Tripla+", cor: "Escuras" },
  "VIÚVA NEGRA": { qtd: 0, cat: "Tripla+", cor: "Escuras" },
  "YELLOW BIRD": { qtd: 1, cat: "Dupla", cor: "Amarelas" }
};

let selecionados = new Set();
let filtroTexto = "";
let apenasDisponiveis = false;
let categoriaAtiva = "Todas";
let corAtiva = "Todas";

const grid = document.getElementById("gridCatalogo");
const statusFiltro = document.getElementById("statusFiltro");
const inputPesquisa = document.getElementById("inputPesquisa");
const checkProntaEntrega = document.getElementById("checkProntaEntrega");

function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('active');
  document.getElementById('overlay').style.display = document.getElementById('drawer').classList.contains('active') ? 'block' : 'none';
}

inputPesquisa.addEventListener("input", (e) => { filtroTexto = e.target.value.toLowerCase(); montarCatalogo(); });
checkProntaEntrega.addEventListener("change", (e) => { apenasDisponiveis = e.target.checked; montarCatalogo(); });

function filtrarCategoria(cat, elemento) {
  categoriaAtiva = cat;
  document.querySelectorAll('#filtroCategorias .pill').forEach(p => p.classList.remove('active'));
  elemento.classList.add('active');
  montarCatalogo();
}

function filtrarCor(cor, elemento) {
  corAtiva = cor;
  document.querySelectorAll('#filtroCores .pill').forEach(p => p.classList.remove('active'));
  elemento.classList.add('active');
  montarCatalogo();
}

function atualizarTextoFiltro() {
  let partes = [];
  if (apenasDisponiveis) partes.push("pronta entrega");
  if (categoriaAtiva !== "Todas") partes.push(categoriaAtiva.toLowerCase());
  if (corAtiva !== "Todas") partes.push(corAtiva.toLowerCase());

  if (partes.length > 0) {
    statusFiltro.innerText = "Exibindo apenas ID's " + partes.join(" e ");
    statusFiltro.classList.remove("oculto");
  } else {
    statusFiltro.classList.add("oculto");
  }
}

function formatarNomeArquivo(nome) { return nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ /g, "-").replace(/[()]/g, ""); }

function montarCatalogo() {
  grid.innerHTML = "";
  let itensExibidos = 0;
  atualizarTextoFiltro();
  
  Object.keys(estoque).sort().forEach(nome => {
    const dados = estoque[nome];
    if (apenasDisponiveis && dados.qtd === 0) return;
    if (categoriaAtiva !== "Todas" && dados.cat !== categoriaAtiva) return;
    if (corAtiva !== "Todas" && dados.cor !== corAtiva) return;
    if (filtroTexto && !nome.toLowerCase().includes(filtroTexto)) return;

    itensExibidos++;
    const nomeArquivo = formatarNomeArquivo(nome);
    const card = document.createElement("div");
    card.className = "item" + (selecionados.has(nome) ? " selecionado" : "");
    card.innerHTML = `
      <video src="imagens/${nomeArquivo}.mp4" poster="imagens/${nomeArquivo}.jpg" muted loop playsinline autoplay onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"></video>
      <img src="imagens/${nomeArquivo}.jpg" style="display:none" onerror="this.src='imagens/sem-foto.jpg'">
      <p>${nome}</p>
      <div class="estoque-status ${dados.qtd > 0 ? 'disponivel' : 'encomenda'}">
        ${dados.qtd > 0 ? 'Disponível: '+dados.qtd : 'Por Encomenda'}
      </div>`;
    
    card.onclick = () => { 
      if (selecionados.has(nome)) selecionados.delete(nome); else selecionados.add(nome);
      inputPesquisa.value = "";
      filtroTexto = "";
      atualizarPainelAcoes(); 
      montarCatalogo(); 
    };
    grid.appendChild(card);
  });
  if (itensExibidos === 0) grid.innerHTML = `<div class="vazio">Nenhuma ID encontrada com esses filtros.</div>`;
}

function atualizarPainelAcoes() {
  const btnZap = document.getElementById("btnEnviar");
  if (selecionados.size > 0) {
    btnZap.classList.remove("oculto");
    btnZap.innerHTML = `Pedir informações (${selecionados.size})`; // TEXTO DO BOTÃO ORIGINAL
  } else { btnZap.classList.add("oculto"); }
}

function enviarPedido() {
  const ids = Array.from(selecionados);
  // MENSAGEM ORIGINAL DO WHATSAPP
  const mensagem = `Olá!\n\nTenho interesse nas variedades:\n- ${ids.join("\n- ")}\n\nPoderia me passar mais informações?`;
  window.open("https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem), "_blank");
}

montarCatalogo();
</script>

</body>
</html>
