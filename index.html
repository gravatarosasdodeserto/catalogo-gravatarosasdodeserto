<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo | Gravatá Rosas do Deserto</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --header-bg: #fcfaf7;
  --body-bg: #e5e0d8;
  --card-white: #ffffff;
  --card-selected: #cbc4b7;
  --text-main: #3a3618;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--body-bg);
  color: var(--text-main);
  margin: 0;
  padding-bottom: 230px;
}

/* ===== CABEÇALHO ===== */
.topbar {
  padding: 50px 0;
  position: sticky;
  top: 0;
  z-index: 900;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.18);
  overflow: hidden;
  background-color: var(--header-bg);
  border-bottom: 2px solid #ffffff;
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url('imagens/gravata-cabecalho.jpg');
  background-size: cover;
  background-position: center;
  z-index: 1;
}

.white-frame {
  position: absolute;
  width: 100%;
  height: auto;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
}

.white-frame::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100px;
  background-color: rgba(255, 255, 255, 0.7);
}

.line-top,.line-bottom {
  position: absolute;
  width: 100%;
  height: 1px;
  background-color: #ffffff;
  z-index: 2;
}

.line-top { top: 0; transform: translateY(-50px); }
.line-bottom { bottom: 0; transform: translateY(50px); }

.logo { position: relative; z-index: 3; }
.logo img { width: 150px; height: auto; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4)); }

/* ===== BARRA DE FILTROS ===== */
.secao-filtros {
  position: sticky;
  top: 152px;
  z-index: 950;
  padding: 4px 15px;
  background: #ffffff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  pointer-events: none;
  gap: 10px;
  height: 38px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.status-filtro {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-main);
  background: rgba(58, 54, 24, 0.08);
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: 50px;
  pointer-events: auto;
}

.btn-abrir-filtros {
  background: var(--text-main);
  color: white;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 50px;
  border: none;
  font-weight: 600;
  font-size: 11px;
  cursor: pointer;
  pointer-events: auto;
}

/* ===== GRID ===== */
.catalogo {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}

.item { background: var(--card-white); padding: 10px; border-radius: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.2s; }
.item.selecionado { background: var(--card-selected)!important; transform: scale(0.96); }
.item video, .item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 14px; display: block; }
.item p { text-align: center; font-size: 13px; font-weight: 600; margin: 10px 0 2px 0; }
.estoque-status { text-align: center; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.disponivel { color: #2d5a27; }
.encomenda { color: #8a8471; opacity: 0.7; }

/* ===== DRAWER E RESTANTE ===== */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; backdrop-filter: blur(3px); }
.drawer-filtros { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: var(--body-bg); z-index: 2001; transition: 0.3s; padding: 30px 20px; box-shadow: -5px 0 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
.drawer-filtros.active { right: 0; }
.fechar-drawer { background: none; border: none; font-size: 24px; cursor: pointer; text-align: right; margin-bottom: 20px; }

.pill { padding: 6px 14px; background: #ffffff; border: 1px solid rgba(0,0,0,0.05); border-radius: 50px; font-size: 12px; cursor: pointer; margin-bottom: 5px; display: inline-block; }
.pill.active { background: var(--text-main); color: white; }

.rodape-acoes { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(229, 224, 216, 0.98); backdrop-filter: blur(12px); padding: 10px 20px 25px; z-index: 1000; border-top: 2px solid #ffffff; }
.container-rodape { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
.campo-busca { width: 100%; padding: 12px 20px; border-radius: 50px; border: 1.5px solid rgba(0,0,0,0.1); outline: none; text-align: center; }
.btn-whatsapp { width: 100%; padding: 15px; background: var(--text-main); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
.oculto { display: none; }

.caixa-selecao { display: none; background: #ffffff; padding: 10px; border-radius: 15px; margin-bottom: 10px; max-height: 100px; overflow-y: auto; }
.tag-item { font-size: 10px; background: #f0f0eb; padding: 4px 8px; border-radius: 8px; margin: 2px; display: inline-flex; align-items: center; gap: 5px; }

.instrucao-texto { width: calc(100% - 40px); margin: 20px auto; padding: 15px; text-align: center; background: white; border-radius: 15px; font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><img src="logo.png" onerror="this.style.display='none'"></div>
  <div class="white-frame">
    <div class="line-top"></div>
    <div class="line-bottom"></div>
  </div>
</div>

<div class="secao-filtros">
  <div class="status-filtro" id="statusFiltro" style="display: none;">Filtros ativos</div>
  <button class="btn-abrir-filtros" onclick="toggleDrawer()">Filtrar</button>
</div>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>

<div class="drawer-filtros" id="drawer">
  <button class="fechar-drawer" onclick="toggleDrawer()">✕</button>
  <div style="margin-bottom: 20px;">
    <label><input type="checkbox" id="checkProntaEntrega"> Apenas Pronta Entrega</label>
  </div>
  <div id="filtroCategorias"><strong>Camadas:</strong><br></div>
  <div id="filtroCores" style="margin-top:20px;"><strong>Cores:</strong><br></div>
</div>

<div class="instrucao-texto">
    Selecione as ID's desejadas para solicitar informações.
</div>

<div class="catalogo" id="gridCatalogo"></div>

<div class="rodape-acoes">
  <div class="container-rodape">
    <div class="caixa-selecao" id="areaSelecao">
      <div id="containerTags"></div>
      <span style="font-size: 10px; color: red; cursor: pointer;" onclick="limparTudo()">Limpar Tudo</span>
    </div>
    <input type="text" id="inputPesquisa" class="campo-busca" placeholder="Buscar ID pelo nome...">
    <button id="btnEnviar" class="btn-whatsapp oculto" onclick="enviarPedido()"></button>
  </div>
</div>

<script>
let estoque = {};
let selecionados = new Set();
let filtroTexto = "";
let apenasDisponiveis = false;
let categoriaAtiva = "Todas";
let corAtiva = "Todas";
let categoriasUnicas = new Set();
let coresUnicas = new Set();

async function carregarEstoque() {
  const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQHtdljGrbqvDGysgNUi7MVlGI19jY6WYrIJSckkcX7ylbKP02BWqgt0qHPUTTxqg/pub?gid=1893895788&single=true&output=csv';

  try {
    const resposta = await fetch(urlCSV);
    const csv = await resposta.text();
    const linhas = csv.split(/\r?\n/);
    
    // Processa cabeçalho removendo espaços e acentos para comparação
    const cabecalho = linhas.shift().split(',').map(h => 
      h.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    );

    const idxNome = cabecalho.indexOf('nome');
    const idxQtd = cabecalho.indexOf('qtd');
    const idxCamadas = cabecalho.indexOf('camadas');
    const idxCores = cabecalho.indexOf('cores');
    const idxMidia = cabecalho.indexOf('midia');

    estoque = {};

    linhas.forEach(linha => {
      if (!linha.trim()) return;
      const colunas = linha.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
      const limpar = (str) => str ? str.trim().replace(/^"|"$/g, '') : '';

      const nome = limpar(colunas[idxNome]);
      if (!nome) return;

      const midia = limpar(colunas[idxMidia]);
      const cat = limpar(colunas[idxCamadas]);
      const cor = limpar(colunas[idxCores]);

      estoque[nome] = {
        qtd: parseInt(limpar(colunas[idxQtd])) || 0,
        cat: cat || 'Outros',
        cor: cor || 'Outras',
        midia: midia
      };

      if (cat) categoriasUnicas.add(cat);
      if (cor) coresUnicas.add(cor);
    });

    gerarFiltrosDinamicos();
    montarCatalogo();
  } catch (erro) {
    console.error(erro);
    document.getElementById("gridCatalogo").innerHTML = "Erro ao carregar planilha.";
  }
}

function gerarFiltrosDinamicos() {
  const divCat = document.getElementById('filtroCategorias');
  const divCor = document.getElementById('filtroCores');
  
  divCat.innerHTML = '<strong>Camadas:</strong><br><div class="pill active" onclick="filtrarCategoria(\'Todas\', this)">Todas</div>';
  categoriasUnicas.forEach(cat => {
    divCat.innerHTML += `<div class="pill" onclick="filtrarCategoria('${cat}', this)">${cat}</div>`;
  });

  divCor.innerHTML = '<strong>Cores:</strong><br><div class="pill active" onclick="filtrarCor(\'Todas\', this)">Todas</div>';
  coresUnicas.forEach(cor => {
    divCor.innerHTML += `<div class="pill" onclick="filtrarCor('${cor}', this)">${cor}</div>`;
  });
}

function montarCatalogo() {
  const grid = document.getElementById("gridCatalogo");
  grid.innerHTML = "";
  
  Object.keys(estoque).sort().forEach(nome => {
    const dados = estoque[nome];
    
    if (apenasDisponiveis && dados.qtd === 0) return;
    if (categoriaAtiva !== "Todas" && dados.cat !== categoriaAtiva) return;
    if (corAtiva !== "Todas" && dados.cor !== corAtiva) return;
    if (filtroTexto && !nome.toLowerCase().includes(filtroTexto)) return;

    const midia = dados.midia ? dados.midia.trim() : '';
    const isVideo = midia.toLowerCase().endsWith('.mp4');
    const caminhoMidia = midia ? `imagens/${midia}` : 'imagens/sem-foto.jpg';

    const card = document.createElement("div");
    card.className = "item" + (selecionados.has(nome) ? " selecionado" : "");
    card.innerHTML = `
      ${isVideo ? 
        `<video src="${caminhoMidia}" muted loop playsinline autoplay onerror="this.style.display='none'"></video>` : 
        `<img src="${caminhoMidia}" onerror="this.src='imagens/sem-foto.jpg'">`
      }
      <p>${nome}</p>
      <div class="estoque-status ${dados.qtd > 0 ? 'disponivel' : 'encomenda'}">
        ${dados.qtd > 0 ? 'Disponível' : 'Por Encomenda'}
      </div>
    `;

    card.onclick = () => {
      if (selecionados.has(nome)) selecionados.delete(nome); 
      else selecionados.add(nome);
      atualizarPainelAcoes();
      montarCatalogo();
    };
    grid.appendChild(card);
  });
}

// Funções de Interface
function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('active');
  document.getElementById('overlay').style.display = 
    document.getElementById('drawer').classList.contains('active') ? 'block' : 'none';
}

function filtrarCategoria(cat, el) {
  categoriaAtiva = cat;
  document.querySelectorAll('#filtroCategorias .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  montarCatalogo();
}

function filtrarCor(cor, el) {
  corAtiva = cor;
  document.querySelectorAll('#filtroCores .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  montarCatalogo();
}

document.getElementById("inputPesquisa").addEventListener("input", (e) => {
  filtroTexto = e.target.value.toLowerCase();
  montarCatalogo();
});

document.getElementById("checkProntaEntrega").addEventListener("change", (e) => {
  apenasDisponiveis = e.target.checked;
  montarCatalogo();
});

function atualizarPainelAcoes() {
  const area = document.getElementById("areaSelecao");
  const container = document.getElementById("containerTags");
  const btn = document.getElementById("btnEnviar");
  container.innerHTML = "";

  if (selecionados.size > 0) {
    area.style.display = "block";
    btn.classList.remove("oculto");
    btn.innerText = `Solicitar ${selecionados.size} ID(s)`;
    selecionados.forEach(id => {
      container.innerHTML += `<span class="tag-item">${id}</span>`;
    });
  } else {
    area.style.display = "none";
    btn.classList.add("oculto");
  }
}

function enviarPedido() {
  const msg = `Olá! Gostaria de informações sobre: ${Array.from(selecionados).join(", ")}`;
  window.open(`https://wa.me/5581992665421?text=${encodeURIComponent(msg)}`, "_blank");
}

function limparTudo() {
  selecionados.clear();
  atualizarPainelAcoes();
  montarCatalogo();
}

carregarEstoque();
</script>
</body>
</html>
