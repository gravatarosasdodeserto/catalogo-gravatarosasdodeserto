<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravatá RD | Catálogo de Rosas do Deserto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfbf7;
            --surface: #ffffff;
            --text-primary: #2e2a15;
            --text-secondary: #7d6e53;
            --accent: #a08c6b;
            --border: #eceae4;
            --radius: 12px;
            --premium-grad: linear-gradient(135deg, #a08c6b 0%, #7d6e53 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text-primary); overflow-x: hidden; }

        header { 
            height: 150px; 
            background: url('imagens/gravata-cabecalho.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
        }
        .header-stripe {
            width: 100%; background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px 0; border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; justify-content: center;
        }
        .logo { width: 110px; }

        @media (min-width: 1024px) { header { height: 300px; } .logo { width: 160px; } }

        .filter-bar {
            background: #2e2a15; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .filter-title { color: white; font-size: 13px; font-weight: 500; letter-spacing: 1px; }
        .btn-filter-trigger { background: var(--premium-grad); color: white; border: none; padding: 8px 18px; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; }

        .catalog-container { max-width: 1400px; margin: auto; padding: 20px 15px 120px; }
        .search-area { text-align: center; margin-bottom: 25px; }
        .search-box { width: 100%; max-width: 500px; padding: 12px 25px; border-radius: 50px; border: 1px solid var(--border); outline: none; }

        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        @media (min-width: 768px) { #grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; } }

        /* CARDS */
        .card { 
            background: var(--surface); border-radius: var(--radius); 
            border: 2px solid transparent; overflow: hidden; 
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .card.selected { border-color: var(--accent); background: #fffcf5; transform: scale(0.98); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        .card-body { padding: 12px; text-align: center; }
        .card-id { font-size: 15px; font-weight: 600; display: block; }
        .card-status { font-size: 11px; margin-top: 4px; display: block; font-weight: 500; }
        .status-available { color: var(--accent); }
        .status-order { color: var(--text-secondary); }

        /* SELEÇÃO CHECKMARK */
        .select-badge {
            position: absolute; top: 10px; right: 10px; background: var(--accent);
            color: white; width: 22px; height: 22px; border-radius: 50%;
            display: none; align-items: center; justify-content: center; font-size: 12px;
        }
        .card.selected .select-badge { display: flex; }

        /* DRAWER FILTROS */
        .drawer { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--bg); z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: 0.4s; padding: 20px; overflow-y: auto; }
        .drawer.active { right: 0; }
        .filter-section h4 { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; margin-top: 20px; }
        .option-item { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
        .overlay.active { display: block; }

        /* BOTÃO WHATSAPP FLUTUANTE */
        #btn-whatsapp {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #25d366; color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: 600; text-decoration: none; display: none; z-index: 3000;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { bottom: -50px; } to { bottom: 30px; } }
    </style>
</head>
<body>

<header><div class="header-stripe"><img src="logo.png" class="logo"></div></header>

<div class="filter-bar">
    <span class="filter-title">CATÁLOGO GRAVATÁ RD</span>
    <button class="btn-filter-trigger" onclick="toggleDrawer()">FILTRAR</button>
</div>

<div class="catalog-container">
    <div class="search-area"><input type="text" id="search" class="search-box" placeholder="Buscar ID..." oninput="filtrar()"></div>
    <div id="grid"></div>
</div>

<a id="btn-whatsapp" href="#" onclick="enviarWhatsApp(event)">SOLICITAR INFORMAÇÕES</a>

<div class="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
    <h3 style="font-size: 16px; margin-bottom: 10px;">Filtros</h3>
    <div id="filtros-container"></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzgV_H5QLTNwJ12B-78q57qNnlaVi0vbxW3jIqdnp7YH1IKCdBdFthIHymlMM9Jusqktg/exec";
    const WHATSAPP = "558992665421";
    let BANCO = [];
    let SELECIONADOS = new Set();

    async function carregar() {
        try {
            const r = await fetch(`${API}?action=get&t=${Date.now()}`);
            const json = await r.json();
            BANCO = Object.keys(json).map(id => ({ id, ...json[id] }));
            gerarFiltros();
            filtrar();
        } catch (e) { console.error(e); }
    }

    function gerarFiltros() {
        const cats = { cores: 'Cores', camadas: 'Camadas', padrao: 'Padrão', especiais: 'Especiais' };
        let html = "";
        Object.keys(cats).forEach(cat => {
            let opts = [...new Set(BANCO.flatMap(i => i[cat] ? i[cat].split(',').map(s => s.trim()) : []))].sort();
            html += `<div class="filter-section"><h4>${cats[cat]}</h4>`;
            opts.forEach(o => {
                html += `<label class="option-item"><input type="checkbox" class="chk-f" data-cat="${cat}" value="${o}" onchange="filtrar()"> ${o}</label>`;
            });
            html += `</div>`;
        });
        document.getElementById('filtros-container').innerHTML = html;
    }

    function filtrar() {
        const busca = document.getElementById('search').value.toUpperCase();
        const ativos = {};
        document.querySelectorAll('.chk-f:checked').forEach(c => {
            if(!ativos[c.dataset.cat]) ativos[c.dataset.cat] = [];
            ativos[c.dataset.cat].push(c.value);
        });

        const res = BANCO.filter(item => {
            const bateB = item.id.toUpperCase().includes(busca);
            const bateF = Object.keys(ativos).every(cat => {
                const vItem = (item[cat] || "").split(',').map(s => s.trim());
                return ativos[cat].some(a => vItem.includes(a));
            });
            return bateB && bateF;
        });
        render(res);
    }

    function render(lista) {
        document.getElementById('grid').innerHTML = lista.map(item => {
            const qtd = parseInt(item.qtd) || 0;
            const isSelected = SELECIONADOS.has(item.id) ? 'selected' : '';
            return `
                <div class="card ${isSelected}" onclick="toggleSelect('${item.id}')">
                    <div class="select-badge">✓</div>
                    <img src="${item.midia ? 'https://drive.google.com/thumbnail?sz=w600&id='+item.midia : 'imagens/sem-foto.jpg'}">
                    <div class="card-body">
                        <span class="card-id">${item.id}</span>
                        <span class="card-status ${qtd > 0 ? 'status-available' : 'status-order'}">
                            ${qtd > 0 ? qtd + (qtd === 1 ? ' disponível' : ' disponíveis') : 'Encomendar sem custo'}
                        </span>
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleSelect(id) {
        if(SELECIONADOS.has(id)) SELECIONADOS.delete(id);
        else SELECIONADOS.add(id);
        
        document.getElementById('btn-whatsapp').style.display = SELECIONADOS.size > 0 ? 'block' : 'none';
        filtrar(); // Re-renderiza para aplicar classe de seleção
    }

    function enviarWhatsApp(e) {
        e.preventDefault();
        const listaIds = Array.from(SELECIONADOS).join(', ');
        const texto = encodeURIComponent(`Olá! Estive visitando o catálogo da Gravatá RD e gostaria de solicitar mais informações sobre estas IDs que selecionei:\n\n*IDs: ${listaIds}*\n\nComo faço para garantir estas belezuras?`);
        window.open(`https://wa.me/${WHATSAPP}?text=${texto}`, '_blank');
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('active');
        document.querySelector('.overlay').classList.toggle('active');
    }

    window.onload = carregar;
</script>
</body>
</html>
