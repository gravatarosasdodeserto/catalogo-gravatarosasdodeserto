<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravatá RD | Catálogo de Rosas do Deserto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfbf7;
            --surface: #ffffff;
            --text-primary: #2e2a15;
            --text-secondary: #7d6e53;
            --accent: #a08c6b;
            --border: #eceae4;
            --radius: 12px;
            --premium-grad: linear-gradient(135deg, #a08c6b 0%, #7d6e53 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text-primary); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        header { 
            height: 150px; 
            background: url('imagens/gravata-cabecalho.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
        }
        .header-stripe {
            width: 100%; background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 20px 0; border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; justify-content: center;
        }
        .logo { width: 110px; }
        @media (min-width: 1024px) { header { height: 300px; } .logo { width: 160px; } }

        .top-nav {
            background: #2e2a15; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; height: 65px;
        }
        
        .btn-filter { 
            background: var(--premium-grad); color: white; border: none; 
            padding: 10px 25px; border-radius: 50px; font-size: 11px; 
            font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        /* BOTÃO WHATSAPP AJUSTADO */
        #btn-whatsapp { 
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--premium-grad); color: white; border: none; 
            padding: 18px 10px; font-size: 11.5px; /* Fonte levemente menor para não quebrar */
            font-weight: 700; cursor: pointer; text-decoration: none;
            text-transform: uppercase; letter-spacing: 0.5px;
            display: none; justify-content: center; align-items: center;
            z-index: 3000; box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            text-align: center; gap: 8px;
        }
        #btn-whatsapp svg { width: 18px; height: 18px; fill: white; }

        .catalog-container { max-width: 1400px; margin: auto; padding: 20px 15px 120px; flex: 1; }
        
        .search-area { text-align: center; margin-bottom: 25px; width: 100%; display: flex; justify-content: center; }
        .search-box { 
            width: 100%; max-width: 500px; padding: 12px 25px; 
            border-radius: 50px; border: 1px solid var(--border); 
            outline: none; text-align: center; font-size: 15px;
        }

        .panel-group { margin-bottom: 20px; display: none; }
        .panel-label { 
            font-size: 10px; font-weight: 700; color: var(--accent); 
            text-transform: uppercase; margin-bottom: 8px; display: block;
            text-align: center; letter-spacing: 1px;
        }
        .chips-container {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
        }
        .chip {
            background: #eeebe3; border: 1px solid var(--border);
            padding: 4px 12px; border-radius: 20px; font-size: 10px;
            display: flex; align-items: center; gap: 6px; color: var(--text-secondary);
        }
        .chip.chip-id { background: #fdf5e6; border-color: var(--accent); color: var(--text-primary); font-weight: 600; }
        .chip span { cursor: pointer; font-weight: bold; font-size: 14px; color: var(--accent); }

        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        @media (min-width: 768px) { #grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; } }

        .card { 
            background: var(--surface); border-radius: var(--radius); 
            border: 2px solid transparent; overflow: hidden; 
            cursor: pointer; transition: 0.2s; position: relative;
        }
        .card.selected { border-color: var(--accent); background: #fffcf5; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        .card-body { padding: 12px; text-align: center; }
        .card-id { font-size: 15px; font-weight: 600; display: block; }
        .card-status { font-size: 11px; margin-top: 4px; display: block; font-weight: 500; }
        .status-available { color: var(--accent); }
        .status-order { color: var(--text-secondary); opacity: 0.8; }

        .drawer { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--bg); z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: 0.4s; padding: 25px; overflow-y: auto; }
        .drawer.active { right: 0; }
        .filter-section { border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 15px; }
        .filter-section h4 { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
        .option-item { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 10px; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
        .overlay.active { display: block; }

        footer { padding: 60px 20px; text-align: center; border-top: 1px solid var(--border); margin-top: 40px; }
    </style>
</head>
<body>

<header><div class="header-stripe"><img src="logo.png" class="logo"></div></header>

<div class="top-nav">
    <button class="btn-filter" onclick="toggleDrawer()">Filtrar</button>
</div>

<div class="catalog-container">
    <div class="search-area">
        <input type="text" id="search" class="search-box" placeholder="Pesquisar por ID ou nome..." oninput="filtrar()">
    </div>

    <div id="filter-panel" class="panel-group">
        <span class="panel-label">Exibindo apenas:</span>
        <div id="filter-chips" class="chips-container"></div>
    </div>

    <div id="selection-panel" class="panel-group">
        <span class="panel-label">IDs selecionadas:</span>
        <div id="selection-chips" class="chips-container"></div>
    </div>

    <div id="grid"></div>
</div>

<a id="btn-whatsapp" href="#" onclick="enviarWhatsApp(event)">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.431 5.63 1.432h.006c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    <span id="txt-whatsapp">SOLICITAR INFORMAÇÕES</span>
</a>

<footer>
    <a href="admin.html" style="color: #ddd; text-decoration: none; font-size: 20px;">⚙</a>
</footer>

<div class="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
    <h3 style="font-size: 16px; margin-bottom: 20px;">Refinar Busca</h3>
    <div id="filtros-container"></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzgV_H5QLTNwJ12B-78q57qNnlaVi0vbxW3jIqdnp7YH1IKCdBdFthIHymlMM9Jusqktg/exec";
    const WHATSAPP = "5581992665421";
    let BANCO = [];
    let SELECIONADOS = new Set();

    async function carregar() {
        try {
            const r = await fetch(`${API}?action=get&t=${Date.now()}`);
            const json = await r.json();
            BANCO = Object.keys(json).map(id => ({ id, ...json[id] }));
            gerarFiltros();
            filtrar();
        } catch (e) { console.error(e); }
    }

    function removerAcentos(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function gerarFiltros() {
        const cats = { cores: 'Cores', camadas: 'Número de Camadas', padrao: 'Padrão das Pétalas', especiais: 'Características Especiais' };
        let html = "";
        Object.keys(cats).forEach(cat => {
            let opts = [...new Set(BANCO.flatMap(i => i[cat] ? i[cat].split(',').map(s => s.trim()) : []))].sort();
            if(opts.length > 0) {
                const isSingle = (cat === 'camadas' || cat === 'padrao');
                html += `<div class="filter-section"><h4>${cats[cat]}</h4>`;
                if(isSingle) html += `<label class="option-item"><input type="radio" name="${cat}" class="chk-f" data-cat="${cat}" value="" onchange="filtrar()" checked> Todas</label>`;
                opts.forEach(o => {
                    const type = isSingle ? 'radio' : 'checkbox';
                    const name = isSingle ? `name="${cat}"` : '';
                    html += `<label class="option-item"><input type="${type}" ${name} class="chk-f" data-cat="${cat}" value="${o}" onchange="filtrar()"> ${o}</label>`;
                });
                html += `</div>`;
            }
        });
        document.getElementById('filtros-container').innerHTML = html;
    }

    function filtrar() {
        const busca = removerAcentos(document.getElementById('search').value);
        const ativos = {};
        document.querySelectorAll('.chk-f:checked').forEach(c => {
            if(c.value === "") return;
            if(!ativos[c.dataset.cat]) ativos[c.dataset.cat] = [];
            ativos[c.dataset.cat].push(c.value);
        });

        const res = BANCO.filter(item => {
            const textoItem = removerAcentos(item.id);
            const bateB = textoItem.includes(busca);
            const bateF = Object.keys(ativos).every(cat => {
                const vItem = (item[cat] || "").split(',').map(s => s.trim());
                return ativos[cat].some(a => vItem.includes(a));
            });
            return bateB && bateF;
        });
        
        atualizarPaineis(ativos);
        render(res);
    }

    function atualizarPaineis(filtrosAtivos) {
        const selectionPanel = document.getElementById('selection-panel');
        const selectionChips = document.getElementById('selection-chips');
        let htmlIds = "";
        SELECIONADOS.forEach(id => {
            htmlIds += `<div class="chip chip-id">${id} <span onclick="toggleSelect('${id}')">&times;</span></div>`;
        });
        selectionChips.innerHTML = htmlIds;
        selectionPanel.style.display = SELECIONADOS.size > 0 ? 'block' : 'none';

        const filterPanel = document.getElementById('filter-panel');
        const filterChips = document.getElementById('filter-chips');
        let htmlFilters = "";
        Object.keys(filtrosAtivos).forEach(cat => {
            filtrosAtivos[cat].forEach(val => {
                htmlFilters += `<div class="chip">${val} <span onclick="removerFiltro('${cat}', '${val}')">&times;</span></div>`;
            });
        });
        filterChips.innerHTML = htmlFilters;
        filterPanel.style.display = htmlFilters !== "" ? 'block' : 'none';

        const btnWs = document.getElementById('btn-whatsapp');
        const txtWs = document.getElementById('txt-whatsapp');
        const qtd = SELECIONADOS.size;
        if(qtd > 0) {
            btnWs.style.display = 'flex';
            txtWs.innerText = qtd === 1 
                ? `SOLICITAR INFORMAÇÕES SOBRE A ID SELECIONADA` 
                : `SOLICITAR INFORMAÇÕES SOBRE AS ${qtd} IDs SELECIONADAS`;
        } else {
            btnWs.style.display = 'none';
        }
    }

    function removerFiltro(cat, val) {
        const el = document.querySelector(`.chk-f[data-cat="${cat}"][value="${val}"]`);
        if(el) {
            if(el.type === 'radio') document.querySelector(`.chk-f[data-cat="${cat}"][value=""]`).checked = true;
            else el.checked = false;
            filtrar();
        }
    }

    function render(lista) {
        document.getElementById('grid').innerHTML = lista.map(item => {
            const qtd = parseInt(item.qtd) || 0;
            const isSelected = SELECIONADOS.has(item.id) ? 'selected' : '';
            return `
                <div class="card ${isSelected}" onclick="toggleSelect('${item.id}')">
                    <img src="${item.midia ? 'https://drive.google.com/thumbnail?sz=w600&id='+item.midia : 'imagens/sem-foto.jpg'}" loading="lazy">
                    <div class="card-body">
                        <span class="card-id">${item.id}</span>
                        <span class="card-status ${qtd > 0 ? 'status-available' : 'status-order'}">
                            ${qtd > 0 ? qtd + (qtd === 1 ? ' disponível' : ' disponíveis') : 'Encomendar sem custo'}
                        </span>
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleSelect(id) {
        if(SELECIONADOS.has(id)) {
            SELECIONADOS.delete(id);
        } else {
            SELECIONADOS.add(id);
            document.getElementById('search').value = "";
        }
        filtrar();
    }

    function enviarWhatsApp(e) {
        e.preventDefault();
        const listaIds = Array.from(SELECIONADOS).sort().join(', ');
        const texto = encodeURIComponent(`Olá! Gostaria de informações sobre estas Rosas do Deserto:\n\n*IDs: ${listaIds}*\n\nComo faço para garantir estas plantas?`);
        window.open(`https://wa.me/${WHATSAPP}?text=${texto}`, '_blank');
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('active');
        document.querySelector('.overlay').classList.toggle('active');
    }

    window.onload = carregar;
</script>
</body>
</html>
