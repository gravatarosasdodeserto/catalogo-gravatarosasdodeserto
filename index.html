<!DOCTYPE html>
<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Flores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: #f8f5f0;
  margin: 0;
  padding-bottom: 200px;
  overflow-x: hidden;
}

.topbar {
  background: #3a3618;
  padding: 12px 0 16px 0;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  max-width: 600px;
  margin: auto;
  padding: 0 15px;
}

.logo img { width: 70px; }

.info-topo h1 { margin: 0; color: white; font-size: 18px; }
.subtitulo { margin: 0; font-size: 13px; color: #d6d6d6; }

.instrucao {
  max-width: 600px;
  margin: 15px auto;
  padding: 15px;
  background: white;
  border-radius: 12px;
  text-align: center;
}

.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0,0,0,0.1);
}

.item.selecionado {
  background: rgba(58, 54, 24, 0.15);
}

img, video {
  width: 100%;
  border-radius: 8px;
}

.item p {
  text-align: center;
  margin-top: 8px;
  font-weight: 500;
}

.estoque {
  font-size: 12px;
  margin-top: 4px;
  text-align: center;
}

.disponivel { color: green; }
.indisponivel { color: #a67c00; }

.botoes-acoes {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px;
  background: #f8f5f0;
}

.botao-whatsapp {
  width: 100%;
  padding: 15px;
  background: #3a3618;
  color: white;
  border: none;
  border-radius: 50px;
}

.busca {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: 2px solid #3a3618;
  margin-bottom: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div class="caixa-selecao">
  <div class="topo-caixa">
    <h3>ID's selecionadas:</h3>
    <button onclick="limparSelecao()">Limpar tudo</button>
  </div>
  <div id="listaSelecionadas"></div>
</div>

<div class="topbar">
  <div class="header">
    <div class="logo"><img src="logo.jpg"></div>
    <div class="info-topo">
      <h1>Gravatá Rosas do Deserto</h1>
      <p class="subtitulo">Enxertos de Adenium Obesum</p>
    </div>
  </div>
</div>

<p class="instrucao">
Escolha as ID(s) das flores e clique em <strong>Ver disponibilidade</strong>.
</p>

<div class="catalogo" id="catalogo"></div>

<div class="botoes-acoes">
  <input type="text" id="busca" class="busca" placeholder="Buscar por ID...">
  <button class="botao-whatsapp" onclick="enviarWhatsApp()">
  Pedir informações / encomendar (<span id="contador">0</span>)
</button>
</div>

const catalogo = document.getElementById("catalogo");
const buscaInput = document.getElementById("busca");

let selecionados = new Set();

function gerarNomeArquivo(nome){
  return nome.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/ /g, "-")
    .replace(/[()]/g, "");
}

function renderCatalogo(){
  catalogo.innerHTML = "";

  flores.forEach(nome=>{
    let div = document.createElement("div");
    div.className = "item";

    if(selecionados.has(nome)) div.classList.add("selecionado");

    let arquivo = gerarNomeArquivo(nome);
    let qtd = estoque[nome] ?? 0;

    let texto = qtd > 0
      ? `Enxertos disponíveis: ${qtd} (envio imediato)`
      : `Enxertos disponíveis: 0 (pode encomendar)`;

    let classe = qtd > 0 ? "estoque disponivel" : "estoque indisponivel";

    if(floresComVideo.includes(nome)){
      div.innerHTML = `
        <video autoplay muted loop playsinline>
          <source src="imagens/${arquivo}.mp4">
        </video>
        <p>${nome}</p>
        <small class="${classe}">${texto}</small>
      `;
    } else {
      div.innerHTML = `
        <img src="imagens/${arquivo}.jpg" onerror="this.src='imagens/sem-foto.jpg'">
        <p>${nome}</p>
        <small class="${classe}">${texto}</small>
      `;
    }

    div.onclick = ()=>{
  if(selecionados.has(nome)) selecionados.delete(nome);
  else selecionados.add(nome);

  atualizar();

  // 🔥 limpa a busca
  buscaInput.value = "";

  // 🔥 mostra tudo novamente
  mostrarTodasIDs();
};

    catalogo.appendChild(div);
  });
}

buscaInput.addEventListener("input", ()=>{
  const termo = buscaInput.value.toLowerCase();
  document.querySelectorAll(".item").forEach(div=>{
    div.style.display = div.innerText.toLowerCase().includes(termo) ? "block" : "none";
  });
});

function atualizar(){
  const caixa = document.querySelector(".caixa-selecao");
  const lista = document.getElementById("listaSelecionadas");

  lista.innerHTML = "";

  if(selecionados.size > 0){
    caixa.style.display = "block";

    selecionados.forEach(nome=>{
      const tag = document.createElement("div");
      tag.className = "tag";
      tag.innerHTML = `${nome} <button onclick="removerItem('${nome}')">✕</button>`;
      lista.appendChild(tag);
    });

  } else {
    caixa.style.display = "none";
  }

  document.getElementById("contador").innerText = selecionados.size;

  renderCatalogo();
}
