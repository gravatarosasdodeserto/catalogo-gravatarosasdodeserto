<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Gravatá Rosas do Deserto</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#2e2a15">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --header-bg: #fcfaf7;
        --body-bg: #e9e4dd;
        --card-white: #ffffff;
        --card-selected: #d4ccc0;
        --text-main: #2e2a15;
        --accent: #a08c6b;
        --accent-dark: #7d6e53;
        --shadow-sm: 0 4px 12px rgba(58, 54, 24, 0.06);
        --shadow-md: 0 8px 24px rgba(58, 54, 24, 0.08);
        --shadow-lg: 0 12px 40px rgba(58, 54, 24, 0.12);
    }

    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        scroll-behavior: smooth;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: var(--body-bg);
        background-image:
            radial-gradient(at 20% 20%, rgba(160, 140, 107, 0.08) 0px, transparent 50%),
            radial-gradient(at 80% 80%, rgba(255, 255, 255, 0.4) 0px, transparent 50%);
        color: var(--text-main);
        margin: 0;
        padding-bottom: 240px;
        animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

 .topbar {
        padding: 35px 0;
        position: sticky;
        top: 0;
        z-index: 1100;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        background: transparent;
        overflow: hidden;
        min-height: 160px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        margin-bottom: 0;
    }

 .topbar::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url('imagens/gravata-cabecalho.jpg');
        background-size: cover;
        background-position: top center;
        z-index: -2;
        transform: scale(1.05);
        animation: slowZoom 20s ease-in-out infinite alternate;
    }

    @keyframes slowZoom {
        from { transform: scale(1.05); }
        to { transform: scale(1.1); }
    }

 .topbar::after {
        content: "";
        position: absolute;
        left: 0;
        width: 100%;
        height: 115px;
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(8px) saturate(180%);
        -webkit-backdrop-filter: blur(8px) saturate(180%);
        z-index: -1;
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
    }

 .logo {
        position: relative;
        z-index: 3;
        display: flex;
        align-items: center;
        animation: slideUp 0.8s ease-out 0.2s both;
    }

 .logo img {
        width: 155px;
        height: auto;
        filter: drop-shadow(0 6px 20px rgba(0,0,0,0.35));
        cursor: pointer;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

 .logo img:hover {
        transform: scale(1.05) rotate(-1deg);
    }

 .admin-access {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-main);
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1200;
        border: 1.5px solid rgba(255, 255, 255, 0.6);
        box-shadow: var(--shadow-sm);
    }

 .admin-access:hover {
        background: rgba(255, 255, 255, 0.95);
        transform: translateY(-50%) rotate(90deg) scale(1.1);
        box-shadow: var(--shadow-md);
    }

 .admin-access svg {
        width: 18px;
        height: 18px;
        opacity: 0.8;
    }

 .secao-filtros {
        position: sticky;
        top: 160px;
        z-index: 1000;
        padding: 8px 15px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px) saturate(180%);
        -webkit-backdrop-filter: blur(12px) saturate(180%);
        display: flex;
        align-items: center;
        border-top: 2px solid rgba(255, 255, 255, 0.8);
        border-bottom: 1px solid rgba(0,0,0,0.04);
        min-height: 52px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.04);
        animation: slideUp 0.6s ease-out 0.3s both;
        margin-top: -1px;
    }

 .filtros-topo-wrapper {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        gap: 12px;
    }

 .resumo-filtros {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 8px;
        flex-grow: 1;
        padding-right: 10px;
        scrollbar-width: none;
    }
 .resumo-filtros::-webkit-scrollbar { display: none; }

 .tag-filtro-ativa {
        font-size: 9px;
        background: linear-gradient(135deg, var(--text-main), var(--accent-dark));
        color: white;
        padding: 4px 10px;
        border-radius: 6px;
        font-weight: 700;
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(58, 54, 24, 0.2);
        transition: all 0.2s ease;
        animation: slideUp 0.3s ease-out;
    }

 .tag-filtro-ativa:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(58, 54, 24, 0.3);
    }

 .tag-filtro-ativa span {
        font-size: 13px;
        font-weight: 300;
        line-height: 1;
    }

 .btn-abrir-filtros {
        background: linear-gradient(135deg, var(--text-main), var(--accent-dark));
        color: white;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 14px;
        border-radius: 50px;
        border: none;
        font-weight: 600;
        font-size: 10px;
        cursor: pointer;
        height: 28px;
        flex-shrink: 0;
        text-transform: uppercase;
        box-shadow: 0 3px 12px rgba(58, 54, 24, 0.25);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

 .btn-abrir-filtros:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 16px rgba(58, 54, 24, 0.35);
    }

 .btn-abrir-filtros:active {
        transform: translateY(0);
    }

 .btn-abrir-filtros svg { width: 11px; height: 11px; }

 .instrucao-texto {
        width: calc(100% - 40px);
        margin: 30px auto 15px;
        padding: 18px 22px;
        text-align: center;
        background: rgba(255, 255, 255, 0.65);
        border-radius: 24px;
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border: 1.5px solid rgba(255,255,255,0.7);
        box-shadow: var(--shadow-md);
        animation: slideUp 0.6s ease-out 0.4s both;
    }
 .instrucao-texto p {
        margin: 0;
        font-size: 14px;
        font-weight: 500;
    }
 .instrucao-texto span {
        display: block;
        margin-top: 6px;
        font-size: 11px;
        color: rgba(58, 54, 24, 0.7);
        font-weight: 400;
    }

 .catalogo {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 18px;
        width: 100%;
        padding: 0 20px;
        animation: slideUp 0.6s ease-out 0.5s both;
    }

 .item {
        background: var(--card-white);
        padding: 12px;
        border-radius: 24px;
        cursor: pointer;
        box-shadow: var(--shadow-sm);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

 .item::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 100%;
        background: linear-gradient(135deg, rgba(160, 140, 107, 0.1), transparent);
        opacity: 0;
        transition: opacity 0.4s ease;
    }

 .item:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: var(--shadow-lg);
    }

 .item:hover::before {
        opacity: 1;
    }

 .item.selecionado {
        background: var(--card-selected)!important;
        transform: scale(0.96);
        box-shadow: 0 0 0 3px var(--accent), var(--shadow-md);
    }

 .item.selecionado::after {
        content: '✓';
        position: absolute;
        top: 8px;
        right: 8px;
        width: 24px;
        height: 24px;
        background: var(--accent);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
        animation: pulse 0.4s ease;
    }

 .item img {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        border-radius: 16px;
        display: block;
        transition: transform 0.4s ease;
    }

 .item:hover img {
        transform: scale(1.05);
    }

 .item p {
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        margin: 12px 0 4px 0;
    }

 .estoque-status {
        text-align: center;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

 .disponivel {
        color: #2d5a27;
    }

 .produzimos {
        color: var(--accent-dark);
        opacity: 0.95;
        font-weight: 600;
    }

 .rodape-acoes {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(233, 228, 221, 0.95);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        padding: 12px 20px 28px;
        z-index: 1000;
        border-top: 2px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 -8px 32px rgba(0,0,0,0.08);
    }

 .container-rodape {
        max-width: 500px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

 .caixa-selecao {
        display: none;
        background: #ffffff;
        padding: 8px 12px;
        border-radius: 18px;
        max-height: 75px;
        overflow-y: auto;
        border: 1.5px solid rgba(0,0,0,0.06);
        box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
    }

.selecao-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
}

.selecao-contador {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent-dark);
    text-transform: uppercase;
}

.btn-limpar-tudo {
    background: none;
    border: none;
    color: #8b2d2d;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.2s ease;
}

.btn-limpar-tudo:hover {
    background: rgba(139, 45, 0.1);
    transform: scale(1.05);
}
 
 .tag-item {
        font-size: 10px;
        background: linear-gradient(135deg, #f5f3f0, #ebe7e1);
        padding: 5px 11px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin: 0 5px 5px 0;
        font-weight: 600;
        animation: slideUp 0.2s ease;
    }

 .tag-item button {
        border: none;
        background: none;
        color: var(--danger);
        cursor: pointer;
        font-weight: bold;
        transition: transform 0.2s;
    }

 .tag-item button:hover {
        transform: scale(1.2);
    }

 .campo-busca {
        width: 100%;
        padding: 14px 22px;
        border-radius: 50px;
        border: 2px solid rgba(0,0,0,0.08);
        outline: none;
        text-align: center;
        font-family: inherit;
        font-weight: 500;
        background: white;
        transition: all 0.3s ease;
    }

 .campo-busca:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(160, 140, 107, 0.1);
        transform: scale(1.01);
    }

 .btn-whatsapp {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, var(--text-main), var(--accent-dark));
        color: white;
        border: none;
        border-radius: 50px;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
        box-shadow: 0 6px 20px rgba(58, 54, 24, 0.3);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        animation: slideUp 0.4s ease;
    }

 .btn-whatsapp:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 28px rgba(58, 54, 24, 0.4);
    }

 .btn-whatsapp:active {
        transform: translateY(-1px);
    }

 .oculto { display: none!important; }

 .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 2000;
        display: none;
        backdrop-filter: blur(6px);
        animation: fadeIn 0.3s ease;
    }

 .drawer-filtros {
        position: fixed;
        right: -320px;
        top: 0;
        width: 320px;
        height: 100%;
        background: var(--body-bg);
        background-image:
            radial-gradient(at 80% 20%, rgba(160, 140, 107, 0.1) 0px, transparent 50%);
        z-index: 2001;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 35px 25px;
        overflow-y: auto;
        box-shadow: -12px 0 40px rgba(0,0,0,0.15);
    }

 .drawer-filtros.active { right: 0; }

 .fechar-drawer {
        background: rgba(255,255,255,0.6);
        border: none;
        font-size: 26px;
        cursor: pointer;
        text-align: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        color: var(--text-main);
        margin-bottom: 15px;
        transition: all 0.3s ease;
        backdrop-filter: blur(8px);
    }

 .fechar-drawer:hover {
        background: rgba(255,255,255,0.9);
        transform: rotate(90deg);
    }

 .pill {
        padding: 7px 16px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(8px);
        border: 1.5px solid rgba(0,0,0,0.06);
        border-radius: 50px;
        font-size: 12px;
        cursor: pointer;
        margin: 5px;
        display: inline-block;
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

 .pill:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
    }

 .pill.active {
        background: linear-gradient(135deg, var(--text-main), var(--accent-dark));
        color: white;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(58, 54, 24, 0.3);
    }

    @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
    }

 .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0 75%);
        background-size: 1000px 100%;
        animation: shimmer 2s infinite;
    }

    @media (min-width: 768px) {
     .topbar {
            padding: 50px 0;
            min-height: 230px;
        }
     .logo img {
            width: 260px;
        }
     .topbar::after {
            height: 175px;
        }
     .secao-filtros {
            top: 230px;
            margin-top: -1px;
        }
     .catalogo { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
    }
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">
        <img src="logo.png" onclick="location.reload()">
    </div>

    <a href="javascript:void(0)" onclick="acessarAdmin()" class="admin-access" title="Acesso Admin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
    <circle cx="12" cy="12" r="3"></circle>
    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
        </svg>
    </a>
</div>

<div class="secao-filtros">
  <div class="filtros-topo-wrapper">
    <div class="resumo-filtros" id="listaFiltrosAtivos"></div>
    <button class="btn-abrir-filtros" onclick="toggleDrawer()">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 4.5H21M7 12H17M10 19.5H14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span>Filtrar</span>
    </button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="drawer-filtros" id="drawer"></div>

<div class="instrucao-texto">
    <p>Selecione as ID's desejadas para solicitar informações sobre os enxertos</p>
    <span>Sua cor favorita acabou? Produzimos uma pra você sem custo adicional</span>
</div>

<div class="catalogo" id="gridCatalogo">
  <p style="text-align:center; grid-column: 1/-1; padding: 50px; color: rgba(58,54,24,0.5);">Carregando catálogo...</p>
</div>

<div class="rodape-acoes">
  <div class="container-rodape">
    <div class="caixa-selecao" id="areaSelecao">
      <div class="selecao-header">
        <span class="selecao-contador" id="contadorSelecao"></span>
        <button class="btn-limpar-tudo" onclick="limparSelecao()">Limpar tudo</button>
      </div>
    <div id="containerTags"></div>
</div>
    <input type="text" id="inputPesquisa" class="campo-busca" placeholder="Buscar ID pelo nome...">
    <button id="btnEnviar" class="btn-whatsapp oculto" onclick="enviarPedido()"></button>
  </div>
</div>

<script>
let estoque = {};
let filtro = "";
let filtrosAtivos = {};
let colunasDeFiltro = ["camadas", "cores", "padrao", "especiais"];
const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv";

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  return lines.map(line => {
    const cells = line.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g) || [];
    return cells.map(c => c.replace(/^"|"$/g, '').trim());
  });
}

async function carregarEstoque() {
  try {
    const resp = await fetch(urlPlanilha + "&t=" + Date.now());
    const text = await resp.text();
    const dados = parseCSV(text);
    dados.shift();
    estoque = {};
    dados.forEach(l => {
      const nome = l[0];
      if (!nome) return;
      estoque[nome] = {
        camadas: l[1] || "Não inf.",
        cores: l[2] || "Não inf.",
        padrao: l[3] || "Não inf.",
        especiais: (l[4] || "").split(', ').filter(t => t),
        qtd: parseInt(l[5]) || 0,
        midia: l[6] || ""
      };
    });
    gerarInterfaceFiltros();
    montarCatalogo();
  } catch (e) {
    console.error("Erro ao carregar estoque:", e);
  }
}

function getOpcoesUnicas(campo) {
  let valores = [];
  Object.values(estoque).forEach(d => {
    if (campo === 'especiais' && Array.isArray(d[campo])) {
      valores = valores.concat(d[campo]);
    } else if (d[campo] && d[campo]!== "Não inf." && d[campo].trim()) {
      valores.push(d[campo]);
    }
  });
  return [...new Set(valores)].filter(v => v).sort();
}

function gerarInterfaceFiltros() {
  const drawer = document.getElementById("drawerFiltros");
  if (!drawer) return;

  drawer.innerHTML = '<h3 style="margin:0 0 16px 0;">Filtros</h3>';

  colunasDeFiltro.forEach(campo => {
    const opcoes = getOpcoesUnicas(campo);
    if (opcoes.length === 0) return;

    const label = campo.charAt(0).toUpperCase() + campo.slice(1);
    drawer.innerHTML += `<label style="font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; margin-top:16px; display:block;">${label}</label>`;

    if (campo === 'especiais') {
      drawer.innerHTML += `<div id="filtro_${campo}" style="display:flex; flex-direction:column; gap:8px; margin-top:8px;">`;
      opcoes.forEach(op => {
        const checked = filtrosAtivos.especiais?.includes(op)? 'checked' : '';
        drawer.innerHTML += `
          <label style="display:flex; align-items:center; gap:8px; font-size:12px; font-weight:500; cursor:pointer; text-transform:none; margin:0;">
            <input type="checkbox" value="${op}" ${checked} onchange="toggleFiltroEspecial('${op}')" style="width:16px; height:16px; accent-color:var(--accent); cursor:pointer;">
            ${op}
          </label>`;
      });
      drawer.innerHTML += `</div>`;
    } else {
      let html = `<select id="filtro_${campo}" onchange="aplicarFiltro('${campo}', this.value)" style="width:100%; padding:10px; border-radius:10px; border:1.5px solid #e5e0d8; margin-top:8px; font-family:inherit; font-size:13px;">
        <option value="">Todos</option>`;
      opcoes.forEach(op => {
        const selected = filtrosAtivos[campo] === op? 'selected' : '';
        html += `<option value="${op}" ${selected}>${op}</option>`;
      });
      html += `</select>`;
      drawer.innerHTML += html;
    }
  });

  drawer.innerHTML += `<button onclick="limparFiltros()" style="width:100%; margin-top:20px; padding:12px; border-radius:50px; border:none; background:var(--accent); color:white; font-weight:600; font-size:12px; cursor:pointer; text-transform:uppercase;">Limpar Filtros</button>`;
}

function toggleFiltroEspecial(tag) {
  if (!filtrosAtivos.especiais) filtrosAtivos.especiais = [];

  const index = filtrosAtivos.especiais.indexOf(tag);
  if (index > -1) {
    filtrosAtivos.especiais.splice(index, 1);
  } else {
    filtrosAtivos.especiais.push(tag);
  }

  montarCatalogo();
}

function aplicarFiltro(campo, valor) {
  if (valor) {
    filtrosAtivos[campo] = valor;
  } else {
    delete filtrosAtivos[campo];
  }
  montarCatalogo();
}

function limparFiltros() {
  filtrosAtivos = {};
  colunasDeFiltro.forEach(c => {
    if (c!== 'especiais') {
      const el = document.getElementById(`filtro_${c}`);
      if (el) el.value = '';
    }
  });
  document.querySelectorAll('#filtro_especiais input').forEach(cb => cb.checked = false);
  montarCatalogo();
}

function filtrar(v) {
  filtro = v;
  montarCatalogo();
}

function montarCatalogo() {
  const lista = document.getElementById("lista");
  if (!lista) return;

  lista.innerHTML = "";

  const itensFiltrados = Object.entries(estoque)
 .filter(([nome, d]) => {
      const matchBusca = nome.toLowerCase().includes(filtro.toLowerCase());

      const matchFiltros = colunasDeFiltro.every(c => {
        if (!filtrosAtivos[c] || filtrosAtivos[c].length === 0) return true;

        if (c === 'especiais') {
          return filtrosAtivos[c].some(tag => d.especiais.includes(tag));
        }
        return filtrosAtivos[c] === d[c];
      });

      return matchBusca && matchFiltros && d.qtd > 0;
    })
 .sort((a, b) => a[0].localeCompare(b[0], 'pt-BR', { sensitivity: 'base' }));

  if (itensFiltrados.length === 0) {
    lista.innerHTML = "<p style='text-align:center; grid-column: 1/-1; padding: 60px; color: rgba(58,54,24,0.4);'>Nenhuma ID encontrada</p>";
    return;
  }

  itensFiltrados.forEach(([nome, d], index) => {
    const imgUrl = (!d.midia || d.midia === "")? "imagens/sem-foto.jpg" : `https://drive.google.com/thumbnail?sz=w600&id=${d.midia}`;

    const especiaisHTML = d.especiais.length > 0
    ? `<div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; justify-content:center;">
          ${d.especiais.map(tag => `<span style="font-size:8px; background:var(--accent); color:white; padding:2px 6px; border-radius:8px; font-weight:600; text-transform:uppercase;">${tag}</span>`).join('')}
         </div>`
      : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${index * 0.03}s`;
    card.innerHTML = `
      <div>
        <div class="img-container">
          <img src="${imgUrl}" class="img" onerror="this.src='imagens/sem-foto.jpg'" alt="${nome}">
        </div>
        <h4>${nome}</h4>
        <div style="font-size:11px; text-align:center; color:rgba(58,54,24,0.7); margin-top:8px;">
          <div><strong>Camadas:</strong> ${d.camadas}</div>
          <div><strong>Cores:</strong> ${d.cores}</div>
          <div><strong>Padrão:</strong> ${d.padrao}</div>
          ${especiaisHTML}
        </div>
        <div style="text-align:center; margin-top:12px; font-size:13px; font-weight:700; color:var(--ok);">
          ${d.qtd} ${d.qtd === 1? 'unidade' : 'unidades'}
        </div>
      </div>
    `;
    lista.appendChild(card);
  });
}

carregarEstoque();
</script>
</body>
</html>
