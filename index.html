<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Flores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #f8f5f0;
  margin: 0;
  padding-bottom: 200px;
  overflow-x: hidden; /* REMOVE LARGURA EXTRA */
}

/* HEADER */
.topbar {
  background: #3a3618;
  padding: 12px 0;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  max-width: 600px;
  margin: auto;
  padding: 0 15px;
}

.logo img {
  width: 70px;
}

.info-topo h1 {
  margin: 0;
  color: white;
  font-size: 18px;
}

.subtitulo {
  font-size: 13px;
  color: #d6d6d6;
}

/* BUSCA */
.busca-container {
  max-width: 600px;
  margin: 12px auto;
  padding: 0 15px;
  display: flex;
  justify-content: center;
}

.busca {
  width: 100%;
  max-width: 500px;
  padding: 12px;
  border-radius: 25px;
  border: 2px solid #3a3618;
  background: #f8f5f0;
  font-size: 14px;
}

/* INSTRUÇÃO */
.instrucao {
  max-width: 600px;
  margin: 15px auto;
  padding: 15px;
  background: white;
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
  line-height: 1.5;
  color: #444;
}

/* CATÁLOGO */
.catalogo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 15px;
}

.item {
  background: white;
  padding: 10px;
  border-radius: 12px;
  border: 1px solid #eee;
  cursor: pointer;
}

.item.selecionado {
  border: 2px solid #3a3618;
}

/* IMAGENS */
img, video {
  width: 100%;
  border-radius: 8px;
  
}
.item p {
  text-align: center;
  font-size: 14px;
  margin-top: 8px;
  font-weight: 500;
}
  
/* BOTÕES FIXOS */
.botoes-acoes {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px;
  background: #f8f5f0;
  box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
}

/* CAIXA DE SELEÇÃO */
.caixa-selecao {
  display: none;
  border: 2px solid #3a3618;
  border-radius: 16px;
  padding: 10px;
  background: #f8f5f0;
  margin-bottom: 10px;
}

.topo-caixa {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.caixa-selecao h3 {
  margin: 0;
  font-size: 14px;
}

/* BOTÃO LIMPAR */
.btn-limpar-tudo {
  background: none;
  border: none;
  color: #3a3618;
  font-size: 12px;
  cursor: pointer;
  font-weight: 500;
}

/* TAGS */
#listaSelecionadas {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-top: 8px;
}

.tag {
  background: white;
  border: 1px solid #3a3618;
  border-radius: 20px;
  padding: 5px 10px;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.tag button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 12px;
  color: #3a3618;
}

/* BOTÃO WHATSAPP */
.botao-whatsapp {
  width: 100%;
  padding: 15px;
  background: #3a3618;
  color: white;
  border: none;
  border-radius: 50px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="header">
    <div class="logo">
      <img src="logo.jpg">
    </div>
    <div class="info-topo">
      <h1>Gravatá Rosas do Deserto</h1>
      <p class="subtitulo">Enxertos de Adenium Obesum</p>
    </div>
  </div>
</div>

<div class="busca-container">
  <input type="text" id="busca" class="busca" placeholder="Buscar por nome da flor...">
</div>

<p class="instrucao">
Escolha as ID(s) das flores que você mais gostou 🌸<br><br>
Depois é só clicar em <strong>“Ver disponibilidade”</strong> para falar direto no WhatsApp e receber informações de valores, fotos atualizadas e envio dos enxertos.
</p>

<div class="catalogo" id="catalogo"></div>

<div class="botoes-acoes">

  <div class="caixa-selecao">
    <div class="topo-caixa">
      <h3>ID's selecionadas:</h3>
      <button class="btn-limpar-tudo" onclick="limparSelecao()">Limpar tudo</button>
    </div>
    <div id="listaSelecionadas"></div>
  </div>

  <button class="botao-whatsapp" onclick="enviarWhatsApp()">
    Ver disponibilidade (<span id="contador">0</span>)
  </button>

</div>

<script>
const flores = [/* MANTIDO COMPLETO */
"AÇUCENA (MUTANTE)","AKACHI","AMATTA","ARYA","BLOODY MARY","BP-116",
"BRANCA DE NEVE","BRIDAL BOUQUET","CANAN 55","CANAN 170","CAPIXABA",
"CÉU ESTRELADO","CÉU ESTRELADO VARIEGATA","COPENHAGEN","DAFNE","COCA-COLA",
"DOUBLE STAR","DUQUESA","EGG ROLL","ELARA","ELLIE","EV19-XANADÚ",
"FERRARI","GOLDEN FAITH","GOLDEN PINK","GRAPE CHOCOLATE","GUARÁ",
"GTA-AIKA","GTA-BOLD","GTA-CANDY CRUSH","GTA-CÓSMICA","GTA-CREPÚSCULO",
"GTA-DESERT DOLL","GTA-DIANA","GTA-EMMA FROST","GTA-FAY","GTA-FLORZINHA",
"GTA-FLUTTERSHY","GTA-FRACTA","GTA-GOLDEN PINK","GTA-ICE DRAGON",
"GTA-KIMBERLY","GTA-LITTLE KISS","GTA-LOLLIPOP BLACK","GTA-LYSSA",
"GTA-LYTA","GTA-MISS GRAVATÁ","GTA-NYX","GTA-PERONA","GTA-PINK VENOM",
"GTA-PINKIE PIE","GTA-RED COMETS","GTA-RED STORM","GTA-RED WIDOW",
"GTA-SANSA","GTA-SHE HA","GTA-SUN CLUSTER","GTA-SWEET BLUSH",
"GTA-TRINITY","GTA-TRUE FAITH","GTA-YUNA","HELENA","INDIGO GLAZE",
"INFINITY","JHULLY","JULIUS CAESAR","KING OF KINGS","KINDLY","L-06",
"LAILA","LILAC FROST (MUTANTE)","LM-440","LM-50","LM2","LUNA",
"MAGNIFICAT","MARIA","MIDNIGHT","MỘNG CẦM","MORAN","NANCY","NEMO",
"NORALINE","NUSA","P-200","PATHUMMA","PEONY","PHARAOH","PURPLE BLUE",
"QUEEN RAY","RF-001","RF-002","RIHANNA","ROMANTIC EDGE","SANTA CLAUS",
"SATURNO","SENNA","SIENA","SOCHI","SOPHIA","STAR CLUSTER","SWALLOW",
"TC-04","THAMIRES","THE SECRET OF VICTORIA","TRIPLE WISH","TROPICAL","TS-69",
"TS-222","TS-330","TW4","UNPARALLELED","VARIEGATA","VAMPIRA",
"VIÚVA NEGRA","VOLCANO","W59","YÚ JIǍO"
];

const catalogo = document.getElementById("catalogo");

function gerarNomeArquivo(nome){
  return nome.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/ /g, "-")
    .replace(/[()]/g, "");
}

/* FLORES COM VÍDEO */
const floresComVideo = [
  "AÇUCENA (MUTANTE)",
  "LILAC FROST (MUTANTE)"
];

function renderCatalogo(lista){
  catalogo.innerHTML = "";

  lista.forEach(nome=>{
    let div = document.createElement("div");
    div.className = "item";
    div.dataset.id = nome;

    let arquivo = gerarNomeArquivo(nome);

    /* AQUI ESTÁ A CORREÇÃO */
    if(floresComVideo.includes(nome)){
      div.innerHTML = `
        <video autoplay muted loop playsinline>
          <source src="imagens/${arquivo}.mp4" type="video/mp4">
        </video>
        <p>${nome}</p>
      `;
    } else {
      div.innerHTML = `
        <img src="imagens/${arquivo}.jpg">
        <p>${nome}</p>
      `;
    }

    div.onclick = () => {
      div.classList.toggle("selecionado");
      atualizar();
    };

    catalogo.appendChild(div);
  });
}

function atualizar(){
  let selecionados = document.querySelectorAll(".item.selecionado");
  let total = selecionados.length;

  document.getElementById("contador").innerText = total;

  let caixa = document.querySelector(".caixa-selecao");
  let lista = document.getElementById("listaSelecionadas");

  if(total > 0){
    caixa.style.display = "block";
    lista.innerHTML = "";

    selecionados.forEach(item=>{
      let nome = item.dataset.id;

      let tag = document.createElement("div");
      tag.className = "tag";

      tag.innerHTML = `
        ${nome}
        <button onclick="removerItem('${nome}')">✕</button>
      `;

      lista.appendChild(tag);
    });

  } else {
    caixa.style.display = "none";
  }
}

function removerItem(nome){
  document.querySelectorAll(".item").forEach(item=>{
    if(item.dataset.id === nome){
      item.classList.remove("selecionado");
    }
  });
  atualizar();
}

function limparSelecao(){
  document.querySelectorAll(".item.selecionado")
    .forEach(i=>i.classList.remove("selecionado"));
  atualizar();
}

document.getElementById("busca").addEventListener("input", function(){
  let termo = normalizarTexto(this.value);

  let filtradas = flores.filter(f => 
    normalizarTexto(f).includes(termo)
  );

  renderCatalogo(filtradas);
});

/* FUNÇÃO DE NORMALIZAÇÃO */
function normalizarTexto(texto){
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "") // remove acentos
    .replace(/[^a-z0-9 ]/g, ""); // remove símbolos e vírgulas
}

function enviarWhatsApp(){
  let selecionados = document.querySelectorAll(".item.selecionado");
  let ids = [...selecionados].map(i=>i.dataset.id);

  if(ids.length === 0){
    alert("Selecione pelo menos uma flor!");
    return;
  }

  let texto = ids.length === 1
    ? "Tenho interesse no enxerto da seguinte flor:\n\n- "
    : "Tenho interesse nos enxertos das seguintes variedades:\n\n- ";

  let mensagem = [
  "Olá! 😊",
  "",
  texto + ids.join("\n- "),
  "",
  "Gostaria de receber mais informações sobre valores, disponibilidade e envio."
  ].join("\n");

  let url = "https://wa.me/5581992665421?text=" + encodeURIComponent(mensagem);

  window.open(url, "_blank");
}

renderCatalogo(flores);
</script>

</body>
</html>
