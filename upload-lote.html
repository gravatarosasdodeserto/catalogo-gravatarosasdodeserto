<!DOCTYPE html>
<html>
<head><title>Upload Flexível - Gravatá</title>
<meta charset="UTF-8">
<style>
body{font-family:sans-serif;padding:20px;max-width:900px;margin:auto;background:#f8f5f0}
.container{background:white;padding:25px;border-radius:12px;box-shadow:0 6px 14px rgba(0,0,0,0.1)}
button{padding:15px;width:100%;background:#434019;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:8px 0}
button:disabled{background:#ccc}
input[type=file]{width:100%;padding:10px;margin:8px 0;border:2px solid #3a3618;border-radius:8px}
#log{background:#f5f5f5;padding:15px;border-radius:8px;margin:10px 0;font-size:13px;max-height:500px;overflow:auto;font-family:monospace}
.ok{color:#080}.erro{color:#c00}.aviso{color:#b45309}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
td,th{border:1px solid #ddd;padding:6px;text-align:left}
th{background:#f3efe9}
</style>
</head>
<body>
<div class="container">
<h1>Upload Flexível - Firestore</h1>
<p><strong>Agora aceita:</strong> Só foto, só vídeo, ou os dois. Depois você completa o que faltar.</p>

<p><strong>Passo 1:</strong> Selecione TODOS os arquivos que você tem na pasta <code>imagens</code> com Ctrl+A</p>
<input type="file" id="arquivos" multiple accept="image/*,video/*">

<button onclick="processar()">1. Processar Arquivos</button>
<button id="btnEnviar" onclick="enviarFirestore()" disabled>2. Enviar pro Firestore</button>
<div id="log"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACY4dN_xmN06571jZyY34Oz_xXkvdOdtk",
  authDomain: "gravata-rosas.firebaseapp.com",
  projectId: "gravata-rosas",
  storageBucket: "gravata-rosas.firebasestorage.app",
  messagingSenderId: "72580333369",
  appId: "1:72580333369:web:5f17bdc737bd3401fd72e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let pares = {};

function log(msg, tipo=''){
  document.getElementById('log').innerHTML += `<div class="${tipo}">${msg}</div>`;
  document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
}

function nomeToId(nomeArquivo){
  return nomeArquivo
    .replace(/\.(jpg|jpeg|png|mp4)$/i, '')
    .replace(/-/g, ' ')
    .toUpperCase();
}

async function fileToBase64(file){
  return new Promise((resolve, reject) => {
    if(file.size > 1048576) return reject(`Arquivo ${file.name} maior que 1MB`);
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

window.processar = async function(){
  document.getElementById('log').innerHTML = '';
  const input = document.getElementById('arquivos');
  
  if(!input.files.length) return log('Selecione os arquivos primeiro', 'erro');
  
  log(`Processando ${input.files.length} arquivos...`, 'ok');
  
  pares = {};
  for(let file of input.files){
    const nomeBase = file.name.replace(/\.(jpg|jpeg|png|mp4)$/i, '');
    const tipo = file.type.startsWith('image') ? 'foto' : 'video';
    
    if(!pares[nomeBase]) pares[nomeBase] = {};
    pares[nomeBase][tipo] = file;
  }
  
  let tabela = '<table><tr><th>ID</th><th>Foto</th><th>Vídeo</th><th>Status</th></tr>';
  let total = 0;
  
  for(let nomeBase in pares){
    const id = nomeToId(nomeBase);
    const temFoto = !!pares[nomeBase].foto;
    const temVideo = !!pares[nomeBase].video;
    total++;
    
    let status = '';
    let statusClass = '';
    if(temFoto && temVideo){ status = 'COMPLETO'; statusClass = 'ok'; }
    else if(temFoto){ status = 'SÓ FOTO'; statusClass = 'aviso'; }
    else if(temVideo){ status = 'SÓ VÍDEO'; statusClass = 'aviso'; }
    
    tabela += `<tr>
      <td>${id}</td>
      <td class="${temFoto?'ok':'erro'}">${temFoto?'✓ '+pares[nomeBase].foto.name:'✗'}</td>
      <td class="${temVideo?'ok':'erro'}">${temVideo?'✓ '+pares[nomeBase].video.name:'✗'}</td>
      <td class="${statusClass}">${status}</td>
    </tr>`;
  }
  tabela += '</table>';
  
  log(`\nEncontrados ${total} IDs`, 'ok');
  log(tabela);
  document.getElementById('btnEnviar').disabled = false;
  log('\n✅ Pode enviar pro Firestore! IDs incompletas podem ser editadas depois no admin.html', 'ok');
}

window.enviarFirestore = async function(){
  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  log('\n=== ENVIANDO PRO FIRESTORE ===', 'ok');
  
  let contador = 0;
  let erros = 0;
  
  for(let nomeBase in pares){
    const par = pares[nomeBase];
    const id = nomeToId(nomeBase);
    contador++;
    log(`[${contador}] Enviando ${id}...`);
    
    try{
      const fotoBase64 = par.foto ? await fileToBase64(par.foto) : null;
      const videoBase64 = par.video ? await fileToBase64(par.video) : null;
      
      await addDoc(collection(db, "catalogo"), {
        nome: id,
        estoque: 0,
        fotoBase64: fotoBase64,
        videoBase64: videoBase64,
        criado: Date.now()
      });
      
      let status = [];
      if(fotoBase64) status.push('foto');
      if(videoBase64) status.push('vídeo');
      log(`  ✓ ${id} salvo com ${status.join(' + ')}`, 'ok');
    }catch(e){
      log(`  ✗ ERRO em ${id}: ${e.message}`, 'erro');
      erros++;
    }
  }
  log(`\n🎉 FINALIZADO! ${contador-erros} salvos, ${erros} erros`, erros > 0 ? 'aviso' : 'ok');
  log('\nAbre o index.html pra ver. IDs sem foto/vídeo vão aparecer com placeholder.', 'aviso');
  btn.disabled = false;
}
</script>
</body>
</html>
