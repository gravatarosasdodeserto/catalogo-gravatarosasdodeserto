<!DOCTYPE html>
<html>
<head><title>Migrar GitHub → Firestore</title>
<meta charset="UTF-8">
<style>
body{font-family:sans-serif;padding:20px;max-width:800px;margin:auto;background:#f8f5f0}
.container{background:white;padding:25px;border-radius:12px;box-shadow:0 6px 14px rgba(0,0,0,0.1)}
button{padding:15px;width:100%;background:#434019;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:8px 0}
button:disabled{background:#ccc}
input[type=file]{width:100%;padding:10px;margin:8px 0;border:2px solid #3a3618;border-radius:8px}
#log{background:#f5f5f5;padding:15px;border-radius:8px;margin:10px 0;font-size:13px;max-height:500px;overflow:auto;font-family:monospace}
.ok{color:#080}.erro{color:#c00}.aviso{color:#b45309}
label{font-weight:600;display:block;margin-top:12px}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
td,th{border:1px solid #ddd;padding:6px;text-align:left}
th{background:#f3efe9}
</style>
</head>
<body>
<div class="container">
<h1>Migrar Catálogo → Firestore</h1>
<p><strong>Passo 1:</strong> Selecione seu <code>flores.json</code></p>
<input type="file" id="jsonFile" accept=".json">

<p><strong>Passo 2:</strong> Selecione TODOS os arquivos da pasta <code>imagens</code> com Ctrl+A</p>
<input type="file" id="mediaFiles" multiple accept="image/*,video/*">

<button id="btnVerificar" onclick="verificar()">1. Verificar Arquivos</button>
<button id="btnMigrar" onclick="migrar()" disabled>2. Iniciar Migração</button>
<div id="log"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACY4dN_xmN06571jZyY34Oz_xXkvdOdtk",
  authDomain: "gravata-rosas.firebaseapp.com",
  projectId: "gravata-rosas",
  storageBucket: "gravata-rosas.firebasestorage.app",
  messagingSenderId: "72580333369",
  appId: "1:72580333369:web:5f17bdc737bd3401fd72e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let floresData = [];
let arquivosMap = {};

function log(msg, tipo=''){
  document.getElementById('log').innerHTML += `<div class="${tipo}">${msg}</div>`;
  document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
}

function normalizar(str){
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

async function fileToBase64(file){
  return new Promise((resolve, reject) => {
    if(file.size > 1048576) return reject(`Arquivo ${file.name} maior que 1MB: ${(file.size/1024/1024).toFixed(2)}MB`);
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

window.verificar = async function(){
  document.getElementById('log').innerHTML = '';
  const jsonInput = document.getElementById('jsonFile');
  const mediaInput = document.getElementById('mediaFiles');
  
  if(!jsonInput.files[0]) return log('Selecione o flores.json', 'erro');
  if(!mediaInput.files.length) return log('Selecione os arquivos da pasta imagens', 'erro');
  
  log('Lendo flores.json...', 'ok');
  const jsonText = await jsonInput.files[0].text();
  floresData = JSON.parse(jsonText);
  log(`Encontradas ${floresData.length} IDs no JSON`, 'ok');
  
  arquivosMap = {};
  for(let file of mediaInput.files){
    arquivosMap[normalizar(file.name)] = file;
  }
  log(`Selecionados ${mediaInput.files.length} arquivos de mídia`, 'ok');
  
  log('\n=== VERIFICANDO ARQUIVOS ===', 'aviso');
  let faltando = [];
  let tabela = '<table><tr><th>ID</th><th>Foto</th><th>Vídeo</th></tr>';
  
  for(let f of floresData){
    const nomeFoto = f.foto.split('/').pop();
    const nomeVideo = f.video.split('/').pop();
    const temFoto = !!arquivosMap[normalizar(nomeFoto)];
    const temVideo = !!arquivosMap[normalizar(nomeVideo)];
    
    tabela += `<tr>
      <td>${f.id}</td>
      <td class="${temFoto?'ok':'erro'}">${temFoto?'✓':'✗'} ${nomeFoto}</td>
      <td class="${temVideo?'ok':'erro'}">${temVideo?'✓':'✗'} ${nomeVideo}</td>
    </tr>`;
    
    if(!temFoto) faltando.push(nomeFoto);
    if(!temVideo) faltando.push(nomeVideo);
  }
  tabela += '</table>';
  log(tabela);
  
  if(faltando.length > 0){
    log(`\n❌ FALTANDO ${faltando.length} ARQUIVOS:`, 'erro');
    log(faltando.slice(0,20).join(', ') + (faltando.length>20?'...':''), 'erro');
    log('\nVerifica se selecionou TODOS os arquivos com Ctrl+A', 'aviso');
    document.getElementById('btnMigrar').disabled = true;
  } else {
    log('\n✅ TODOS OS ARQUIVOS ENCONTRADOS! Pode migrar.', 'ok');
    document.getElementById('btnMigrar').disabled = false;
  }
}

window.migrar = async function(){
  const btn = document.getElementById('btnMigrar');
  btn.disabled = true;
  log('\n=== INICIANDO MIGRAÇÃO ===', 'ok');
  
  for(let i = 0; i < floresData.length; i++){
    const f = floresData[i];
    log(`[${i+1}/${floresData.length}] Migrando ${f.id}...`);
    
    try{
      const nomeFoto = f.foto.split('/').pop();
      const nomeVideo = f.video.split('/').pop();
      
      const fotoBase64 = await fileToBase64(arquivosMap[normalizar(nomeFoto)]);
      const videoBase64 = await fileToBase64(arquivosMap[normalizar(nomeVideo)]);
      
      await addDoc(collection(db, "catalogo"), {
        nome: f.id,
        estoque: f.estoque,
        fotoBase64: fotoBase64,
        videoBase64: videoBase64,
        criado: Date.now()
      });
      log(`  ✓ ${f.id} salvo`, 'ok');
    }catch(e){
      log(`  ✗ ERRO em ${f.id}: ${e.message}`, 'erro');
    }
  }
  log('\n🎉 MIGRAÇÃO FINALIZADA! Abre o index.html pra ver', 'ok');
  btn.disabled = false;
}
</script>
</body>
</html>
