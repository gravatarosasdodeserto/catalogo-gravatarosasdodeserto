<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Pro | Gravatá Rosas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root { --primary:#3a3618; --bg:#f4f1ee; --white:#fff; --success:#2d5a27; --border:#e0e0e0; }
body { font-family:Poppins; background:var(--bg); margin:0; padding:10px; }
.container { max-width:1100px; margin:auto; background:#fff; padding:20px; border-radius:15px; }
table { width:100%; margin-top:20px; border-collapse:collapse; }
td,th { padding:8px; border-bottom:1px solid #eee; }
.thumb-admin { width:50px; height:50px; object-fit:cover; border-radius:8px; }
.edit-input { width:100%; padding:5px; }
.btn-salvar { background:var(--success); color:white; border:none; padding:8px; cursor:pointer; }
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; }
.modal-content { background:white; padding:20px; border-radius:10px; }
.status-toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:10px 20px; color:white; display:none; border-radius:50px; }
</style>
</head>

<body>

<div class="container">

<h2>Gerenciador</h2>

<button onclick="abrirModal()">+ Nova ID</button>

<div id="loader">Carregando...</div>

<table id="tabelaAdmin" style="display:none;">
<thead>
<tr>
<th>Foto</th>
<th>Nome</th>
<th>Qtd</th>
<th>Filtros</th>
<th>Mídia</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="tabelaCorpo"></tbody>
</table>

</div>

<!-- MODAL -->
<div id="modalNovaID" class="modal">
<div class="modal-content">
<form onsubmit="criarNovaID(event)">
<input id="new-nome" placeholder="Nome" required>
<input id="new-qtd" type="number" value="0">
<input id="new-cores" placeholder="Cores">
<input id="new-camadas" placeholder="Camadas">
<input id="new-padrao" placeholder="Padrão">
<input id="new-midia" placeholder="ID imagem Drive">
<button type="submit">CRIAR</button>
</form>
<button onclick="fecharModal()">Fechar</button>
</div>
</div>

<div id="status" class="status-toast"></div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";

const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv&t=" + Math.random();

let dadosCompletos = [];

function cleanID(name){ return name.replace(/[^a-zA-Z0-9]/g,'_'); }

// ===================== CARREGAR =====================
async function carregarDados(){
    try{
        const resp = await fetch(urlPlanilha);
        const text = await resp.text();

        const linhas = text.split(/\r?\n/).filter(l=>l);
        const header = linhas.shift().split(',');

        dadosCompletos = linhas.map(l=>{
            let obj={};
            l.split(',').forEach((c,i)=>obj[header[i].toLowerCase()]=c);
            return obj;
        });

        document.getElementById("loader").style.display="none";
        document.getElementById("tabelaAdmin").style.display="table";

        renderizarTabela();

    }catch(e){ console.error(e); }
}

// ===================== RENDER =====================
function renderizarTabela(){
    const corpo=document.getElementById("tabelaCorpo");
    corpo.innerHTML="";

    dadosCompletos.forEach(item=>{
        const id=cleanID(item.nome);

        let img=item.midia
            ? `https://drive.google.com/uc?export=view&id=${item.midia}`
            : "imagens/sem-foto.jpg";

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td><img src="${img}" class="thumb-admin"></td>
        <td>${item.nome}</td>
        <td><input id="qtd-${id}" value="${item.qtd||0}"></td>
        <td>
            <input id="cores-${id}" value="${item.cores||''}">
            <input id="camadas-${id}" value="${item.camadas||''}">
            <input id="padrao-${id}" value="${item.padrao||''}">
        </td>
        <td><input id="midia-${id}" value="${item.midia||''}"></td>
        <td><button onclick='salvar("${item.nome}")'>Salvar</button></td>
        `;

        corpo.appendChild(tr);
    });
}

async function criarNovaID(e){
    e.preventDefault();

    const fileInput = document.getElementById("new-file");
    let midiaID = "";

    if(fileInput && fileInput.files.length > 0){

        const file = fileInput.files[0];

        const base64 = await new Promise((resolve, reject)=>{
            const reader = new FileReader();

            reader.onload = () => resolve(reader.result.split(",")[1]);
            reader.onerror = reject;

            reader.readAsDataURL(file);
        });

        try{
            const uploadResp = await fetch(WEB_APP_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "upload",
                    file: base64,
                    mimeType: file.type,
                    fileName: file.name
                })
            });

            const uploadData = await uploadResp.json();

            if(uploadData && uploadData.id){
                midiaID = uploadData.id;
            }

        }catch(err){
            console.error("Erro no upload:", err);
            toast("Erro no upload da imagem", "#8b2d2d");
            return; // interrompe criação se quiser evitar ID sem imagem falha
        }
    }
    const payload = {
        action: "create",
        nome: document.getElementById("new-nome").value,
        qtd: document.getElementById("new-qtd").value,
        cores: document.getElementById("new-cores").value,
        camadas: document.getElementById("new-camadas").value,
        padrao: document.getElementById("new-padrao").value,
        midia: midiaID
    };

    try{
        await fetch(WEB_APP_URL, {
            method: "POST",
            body: new URLSearchParams(payload)
        });

        toast("Criado com sucesso!", "#2d5a27");

        // limpa input de imagem
        if(fileInput) fileInput.value = "";

    }catch(err){
        console.error(err);
        toast("Erro ao criar ID", "#8b2d2d");
    }
}
// =====================
function abrirModal(){ document.getElementById("modalNovaID").style.display="flex"; }
function fecharModal(){ document.getElementById("modalNovaID").style.display="none"; }

function toast(txt,cor){
    const t=document.getElementById("status");
    t.innerText=txt;
    t.style.background=cor;
    t.style.display="block";
    setTimeout(()=>t.style.display="none",2000);
}

carregarDados();

</script>

</body>
</html>
