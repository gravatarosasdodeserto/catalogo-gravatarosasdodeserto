<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Gravatá Rosas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --header-bg:#fcfaf7;
  --body-bg:#e5e0d8;
  --text:#3a3618;
  --card:#fff;
  --danger:#8b2d2d;
  --ok:#2d5a27;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Poppins;
  background:var(--body-bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ===== HEADER IGUAL INDEX ===== */
.topbar{
  position:sticky;
  top:0;
  z-index:1000;
  overflow:hidden;
}

.topbar::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url('imagens/gravata-cabecalho.jpg');
  background-size:cover;
  background-position:center;
  z-index:0;
}

/* logo */
.logo-bar{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px 0;
  background:rgba(252,250,247,0.75);
  z-index:2;
}

.logo img{
  width:140px;
}

/* barra inferior */
.bottom-bar{
  position:relative;
  z-index:2;
  background:#fff;
  height:48px;
  display:flex;
  align-items:center;
  padding:0 12px;
  border-top:1px solid rgba(0,0,0,0.08);
}

.voltar{
  background:#fff;
  border:1px solid #3a3618;
  border-radius:20px;
  padding:6px 12px;
  font-size:12px;
  cursor:pointer;
}

/* ===== CONTAINER ===== */
.container{
  padding:12px;
  max-width:1000px;
  margin:auto;
}

.busca{
  width:100%;
  padding:12px;
  border-radius:50px;
  border:1px solid #ccc;
  margin:10px 0;
  text-align:center;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:15px;
  padding:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

/* imagem grande */
.img{
  width:160px;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  display:block;
  margin:0 auto 10px;
}

/* inputs */
label{
  font-size:11px;
  opacity:.7;
  display:block;
  margin-top:6px;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:13px;
}

/* evitar overflow mobile */
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.col{flex:1; min-width:120px}

/* buttons */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  border:none;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.save{background:var(--ok);color:#fff;flex:1}
.del{background:var(--danger);color:#fff;flex:1}

.new{
  width:100%;
  background:#3a3618;
  color:#fff;
  margin:10px 0;
}

/* upload */
.upload-box{
  border:1px dashed #aaa;
  padding:10px;
  border-radius:12px;
  margin-top:8px;
  text-align:center;
}

.upload-box img{
  width:100%;
  max-height:180px;
  object-fit:cover;
  margin-top:10px;
  border-radius:10px;
  display:none;
}

/* toast */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 15px;
  border-radius:20px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div class="logo-bar">
    <div class="logo">
      <img src="logo.png">
    </div>
  </div>

  <div class="bottom-bar">
    <button class="voltar" onclick="location.href='index.html'">← Catálogo</button>
  </div>
</div>

<div class="container">

<button class="new" onclick="abrirModal()">+ Nova ID</button>

<input class="busca" placeholder="Buscar ID..." oninput="filtrar(this.value)">

<div id="lista"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:2000;">
  <div style="background:#fff;padding:15px;border-radius:15px;width:90%;max-width:400px;">

    <h4>Nova ID</h4>

    <input id="n_nome" placeholder="Nome">

    <label>Qtd</label>
    <input id="n_qtd" type="number">

    <label>Camadas</label>
    <input id="n_camadas">

    <label>Cores</label>
    <input id="n_cores">

    <label>Padrão</label>
    <input id="n_padrao">

    <!-- ✔️ ÚNICO UPLOAD -->
    <label>Imagem</label>
    <input type="file" id="n_imagem" accept="image/*" onchange="previewUpload(event)">

    <img id="previewImg" style="width:100%;max-height:180px;object-fit:cover;margin-top:10px;border-radius:10px;display:none;">

    <br><br>

    <button class="save" onclick="criar()">Criar</button>
    <button class="del" onclick="fecharModal()">Fechar</button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>

  const URL = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
const CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv";

let dados = [];
let filtro = "";

function parseCSV(t){
  return t.split("\n").map(r => r.split(","));
}

// ================= CARREGAR =================
async function carregar(){
  const r = await fetch(CSV);
  const t = await r.text();
  const linhas = parseCSV(t);

  linhas.shift();

  dados = linhas.map(l => ({
    nome:l[0],
    camadas:l[1],
    cores:l[2],
    padrao:l[3],
    qtd:l[5],
    midia:l[6]
  }));

  render();
}

// ================= IMAGEM SEGURA =================
function getImg(midia){

  if(!midia) return "imagens/sem-foto.jpg";

  if(midia.includes("http")) return midia;

  return `https://drive.google.com/uc?export=view&id=${midia}`;
}

// ================= RENDER =================
function render(){

  const el = document.getElementById("lista");
  el.innerHTML = "";

  dados
  .filter(d => d.nome.toLowerCase().includes(filtro.toLowerCase()))
  .forEach(d => {

    const id = d.nome.replace(/\W/g,"_");
    const img = getImg(d.midia);

    el.innerHTML += `
    <div class="card">

      <img src="${img}" class="img" onerror="this.src='imagens/sem-foto.jpg'">

      <label>Nome</label>
      <input id="nome_${id}" value="${d.nome}">

      <label>Qtd</label>
      <input id="qtd_${id}" value="${d.qtd}">

      <label>Link da imagem</label>
      <input id="midia_${id}" value="${d.midia}">

      <label>Camadas</label>
      <input id="cam_${id}" value="${d.camadas}">

      <label>Cores</label>
      <input id="cor_${id}" value="${d.cores}">

      <label>Padrão</label>
      <input id="pad_${id}" value="${d.padrao}">

      <div class="actions">
        <button class="save" onclick="salvar('${d.nome}')">Salvar</button>
        <button class="del" onclick="excluir('${d.nome}')">Excluir</button>
      </div>

    </div>`;
  });
}

// ================= BUSCA =================
function filtrar(v){
  filtro = v;
  render();
}

// ================= UPLOAD CREATE =================
async function criar(){

  const file = document.getElementById("n_imagem").files[0];

  let base64 = "";
  let mime = "";
  let name = "";

  if(file){
    base64 = await new Promise(resolve => {
      const r = new FileReader();
      r.onload = () => resolve(r.result.split(",")[1]);
      r.readAsDataURL(file);
    });

    mime = file.type;
    name = file.name;
  }

  const form = new URLSearchParams({
    action: "create",
    nome: document.getElementById("n_nome").value,
    qtd: document.getElementById("n_qtd").value,
    camadas: document.getElementById("n_camadas").value,
    cores: document.getElementById("n_cores").value,
    padrao: document.getElementById("n_padrao").value,
    imageBase64: base64,
    mimeType: mime,
    fileName: name
  });

  try {
    await fetch(URL, {
      method: "POST",
      body: form
    });

    fecharModal();
    toast("Criado!");
    carregar();

  } catch (e) {
    console.error(e);
    toast("Erro ao criar!");
  }
}

function previewUpload(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("previewImg");
    img.src = e.target.result;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
}

  
// ================= SALVAR =================
async function salvar(nome){

  const id = nome.replace(/\W/g,"_");

  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"update",
      nome,
      qtd:document.getElementById("qtd_"+id).value,
      cores:document.getElementById("cor_"+id).value,
      camadas:document.getElementById("cam_"+id).value,
      padrao:document.getElementById("pad_"+id).value,
      midia:document.getElementById("midia_"+id).value
    })
  });

  toast("Salvo!");
  carregar();
}

// ================= DELETE =================
async function excluir(nome){

  if(!confirm("Excluir?")) return;

  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"delete",
      nome
    })
  });

  toast("Excluído!");
  carregar();
}

// ================= MODAL =================
function abrirModal(){ modal.style.display="flex"; }
function fecharModal(){ modal.style.display="none"; }

function toast(t){
  const x=document.getElementById("toast");
  x.innerText=t;
  x.style.display="block";
  setTimeout(()=>x.style.display="none",2000);
}

carregar();

</script>

</body>
</html>
