<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Gravatá Rosas do Deserto</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#2e2a15">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --header-bg: #fcfaf7;
        --body-bg: #e9e4dd;
        --text-main: #2e2a15;
        --card-white: #ffffff;
        --danger: #c41e3a;
        --danger-dark: #9e1829;
        --ok: #2d5a27;
        --accent: #a08c6b;
        --accent-dark: #7d6e53;
        --shadow-sm: 0 4px 12px rgba(58, 54, 24, 0.06);
        --shadow-md: 0 8px 24px rgba(58, 54, 24, 0.08);
        --shadow-lg: 0 12px 40px rgba(58, 54, 24, 0.12);
    }

    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        scroll-behavior: smooth;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: var(--body-bg);
        background-image:
            radial-gradient(at 20% 20%, rgba(160, 140, 107, 0.08) 0px, transparent 50%),
            radial-gradient(at 80% 80%, rgba(255, 255, 255, 0.4) 0px, transparent 50%);
        color: var(--text-main);
        margin: 0;
        padding-bottom: 50px;
        animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
    }

.topbar {
        padding: 35px 0;
        position: sticky;
        top: 0;
        z-index: 1100;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        background: transparent;
        overflow: hidden;
        min-height: 160px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        margin-bottom: 0;
    }

.topbar::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url('imagens/gravata-cabecalho.jpg');
        background-size: cover;
        background-position: top center;
        z-index: -2;
        transform: scale(1.05);
        animation: slowZoom 20s ease-in-out infinite alternate;
    }

    @keyframes slowZoom {
        from { transform: scale(1.05); }
        to { transform: scale(1.1); }
    }

.topbar::after {
        content: "";
        position: absolute;
        left: 0;
        width: 100%;
        height: 115px;
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(8px) saturate(180%);
        -webkit-backdrop-filter: blur(8px) saturate(180%);
        z-index: -1;
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
    }

.logo {
        position: relative;
        z-index: 3;
        display: flex;
        align-items: center;
        animation: slideUp 0.8s ease-out 0.2s both;
    }

.logo img {
        width: 155px;
        height: auto;
        filter: drop-shadow(0 6px 20px rgba(0,0,0,0.35));
        cursor: pointer;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

.logo img:hover {
        transform: scale(1.05) rotate(-1deg);
    }

.bottom-bar {
        position: sticky;
        top: 160px;
        z-index: 1050;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px) saturate(180%);
        -webkit-backdrop-filter: blur(12px) saturate(180%);
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 15px;
        border-top: 2px solid rgba(255, 255, 0.8);
        border-bottom: 1px solid rgba(0,0,0,0.06);
        box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        animation: slideUp 0.6s ease-out 0.3s both;
        margin-top: -1px;
    }

.btn-voltar-admin {
        background: linear-gradient(135deg, var(--text-main), var(--accent-dark));
        color: white;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 28px;
        border-radius: 50px;
        border: none;
        font-weight: 600;
        font-size: 11px;
        cursor: pointer;
        height: 38px;
        text-transform: uppercase;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 14px rgba(58, 54, 24, 0.25);
        letter-spacing: 0.5px;
    }

.btn-voltar-admin:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(58, 54, 24, 0.35);
    }

.btn-voltar-admin:active {
        transform: translateY(0);
    }

.container {
        padding: 20px;
        max-width: 1400px;
        margin: auto;
        animation: slideUp 0.6s ease-out 0.4s both;
    }

.busca {
        width: 100%;
        padding: 14px 24px;
        border-radius: 50px;
        border: 2px solid rgba(0,0,0,0.08);
        margin: 20px 0;
        outline: none;
        text-align: center;
        font-family: inherit;
        font-weight: 500;
        background: rgba(255, 255, 0.8);
        backdrop-filter: blur(8px);
        transition: all 0.3s ease;
        box-shadow: var(--shadow-sm);
    }

.busca:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(160, 140, 107, 0.1), var(--shadow-md);
        transform: scale(1.01);
        background: white;
    }

    #lista {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 22px;
    }

.card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        border-radius: 24px;
        padding: 18px;
        box-shadow: var(--shadow-md);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1.5px solid rgba(255, 255, 0.6);
        animation: slideUp 0.5s ease-out both;
        position: relative;
    }

.card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-lg);
    }

.card.nao-salvo {
        border: 2px solid #ff9500;
        box-shadow: 0 0 0 3px rgba(255, 149, 0, 0.2), var(--shadow-md);
    }

.badge-nao-salvo {
        position: absolute;
        top: 10px;
        left: 10px;
        background: #ff9500;
        color: white;
        font-size: 9px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 6px;
        text-transform: uppercase;
        z-index: 5;
        animation: pulse 1.5s infinite;
    }

.img-container {
        position: relative;
        width: 100%;
        aspect-ratio: 1/1;
        margin-bottom: 14px;
        border-radius: 18px;
        overflow: hidden;
    }

.img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border: 2px solid rgba(255,255,0.8);
        transition: transform 0.4s ease;
    }

.card:hover.img {
        transform: scale(1.05);
    }

.edit-badge {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background: linear-gradient(135deg, var(--text-main), var(--accent-dark));
        color: white;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 3px solid white;
        box-shadow: 0 4px 12px rgba(0,0,0.25);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

.edit-badge:hover {
        transform: scale(1.15) rotate(15deg);
        box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }

.file-input { display: none; }

    h4 {
        margin: 6px 0 18px;
        text-align: center;
        font-size: 17px;
        color: var(--text-main);
        font-weight: 700;
    }

    label {
        font-size: 10px;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        margin-top: 12px;
        display: block;
        letter-spacing: 0.8px;
    }

    input, select {
        width: 100%;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1.5px solid #e5e0d8;
        margin-top: 4px;
        font-family: inherit;
        font-size: 13px;
        background: rgba(252, 250, 247, 0.6);
        transition: all 0.3s ease;
        cursor: pointer;
    }

    input:focus, select:focus {
        border-color: var(--accent);
        outline: none;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(160, 140, 107, 0.1);
    }

.row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

.actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    button {
        padding: 13px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
        font-size: 12px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

.save {
        background: linear-gradient(135deg, var(--ok), #3d7a37);
        color: #fff;
        flex: 2;
        box-shadow: 0 4px 14px rgba(45, 90, 39, 0.3);
    }

.save:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(45, 90, 39, 0.4);
    }

.save:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

.del {
        background: rgba(245, 243, 240, 0.8);
        color: var(--danger);
        flex: 1;
        border: 1.5px solid rgba(196, 30, 58, 0.2);
    }

.del:hover {
        background: rgba(196, 30, 58, 0.1);
        transform: translateY(-2px);
        border-color: rgba(196, 30, 58, 0.4);
    }

.new {
        width: 100%;
        background: linear-gradient(135deg, var(--text-main), var(--accent-dark));
        color: #fff;
        margin-bottom: 15px;
        border-radius: 50px;
        height: 52px;
        font-size: 14px;
        box-shadow: 0 6px 20px rgba(58, 54, 24, 0.3);
    }

.new:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 28px rgba(58, 54, 24, 0.4);
    }

.toast {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(135deg, #2e2a15, #3a3618);
        color: #fff;
        padding: 14px 28px;
        border-radius: 50px;
        display: none;
        z-index: 3000;
        font-size: 13px;
        font-weight: 500;
        box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        animation: slideUp 0.3s ease;
    }

    #modal, #modalExcluir, #modalSair {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        align-items: center;
        justify-content: center;
        z-index: 2000;
        backdrop-filter: blur(8px);
        animation: fadeIn 0.3s ease;
    }

    #modal.modal-content {
        background: transparent;
        backdrop-filter: none;
        padding: 0;
        border: none;
        box-shadow: none;
        max-width: 340px;
    }

    #modal.card-modal {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(16px);
        border-radius: 24px;
        padding: 18px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        border: 2px solid rgba(255, 255, 255, 0.8);
        animation: slideUp 0.4s ease;
    }

    #modal.card-modal h4 {
        margin: 6px 0 18px;
        text-align: center;
        font-size: 20px;
        color: var(--text-main);
        font-weight: 700;
    }

.img-placeholder {
        width: 100%;
        aspect-ratio: 1/1;
        background: linear-gradient(135deg, #f5f3f0, #e9e4dd);
        border: 2px dashed rgba(160, 140, 107, 0.4);
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        gap: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

.img-placeholder:hover {
        border-color: var(--accent);
        background: linear-gradient(135deg, #fcfaf7, #f5f3f0);
    }

    #modalExcluir.modal-content,
    #modalSair.modal-content {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(16px);
        padding: 0;
        border-radius: 28px;
        width: 90%;
        max-width: 420px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        border: 2px solid rgba(255, 255, 255, 0.8);
        animation: slideUp 0.4s ease;
        overflow: hidden;
    }

.modal-header {
        background: linear-gradient(135deg, var(--danger), var(--danger-dark));
        padding: 28px 32px 24px;
        text-align: center;
        position: relative;
    }

.modal-icon {
        width: 64px;
        height: 64px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        backdrop-filter: blur(8px);
        border: 3px solid rgba(255, 255, 255, 0.3);
    }

.modal-header h4 {
        margin: 0;
        font-size: 22px;
        color: white;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

.modal-body {
        padding: 28px 32px;
        text-align: center;
    }

.modal-body p {
        font-size: 14px;
        color: rgba(58,54,24,0.75);
        margin: 0 0 28px;
        line-height: 1.6;
    }

.modal-body.actions {
        margin-top: 0;
    }

.modal-body.btn-confirmar {
        background: linear-gradient(135deg, var(--danger), var(--danger-dark));
        color: white;
        flex: 1;
        box-shadow: 0 4px 14px rgba(196, 30, 58, 0.3);
    }

.modal-body.btn-confirmar:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(196, 30, 58, 0.4);
    }

.modal-body.btn-cancelar {
        background: linear-gradient(135deg, #4a4a4a, #2e2e2e);
        color: white;
        flex: 1;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
    }

.modal-body.btn-cancelar:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
    }

.skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0 50%, #f0f0f0 75%);
        background-size: 1000px 100%;
        animation: shimmer 2s infinite;
    }

   @media (min-width: 768px) {
.topbar { min-height: 230px; padding: 50px 0; }
.logo img { width: 260px; }
.topbar::after { height: 175px; }
.bottom-bar { top: 230px; margin-top: -1px; }
    #lista { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
}

.upload-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 0 0 16px 16px;
    overflow: hidden;
    display: none;
}

.upload-progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-dark));
    transition: width 0.3s ease;
    box-shadow: 0 0 10px rgba(160, 140, 107, 0.6);
}

.upload-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    color: white;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.especiais-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    padding: 10px 4px;
    margin-top: 4px;
}

.especiais-wrap label {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    margin: 0;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text-main);
    background: none;
    border: none;
    padding: 0;
}

.especiais-wrap input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
    margin: 0;
    flex-shrink: 0;
}

</style>
</head>
<body>

<div class="topbar">
    <div class="logo">
        <img src="logo.png" onclick="location.href='index.html'">
    </div>
</div>

<div class="bottom-bar">
    <a href="index.html" class="btn-voltar-admin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="15">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 5"></polyline>
        </svg>
        Sair do Painel
    </a>
</div>

<div class="container">
  <button class="new" onclick="abrirModal()">+ Adicionar Nova ID</button>
  <input class="busca" placeholder="Buscar ID pelo nome..." oninput="filtrar(this.value)">
  <div id="lista"></div>
</div>

<div id="modal" onclick="if(event.target == this) fecharModal()">
  <div class="modal-content">
    <div class="card card-modal">
     <h4 id="tituloModal">Nova Rosa do Deserto</h4>

      <div class="img-container">
        <img src="imagens/sem-foto.jpg" class="img" id="img_nova" style="display:none;">
        <div class="img-placeholder" id="placeholder_nova" onclick="document.getElementById('file_nova').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <span>Clique para adicionar foto</span>
          <span style="font-size:10px;opacity:0.7;">Opcional</span>
        </div>
        <div class="upload-overlay" id="overlay_nova">Enviando...</div>
        <div class="upload-progress" id="progress_nova">
          <div class="upload-progress-bar" id="progressBar_nova"></div>
        </div>
        <label class="edit-badge" for="file_nova">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="19" height="19"><path d="M17 3a2.828 2.828 0 1 1 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
        </label>
        <input type="file" id="file_nova" class="file-input" accept="image/*" onchange="uploadFotoNova(this)">
      </div>

      <input id="n_midia" value="" type="hidden">

      <label>Nome da ID</label>
      <input id="n_nome" placeholder="Ex: TS-152">

      <label>Quantidade em Estoque</label>
      <input id="n_qtd" type="number" value="0" min="0">

      <div class="row">
        <div>
          <label>Camadas</label>
          <div id="n_camadas_container"></div>
        </div>
        <div>
          <label>Cores</label>
          <div id="n_cores_container"></div>
        </div>
      </div>

      <label>Padrão</label>
      <div id="n_padrao_container"></div>

      <label>Especiais</label>
      <div id="n_especiais_container" class="especiais-wrap"></div>

      <div class="actions">
        <button class="save" onclick="criar()">Criar ID</button>
        <button class="del" style="color:#666" onclick="fecharModal()">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<div id="modalExcluir" onclick="if(event.target == this) fecharModalExcluir()">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="32" height="32">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
      </div>
      <h4>Excluir ID</h4>
    </div>
    <div class="modal-body">
      <p id="textoExcluir"></p>
      <div class="actions">
        <button class="btn-confirmar" onclick="confirmarExclusao()">Confirmar Exclusão</button>
        <button class="btn-cancelar" onclick="fecharModalExcluir()">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<div id="modalSair" onclick="if(event.target == this) fecharModalSair()">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="32" height="32">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
      </div>
      <h4>Alterações não salvas</h4>
    </div>
    <div class="modal-body">
      <p>Você tem alterações que não foram salvas.<br>Tem certeza que deseja sair?</p>
      <div class="actions">
        <button class="btn-confirmar" onclick="confirmarSair()">Sair mesmo assim</button>
        <button class="btn-cancelar" onclick="fecharModalSair()">Continuar editando</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// BLOQUEIO DE ACESSO
(function() {
    if (sessionStorage.getItem("adminLogado") === "true") {
        return;
    }

    const senhaCorreta = "MTQwNTA4bGU=";
    const tentativa = prompt("Área restrita. Digite a senha:");

    if (tentativa === null || btoa(tentativa)!== senhaCorreta) {
        alert("Acesso negado!");
        window.location.href = "index.html";
        return;
    }

    sessionStorage.setItem("adminLogado", "true");
})();

let dados = [];
let filtro = "";
let temAlteracoesNaoSalvas = false;
let colunasDeFiltro = ["camadas", "cores", "padrao", "especiais"];
let idParaExcluir = "";
let plantaEditando = { especiais: [] };
const URL = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
const todasEspeciais = ['Cristatas', 'floraçao em buquê', 'Mutantes', 'Perfumadas', 'Variegatas'];

window.addEventListener('beforeunload', (e) => {
    if (temAlteracoesNaoSalvas) {
        e.preventDefault();
        e.returnValue = 'Você tem alterações não salvas. Deseja sair mesmo assim?';
        return e.returnValue;
    }
});

document.addEventListener('DOMContentLoaded', () => {
    document.querySelector('.btn-voltar-admin').addEventListener('click', (e) => {
        if (temAlteracoesNaoSalvas) {
            e.preventDefault();
            document.getElementById("modalSair").style.display = "flex";
        }
    });
});

function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}

function getOpcoesUnicas(campo) {
  const valores = dados.map(d => d[campo]).filter(v => v && v!== "Não inf." && v.trim());
  return [...new Set(valores)].sort();
}

function mostrarBotaoSalvar(idSeguro) {
  temAlteracoesNaoSalvas = true;
  const card = document.getElementById("qtd_" + idSeguro).closest('.card');
  const btn = card.querySelector('.save');

  btn.style.display = "block";
  card.classList.add('nao-salvo');

  if (!card.querySelector('.badge-nao-salvo')) {
    const badge = document.createElement('div');
    badge.className = 'badge-nao-salvo';
    badge.innerText = 'Não salvo';
    card.querySelector('.img-container').appendChild(badge);
  }
}

function criarSelect(id, valorAtual, opcoes) {
  const idSeguro = id.replace(/^(cam_|cor_|pad_)/, '');
  let html = `<select id="${id}" onchange="mostrarBotaoSalvar('${idSeguro}')">`;
  html += `<option value="">Selecione...</option>`;
  opcoes.forEach(op => {
    html += `<option value="${op}" ${valorAtual === op? 'selected' : ''}>${op}</option>`;
  });
  html += `</select>`;
  return html;
}

function gerarCheckboxesEspeciais(selecionadas = [], prefixo = 'n') {
  const container = document.getElementById(prefixo + '_especiais_container');
  if (!container) return;

  container.innerHTML = '';
  todasEspeciais.forEach(tag => {
    const checked = selecionadas.includes(tag)? 'checked' : '';
    container.className = 'especiais-wrap';
    container.innerHTML += `
  <label>
    <input type="checkbox" value="${tag}" ${checked} onchange="atualizarEspeciais('${prefixo}')">
    ${tag}
  </label>`;
  });
}

function atualizarEspeciais(prefixo) {
  const checkboxes = document.querySelectorAll('#' + prefixo + '_especiais_container input:checked');
  const selecionadas = Array.from(checkboxes).map(cb => cb.value);
  if (prefixo === 'n') {
    plantaEditando.especiais = selecionadas;
  } else {
    const idSeguro = prefixo;
    mostrarBotaoSalvar(idSeguro);
  }
}

function abrirModal() {
  plantaEditando = { especiais: [] };
  document.getElementById('tituloModal').innerText = 'Nova ID';
  document.getElementById('n_nome').value = '';
  document.getElementById('n_qtd').value = '0';
  document.getElementById('n_midia').value = '';
  document.getElementById('img_nova').style.display = "none";
  document.getElementById('placeholder_nova').style.display = "flex";
  document.getElementById('n_camadas_container').innerHTML = criarSelect('n_camadas', '', getOpcoesUnicas('camadas'));
  document.getElementById('n_cores_container').innerHTML = criarSelect('n_cores', '', getOpcoesUnicas('cores'));
  document.getElementById('n_padrao_container').innerHTML = criarSelect('n_padrao', '', getOpcoesUnicas('padrao'));
  gerarCheckboxesEspeciais([], 'n');
  document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}

function abrirModalExcluir(id) {
  idParaExcluir = id;
  document.getElementById("textoExcluir").innerHTML = `Tem certeza que deseja excluir a ID <strong>${id}</strong>?<br>Esta ação não pode ser desfeita.`;
  document.getElementById("modalExcluir").style.display = "flex";
}

function fecharModalExcluir() {
  document.getElementById("modalExcluir").style.display = "none";
}

function abrirModalExcluir(id) {
  idParaExcluir = id;
  document.getElementById("textoExcluir").innerHTML = `Tem certeza que deseja excluir a ID <strong>${id}</strong>?<br>Esta ação não pode ser desfeita.`;
  document.getElementById("modalExcluir").style.display = "flex";
}

function fecharModalExcluir() {
  document.getElementById("modalExcluir").style.display = "none";
  idParaExcluir = "";
}

function fecharModalSair() {
  document.getElementById("modalSair").style.display = "none";
}

function confirmarSair() {
  temAlteracoesNaoSalvas = false;
  window.location.href = "index.html";
}

async function confirmarExclusao() {
  const nome = idParaExcluir;
  const btn = document.querySelector("#modalExcluir .btn-confirmar");
  const originalText = btn.innerText;
  btn.disabled = true;
  btn.innerText = "Excluindo...";
  try {
    await fetch(URL, { method: "POST", body: JSON.stringify({ action: "delete", nome }) });
    toast("ID excluída com sucesso!");
    carregar();
  } catch (err) {
    toast("Erro ao excluir: " + err);
  }
  btn.disabled = false;
  btn.innerText = originalText;
  fecharModalExcluir();
}

function mostrarProgressoUpload(prefixo, mostrar) {
  const overlay = document.getElementById('overlay_' + prefixo);
  const progress = document.getElementById('progress_' + prefixo);
  if (mostrar) {
    overlay.style.display = 'flex';
    progress.style.display = 'block';
  } else {
    overlay.style.display = 'none';
    progress.style.display = 'none';
    document.getElementById('progressBar_' + prefixo).style.width = '0%';
  }
}

function atualizarProgressoUpload(prefixo, porcentagem) {
  document.getElementById('progressBar_' + prefixo).style.width = porcentagem + '%';
}

async function uploadFoto(idSeguro, file) {
  const idReal = idSeguro.replace(/_/g, '-');
  const item = dados.find(d => d.nome === idReal);
  if (!item) {
    toast("ID não encontrada");
    return;
  }

  mostrarProgressoUpload(idSeguro, true);
  atualizarProgressoUpload(idSeguro, 20);

  const reader = new FileReader();
  reader.onload = async () => {
    try {
      atualizarProgressoUpload(idSeguro, 40);
      const base64 = reader.result.split(',')[1];

      atualizarProgressoUpload(idSeguro, 60);
      const res = await fetch(URL, {
        method: "POST",
        body: JSON.stringify({
          action: "upload",
          data: base64,
          mimeType: file.type,
          nome: file.name,
          oldFileId: item.midia || ''
        })
      });

      atualizarProgressoUpload(idSeguro, 80);
      const j = await res.json();

      if (j.success) {
        const img = document.getElementById("img_" + idSeguro);
        const oldMidia = item.midia;
        img.src = j.url;
        item.midia = j.id;
        mostrarBotaoSalvar(idSeguro);

        if (oldMidia && oldMidia !== "Não inf.") {
          toast("Foto substituída! Lembre de salvar.");
        } else {
          toast("Foto enviada! Lembre de salvar.");
        }
        atualizarProgressoUpload(idSeguro, 100);
      } else {
        toast("Erro: " + j.error);
      }
    } catch (err) {
      toast("Erro ao enviar: " + err);
    } finally {
      setTimeout(() => mostrarProgressoUpload(idSeguro, false), 500);
    }
  };
  reader.readAsDataURL(file);
}

async function uploadFotoNova(file) {
  mostrarProgressoUpload('nova', true);
  atualizarProgressoUpload('nova', 20);

  const reader = new FileReader();
  reader.onload = async () => {
    try {
      atualizarProgressoUpload('nova', 40);
      const base64 = reader.result.split(',')[1];

      atualizarProgressoUpload('nova', 60);
      const res = await fetch(URL, {
        method: "POST",
        body: JSON.stringify({
          action: "upload",
          data: base64,
          mimeType: file.type,
          nome: file.name
        })
      });

      atualizarProgressoUpload('nova', 80);
      const j = await res.json();

      if (j.success) {
        document.getElementById("n_midia").value = j.id;
        document.getElementById("img_nova").src = j.url;
        document.getElementById("img_nova").style.display = "block";
        document.getElementById("placeholder_nova").style.display = "none";
        atualizarProgressoUpload('nova', 100);
        toast("Foto enviada!");
      } else {
        toast("Erro: " + j.error);
      }
    } catch (err) {
      toast("Erro ao enviar: " + err);
    } finally {
      setTimeout(() => mostrarProgressoUpload('nova', false), 500);
    }
  };
  reader.readAsDataURL(file);
}

async function criar() {
  const nome = document.getElementById("n_nome").value.trim().toUpperCase();
  if (!nome) return toast("O campo Nome da ID é obrigatório!");

  const existe = dados.find(d => d.nome === nome);
  if (existe) {
    toast("Essa ID já existe! Use outro nome.");
    return;
  }

  const obj = {
    action: "create",
    nome: nome,
    camadas: document.getElementById("n_camadas").value || "Não inf.",
    cores: document.getElementById("n_cores").value || "Não inf.",
    padrao: document.getElementById("n_padrao").value || "Não inf.",
    especiais: plantaEditando.especiais,
    qtd: Math.max(0, parseInt(document.getElementById("n_qtd").value) || 0),
    midia: document.getElementById("n_midia").value || "Não inf."
  };

  const btn = document.querySelector('#modal .save');
  const originalText = btn.innerText;
  btn.disabled = true;
  btn.innerText = "Criando...";
  try {
    const res = await fetch(URL, { method: "POST", body: JSON.stringify(obj) });
    const j = await res.json();
    if (j.success) {
      toast("ID criada com sucesso!");
      fecharModal();
      carregar();
    } else {
      toast("Erro: " + j.error);
    }
  } catch (err) {
    toast("Erro ao criar: " + err);
  }
  btn.disabled = false;
  btn.innerText = originalText;
}

async function salvar(idSeguro) {
  const idReal = idSeguro.replace(/_/g, '-');
  const item = dados.find(d => d.nome === idReal);
  if (!item) return toast("Erro: item não encontrado.");

  const getVal = (id) => document.getElementById(id)?.value || "Não inf.";
  const checkboxes = document.querySelectorAll('#esp_' + idSeguro + ' input:checked');
  const especiaisSelecionadas = Array.from(checkboxes).map(cb => cb.value);

  const obj = {
    action: "update",
    nome: idReal,
    camadas: getVal("cam_" + idSeguro),
    cores: getVal("cor_" + idSeguro),
    padrao: getVal("pad_" + idSeguro),
    especiais: especiaisSelecionadas,
    qtd: Math.max(0, parseInt(getVal("qtd_" + idSeguro)) || 0),
    midia: item.midia || "Não inf."
  };

  const card = document.getElementById("qtd_" + idSeguro).closest('.card');
  const btn = card.querySelector('.save');
  const originalText = btn.innerText;
  btn.disabled = true;
  btn.innerText = "Salvando...";
  try {
    await fetch(URL, { method: "POST", body: JSON.stringify(obj) });
    toast("ID atualizada com sucesso!");
    temAlteracoesNaoSalvas = false;
    card.classList.remove('nao-salvo');
    const badge = card.querySelector('.badge-nao-salvo');
    if (badge) badge.remove();
    btn.style.display = "none";
    carregar();
  } catch (err) {
    toast("Erro ao salvar: " + err);
    btn.disabled = false;
    btn.innerText = originalText;
  }
}

async function carregar() {
  const container = document.getElementById("lista");
  container.innerHTML = "";
  for (let i = 0; i < 6; i++) {
    container.innerHTML += `
      <div class="card">
        <div class="img-container skeleton" style="height: 290px; border-radius: 18px; margin-bottom: 14px;"></div>
        <div class="skeleton" style="height: 20px; margin: 6px 0 18px; border-radius: 6px;"></div>
        <div class="skeleton" style="height: 12px; margin-top: 12px; border-radius: 4px;"></div>
        <div class="skeleton" style="height: 36px; margin-top: 4px; border-radius: 10px;"></div>
      </div>`;
  }
  try {
    const res = await fetch(URL + "?action=get");
    const json = await res.json();
    dados = Object.keys(json).map(k => ({ nome: k, ...json[k] }));
    ordenarDadosAZ();
    render();
    temAlteracoesNaoSalvas = false;
  } catch (err) {
    container.innerHTML = `<p style='text-align:center;color:var(--danger);padding:40px 20px;font-weight:600;'>Erro ao carregar catálogo</p>`;
  }
}

function ordenarDadosAZ() {
  dados.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR', { numeric: true, sensitivity: 'base' }));
}

function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";
  let filtrados = dados.filter(d => d.nome.toLowerCase().includes(filtro.toLowerCase()));
  if (filtrados.length === 0) {
    lista.innerHTML = "<p style='grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(58,54,24,0.5);font-weight:500;'>Nenhuma ID encontrada</p>";
    return;
  }
  filtrados.forEach(d => {
    const idSeguro = d.nome.replace(/-/g, '_');
    const url = d.midia && d.midia !== "Não inf." ? `https://drive.google.com/thumbnail?id=${d.midia}&sz=w600` : "imagens/sem-foto.jpg";
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="img-container">
        <img src="${url}" class="img" id="img_${idSeguro}">
        <label class="edit-badge" for="file_${idSeguro}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="19" height="19"><path d="M17 3a2.828 2.828 0 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
        </label>
        <input type="file" id="file_${idSeguro}" class="file-input" accept="image/*" onchange="uploadFoto('${idSeguro}', this.files[0])">
      </div>
      <h4>${d.nome}</h4>
      <label>Quantidade em Estoque</label>
      <input id="qtd_${idSeguro}" type="number" value="${d.qtd}" min="0" oninput="mostrarBotaoSalvar('${idSeguro}')">
      <div class="row">
        <div>
          <label>Camadas</label>
          ${criarSelect('cam_' + idSeguro, d.camadas, getOpcoesUnicas('camadas'))}
        </div>
        <div>
          <label>Cores</label>
          ${criarSelect('cor_' + idSeguro, d.cores, getOpcoesUnicas('cores'))}
        </div>
      </div>
      <label>Padrão</label>
      ${criarSelect('pad_' + idSeguro, d.padrao, getOpcoesUnicas('padrao'))}
      <label>Especiais</label>
      <div id="esp_${idSeguro}" class="especiais-wrap"></div>
      <div class="actions">
        <button class="save" onclick="salvar('${idSeguro}')" style="display:none;">Salvar</button>
        <button class="del" onclick="abrirModalExcluir('${d.nome}')">Excluir</button>
      </div>
    `;
    lista.appendChild(card);
    const especiaisAtuais = d.especiais ? d.especiais.split(',').map(s => s.trim()) : [];
    gerarCheckboxesEspeciais(especiaisAtuais, 'esp_' + idSeguro);
  });
}

function filtrar(v) {
  filtro = v;
  render();
}

carregar();
</script>
