<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Gravatá Rosas do Deserto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --header-bg: #fcfaf7;
            --body-bg: #e5e0d8;
            --text-main: #3a3618;
            --card-white: #ffffff;
            --danger: #8b2d2d;
            --ok: #2d5a27;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--body-bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 50px;
        }

        /* ===== CABEÇALHO IDÊNTICO AO ÍNDEX ===== */
        .topbar {
            padding: 35px 0;
            position: sticky;
            top: 0;
            z-index: 1100;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            background: transparent;
            border-bottom: 2px solid #ffffff;
            overflow: hidden;
            min-height: 150px;
        }

        .topbar::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('imagens/gravata-cabecalho.jpg');
            background-size: cover;
            background-position: top center;
            z-index: -2;
        }

        .topbar::after {
            content: "";
            position: absolute;
            left: 0;
            width: 100%;
            height: 110px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: -1;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { position: relative; z-index: 3; }
        .logo img { 
            width: 150px; 
            height: auto; 
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4)); 
            cursor: pointer; 
        }

        /* BARRA DE SAÍDA (FILTROS DO ADMIN) */
        .bottom-bar {
            position: sticky;
            top: 150px; /* Alinhado com a altura do topo */
            z-index: 1000;
            background: #ffffff;
            height: 50px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .btn-voltar-admin { 
            background: var(--text-main); 
            color: white; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 0 15px; 
            border-radius: 50px; 
            border: none;
            font-weight: 600; 
            font-size: 11px; 
            cursor: pointer; 
            height: 30px;
            text-transform: uppercase;
            text-decoration: none;
        }

        /* CONTEÚDO PRINCIPAL */
        .container { padding: 15px; max-width: 1400px; margin: auto; }

        .busca {
            width: 100%; padding: 12px 20px; border-radius: 50px;
            border: 1.5px solid rgba(0,0,0,0.1); margin: 15px 0;
            outline: none; text-align: center; font-family: inherit;
        }

        /* GRID DE CARDS */
        #lista {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: #fff; border-radius: 20px; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
            justify-content: space-between;
        }

        /* IMAGEM E EDIÇÃO */
        .img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            margin-bottom: 12px;
        }
        .img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 15px;
            display: block; border: 1px solid #eee;
        }
        .edit-badge {
            position: absolute; bottom: 8px; right: 8px;
            background: var(--text-main); color: white;
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .file-input { display: none; }

        /* FORMULÁRIO INTERNO */
        h4 { margin: 5px 0 15px; text-align: center; font-size: 16px; color: var(--text-main); }
        label { font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; margin-top: 10px; display: block; }
        input { 
            width: 100%; padding: 8px 12px; border-radius: 8px; 
            border: 1px solid #eee; margin-top: 3px; font-family: inherit; font-size: 13px;
            background: #fafafa;
        }
        input:focus { border-color: var(--text-main); outline: none; background: #fff; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* BOTÕES */
        .actions { display: flex; gap: 8px; margin-top: 18px; }
        button { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-family: inherit; font-size: 12px; transition: 0.2s; }
        .save { background: var(--ok); color: #fff; flex: 2; }
        .del { background: #f0f0f0; color: var(--danger); flex: 1; }
        .save:hover { filter: brightness(1.1); }
        .new { width: 100%; background: var(--text-main); color: #fff; margin-bottom: 10px; border-radius: 50px; height: 48px; font-size: 14px; }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 12px 25px; border-radius: 50px;
            display: none; z-index: 3000; font-size: 13px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* MODAL */
        #modal { 
            display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); 
            align-items:center; justify-content:center; z-index:2000; backdrop-filter: blur(4px);
        }
        .modal-content { background:#fff; padding:25px; border-radius:20px; width:90%; max-width:400px; }

        @media (min-width: 768px) {
            .topbar { min-height: 220px; padding: 50px 0; }
            .logo img { width: 250px; }
            .topbar::after { height: 170px; }
            .bottom-bar { top: 220px; }
        }
    </style>
</head>
<body>

<div class="topbar">
  <div class="logo-bar"><div class="logo"><img src="logo.png"></div></div>
  <div class="bottom-bar">
    <a href="index.html" class="btn-voltar-admin">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Sair do Painel
    </a>
  </div>
</div>

<div class="container">
  <button class="new" onclick="abrirModal()">+ Adicionar Nova ID</button>
  <input class="busca" placeholder="Buscar ID pelo nome..." oninput="filtrar(this.value)">
  <div id="lista"></div>
</div>

<div id="modal" onclick="if(event.target == this) fecharModal()">
  <div class="modal-content">
    <h4 style="margin-top:0">Nova Rosa do Deserto</h4>
    <label>Nome da ID</label>
    <input id="n_nome" placeholder="Ex: TS-152">
    <div class="row">
        <div><label>Quantidade</label><input id="n_qtd" type="number" value="0"></div>
        <div><label>Camadas</label><input id="n_camadas" placeholder="Ex: Tripla"></div>
    </div>
    <label>Cores</label>
    <input id="n_cores" placeholder="Ex: Vermelho e Preto">
    <label>Padrão</label>
    <input id="n_padrao" placeholder="Ex: Matizada">
    <label>ID da Imagem (Drive)</label>
    <input id="n_midia" placeholder="Código da foto">
    <br>
    <div class="actions">
        <button class="save" onclick="criar()">Criar ID</button>
        <button class="del" style="color:#666" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
const CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv";

let dados = []; 
let filtro = "";

function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}

function abrirModal() { document.getElementById("modal").style.display = "flex"; }
function fecharModal() { document.getElementById("modal").style.display = "none"; }
function filtrar(v) { filtro = v; render(); }

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  return lines.map(line => {
    const cells = line.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g) || [];
    return cells.map(c => c.replace(/^"|"$/g, '').trim());
  });
}

function render() {
  const el = document.getElementById("lista");
  el.innerHTML = "";
  const itensFiltrados = dados.filter(d => d.nome.toLowerCase().includes(filtro.toLowerCase()));
  
  itensFiltrados.forEach(d => {
    const idSeguro = d.nome.replace(/\W/g, "_");
    const imgUrl = (!d.midia || d.midia === "Não inf.") ? "imagens/sem-foto.jpg" : `https://drive.google.com/thumbnail?sz=w600&id=${d.midia}`;

    el.innerHTML += `
    <div class="card">
      <div>
        <div class="img-container">
          <img src="${imgUrl}" class="img" id="img_${idSeguro}" onerror="this.src='imagens/sem-foto.jpg'">
          <label class="edit-badge" for="file_${idSeguro}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
          </label>
          <input type="file" id="file_${idSeguro}" class="file-input" accept="image/*" onchange="uploadFoto(this, '${idSeguro}')">
        </div>

        <h4>${d.nome}</h4>
        
        <input id="nome_${idSeguro}" value="${d.nome}" type="hidden">
        
        <label>Quantidade em Estoque</label>
        <input id="qtd_${idSeguro}" value="${d.qtd}" type="number">
        
        <label>ID da Imagem (Drive)</label>
        <input id="midia_${idSeguro}" value="${d.midia}">

        <div class="row">
          <div>
            <label>Camadas</label>
            <input id="cam_${idSeguro}" value="${d.camadas}">
          </div>
          <div>
             <label>Cores</label>
             <input id="cor_${idSeguro}" value="${d.cores}">
          </div>
        </div>
        
        <label>Padrão</label>
        <input id="pad_${idSeguro}" value="${d.padrao}">
      </div>

      <div class="actions">
        <button class="save" onclick="salvar('${d.nome}')">Salvar</button>
        <button class="del" onclick="excluir('${d.nome}')">Excluir</button>
      </div>
    </div>`;
  });
}

async function uploadFoto(input, idSeguro) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  toast("Fazendo upload...");
  
  reader.onload = async function(e) {
    const base64Data = e.target.result.split(",")[1];
    try {
      const params = new URLSearchParams();
      params.append("action", "upload");
      params.append("nome", file.name);
      params.append("mimeType", file.type);
      params.append("data", base64Data);

      const res = await fetch(URL, { method: "POST", body: params });
      const json = await res.json();

      if (json && json.id) {
        document.getElementById("midia_" + idSeguro).value = json.id;
        document.getElementById("img_" + idSeguro).src = `https://drive.google.com/thumbnail?sz=w600&id=${json.id}`;
        toast("Foto carregada! Clique em Salvar.");
      }
    } catch (err) { toast("Erro no upload."); }
  };
  reader.readAsDataURL(file);
}

async function carregar() {
  try {
    const r = await fetch(CSV + "&t=" + Date.now());
    const t = await r.text();
    const linhas = parseCSV(t);
    if (linhas.length > 1) {
      linhas.shift(); 
      dados = linhas.map(l => ({
        nome: l[0] || "",
        camadas: l[1] || "",
        cores: l[2] || "",
        padrao: l[3] || "",
        qtd: l[5] || "0",
        midia: l[6] || ""
      }));
      render();
    }
  } catch (e) { toast("Erro ao carregar dados."); }
}

async function salvar(nomeOriginal) {
  const id = nomeOriginal.replace(/\W/g, "_");
  const btn = document.querySelector(`.card:has(#nome_${id}) .save`);
  
  btn.innerText = "Salvando...";
  btn.disabled = true;

  try {
    await fetch(URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "update", 
        nome: nomeOriginal,
        qtd: document.getElementById("qtd_" + id).value,
        camadas: document.getElementById("cam_" + id).value,
        cores: document.getElementById("cor_" + id).value,
        padrao: document.getElementById("pad_" + id).value,
        midia: document.getElementById("midia_" + id).value
      })
    });
    toast("Salvo com sucesso!");
  } catch (e) { toast("Erro ao salvar"); }
  btn.innerText = "Salvar";
  btn.disabled = false;
}

async function excluir(nome) {
  if (!confirm("Excluir " + nome + "?")) return;
  try {
    const res = await fetch(URL, {
      method: "POST",
      body: new URLSearchParams({ action: "delete", nome })
    });
    toast("Excluído!"); 
    carregar();
  } catch (e) { toast("Erro ao excluir"); }
}

async function criar() {
    const nome = document.getElementById("n_nome").value;
    const btn = document.querySelector("#modal .save");
    if(!nome) return alert("Digite o nome");

    btn.innerText = "Criando...";
    btn.disabled = true;

    try {
        await fetch(URL, {
            method: "POST",
            body: new URLSearchParams({
                action: "create", nome: nome,
                qtd: document.getElementById("n_qtd").value,
                camadas: document.getElementById("n_camadas").value,
                cores: document.getElementById("n_cores").value,
                padrao: document.getElementById("n_padrao").value,
                midia: document.getElementById("n_midia").value
            })
        });
        toast("Criado com sucesso!"); 
        fecharModal(); 
        carregar(); 
    } catch(e) { toast("Erro ao criar"); }
    btn.innerText = "Criar ID";
    btn.disabled = false;
}

carregar();
</script>
</body>
</html>
