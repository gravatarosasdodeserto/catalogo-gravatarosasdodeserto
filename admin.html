<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Gravatá Rosas do Deserto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --text-main: #3a3618; --bg: #e5e0d8; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; margin-top: 0; font-size: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .campo { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; opacity: 0.7; }
        input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; font-family: inherit; box-sizing: border-box; }
        input:focus { border-color: var(--text-main); outline: none; }
        .preview-container { width: 100%; aspect-ratio: 1/1; background: #f0f0f0; border-radius: 15px; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px dashed #ccc; }
        #previewImg { width: 100%; height: 100%; object-fit: cover; display: none; }
        button { width: 100%; padding: 15px; background: var(--text-main); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:disabled { background: #999; cursor: not-allowed; }
        #mensagem { text-align: center; margin-top: 15px; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cadastrar Nova ID</h2>
    <form id="formAdmin">
        <div class="campo">
            <label>Nome da ID</label>
            <input type="text" id="nome" placeholder="Ex: TS 304" required>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="campo">
                <label>Camadas</label>
                <input type="text" id="camadas" placeholder="Ex: Dobrada">
            </div>
            <div class="campo">
                <label>Cores</label>
                <input type="text" id="cores" placeholder="Ex: Vermelha">
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="campo">
                <label>Padrão</label>
                <input type="text" id="padrao" placeholder="Ex: Bordas Negras">
            </div>
            <div class="campo">
                <label>Especiais</label>
                <input type="text" id="especiais" placeholder="Ex: Perfumada">
            </div>
        </div>
        <div class="campo">
            <label>Qtd em Estoque</label>
            <input type="number" id="qtd" value="0" required>
        </div>
        <div class="campo">
            <label>Foto/Vídeo (Upload para o Drive)</label>
            <input type="file" id="arquivo" accept="image/*,video/mp4" required>
            <div class="preview-container">
                <span id="placeholder">Prévia da Mídia</span>
                <img id="previewImg">
            </div>
        </div>
        <button type="submit" id="btnEnviar">CADASTRAR NO SITE</button>
    </form>
    <div id="mensagem"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
    const fileInput = document.getElementById('arquivo');
    const previewImg = document.getElementById('previewImg');
    const placeholder = document.getElementById('placeholder');

    // Mostrar prévia da imagem ao selecionar
    fileInput.onchange = e => {
        const [file] = fileInput.files;
        if (file && file.type.startsWith('image/')) {
            previewImg.src = URL.createObjectURL(file);
            previewImg.style.display = 'block';
            placeholder.style.display = 'none';
        }
    };

    document.getElementById('formAdmin').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        const msg = document.getElementById('mensagem');
        
        btn.disabled = true;
        msg.style.color = "black";
        msg.innerText = "Processando mídia e enviando...";

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function() {
            const base64Content = reader.result.split(',')[1];
            
            const dados = {
                nome: document.getElementById('nome').value,
                camadas: document.getElementById('camadas').value,
                cores: document.getElementById('cores').value,
                padrao: document.getElementById('padrao').value,
                especiais: document.getElementById('especiais').value,
                qtd: document.getElementById('qtd').value,
                tipoMime: file.type,
                arquivoBase64: base64Content
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(dados)
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === "sucesso") {
                    msg.style.color = "green";
                    msg.innerText = "✅ Sucesso! ID salva e imagem no Drive.";
                    document.getElementById('formAdmin').reset();
                    previewImg.style.display = 'none';
                    placeholder.style.display = 'block';
                } else {
                    throw new Error(res.error);
                }
            })
            .catch(err => {
                msg.style.color = "red";
                msg.innerText = "❌ Erro ao enviar. Verifique o console.";
                console.error(err);
            })
            .finally(() => {
                btn.disabled = false;
            });
        };

        reader.readAsDataURL(file);
    });
</script>

</body>
</html>
