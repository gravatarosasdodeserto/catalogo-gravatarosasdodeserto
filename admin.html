<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Gravatá RD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fcfbf7;
            --surface: #ffffff;
            --text-primary: #2e2a15;
            --text-secondary: #7d6e53;
            --accent: #a08c6b;
            --border: #eceae4;
            --radius: 12px;
            --premium-grad: linear-gradient(135deg, #a08c6b 0%, #7d6e53 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text-primary); }

        /* --- HEADER --- */
        header { 
            height: 150px; 
            background: url('imagens/gravata-cabecalho.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
        }
        .header-stripe {
            width: 100%;
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 0;
            display: flex; justify-content: center; align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .logo { width: 110px; }

        @media (min-width: 1024px) {
            header { height: 350px; }
            .header-stripe { padding: 40px 0; }
            .logo { width: 180px; }
        }

        /* --- BARRA DE GESTÃO --- */
        .top-action-bar {
            background: #2e2a15;
            padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .bar-title { color: white; font-size: 14px; font-weight: 500; }
        .btn-logout { background: none; border: none; color: white; font-size: 12px; text-decoration: none; font-weight: 500; }

        /* --- ÁREA DE BUSCA (IGUAL INDEX) --- */
        .controls-area { padding: 25px 15px; background: var(--bg); text-align: center; }
        .search-box {
            width: 100%; max-width: 500px; padding: 12px 25px; 
            border-radius: 50px; border: 1px solid var(--border);
            outline: none; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        /* --- CARD DE EDIÇÃO --- */
        .container { max-width: 600px; margin: auto; padding: 0 20px 100px; }
        .admin-card {
            background: var(--surface); border-radius: var(--radius);
            border: 1px solid var(--border); overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .img-preview { width: 100%; aspect-ratio: 1/1; background: #eee; }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .edit-content { padding: 25px; }
        .id-label { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: block; color: var(--accent); }
        
        .filter-group { margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; }
        .filter-group-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .option-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }

        .input-field {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 8px; margin-top: 5px; outline: none; font-size: 14px;
        }

        .btn-save {
            width: 100%; padding: 15px; background: var(--premium-grad);
            color: white; border: none; border-radius: 8px; font-weight: 600;
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .btn-save:hover { opacity: 0.9; }

        #msg { text-align: center; margin-top: 15px; font-size: 13px; font-weight: 500; min-height: 20px; }
    </style>
</head>
<body>

<header>
    <div class="header-stripe"><img src="logo.png" class="logo"></div>
</header>

<div class="top-action-bar">
    <span class="bar-title">Gestão das ID's</span>
    <a href="index.html" class="btn-logout">SAIR</a>
</div>

<div class="controls-area">
    <input type="text" id="search-id" class="search-box" placeholder="Pesquisar ID para editar..." oninput="buscarDinamico()">
    <div id="msg"></div>
</div>

<main class="container">
    <div id="editor" style="display: none;">
        <div class="admin-card">
            <div class="img-preview"><img id="preview-img" src=""></div>
            <div class="edit-content">
                <span class="id-label" id="display-id">ID: ---</span>
                
                <div class="filter-group">
                    <span class="filter-group-title">Estoque Disponível</span>
                    <input type="number" id="input-qtd" class="input-field">
                </div>

                <div class="filter-group">
                    <span class="filter-group-title">ID da Imagem (Google Drive)</span>
                    <input type="text" id="input-midia" class="input-field" oninput="atualizarPreview()">
                </div>

                <div class="filter-group"><span class="filter-group-title">Camadas (Única)</span><div class="options-grid" id="edit-camadas"></div></div>
                <div class="filter-group"><span class="filter-group-title">Padrão de Pétala (Única)</span><div class="options-grid" id="edit-padrao"></div></div>
                <div class="filter-group"><span class="filter-group-title">Cores (Múltiplas)</span><div class="options-grid" id="edit-cores"></div></div>
                <div class="filter-group"><span class="filter-group-title">Padrões Especiais (Múltiplas)</span><div class="options-grid" id="edit-especiais"></div></div>

                <button class="btn-save" onclick="salvar()">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>
</main>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzgV_H5QLTNwJ12B-78q57qNnlaVi0vbxW3jIqdnp7YH1IKCdBdFthIHymlMM9Jusqktg/exec";
    
    const OPCOES = {
        camadas: ["Simples", "Dobrada", "Tripla", "Multi-pétalas"],
        padrao: ["Lisa", "Borda Colorida", "Riscada", "Matizada"],
        cores: ["Amarela", "Branca", "Negra", "Rosa", "Roxa", "Vermelha", "Vinho"],
        especiais: ["Fragrância", "Negra Retinta", "Pétala Rasgada"]
    };

    let BANCO_DADOS = null;
    let itemAtual = null;

    // 1. Carrega todos os dados uma vez só ao abrir a página (igual o Index faz)
    async function inicializar() {
        renderOpcoes();
        try {
            const r = await fetch(`${API}?action=get&t=${Date.now()}`);
            BANCO_DADOS = await r.json();
            document.getElementById('msg').innerText = "Banco de dados pronto.";
            setTimeout(() => document.getElementById('msg').innerText = "", 2000);
        } catch(e) {
            document.getElementById('msg').innerText = "Erro ao carregar banco de dados.";
        }
    }

    function renderOpcoes() {
        const montar = (containerId, lista, chave, isRadio) => {
            const container = document.getElementById(containerId);
            container.innerHTML = lista.map(opt => `
                <label class="option-item">
                    <input type="${isRadio ? 'radio' : 'checkbox'}" 
                           name="${isRadio ? 'radio-'+chave : 'check-'+chave}" 
                           class="input-opt" 
                           data-type="${chave}" 
                           value="${opt}"> ${opt}
                </label>
            `).join('');
        };
        montar('edit-camadas', OPCOES.camadas, 'camadas', true);
        montar('edit-padrao', OPCOES.padrao, 'padrao', true);
        montar('edit-cores', OPCOES.cores, 'cores', false);
        montar('edit-especiais', OPCOES.especiais, 'especiais', false);
    }

    // 2. Busca dinâmica: igual ao index
    function buscarDinamico() {
        const idBusca = document.getElementById('search-id').value.trim().toUpperCase();
        const editor = document.getElementById('editor');
        const msg = document.getElementById('msg');

        if (!BANCO_DADOS) return; // Espera o banco carregar

        if (BANCO_DADOS[idBusca]) {
            itemAtual = { id: idBusca, ...BANCO_DADOS[idBusca] };
            abrirEditor();
            msg.innerText = "✅ Editando ID: " + idBusca;
            msg.style.color = "green";
        } else {
            editor.style.display = 'none';
            msg.innerText = idBusca === "" ? "" : "ID não encontrada...";
            msg.style.color = "var(--text-secondary)";
        }
    }

    function abrirEditor() {
        document.getElementById('editor').style.display = 'block';
        document.getElementById('display-id').innerText = `ID: ${itemAtual.id}`;
        document.getElementById('input-qtd').value = itemAtual.qtd || 0;
        document.getElementById('input-midia').value = itemAtual.midia || "";
        atualizarPreview();

        document.querySelectorAll('.input-opt').forEach(i => i.checked = false);

        ['camadas', 'padrao', 'cores', 'especiais'].forEach(chave => {
            const valorSalvo = (itemAtual[chave] || "").toString();
            const listaValores = valorSalvo.split(',').map(v => v.trim());
            document.querySelectorAll(`.input-opt[data-type="${chave}"]`).forEach(input => {
                if(listaValores.includes(input.value)) input.checked = true;
            });
        });
    }

    function atualizarPreview() {
        const midiaId = document.getElementById('input-midia').value;
        document.getElementById('preview-img').src = midiaId ? `https://drive.google.com/thumbnail?sz=w600&id=${midiaId}` : 'imagens/sem-foto.jpg';
    }

    async function salvar() {
        const msgEl = document.getElementById('msg');
        msgEl.innerText = "💾 Salvando...";
        
        const payload = {
            action: "upsert",
            id: itemAtual.id,
            qtd: document.getElementById('input-qtd').value,
            midia: document.getElementById('input-midia').value
        };

        ['camadas', 'padrao', 'cores', 'especiais'].forEach(chave => {
            const marcados = [...document.querySelectorAll(`.input-opt[data-type="${chave}"]:checked`)];
            payload[chave] = marcados.map(m => m.value).join(', ');
        });

        try {
            await fetch(API, { method: "POST", body: JSON.stringify(payload) });
            // Atualiza o banco local para a próxima busca ser rápida
            BANCO_DADOS[itemAtual.id] = { ...payload };
            delete BANCO_DADOS[itemAtual.id].action;
            
            msgEl.innerText = "✨ Alterações salvas com sucesso!";
            msgEl.style.color = "green";
        } catch(e) {
            msgEl.innerText = "❌ Erro ao salvar.";
            msgEl.style.color = "red";
        }
    }

    window.onload = inicializar;
</script>
</body>
</html>
