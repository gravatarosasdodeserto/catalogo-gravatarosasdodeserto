<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Gravatá Rosas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#e5e0d8;
  --card:#ffffff;
  --text:#3a3618;
  --ok:#2d5a27;
  --danger:#8b2d2d;
  --border:#e8e8e8;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:var(--text);
}

/* ===== HEADER ===== */
.topbar{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fcfaf7;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.logo img{
  width:120px;
}

/* BOTÃO VOLTAR */
.voltar{
  position:absolute;
  left:12px;
  top:12px;
  background:#fff;
  border:1px solid #ccc;
  border-radius:20px;
  padding:6px 10px;
  font-size:12px;
}

/* ===== CONTAINER ===== */
.container{
  padding:12px;
  max-width:900px;
  margin:auto;
}

/* ===== CARD ===== */
.card{
  background:var(--card);
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* IMAGEM MAIOR E CENTRAL */
.img-box{
  display:flex;
  justify-content:center;
  align-items:center;
}

.img{
  width:160px;
  height:160px;
  object-fit:cover;
  border-radius:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

/* LABEL */
label{
  font-size:11px;
  opacity:.7;
  margin-top:4px;
}

/* INPUTS */
input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--border);
  font-family:Poppins;
  font-size:14px;
}

/* BLOCO HORIZONTAL CONTROLADO */
.row{
  display:flex;
  gap:10px;
}

.row .col{
  flex:1;
  min-width:0;
}

/* AÇÕES */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  border:none;
  padding:12px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
}

.save{
  background:var(--ok);
  color:white;
  flex:1;
}

.del{
  background:var(--danger);
  color:white;
  flex:1;
}

/* BOTÃO NOVO */
.new{
  background:#3a3618;
  color:#fff;
  width:100%;
  padding:12px;
  border-radius:14px;
  margin-bottom:14px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 16px;
  border-radius:20px;
  display:none;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="voltar" onclick="location.href='index.html'">← Catálogo</button>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<div class="container">

<button class="new" onclick="abrirModal()">+ Nova ID</button>

<div id="lista"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Nova ID</h3>

    <input id="n_nome" placeholder="Nome">

    <label>Qtd</label>
    <input id="n_qtd" type="number">

    <label>Camadas</label>
    <input id="n_camadas">

    <label>Cores</label>
    <input id="n_cores">

    <label>Padrão</label>
    <input id="n_padrao">

    <label>Link da imagem</label>
    <input id="n_midia">

    <br><br>

    <button class="save" onclick="criar()">Criar</button>
    <button class="del" onclick="fecharModal()">Fechar</button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
const CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv";

let dados = [];

function parseCSV(text){
  return text.split("\n").map(r => r.split(","));
}

async function carregar(){
  const r = await fetch(CSV);
  const t = await r.text();
  const linhas = parseCSV(t);

  linhas.shift();

  dados = linhas.map(l => ({
    nome:l[0],
    camadas:l[1],
    cores:l[2],
    padrao:l[3],
    especiais:l[4],
    qtd:l[5],
    midia:l[6]
  }));

  render();
}

function render(){

  const el = document.getElementById("lista");
  el.innerHTML = "";

  dados.forEach(d => {

    const id = d.nome.replace(/\W/g,"_");

    let img = d.midia?.startsWith("http")
      ? d.midia
      : `https://drive.google.com/uc?export=view&id=${d.midia}`;

    el.innerHTML += `
    <div class="card">

      <div class="img-box">
        <img src="${img}" class="img" onerror="this.src='imagens/sem-foto.jpg'">
      </div>

      <label>Nome</label>
      <input id="nome_${id}" value="${d.nome}">

      <label>Qtd</label>
      <input id="qtd_${id}" value="${d.qtd}">

      <label>Link da imagem (somente visual)</label>
      <input value="${d.midia}" disabled>

      <div class="row">
        <div class="col">
          <label>Camadas</label>
          <input id="cam_${id}" value="${d.camadas}">
        </div>

        <div class="col">
          <label>Cores</label>
          <input id="cor_${id}" value="${d.cores}">
        </div>
      </div>

      <label>Padrão</label>
      <input id="pad_${id}" value="${d.padrao}">

      <div class="actions">
        <button class="save" onclick="salvar('${d.nome}')">Salvar</button>
        <button class="del" onclick="excluir('${d.nome}')">Excluir</button>
      </div>

    </div>`;
  });
}

async function salvar(nome){

  const id = nome.replace(/\W/g,"_");

  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"update",
      nome,
      qtd:document.getElementById("qtd_"+id).value,
      cores:document.getElementById("cor_"+id).value,
      camadas:document.getElementById("cam_"+id).value,
      padrao:document.getElementById("pad_"+id).value
    })
  });

  toast("Salvo!");
  carregar();
}

async function excluir(nome){

  if(!confirm("Excluir ID?")) return;

  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"delete",
      nome
    })
  });

  toast("Excluído!");
  carregar();
}

async function criar(){

  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"create",
      nome:n_nome.value,
      qtd:n_qtd.value,
      camadas:n_camadas.value,
      cores:n_cores.value,
      padrao:n_padrao.value,
      midia:n_midia.value
    })
  });

  fecharModal();
  toast("Criado!");
  carregar();
}

function abrirModal(){ modal.style.display="flex"; }
function fecharModal(){ modal.style.display="none"; }

function toast(t){
  const x=document.getElementById("toast");
  x.innerText=t;
  x.style.display="block";
  setTimeout(()=>x.style.display="none",2000);
}

carregar();

</script>

</body>
</html>
