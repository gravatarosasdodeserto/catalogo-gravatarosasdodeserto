<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Gravatá Rosas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --header-bg:#fcfaf7;
  --body-bg:#e5e0d8;
  --text:#3a3618;
  --card:#fff;
  --danger:#8b2d2d;
  --ok:#2d5a27;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Poppins;
  background:var(--body-bg);
  color:var(--text);
}
.topbar{position:sticky;top:0;z-index:1000;overflow:hidden;}
.topbar::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('imagens/gravata-cabecalho.jpg') center/cover;
}
.logo-bar{
  position:relative;
  display:flex;
  justify-content:center;
  padding:18px 0;
  background:rgba(252,250,247,.75);
}
.logo img{width:140px;}
.bottom-bar{
  background:#fff;
  height:48px;
  display:flex;
  align-items:center;
  padding:0 12px;
}
.voltar{
  border:1px solid #3a3618;
  border-radius:20px;
  padding:6px 12px;
  cursor:pointer;
}
.container{padding:12px;max-width:1000px;margin:auto;}
.busca{
  width:100%;
  padding:12px;
  border-radius:50px;
  border:1px solid #ccc;
  margin:10px 0;
}
.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  margin-bottom:15px;
}
.img{
  width:160px;height:160px;object-fit:cover;border-radius:12px;
  display:block;margin:0 auto 10px;
}
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:5px;
}
.actions{display:flex;gap:10px;margin-top:10px;}
button{
  padding:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}
.save{background:var(--ok);color:#fff;flex:1}
.del{background:var(--danger);color:#fff;flex:1}
.new{width:100%;background:#3a3618;color:#fff;margin:10px 0;}
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 15px;
  border-radius:20px;
  display:none;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo-bar">
    <div class="logo">
      <img src="logo.png">
    </div>
  </div>

  <div class="bottom-bar">
    <button class="voltar" onclick="location.href='index.html'">← Catálogo</button>
  </div>
</div>

<div class="container">

<button class="new" onclick="abrirModal()">+ Nova ID</button>

<input class="busca" placeholder="Buscar ID..." oninput="filtrar(this.value)">

<div id="lista"></div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;">
  <div style="background:#fff;padding:15px;border-radius:15px;width:90%;max-width:400px;">
    <h4>Nova ID</h4>

    <input id="n_nome" placeholder="Nome">
    <input id="n_qtd" type="number" placeholder="Quantidade">
    <input id="n_camadas" placeholder="Camadas">
    <input id="n_cores" placeholder="Cores">
    <input id="n_padrao" placeholder="Padrão">

    <input type="file" id="n_imagem">

    <br><br>

    <button class="save" onclick="criar()">Criar</button>
    <button class="del" onclick="fecharModal()">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const URL = "COLE_AQUI_O_SEU_LINK_DO_DEPLOY_GERADO_PELO_GOOGLE";
const CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv";

let dados = []; 
let filtro = "";

// ===== 1. FUNÇÕES DE UTILIDADE E INTERFACE =====
function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

function abrirModal() {
  document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}

function filtrar(v) {
  filtro = v;
  render();
}

function getImg(m) {
  if (!m) return "imagens/sem-foto.jpg";
  if (m.startsWith("http")) return m;
  return `https://drive.google.com/uc?export=view&id=${m}`;
}

// ===== 2. PROCESSAMENTO DE DADOS (CSV) =====
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  return lines.map(line => {
    const cells = line.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g) || [];
    return cells.map(c => c.replace(/^"|"$/g, '').trim());
  });
}

// ===== 3. FUNÇÃO DE RENDERIZAÇÃO (Onde estava o erro) =====
function render() {
  const el = document.getElementById("lista");
  el.innerHTML = "";

  const itensFiltrados = dados.filter(d => 
    d.nome.toLowerCase().includes(filtro.toLowerCase())
  );

  itensFiltrados.forEach(d => {
    // Cria um ID seguro para os campos baseado no nome (remove espaços e acentos)
    const idSeguro = d.nome.replace(/\W/g, "_");

    el.innerHTML += `
    <div class="card">
      <img src="${getImg(d.midia)}" class="img" onerror="this.src='imagens/sem-foto.jpg'">

      <label>Nome:</label>
      <input id="nome_${idSeguro}" value="${d.nome}" readonly style="background:#f0f0f0">
      
      <label>Qtd:</label>
      <input id="qtd_${idSeguro}" value="${d.qtd}" type="number">
      
      <label>ID da Mídia (Drive):</label>
      <input id="midia_${idSeguro}" value="${d.midia}">
      
      <label>Camadas:</label>
      <input id="cam_${idSeguro}" value="${d.camadas}">
      
      <label>Cores:</label>
      <input id="cor_${idSeguro}" value="${d.cores}">
      
      <label>Padrão:</label>
      <input id="pad_${idSeguro}" value="${d.padrao}">

      <div class="actions">
        <button class="save" onclick="salvar('${d.nome}')">Salvar Alterações</button>
        <button class="del" onclick="excluir('${d.nome}')">Excluir</button>
      </div>
    </div>`;
  });
}

// ===== 4. CARREGAMENTO INICIAL =====
async function carregar() {
  try {
    const r = await fetch(CSV + "&t=" + Date.now());
    const t = await r.text();
    const linhas = parseCSV(t);

    if (linhas.length > 0) {
      linhas.shift(); // Remove cabeçalho
      dados = linhas.map(l => ({
        nome: l[0] || "",
        camadas: l[1] || "",
        cores: l[2] || "",
        padrao: l[3] || "",
        qtd: l[5] || "0",
        midia: l[6] || ""
      }));
      render();
    }
  } catch (e) {
    console.error("Erro ao carregar CSV:", e);
    toast("Erro ao carregar dados da planilha.");
  }
}

// ===== 5. AÇÕES (COMUNICAÇÃO COM GOOGLE SCRIPT) =====
async function criar() {
  try {
    const nome = document.getElementById("n_nome").value;
    if (!nome) return toast("Nome obrigatório!");

    const file = document.getElementById("n_imagem").files[0];
    let base64 = "", mime = "", fileName = "";

    if (file) {
      base64 = await new Promise(res => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.readAsDataURL(file);
      });
      mime = file.type;
      fileName = file.name;
    }

    const res = await fetch(URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "create",
        nome: nome,
        qtd: document.getElementById("n_qtd").value,
        camadas: document.getElementById("n_camadas").value,
        cores: document.getElementById("n_cores").value,
        padrao: document.getElementById("n_padrao").value,
        imageBase64: base64,
        mimeType: mime,
        fileName: fileName
      })
    });

    const txt = await res.text();
    if (txt.includes("OK")) {
      toast("Criado!");
      fecharModal();
      carregar();
    } else {
      toast("Erro: " + txt);
    }
  } catch (e) {
    toast("Erro na conexão!");
  }
}

async function salvar(nomeOriginal) {
  try {
    const id = nomeOriginal.replace(/\W/g, "_");
    const res = await fetch(URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "update",
        nome: nomeOriginal,
        qtd: document.getElementById("qtd_" + id).value,
        camadas: document.getElementById("cam_" + id).value,
        cores: document.getElementById("cor_" + id).value,
        padrao: document.getElementById("pad_" + id).value,
        midia: document.getElementById("midia_" + id).value
      })
    });
    const txt = await res.text();
    txt.includes("OK") ? toast("Salvo!") : toast("Erro ao salvar");
  } catch (e) {
    toast("Erro de conexão");
  }
}

async function excluir(nome) {
  if (!confirm("Tem certeza que deseja excluir " + nome + "?")) return;
  try {
    const res = await fetch(URL, {
      method: "POST",
      body: new URLSearchParams({ action: "delete", nome: nome })
    });
    const txt = await res.text();
    if (txt.includes("OK")) {
      toast("Excluído!");
      carregar();
    }
  } catch (e) {
    toast("Erro ao excluir");
  }
}

// INICIALIZAÇÃO
carregar();
</script>

</body>
</html>
