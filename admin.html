<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Gravatá Rosas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --header-bg:#fcfaf7;
  --body-bg:#e5e0d8;
  --text:#3a3618;
  --card:#fff;
  --danger:#8b2d2d;
  --ok:#2d5a27;
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--body-bg);
  color:var(--text);
}

/* ===== HEADER IGUAL INDEX ===== */
.topbar{
  padding:30px 0;
  position:sticky;
  top:0;
  z-index:1000;
  background:var(--header-bg);
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 6px 20px rgba(0,0,0,.15);
}

.logo img{
  width:130px;
}

/* BOTÃO VOLTAR */
.voltar{
  position:absolute;
  left:15px;
  top:15px;
  background:#fff;
  border:1px solid #ccc;
  border-radius:20px;
  padding:6px 10px;
  font-size:12px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  padding:15px;
  max-width:1000px;
  margin:auto;
}

/* TABELA MOBILE FRIENDLY */
.card{
  background:var(--card);
  border-radius:15px;
  padding:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:10px;
}

label{
  font-size:11px;
  opacity:.7;
  display:block;
  margin-top:6px;
}

input{
  width:100%;
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
  font-family:Poppins;
  font-size:13px;
}

.row{
  display:flex;
  gap:10px;
}

.col{
  flex:1;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  border:none;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.save{ background:var(--ok); color:#fff; flex:1; }
.del{ background:var(--danger); color:#fff; flex:1; }

.new{
  background:#3a3618;
  color:#fff;
  width:100%;
  margin-bottom:15px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#fff;
  padding:15px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 15px;
  border-radius:20px;
  display:none;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="voltar" onclick="location.href='index.html'">← Catálogo</button>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<div class="container">

<button class="new" onclick="abrirModal()">+ Nova ID</button>

<div id="lista"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h4>Nova ID</h4>

    <input id="n_nome" placeholder="Nome">

    <label>Qtd</label>
    <input id="n_qtd" type="number">

    <label>Camadas</label>
    <input id="n_camadas">

    <label>Cores</label>
    <input id="n_cores">

    <label>Padrão</label>
    <input id="n_padrao">

    <label>Link da imagem</label>
    <input id="n_midia">

    <br><br>
    <button class="save" onclick="criar()">Criar</button>
    <button class="del" onclick="fecharModal()">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
const CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv";

let dados = [];

/* CSV seguro */
function parseCSV(text){
  return text.split("\n").map(r => r.split(","));
}

async function carregar(){
  const r = await fetch(CSV);
  const t = await r.text();
  const linhas = parseCSV(t);

  linhas.shift(); // header

  dados = linhas.map(l => ({
    nome:l[0],
    camadas:l[1],
    cores:l[2],
    padrao:l[3],
    especiais:l[4],
    qtd:l[5],
    midia:l[6]
  }));

  render();
}

function render(){
  const el = document.getElementById("lista");
  el.innerHTML = "";

  dados.forEach(d => {

    let img = d.midia?.startsWith("http")
      ? d.midia
      : `https://drive.google.com/uc?export=view&id=${d.midia}`;

    const id = d.nome.replace(/\W/g,"_");

    el.innerHTML += `
    <div class="card">

      <img src="${img}" class="img" onerror="this.src='imagens/sem-foto.jpg'">

      <label>Nome</label>
      <input id="nome_${id}" value="${d.nome}">

      <div class="row">
        <div class="col">
          <label>Qtd</label>
          <input id="qtd_${id}" value="${d.qtd}">
        </div>
        <div class="col">
          <label>Link da imagem</label>
          <input id="midia_${id}" value="${d.midia}">
        </div>
      </div>

      <label>Camadas</label>
      <input id="cam_${id}" value="${d.camadas}">

      <label>Cores</label>
      <input id="cor_${id}" value="${d.cores}">

      <label>Padrão</label>
      <input id="pad_${id}" value="${d.padrao}">

      <div class="actions">
        <button class="save" onclick="salvar('${d.nome}')">Salvar</button>
        <button class="del" onclick="excluir('${d.nome}')">Excluir</button>
      </div>

    </div>`;
  });
}

async function salvar(nome){

  const id = nome.replace(/\W/g,"_");

  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"update",
      nome,
      qtd:document.getElementById("qtd_"+id).value,
      cores:document.getElementById("cor_"+id).value,
      camadas:document.getElementById("cam_"+id).value,
      padrao:document.getElementById("pad_"+id).value,
      midia:document.getElementById("midia_"+id).value
    })
  });

  toast("Salvo!");
  carregar();
}

async function excluir(nome){

  if(!confirm("Excluir ID?")) return;

  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"delete",
      nome
    })
  });

  toast("Excluído!");
  carregar();
}

async function criar(){

  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"create",
      nome:n_nome.value,
      qtd:n_qtd.value,
      camadas:n_camadas.value,
      cores:n_cores.value,
      padrao:n_padrao.value,
      midia:n_midia.value
    })
  });

  fecharModal();
  toast("Criado!");
  carregar();
}

function abrirModal(){ modal.style.display="flex"; }
function fecharModal(){ modal.style.display="none"; }

function toast(t){
  const x=document.getElementById("toast");
  x.innerText=t;
  x.style.display="block";
  setTimeout(()=>x.style.display="none",2000);
}

carregar();

</script>

</body>
</html>
