<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Gravatá Rosas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --header-bg:#fcfaf7;
  --body-bg:#e5e0d8;
  --text:#3a3618;
  --card:#fff;
  --danger:#8b2d2d;
  --ok:#2d5a27;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Poppins;
  background:var(--body-bg);
  color:var(--text);
}
.topbar{position:sticky;top:0;z-index:1000;overflow:hidden;}
.topbar::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('imagens/gravata-cabecalho.jpg') center/cover;
}
.logo-bar{
  position:relative;
  display:flex;
  justify-content:center;
  padding:18px 0;
  background:rgba(252,250,247,.75);
}
.logo img{width:140px;}
.bottom-bar{
  background:#fff;
  height:48px;
  display:flex;
  align-items:center;
  padding:0 12px;
}
.voltar{
  border:1px solid #3a3618;
  border-radius:20px;
  padding:6px 12px;
  cursor:pointer;
}
.container{padding:12px;max-width:1000px;margin:auto;}
.busca{
  width:100%;
  padding:12px;
  border-radius:50px;
  border:1px solid #ccc;
  margin:10px 0;
}
.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  margin-bottom:15px;
}
.img{
  width:160px;height:160px;object-fit:cover;border-radius:12px;
  display:block;margin:0 auto 10px;
}
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:5px;
}
.actions{display:flex;gap:10px;margin-top:10px;}
button{
  padding:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}
.save{background:var(--ok);color:#fff;flex:1}
.del{background:var(--danger);color:#fff;flex:1}
.new{width:100%;background:#3a3618;color:#fff;margin:10px 0;}
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 15px;
  border-radius:20px;
  display:none;
}
  .btn-voltar {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background-color: #3a3618; /* Cor padrão que estamos usando */
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 20px;
    transition: transform 0.2s;
}

.btn-voltar:hover {
    transform: scale(1.05);
    background-color: #5a5425;
}

.btn-voltar svg {
    width: 16px;
    height: 16px;
}
</style>
</head>

<body>

  <a href="index.html" class="btn-voltar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    Voltar para o Catálogo

</a>
  
<div class="topbar">
  <div class="logo-bar">
    <div class="logo">
      <img src="logo.png">
    </div>
  </div>

  <div class="bottom-bar">
    <button class="voltar" onclick="location.href='index.html'">← Catálogo</button>
  </div>
</div>

<div class="container">

<button class="new" onclick="abrirModal()">+ Nova ID</button>

<input class="busca" placeholder="Buscar ID..." oninput="filtrar(this.value)">

<div id="lista"></div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;">
  <div style="background:#fff;padding:15px;border-radius:15px;width:90%;max-width:400px;">
    <h4>Nova ID</h4>

    <input id="n_nome" placeholder="Nome">
    <input id="n_qtd" type="number" placeholder="Quantidade">
    <input id="n_camadas" placeholder="Camadas">
    <input id="n_cores" placeholder="Cores">
    <input id="n_padrao" placeholder="Padrão">

    <input type="file" id="n_imagem">

    <br><br>

    <button class="save" onclick="criar()">Criar</button>
    <button class="del" onclick="fecharModal()">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
const CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv";

let dados = []; 
let filtro = "";

function getMidiaHTML(m) {
  if (!m || m.trim() === "" || m === "Não inf.") return `<img src="imagens/sem-foto.jpg" class="img">`;
  const id = m.trim();
  const imgUrl = `https://drive.google.com/thumbnail?sz=w600&id=${id}`;
  
  return `<img src="${imgUrl}" class="img" style="width:160px; height:160px; object-fit:cover; border-radius:12px; margin-bottom:10px;" onerror="this.src='imagens/sem-foto.jpg'">`;
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

function abrirModal() { document.getElementById("modal").style.display = "flex"; }
function fecharModal() { document.getElementById("modal").style.display = "none"; }
function filtrar(v) { filtro = v; render(); }

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  return lines.map(line => {
    const cells = line.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g) || [];
    return cells.map(c => c.replace(/^"|"$/g, '').trim());
  });
}

function render() {
  const el = document.getElementById("lista");
  el.innerHTML = "";
  const itensFiltrados = dados.filter(d => d.nome.toLowerCase().includes(filtro.toLowerCase()));
  
  itensFiltrados.forEach(d => {
    const idSeguro = d.nome.replace(/\W/g, "_");
    el.innerHTML += `
    <div class="card">
      ${getMidiaHTML(d.midia)}
      <label>Nome:</label>
      <input id="nome_${idSeguro}" value="${d.nome}" readonly style="background:#f0f0f0">
      <label>Qtd:</label>
      <input id="qtd_${idSeguro}" value="${d.qtd}" type="number">
      <label>ID da Mídia (Google Drive):</label>
      <input id="midia_${idSeguro}" value="${d.midia}">
      <label>Camadas:</label>
      <input id="cam_${idSeguro}" value="${d.camadas}">
      <label>Cores:</label>
      <input id="cor_${idSeguro}" value="${d.cores}">
      <label>Padrão:</label>
      <input id="pad_${idSeguro}" value="${d.padrao}">
      <div class="actions">
        <button class="save" onclick="salvar('${d.nome}')">Salvar</button>
        <button class="del" onclick="excluir('${d.nome}')">Excluir</button>
      </div>
    </div>`;
  });
}

async function carregar() {
  try {
    const r = await fetch(CSV + "&t=" + Date.now());
    const t = await r.text();
    const linhas = parseCSV(t);
    if (linhas.length > 1) {
      linhas.shift(); 
      dados = linhas.map(l => ({
        nome: l[0] || "",
        camadas: l[1] || "",
        cores: l[2] || "",
        padrao: l[3] || "",
        qtd: l[5] || "0",
        midia: l[6] || ""
      }));
      render();
    }
  } catch (e) { toast("Erro ao carregar dados."); }
}

async function salvar(nomeOriginal) {
  try {
    const id = nomeOriginal.replace(/\W/g, "_");
    const res = await fetch(URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "update", nome: nomeOriginal,
        qtd: document.getElementById("qtd_" + id).value,
        camadas: document.getElementById("cam_" + id).value,
        cores: document.getElementById("cor_" + id).value,
        padrao: document.getElementById("pad_" + id).value,
        midia: document.getElementById("midia_" + id).value
      })
    });
    const txt = await res.text();
    txt.includes("OK") ? toast("Salvo!") : toast("Erro ao salvar");
  } catch (e) { toast("Erro de conexão"); }
}

async function excluir(nome) {
  if (!confirm("Excluir " + nome + "?")) return;
  try {
    const res = await fetch(URL, {
      method: "POST",
      body: new URLSearchParams({ action: "delete", nome })
    });
    const txt = await res.text();
    if (txt.includes("OK")) { toast("Excluído!"); carregar(); }
  } catch (e) { toast("Erro ao excluir"); }
}

carregar();
</script>
</body>
</html>
