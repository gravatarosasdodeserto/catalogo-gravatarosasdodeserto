<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Gravatá Rosas do Deserto</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --body-bg: #e9e4dd;
        --card-white: #ffffff;
        --text-main: #2e2a15;
        --accent: #a08c6b;
        --accent-dark: #7d6e53;
        --danger: #8b2d2d;
        --ok: #2d5a27;
        --shadow-sm: 0 4px 12px rgba(58, 54, 24, 0.06);
        --shadow-md: 0 8px 24px rgba(58, 54, 24, 0.08);
        --shadow-lg: 0 12px 40px rgba(58, 54, 24, 0.12);
    }

    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: var(--body-bg);
        color: var(--text-main);
        margin: 0;
        padding: 20px;
    }

   .container {
        max-width: 900px;
        margin: 0 auto;
    }

   .header {
        background: white;
        padding: 20px;
        border-radius: 20px;
        box-shadow: var(--shadow-md);
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

   .header h1 {
        margin: 0;
        font-size: 24px;
    }

   .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        transition: all 0.3s ease;
    }

   .btn-primary {
        background: linear-gradient(135deg, var(--text-main), var(--accent-dark));
        color: white;
    }

   .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
    }

   .btn-danger {
        background: var(--danger);
        color: white;
    }

   .btn-success {
        background: var(--ok);
        color: white;
    }

   .tabela {
        background: white;
        border-radius: 20px;
        box-shadow: var(--shadow-md);
        overflow: hidden;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th {
        background: var(--accent);
        color: white;
        padding: 14px;
        text-align: left;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    td {
        padding: 12px 14px;
        border-bottom: 1px solid #f0f0f0;
        font-size: 13px;
    }

    tr:hover {
        background: #fcfaf7;
    }

   .acoes {
        display: flex;
        gap: 8px;
    }

   .acoes button {
        padding: 6px 12px;
        font-size: 11px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
    }

   .btn-editar {
        background: var(--accent);
        color: white;
    }

   .btn-excluir {
        background: var(--danger);
        color: white;
    }

   .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(8px);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

   .modal.active {
        display: flex;
    }

   .modal-content {
        background: white;
        padding: 30px;
        border-radius: 24px;
        width: 100%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

   .modal-content h2 {
        margin: 0 0 20px 0;
        font-size: 22px;
    }

   .form-group {
        margin-bottom: 16px;
    }

   .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }

   .form-group input,.form-group select {
        width: 100%;
        padding: 12px;
        border: 1.5px solid #e5e0d8;
        border-radius: 12px;
        font-family: inherit;
        font-size: 14px;
        transition: all 0.3s ease;
    }

   .form-group input:focus,.form-group select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(160, 140, 107, 0.1);
    }

   .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
    }

   .form-actions button {
        flex: 1;
        padding: 14px;
    }

   .tag-especial {
        display: inline-block;
        background: var(--accent);
        color: white;
        padding: 2px 8px;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 600;
        margin-right: 4px;
    }

   .loading {
        text-align: center;
        padding: 60px;
        color: rgba(58,54,24,0.5);
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Gerenciar Estoque</h1>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-primary" onclick="abrirModal()">+ Nova ID</button>
            <button class="btn" onclick="sair()" style="background:#f5f3f0;">Sair</button>
        </div>
    </div>

    <div class="tabela">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Camadas</th>
                    <th>Cores</th>
                    <th>Padrão</th>
                    <th>Especiais</th>
                    <th>Qtd</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                <tr><td colspan="7" class="loading">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal" id="modalEdicao">
    <div class="modal-content">
        <h2 id="tituloModal">Nova ID</h2>

        <div class="form-group">
            <label>Nome da ID</label>
            <input type="text" id="inputNome" placeholder="Ex: VD-001">
        </div>

        <div class="form-group">
            <label>Camadas</label>
            <select id="inputCamadas">
                <option value="">Selecione</option>
                <option>Simples</option>
                <option>Dobrada</option>
                <option>Tripla</option>
            </select>
        </div>

        <div class="form-group">
            <label>Cores</label>
            <select id="inputCores">
                <option value="">Selecione</option>
                <option>Branca</option>
                <option>Rosa</option>
                <option>Vermelha</option>
                <option>Amarela</option>
                <option>Roxa</option>
                <option>Laranja</option>
                <option>Mesclada</option>
            </select>
        </div>

        <div class="form-group">
            <label>Padrão</label>
            <select id="inputPadrao">
                <option value="">Selecione</option>
                <option>Sólida</option>
                <option>Degradê</option>
                <option>Mesclada</option>
                <option>Bicolor</option>
            </select>
        </div>

        <div class="form-group">
            <label>Especiais</label>
            <div id="containerEspeciais" style="display:flex; flex-wrap:wrap; gap:8px; padding:12px; border:1.5px solid #e5e0d8; border-radius:14px; background:#fcfaf7;">
                <!-- Checkboxes gerados via JS -->
            </div>
        </div>

        <div class="form-group">
            <label>Quantidade</label>
            <input type="number" id="inputQtd" min="0" value="0">
        </div>

        <div class="form-group">
            <label>ID da Imagem (Google Drive)</label>
            <input type="text" id="inputMidia" placeholder="Cole o ID aqui">
        </div>

        <div class="form-actions">
            <button class="btn btn-success" onclick="salvar()">Salvar</button>
            <button class="btn" onclick="fecharModal()" style="background:#f5f3f0;">Cancelar</button>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = "COLE_AQUI_URL_DO_SEU_GOOGLE_APPS_SCRIPT";
let estoque = {};
let editando = null;
let plantaEditando = {};

// Lista de todas as especialidades possíveis
const todasEspeciais = ['Variegata', 'Black', 'Flor Dobrada', 'Multi-pétalas', 'Gigante', 'Miniatura', 'Perfumada'];

if (sessionStorage.getItem("adminLogado")!== "true") {
    window.location.href = "index.html";
}

function sair() {
    sessionStorage.removeItem("adminLogado");
    window.location.href = "index.html";
}

async function carregarDados() {
    try {
        const resp = await fetch(SCRIPT_URL + "?action=get");
        estoque = await resp.json();
        renderizarTabela();
    } catch (e) {
        alert("Erro ao carregar dados: " + e);
    }
}

function renderizarTabela() {
    const tbody = document.getElementById("corpoTabela");
    tbody.innerHTML = "";

    const nomes = Object.keys(estoque).sort((a, b) => a.localeCompare(b, 'pt-BR'));

    if (nomes.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:rgba(58,54,24,0.4);">Nenhuma ID cadastrada</td></tr>`;
        return;
    }

    nomes.forEach(nome => {
        const d = estoque[nome];
        const especiaisHTML = d.especiais && d.especiais.length > 0
           ? d.especiais.map(t => `<span class="tag-especial">${t}</span>`).join('')
            : '-';

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><strong>${nome}</strong></td>
            <td>${d.camadas || '-'}</td>
            <td>${d.cores || '-'}</td>
            <td>${d.padrao || '-'}</td>
            <td>${especiaisHTML}</td>
            <td><strong style="color:${d.qtd > 0? 'var(--ok)' : 'var(--danger)'}">${d.qtd}</strong></td>
            <td>
                <div class="acoes">
                    <button class="btn-editar" onclick="abrirEdicao('${nome}')">Editar</button>
                    <button class="btn-excluir" onclick="excluir('${nome}')">Excluir</button>
                </div>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function gerarCheckboxesEspeciais(selecionadas = []) {
    const container = document.getElementById('containerEspeciais');
    if (!container) return;

    container.innerHTML = '';
    todasEspeciais.forEach(tag => {
        const checked = selecionadas.includes(tag)? 'checked' : '';
        container.innerHTML += `
            <label style="display:flex; align-items:center; gap:6px; font-size:13px; font-weight:500; cursor:pointer; background:white; padding:6px 12px; border-radius:20px; border:1.5px solid #e5e0d8;">
                <input type="checkbox" value="${tag}" ${checked} onchange="atualizarEspeciais()" style="width:16px; height:16px; accent-color:var(--accent); cursor:pointer;">
                ${tag}
            </label>`;
    });
}

function atualizarEspeciais() {
    const checkboxes = document.querySelectorAll('#containerEspeciais input:checked');
    const selecionadas = Array.from(checkboxes).map(cb => cb.value);
    plantaEditando.especiais = selecionadas;
}

function abrirModal() {
    editando = null;
    plantaEditando = { especiais: [] };
    document.getElementById('tituloModal').innerText = 'Nova ID';
    document.getElementById('inputNome').value = '';
    document.getElementById('inputNome').disabled = false;
    document.getElementById('inputCamadas').value = '';
    document.getElementById('inputCores').value = '';
    document.getElementById('inputPadrao').value = '';
    document.getElementById('inputQtd').value = '0';
    document.getElementById('inputMidia').value = '';
    gerarCheckboxesEspeciais([]);
    document.getElementById('modalEdicao').classList.add('active');
}

function abrirEdicao(nome) {
    editando = nome;
    plantaEditando = {...estoque[nome]};
    document.getElementById('tituloModal').innerText = 'Editar ID';
    document.getElementById('inputNome').value = nome;
    document.getElementById('inputNome').disabled = true;
    document.getElementById('inputCamadas').value = plantaEditando.camadas || '';
    document.getElementById('inputCores').value = plantaEditando.cores || '';
    document.getElementById('inputPadrao').value = plantaEditando.padrao || '';
    document.getElementById('inputQtd').value = plantaEditando.qtd || 0;
    document.getElementById('inputMidia').value = plantaEditando.midia || '';
    gerarCheckboxesEspeciais(plantaEditando.especiais || []);
    document.getElementById('modalEdicao').classList.add('active');
}

function fecharModal() {
    document.getElementById('modalEdicao').classList.remove('active');
}

async function salvar() {
    const nome = document.getElementById('inputNome').value.trim();
    if (!nome) {
        alert('Preencha o nome da ID');
        return;
    }

    const dados = {
        nome: nome,
        camadas: document.getElementById('inputCamadas').value,
        cores: document.getElementById('inputCores').value,
        padrao: document.getElementById('inputPadrao').value,
        especiais: plantaEditando.especiais || [],
        qtd: parseInt(document.getElementById('inputQtd').value) || 0,
        midia: document.getElementById('inputMidia').value.trim()
    };

    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: editando? 'update' : 'create',
                data: dados
            })
        });
        fecharModal();
        carregarDados();
    } catch (e) {
        alert('Erro ao salvar: ' + e);
    }
}

async function excluir(nome) {
    if (!confirm(`Tem certeza que deseja excluir ${nome}?`)) return;

    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'delete',
                data: { nome: nome }
            })
        });
        carregarDados();
    } catch (e) {
        alert('Erro ao excluir: ' + e);
    }
}

carregarDados();
</script>
</body>
</html>
