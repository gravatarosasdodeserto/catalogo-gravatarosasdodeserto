<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Gravatá Rosas</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #f8f5f0; margin: 0; padding: 20px; }
.container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 6px 14px rgba(0,0,0,0.1); }
h1 { color: #3a3618; margin-top: 0; }
.login, .painel { display: none; }
.ativo { display: block; }
input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 2px solid #3a3618; font-family: 'Poppins'; }
button { background: #434019; color: white; font-weight: 600; cursor: pointer; border: none; }
button:active { transform: translateY(1px); }
button.secundario { background: #999; }
button:disabled { background: #ccc; cursor: not-allowed; }
label { font-weight: 500; font-size: 14px; color: #3a3618; display: block; margin-top: 12px; }
#preview { display: flex; gap: 10px; margin: 10px 0; }
#preview img, #preview video { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; background: #eee; }
.tabela { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
.tabela th, .tabela td { border: 1px solid #ddd; padding: 8px; text-align: left; }
.tabela th { background: #f3efe9; }
.erro { color: #c00; font-size: 13px; }
.ok { color: #080; font-size: 13px; }
.aviso { background: #fff3cd; border: 1px solid #ffc107; padding: 10px; border-radius: 8px; font-size: 13px; margin: 10px 0; color: #664d03; }
</style>
</head>
<body>

<div class="container">
  <div class="login ativo" id="telaLogin">
    <h1>Login Admin</h1>
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
    <p id="erroLogin" class="erro"></p>
  </div>

  <div class="painel" id="telaPainel">
    <h1>Cadastrar Nova ID</h1>
    <button onclick="sair()" style="background:#999; margin-bottom:20px;">Sair</button>
    
    <div class="aviso">⚠️ <strong>Limite:</strong> Foto até 800KB e Vídeo até 1MB. Salva direto no Firebase.</div>
    
    <label>Nome da ID *</label>
    <input type="text" id="nomeId" placeholder="Ex: ROSA VERMELHA">

    <label>Estoque *</label>
    <input type="number" id="estoque" value="0" min="0">

    <label>Foto JPG/PNG - será redimensionada pra 800x800 *</label>
    <input type="file" id="foto" accept="image/jpeg,image/png">
    
    <label>Vídeo MP4 800x800 *</label>
    <input type="file" id="video" accept="video/mp4">

    <div id="preview"></div>
    <p id="msg" class="erro"></p>

    <button id="btnSalvar" onclick="salvarFirebase()">Salvar no Catálogo</button>

    <h2>IDs Cadastradas</h2>
    <table class="tabela" id="tabelaItens">
      <thead><tr><th>ID</th><th>Estoque</th><th>Status</th></tr></thead>
      <tbody id="listaIds"></tbody>
    </table>
    <p class="ok">Catálogo atualiza automaticamente no site.</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyACY4dN_xmN06571jZyY34Oz_xXkvdOdtk",
  authDomain: "gravata-rosas.firebaseapp.com",
  projectId: "gravata-rosas",
  storageBucket: "gravata-rosas.firebasestorage.app",
  messagingSenderId: "72580333369",
  appId: "1:72580333369:web:5f17bdc737bd3401fd72e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const USUARIO_CORRETO = "admin";
const SENHA_CORRETA = "gravata123";

function fazerLogin(){
  let u = document.getElementById('usuario').value;
  let s = document.getElementById('senha').value;
  if(u === USUARIO_CORRETO && s === SENHA_CORRETA){
    document.getElementById('telaLogin').classList.remove('ativo');
    document.getElementById('telaPainel').classList.add('ativo');
    document.getElementById('erroLogin').innerText = "";
    carregarLista();
  } else {
    document.getElementById('erroLogin').innerText = "Usuário ou senha incorretos";
  }
}

function sair(){
  document.getElementById('telaPainel').classList.remove('ativo');
  document.getElementById('telaLogin').classList.add('ativo');
}

async function redimensionarImagem(file, size = 800){
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      canvas.toBlob(resolve, 'image/jpeg', 0.8);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function toBase64(file){
  return new Promise((resolve, reject) => {
    if(file.size > 1048576) return reject('Arquivo maior que 1MB');
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

window.salvarFirebase = async function(){
  const msg = document.getElementById('msg');
  const btn = document.getElementById('btnSalvar');
  msg.innerText = "";
  msg.className = "erro";
  
  const nome = document.getElementById('nomeId').value.trim().toUpperCase();
  const estoque = parseInt(document.getElementById('estoque').value) || 0;
  const fotoFile = document.getElementById('foto').files[0];
  const videoFile = document.getElementById('video').files[0];

  if(!nome || !fotoFile || !videoFile) return msg.innerText = "Preencha todos os campos *";
  if(fotoFile.size > 1048576) return msg.innerText = "Foto muito grande! Máx 1MB";
  if(videoFile.size > 1048576) return msg.innerText = "Vídeo muito grande! Máx 1MB";
  
  btn.disabled = true;
  msg.className = "ok";
  msg.innerText = "Processando imagem...";

  try {
    const fotoBlob = await redimensionarImagem(fotoFile, 800);
    msg.innerText = "Convertendo foto...";
    const fotoBase64 = await toBase64(fotoBlob);
    
    msg.innerText = "Convertendo vídeo...";
    const videoBase64 = await toBase64(videoFile);
    
    msg.innerText = "Salvando no banco...";
    await addDoc(collection(db, "catalogo"), {
      nome: nome,
      estoque: estoque,
      fotoBase64: fotoBase64,
      videoBase64: videoBase64,
      criado: Date.now()
    });

    msg.className = "ok";
    msg.innerText = "Salvo! Catálogo atualizado.";
    document.getElementById('nomeId').value = "";
    document.getElementById('estoque').value = "0";
    document.getElementById('foto').value = "";
    document.getElementById('video').value = "";
    document.getElementById('preview').innerHTML = "";
    carregarLista();
    
  } catch (error) {
    msg.className = "erro";
    msg.innerText = "Erro: " + error.message;
  }
  
  btn.disabled = false;
}

async function carregarLista(){
  const lista = document.getElementById('listaIds');
  lista.innerHTML = '<tr><td colspan="3">Carregando...</td></tr>';
  try{
    const snap = await getDocs(collection(db, "catalogo"));
    lista.innerHTML = '';
    snap.forEach(doc => {
      const d = doc.data();
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${d.nome}</td><td>${d.estoque}</td><td class="ok">✓ Online</td>`;
      lista.appendChild(tr);
    });
    if(snap.empty) lista.innerHTML = '<tr><td colspan="3">Nenhuma ID cadastrada</td></tr>';
  }catch(e){
    lista.innerHTML = `<tr><td colspan="3" class="erro">Erro: ${e.message}</td></tr>`;
  }
}

// Preview
document.getElementById('foto').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(file) {
    if(file.size > 1048576){
      msg.innerText = "Foto muito grande! Máx 1MB";
      e.target.value = "";
      return;
    }
    document.getElementById('preview').innerHTML = `<img src="${URL.createObjectURL(file)}">`;
  }
});
document.getElementById('video').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(file) {
    if(file.size > 1048576){
      msg.innerText = "Vídeo muito grande! Máx 1MB";
      e.target.value = "";
      return;
    }
    const preview = document.getElementById('preview');
    if(!preview.querySelector('img')) preview.innerHTML = '';
    preview.innerHTML += `<video src="${URL.createObjectURL(file)}" muted loop></video>`;
  }
});

window.fazerLogin = fazerLogin;
window.sair = sair;
</script>

</body>
</html>
