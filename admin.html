<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Gravatá Rosas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --header-bg:#fcfaf7;
  --body-bg:#e5e0d8;
  --text:#3a3618;
  --card:#fff;
  --danger:#8b2d2d;
  --ok:#2d5a27;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Poppins;
  background:var(--body-bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ================= HEADER IGUAL INDEX ================= */
.topbar{
  position:sticky;
  top:0;
  z-index:1000;
  overflow:hidden;
}

/* imagem de fundo */
.topbar::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url('imagens/gravata-cabecalho.jpg');
  background-size:cover;
  background-position:center;
  z-index:0;
}

/* faixa branca do logo */
.logo-bar{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:35px 0;
  background:rgba(252,250,247,0.75);
  z-index:2;
}

.logo img{
  width:150px;
  filter:drop-shadow(0 4px 15px rgba(0,0,0,.4));
}

/* barra inferior branca (tipo index filtros) */
.bottom-bar{
  position:relative;
  z-index:2;
  background:#fff;
  height:52px;
  display:flex;
  align-items:center;
  padding:0 12px;
  border-top:1px solid rgba(0,0,0,.08);
}

/* botão voltar dentro da barra */
.voltar{
  background:#fff;
  border:1px solid #3a3618;
  border-radius:20px;
  padding:6px 12px;
  font-size:12px;
  cursor:pointer;
}

/* ================= CONTAINER ================= */
.container{
  padding:15px;
  max-width:1000px;
  margin:auto;
}

/* BUSCA */
.busca{
  width:100%;
  padding:12px;
  border-radius:50px;
  border:1px solid #ccc;
  margin:12px 0;
  text-align:center;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:15px;
  padding:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

/* imagem maior e central */
.img{
  width:160px;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  display:block;
  margin:0 auto 10px;
}

/* labels */
label{
  font-size:11px;
  opacity:.7;
  display:block;
  margin-top:6px;
}

/* inputs sempre controlados */
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:13px;
}

/* evita overflow em linha */
.row{
  display:flex;
  gap:10px;
}
.col{flex:1}

/* botões */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

button{
  border:none;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}

.save{background:var(--ok);color:#fff;flex:1}
.del{background:var(--danger);color:#fff;flex:1}

/* modal */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.modal-content{
  background:#fff;
  padding:15px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

/* toast */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#000;
  color:#fff;
  padding:10px 15px;
  border-radius:20px;
  display:none;
  z-index:3000;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">

  <div class="logo-bar">
    <div class="logo">
      <img src="logo.png">
    </div>
  </div>

  <div class="bottom-bar">
    <button class="voltar" onclick="location.href='index.html'">← Catálogo</button>
  </div>

</div>

<!-- CONTEÚDO -->
<div class="container">

<button class="save" style="width:100%;margin-bottom:10px;background:#3a3618" onclick="abrirModal()">+ Nova ID</button>

<input class="busca" placeholder="Buscar ID..." oninput="filtrar(this.value)">

<div id="lista"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h4>Nova ID</h4>

    <input id="n_nome" placeholder="Nome">

    <label>Qtd</label>
    <input id="n_qtd" type="number">

    <label>Camadas</label>
    <input id="n_camadas">

    <label>Cores</label>
    <input id="n_cores">

    <label>Padrão</label>
    <input id="n_padrao">

    <label>Link da imagem</label>
    <input id="n_midia">

    <br><br>

    <button class="save" onclick="criar()">Criar</button>
    <button class="del" onclick="fecharModal()">Fechar</button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const URL="https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv";

let dados=[];
let filtro="";

function parseCSV(t){
  return t.split("\n").map(r=>r.split(","));
}

async function carregar(){
  const r=await fetch(CSV);
  const t=await r.text();
  const l=parseCSV(t);
  l.shift();

  dados=l.map(x=>({
    nome:x[0],
    camadas:x[1],
    cores:x[2],
    padrao:x[3],
    qtd:x[5],
    midia:x[6]
  }));

  render();
}

function render(){
  const el=document.getElementById("lista");
  el.innerHTML="";

  dados
  .filter(d=>d.nome.toLowerCase().includes(filtro.toLowerCase()))
  .forEach(d=>{

    const id=d.nome.replace(/\W/g,"_");

    let img=d.midia?.startsWith("http")
      ? d.midia
      : `https://drive.google.com/uc?export=view&id=${d.midia}`;

    el.innerHTML+=`
    <div class="card">

      <img src="${img}" class="img" onerror="this.src='imagens/sem-foto.jpg'">

      <label>Nome</label>
      <input id="nome_${id}" value="${d.nome}">

      <label>Qtd</label>
      <input id="qtd_${id}" value="${d.qtd}">

      <label>Link da imagem</label>
      <input id="midia_${id}" value="${d.midia}">

      <label>Camadas</label>
      <input id="cam_${id}" value="${d.camadas}">

      <label>Cores</label>
      <input id="cor_${id}" value="${d.cores}">

      <label>Padrão</label>
      <input id="pad_${id}" value="${d.padrao}">

      <div class="actions">
        <button class="save" onclick="salvar('${d.nome}')">Salvar</button>
        <button class="del" onclick="excluir('${d.nome}')">Excluir</button>
      </div>

    </div>`;
  });
}

function filtrar(v){
  filtro=v;
  render();
}

async function salvar(nome){
  const id=nome.replace(/\W/g,"_");

  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"update",
      nome,
      qtd:document.getElementById("qtd_"+id).value,
      cores:document.getElementById("cor_"+id).value,
      camadas:document.getElementById("cam_"+id).value,
      padrao:document.getElementById("pad_"+id).value,
      midia:document.getElementById("midia_"+id).value
    })
  });

  toast("Salvo!");
  carregar();
}

async function excluir(nome){
  if(!confirm("Excluir?")) return;

  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({action:"delete",nome})
  });

  toast("Excluído!");
  carregar();
}

async function criar(){
  await fetch(URL,{
    method:"POST",
    body:new URLSearchParams({
      action:"create",
      nome:n_nome.value,
      qtd:n_qtd.value,
      camadas:n_camadas.value,
      cores:n_cores.value,
      padrao:n_padrao.value,
      midia:n_midia.value
    })
  });

  fecharModal();
  toast("Criado!");
  carregar();
}

function abrirModal(){modal.style.display="flex"}
function fecharModal(){modal.style.display="none"}

function toast(t){
  const x=document.getElementById("toast");
  x.innerText=t;
  x.style.display="block";
  setTimeout(()=>x.style.display="none",2000);
}

carregar();

</script>

</body>
</html>
