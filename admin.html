<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin v2 | Gravatá Rosas do Deserto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e2a15;
            --accent: #a08c6b;
            --accent-light: #e9e4dd;
            --danger: #8b2d2d;
            --success: #2d5a27;
            --white: #ffffff;
            --shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--accent-light);
            color: var(--primary);
            margin: 0;
            padding-bottom: 40px;
        }

        /* HEADER */
        .header {
            height: 180px;
            background: url('imagens/gravata-cabecalho.jpg') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: var(--shadow);
        }
        .header::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(255,255,255,0.4); backdrop-filter: blur(4px);
        }
        .logo { z-index: 10; width: 200px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2)); cursor: pointer; }

        /* NAV */
        .nav-bar {
            sticky: top; position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 15px; display: flex; justify-content: center;
        }
        .btn-exit {
            background: var(--primary); color: white; border-radius: 50px;
            padding: 10px 25px; text-decoration: none; font-size: 12px; font-weight: 600;
        }

        /* CONTENT */
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        .btn-new {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; font-weight: 700; font-size: 16px; cursor: pointer;
            margin-bottom: 20px; transition: 0.3s;
        }

        .search-box {
            width: 100%; padding: 15px; border-radius: 50px; border: 2px solid #ddd;
            margin-bottom: 30px; outline: none; font-family: inherit; text-align: center;
        }

        /* GRID & CARDS */
        #lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .card {
            background: var(--white); border-radius: 20px; padding: 15px;
            box-shadow: var(--shadow); transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }

        .img-box {
            width: 100%; aspect-ratio: 1/1; border-radius: 15px;
            background: #f0f0f0; overflow: hidden; position: relative; margin-bottom: 15px;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* UPLOAD TRIGGER */
        .upload-trigger {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(0,0,0,0.03);
            border: 2px dashed var(--accent); border-radius: 15px; cursor: pointer;
        }
        .upload-trigger svg { width: 40px; color: var(--accent); margin-bottom: 8px; }

        /* INPUTS */
        .form-group { margin-bottom: 12px; }
        label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
        input, select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;
            font-family: inherit; font-size: 14px;
        }

        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-save { flex: 2; background: var(--success); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; display: none; }
        .btn-del { flex: 1; background: #eee; color: var(--danger); border: none; padding: 10px; border-radius: 8px; font-weight: 600; }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 400px; border-radius: 25px;
            padding: 25px; max-height: 90vh; overflow-y: auto;
        }

        .loading-overlay {
            position: absolute; inset: 0; background: rgba(255,255,255,0.8);
            display: none; align-items: center; justify-content: center; font-weight: 600;
        }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 25px;
            border-radius: 50px; z-index: 2000; display: none; font-size: 13px;
        }

        .nao-salvo { border: 2px solid orange !important; }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.png" class="logo" onclick="location.href='index.html'">
    </header>

    <nav class="nav-bar">
        <a href="index.html" class="btn-exit">Sair do Painel</a>
    </nav>

    <main class="container">
        <button class="btn-new" onclick="openModal()">+ ADICIONAR NOVA ID</button>
        <input type="text" class="search-box" placeholder="Pesquisar rosa..." oninput="filtrar(this.value)">
        
        <div id="lista">
            </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Nova Rosa</h3>
            
            <div class="img-box" id="dropzone_new">
                <input type="file" id="file_new" hidden accept="image/*" onchange="handleUpload(this, 'new')">
                <div class="upload-trigger" onclick="document.getElementById('file_new').click()" id="trigger_new">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span>Selecionar Foto</span>
                </div>
                <img id="preview_new" style="display:none">
                <div class="loading-overlay" id="load_new">Enviando...</div>
            </div>

            <input type="hidden" id="n_midia">
            <div class="form-group"><label>Nome da ID</label><input id="n_nome"></div>
            <div class="form-group"><label>Estoque</label><input type="number" id="n_qtd" value="0"></div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div class="form-group"><label>Camadas</label><select id="n_camadas"></select></div>
                <div class="form-group"><label>Cores</label><select id="n_cores"></select></div>
            </div>
            
            <div class="form-group"><label>Padrão</label><select id="n_padrao"></select></div>

            <div class="card-actions">
                <button class="btn-save" style="display:block; background:var(--primary)" onclick="criarID()">CRIAR AGORA</button>
                <button class="btn-del" onclick="closeModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
        let DADOS_LOCAIS = [];

        // Segurança
        if (sessionStorage.getItem("adminLogado") !== "true") {
            const pass = prompt("Senha de acesso:");
            if (btoa(pass) === "MTQwNTA4bGU=") {
                sessionStorage.setItem("adminLogado", "true");
            } else {
                location.href = "index.html";
            }
        }

        async function carregar() {
            showToast("Sincronizando dados...");
            const r = await fetch(API + "?action=get");
            const json = await r.json();
            DADOS_LOCAIS = Object.keys(json).map(k => ({ nome: k, ...json[k] }));
            render();
            popularSelects();
        }

        function render(filtro = "") {
            const container = document.getElementById("lista");
            container.innerHTML = "";
            
            const filtrados = DADOS_LOCAIS.filter(d => d.nome.toLowerCase().includes(filtro.toLowerCase()));
            
            filtrados.forEach(d => {
                const safeId = d.nome.replace(/\W/g, '_');
                const imgUrl = d.midia ? `https://drive.google.com/thumbnail?sz=w600&id=${d.midia}` : 'imagens/sem-foto.jpg';
                
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div class="img-box">
                        <input type="file" id="file_${safeId}" hidden onchange="handleUpload(this, '${d.nome}')">
                        <img src="${imgUrl}" id="img_${safeId}">
                        <div class="upload-trigger" style="background:transparent; border:none; height:40px; top:auto" onclick="document.getElementById('file_${safeId}').click()">
                            <div style="background:white; padding:5px 10px; border-radius:50px; font-size:10px; box-shadow:0 2px 5px rgba(0,0,0,0.2)">Trocar Foto</div>
                        </div>
                        <div class="loading-overlay" id="load_${safeId}">...</div>
                    </div>
                    <h4 style="margin:5px 0; text-align:center">${d.nome}</h4>
                    <div class="form-group"><label>Estoque</label><input type="number" value="${d.qtd}" oninput="changeHandler('${safeId}')" id="qtd_${safeId}"></div>
                    <div class="card-actions">
                        <button class="btn-save" id="save_${safeId}" onclick="salvarAlteracao('${d.nome}')">SALVAR</button>
                        <button class="btn-del" onclick="excluirID('${d.nome}')">EXCLUIR</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function changeHandler(id) {
            document.getElementById(`save_${id}`).style.display = "block";
            document.getElementById(`save_${id}`).parentElement.parentElement.classList.add('nao-salvo');
        }

        async function handleUpload(input, nomeRosa) {
            const file = input.files[0];
            if (!file) return;

            const safeId = nomeRosa === 'new' ? 'new' : nomeRosa.replace(/\W/g, '_');
            const overlay = document.getElementById(`load_${safeId}`);
            overlay.style.display = "flex";

            try {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    const res = await fetch(API, {
                        method: "POST",
                        body: new URLSearchParams({
                            action: "upload",
                            nome: nomeRosa,
                            data: base64,
                            mimeType: file.type
                        })
                    });
                    const result = await res.json();
                    
                    if (result.success) {
                        if (nomeRosa === 'new') {
                            document.getElementById("n_midia").value = result.id;
                            document.getElementById("preview_new").src = `https://drive.google.com/thumbnail?sz=w600&id=${result.id}`;
                            document.getElementById("preview_new").style.display = "block";
                            document.getElementById("trigger_new").style.display = "none";
                        } else {
                            document.getElementById(`img_${safeId}`).src = `https://drive.google.com/thumbnail?sz=w600&id=${result.id}`;
                            showToast("Foto atualizada!");
                        }
                    }
                    overlay.style.display = "none";
                };
            } catch (e) {
                showToast("Erro no upload");
                overlay.style.display = "none";
            }
        }

        async function criarID() {
            const nome = document.getElementById("n_nome").value;
            if(!nome) return alert("Nome obrigatório");

            showToast("Criando...");
            await fetch(API, {
                method: "POST",
                body: new URLSearchParams({
                    action: "create",
                    nome: nome,
                    qtd: document.getElementById("n_qtd").value,
                    camadas: document.getElementById("n_camadas").value,
                    cores: document.getElementById("n_cores").value,
                    padrao: document.getElementById("n_padrao").value,
                    midia: document.getElementById("n_midia").value
                })
            });
            closeModal();
            carregar();
        }

        async function salvarAlteracao(nome) {
            const safeId = nome.replace(/\W/g, '_');
            showToast("Salvando...");
            await fetch(API, {
                method: "POST",
                body: new URLSearchParams({
                    action: "update",
                    nome: nome,
                    qtd: document.getElementById(`qtd_${safeId}`).value
                })
            });
            carregar();
        }

        async function excluirID(nome) {
            if(!confirm(`Excluir ${nome}?`)) return;
            await fetch(API, {
                method: "POST",
                body: new URLSearchParams({ action: "delete", nome: nome })
            });
            carregar();
        }

        function popularSelects() {
            const campos = { camadas: 'n_camadas', cores: 'n_cores', padrao: 'n_padrao' };
            Object.keys(campos).forEach(c => {
                const unique = [...new Set(DADOS_LOCAIS.map(d => d[c]))].filter(v => v);
                const sel = document.getElementById(campos[c]);
                sel.innerHTML = '<option value="">Selecione...</option>';
                unique.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
            });
        }

        function openModal() { 
            document.getElementById("modal").style.display = "flex";
            document.getElementById("n_midia").value = "";
            document.getElementById("preview_new").style.display = "none";
            document.getElementById("trigger_new").style.display = "flex";
        }
        function closeModal() { document.getElementById("modal").style.display = "none"; }
        function filtrar(v) { render(v); }
        function showToast(m) { 
            const t = document.getElementById("toast"); 
            t.innerText = m; t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        }

        carregar();
    </script>
</body>
</html>
