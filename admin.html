<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Gravatá Rosas</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --header-bg: rgba(252, 250, 247, 0.75);
  --body-bg:#e5e0d8;
  --text:#3a3618;
  --card:#fff;
  --danger:#8b2d2d;
  --ok:#2d5a27;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Poppins;
  background:var(--body-bg);
  color:var(--text);
}

.topbar { position: sticky; top: 0; z-index: 1000; }
.logo-bar {
    position: relative;
    display: flex;
    justify-content: center;
    padding: 30px 0;
    background-color: rgba(255, 255, 255, 0.85); 
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    overflow: hidden;
    border-bottom: 2px solid #ffffff;
    z-index: 1;
}
.logo-bar::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('imagens/gravata-cabecalho.jpg') center/cover;
    z-index: -1;
}
.logo img { width: 130px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }

.bottom-bar {
    background: #ffffff;
    height: 50px;
    display: flex;
    align-items: center;
    padding: 0 15px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
}

.btn-voltar-admin { 
    background: var(--text); 
    color: white; 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    padding: 0 15px; 
    border-radius: 50px; 
    border: none;
    font-weight: 600; 
    font-size: 11px; 
    cursor: pointer; 
    height: 30px;
    text-transform: uppercase;
    text-decoration: none;
}

.container{padding:12px;max-width:1000px;margin:auto;}
.busca{
  width:100%; padding:12px; border-radius:50px;
  border:1.5px solid rgba(0,0,0,0.1); margin:10px 0;
  outline: none; text-align: center;
}
.card{
  background:#fff; border-radius:15px; padding:15px;
  margin-bottom:15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* ESTILO DA FOTO COM LÁPIS */
.img-container {
  position: relative;
  width: 160px;
  height: 160px;
  margin: 0 auto 15px;
}
.img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 12px;
  display: block; border: 2px solid #eee;
}
.edit-badge {
  position: absolute; bottom: 5px; right: 5px;
  background: var(--text); color: white;
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}
.file-input { display: none; }

input{ width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-top:5px; }
label { font-size: 11px; font-weight: 600; color: #888; margin-top: 8px; display: block; }

.actions{display:flex;gap:10px;margin-top:15px;}
button{ padding:10px; border:none; border-radius:12px; cursor:pointer; font-weight:600; }
.save{background:var(--ok);color:#fff;flex:1}
.del{background:var(--danger);color:#fff;flex:1}
.new{width:100%;background:#3a3618;color:#fff;margin:10px 0; border-radius: 50px; height: 45px;}

.toast{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#000; color:#fff; padding:10px 20px; border-radius:50px;
  display:none; z-index: 3000; font-size: 13px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo-bar"><div class="logo"><img src="logo.png"></div></div>
  <div class="bottom-bar">
    <a href="index.html" class="btn-voltar-admin">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Sair do Painel
    </a>
  </div>
</div>

<div class="container">
  <button class="new" onclick="abrirModal()">+ Adicionar Nova ID</button>
  <input class="busca" placeholder="Filtrar por nome da rosa..." oninput="filtrar(this.value)">
  <div id="lista"></div>
</div>

<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:2000;">
  <div style="background:#fff;padding:20px;border-radius:15px;width:90%;max-width:400px;">
    <h4 style="margin-top:0">Nova ID</h4>
    <input id="n_nome" placeholder="Nome da ID">
    <input id="n_qtd" type="number" placeholder="Quantidade em Estoque">
    <input id="n_camadas" placeholder="Camadas (ex: Tripla)">
    <input id="n_cores" placeholder="Cores">
    <input id="n_padrao" placeholder="Padrão">
    <input id="n_midia" placeholder="ID da Imagem (Google Drive)">
    <br><br>
    <div style="display:flex; gap:10px;">
        <button class="save" onclick="criar()">Criar ID</button>
        <button class="del" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
const CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSochNnj1ihxWjFv_87wiDS9-ZakV1LrmdQWfZMAZMGRHf9pqCBXKQpkfQ6BDMlxwYE8E2JkWUVRYOG/pub?gid=1893895788&single=true&output=csv";

let dados = []; 
let filtro = "";

function toast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}

function abrirModal() { document.getElementById("modal").style.display = "flex"; }
function fecharModal() { document.getElementById("modal").style.display = "none"; }
function filtrar(v) { filtro = v; render(); }

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  return lines.map(line => {
    const cells = line.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g) || [];
    return cells.map(c => c.replace(/^"|"$/g, '').trim());
  });
}

function render() {
  const el = document.getElementById("lista");
  el.innerHTML = "";
  const itensFiltrados = dados.filter(d => d.nome.toLowerCase().includes(filtro.toLowerCase()));
  
  itensFiltrados.forEach(d => {
    const idSeguro = d.nome.replace(/\W/g, "_");
    const imgUrl = (!d.midia || d.midia === "Não inf.") ? "imagens/sem-foto.jpg" : `https://drive.google.com/thumbnail?sz=w600&id=${d.midia}`;

    el.innerHTML += `
    <div class="card">
      <div class="img-container">
        <img src="${imgUrl}" class="img" id="img_${idSeguro}" onerror="this.src='imagens/sem-foto.jpg'">
        <label class="edit-badge" for="file_${idSeguro}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
        </label>
        <input type="file" id="file_${idSeguro}" class="file-input" accept="image/*" onchange="uploadFoto(this, '${idSeguro}')">
      </div>

      <label>Nome:</label>
      <input id="nome_${idSeguro}" value="${d.nome}" readonly style="background:#f4f4f4">
      <label>Qtd em Estoque:</label>
      <input id="qtd_${idSeguro}" value="${d.qtd}" type="number">
      <label>ID da Foto (Google Drive):</label>
      <input id="midia_${idSeguro}" value="${d.midia}">
      <label>Camadas:</label>
      <input id="cam_${idSeguro}" value="${d.camadas}">
      <label>Cores:</label>
      <input id="cor_${idSeguro}" value="${d.cores}">
      <label>Padrão:</label>
      <input id="pad_${idSeguro}" value="${d.padrao}">

      <div class="actions">
        <button class="save" onclick="salvar('${d.nome}')">Salvar Alterações</button>
        <button class="del" onclick="excluir('${d.nome}')">Excluir</button>
      </div>
    </div>`;
  });
}

async function uploadFoto(input, idSeguro) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  
  toast("Fazendo upload da foto...");
  
  reader.onload = async function(e) {
    const base64Data = e.target.result.split(",")[1];
    try {
      const res = await fetch(URL, {
        method: "POST",
        body: new URLSearchParams({
          action: "upload",
          nome: file.name,
          mimeType: file.type,
          data: base64Data
        })
      });
      const json = await res.json();
      if (json.id) {
        document.getElementById("midia_" + idSeguro).value = json.id;
        document.getElementById("img_" + idSeguro).src = `https://drive.google.com/thumbnail?sz=w600&id=${json.id}`;
        toast("Foto carregada! Salve para confirmar.");
      }
    } catch (err) { toast("Erro no upload."); }
  };
  reader.readAsDataURL(file);
}

async function carregar() {
  try {
    const r = await fetch(CSV + "&t=" + Date.now());
    const t = await r.text();
    const linhas = parseCSV(t);
    if (linhas.length > 1) {
      linhas.shift(); 
      dados = linhas.map(l => ({
        nome: l[0] || "",
        camadas: l[1] || "",
        cores: l[2] || "",
        padrao: l[3] || "",
        qtd: l[5] || "0",
        midia: l[6] || ""
      }));
      render();
    }
  } catch (e) { toast("Erro ao carregar dados."); }
}

async function salvar(nomeOriginal) {
  try {
    const id = nomeOriginal.replace(/\W/g, "_");
    const res = await fetch(URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "update", nome: nomeOriginal,
        qtd: document.getElementById("qtd_" + id).value,
        camadas: document.getElementById("cam_" + id).value,
        cores: document.getElementById("cor_" + id).value,
        padrao: document.getElementById("pad_" + id).value,
        midia: document.getElementById("midia_" + id).value
      })
    });
    const txt = await res.text();
    txt.includes("OK") ? toast("Alterações salvas!") : toast("Erro ao salvar");
  } catch (e) { toast("Erro de conexão"); }
}

async function excluir(nome) {
  if (!confirm("Excluir " + nome + "?")) return;
  try {
    const res = await fetch(URL, {
      method: "POST",
      body: new URLSearchParams({ action: "delete", nome })
    });
    const txt = await res.text();
    if (txt.includes("OK")) { toast("Excluído!"); carregar(); }
  } catch (e) { toast("Erro ao excluir"); }
}

async function criar() {
    const nome = document.getElementById("n_nome").value;
    if(!nome) return alert("Digite o nome");
    try {
        const res = await fetch(URL, {
            method: "POST",
            body: new URLSearchParams({
                action: "create", nome: nome,
                qtd: document.getElementById("n_qtd").value,
                camadas: document.getElementById("n_camadas").value,
                cores: document.getElementById("n_cores").value,
                padrao: document.getElementById("n_padrao").value,
                midia: document.getElementById("n_midia").value
            })
        });
        const txt = await res.text();
        if(txt.includes("OK")) { toast("Criado!"); fecharModal(); carregar(); }
    } catch(e) { toast("Erro ao criar"); }
}

carregar();
</script>
</body>
</html>
