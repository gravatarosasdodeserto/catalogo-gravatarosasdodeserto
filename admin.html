<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Gravatá Rosas do Deserto</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#2e2a15">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
:root {
    --header-bg: #fcfaf7;
    --body-bg: #e9e4dd;
    --text-main: #2e2a15;
    --card-white: #ffffff;
    --danger: #8b2d2d;
    --ok: #2d5a27;
    --accent: #a08c6b;
    --accent-dark: #7d6e53;

    --shadow-sm: 0 4px 12px rgba(58,54,24,0.06);
    --shadow-md: 0 8px 24px rgba(58,54,24,0.08);
    --shadow-lg: 0 12px 40px rgba(58,54,24,0.12);
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    scroll-behavior: smooth;
}

body {
    font-family: 'Poppins', sans-serif;
    background: var(--body-bg);
    background-image:
        radial-gradient(at 20% 20%, rgba(160,140,107,0.08), transparent 50%),
        radial-gradient(at 80% 80%, rgba(255,255,255,0.4), transparent 50%);
    color: var(--text-main);
    margin: 0;
    padding-bottom: 50px;
}

/* ===== HEADER ===== */
.topbar {
    padding: 35px 0;
    position: sticky;
    top: 0;
    z-index: 1100;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    overflow: hidden;
}

.topbar::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('imagens/gravata-cabecalho.jpg') center/cover;
    z-index: -2;
    transform: scale(1.05);
}

.topbar::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 120px;
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(8px);
    z-index: -1;
}

.logo img {
    width: 180px;
    filter: drop-shadow(0 6px 20px rgba(0,0,0,0.35));
}

/* ===== BARRA ===== */
.bottom-bar {
    position: sticky;
    top: 160px;
    z-index: 1050;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn-voltar-admin {
    background: linear-gradient(135deg,var(--text-main),var(--accent-dark));
    color: white;
    padding: 0 28px;
    border-radius: 50px;
    font-size: 11px;
    height: 38px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* ===== CONTAINER ===== */
.container {
    padding: 20px;
    max-width: 1400px;
    margin: auto;
}

/* ===== BUSCA ===== */
.busca {
    width: 100%;
    padding: 14px;
    border-radius: 50px;
    border: 2px solid rgba(0,0,0,0.08);
    margin: 20px 0;
    text-align: center;
    font-weight: 500;
    background: rgba(255,255,255,0.8);
}

/* ===== GRID ===== */
#lista {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(290px,1fr));
    gap: 22px;
}

/* ===== CARD ===== */
.card {
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 18px;
    box-shadow: var(--shadow-md);
    display: flex;
    flex-direction: column;
    gap: 10px;
    justify-content: flex-start;
    transition: 0.3s;
    position: relative;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-lg);
}

.card.nao-salvo {
    border: 2px solid #ff9500;
}

.badge-nao-salvo {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ff9500;
    color: white;
    font-size: 9px;
    padding: 4px 8px;
    border-radius: 6px;
}

/* ===== IMAGEM ===== */
.img-container {
    position: relative;
    width: 100%;
    aspect-ratio: 1/1;
    margin-bottom: 14px;
    border-radius: 18px;
    overflow: hidden;
}

.img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* botão lápis */
.edit-badge {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: linear-gradient(135deg,var(--text-main),var(--accent-dark));
    color: white;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 3px solid white;
}

.file-input { display:none; }

/* ===== INPUTS ===== */
label {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    margin-top: 12px;
    display: block;
}

input, select {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid #e5e0d8;
    margin-top: 4px;
}

/* ===== GRID INTERNO ===== */
.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

/* ===== BOTÕES ===== */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

button {
    padding: 13px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 12px;
}

.save {
    background: linear-gradient(135deg,var(--ok),#3d7a37);
    color: white;
    flex: 2;
}

.del {
    background: rgba(245,243,240,0.8);
    color: var(--danger);
    flex: 1;
}

.new {
    width: 100%;
    background: linear-gradient(135deg,var(--text-main),var(--accent-dark));
    color: white;
    margin-bottom: 15px;
    border-radius: 50px;
    height: 52px;
}

/* ===== MODAIS ===== */
#modal, #modalExcluir, #modalSair {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(10px);
    align-items: center;
    justify-content: center;
    z-index: 2000;
}

.modal-content {
    width: 92%;
    max-width: 360px;
}

/* modal principal */
.card-modal {
    background: rgba(255,255,255,0.98);
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.card-modal h4 {
    text-align: center;
    font-size: 20px;
    margin-bottom: 16px;
}

/* placeholder imagem */
.img-placeholder {
    width: 100%;
    height: 100%;
    border: 2px dashed rgba(160,140,107,0.4);
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-size: 12px;
}

/* modais secundários */
#modalExcluir .modal-content,
#modalSair .modal-content {
    background: rgba(255,255,255,0.98);
    border-radius: 24px;
    padding: 26px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

#modalExcluir p,
#modalSair p {
    font-size: 14px;
    line-height: 1.5;
}

/* ===== TOAST ===== */
.toast {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    background: #2e2a15;
    color: #fff;
    padding: 14px 28px;
    border-radius: 50px;
    display: none;
}

/* ===== RESPONSIVO ===== */
@media (min-width:768px){
    .topbar { min-height: 230px; }
    .logo img { width: 260px; }
    #lista { grid-template-columns: repeat(auto-fill,minmax(320px,1fr)); }
}
</style>
    
</head>
<body>

<div class="topbar">
    <div class="logo">
        <img src="logo.png" onclick="location.href='index.html'">
    </div>
</div>

<div class="bottom-bar">
    <a href="index.html" class="btn-voltar-admin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="15">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Sair do Painel
    </a>
</div>

<div class="container">
  <button class="new" onclick="abrirModal()">+ Adicionar Nova ID</button>
  <input class="busca" placeholder="Buscar ID pelo nome..." oninput="filtrar(this.value)">
  <div id="lista"></div>
</div>
    <div id="modal" onclick="if(event.target == this) fecharModal()">
  <div class="modal-content">
    <div class="card card-modal">
     <h4 id="tituloModal">Nova Rosa do Deserto</h4>

      <div class="img-container">
        <img src="imagens/sem-foto.jpg" class="img" id="img_nova" style="display:none;">
        <div class="img-placeholder" id="placeholder_nova" onclick="document.getElementById('file_nova').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <span>Clique para adicionar foto</span>
          <span style="font-size:10px;opacity:0.7;">Opcional</span>
        </div>
        <div class="upload-overlay" id="overlay_nova">Enviando...</div>
        <div class="upload-progress" id="progress_nova">
          <div class="upload-progress-bar" id="progressBar_nova"></div>
        </div>
        <label class="edit-badge" for="file_nova">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="19" height="19"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
        </label>
        <input type="file" id="file_nova" class="file-input" accept="image/*" onchange="uploadFotoNova(this)">
      </div>

      <input id="n_midia" value="" type="hidden">

      <label>Nome da ID</label>
      <input id="n_nome" placeholder="Ex: TS-152">

      <label>Quantidade em Estoque</label>
      <input id="n_qtd" type="number" value="0" min="0">

      <div class="row">
        <div>
          <label>Camadas</label>
          <div id="n_camadas_container"></div>
        </div>
        <div>
          <label>Cores</label>
          <div id="n_cores_container"></div>
        </div>
      </div>

      <label>Padrão</label>
      <div id="n_padrao_container"></div>

      <label>Especiais</label>
      <div id="n_especiais_container" class="especiais-wrap"></div>

      <div class="actions">
        <button class="save" onclick="criar()">Criar ID</button>
        <button class="del" style="color:#666" onclick="fecharModal()">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<div id="modalExcluir" onclick="if(event.target == this) fecharModalExcluir()">
  <div class="modal-content" style="text-align:center;">
    <h4 style="margin-top:0;font-size:20px;margin-bottom:16px;">Excluir ID</h4>
    <p id="textoExcluir" style="font-size:14px;color:rgba(58,54,24,0.8);margin-bottom:24px;"></p>
    <div class="actions">
        <button class="del" onclick="confirmarExclusao()" style="flex:1;">Confirmar</button>
        <button class="save" onclick="fecharModalExcluir()" style="flex:1;background:linear-gradient(135deg,#666,#444);">Cancelar</button>
    </div>
  </div>
</div>

<div id="modalSair" onclick="if(event.target == this) fecharModalSair()">
  <div class="modal-content" style="text-align:center;">
    <h4 style="margin-top:0;font-size:20px;margin-bottom:16px;">Alterações não salvas</h4>
    <p style="font-size:14px;color:rgba(58,54,24,0.8);margin-bottom:24px;">Você tem alterações que não foram salvas.<br>Tem certeza que deseja sair?</p>
    <div class="actions">
        <button class="del" onclick="confirmarSair()" style="flex:1;">Sair mesmo assim</button>
        <button class="save" onclick="fecharModalSair()" style="flex:1;background:linear-gradient(135deg,#666,#444);">Continuar editando</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ================= CONFIG =================
const URL = "https://script.google.com/macros/s/AKfycbxs8MmNSgkb43F1vZDCtFE6AiRvWtjlTp67QxpLMcfA9mnWInHQOBm8iZuEqpF6Ctg0hA/exec";
const todasEspeciais = ['Cristatas', 'Floração em buquê', 'Mutantes', 'Perfumadas', 'Variegatas'];

// ================= ESTADO =================
let dados = [];
let filtro = "";
let temAlteracoesNaoSalvas = false;
let idParaExcluir = "";
let plantaEditando = { especiais: [] };

// ================= SEGURANÇA =================
(function() {
    if (sessionStorage.getItem("adminLogado") === "true") return;

    const senhaCorreta = "MTQwNTA4bGU=";
    const tentativa = prompt("Área restrita. Digite a senha:");

    if (!tentativa || btoa(tentativa) !== senhaCorreta) {
        alert("Acesso negado!");
        window.location.href = "index.html";
        return;
    }

    sessionStorage.setItem("adminLogado", "true");
})();

// ================= UTIL =================
function toast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3000);
}

function getOpcoesUnicas(campo) {
    return [...new Set(dados.map(d => d[campo]).filter(v => v && v !== "Não inf."))].sort();
}

// ================= CONTROLE ALTERAÇÃO =================
function mostrarBotaoSalvar(id) {
    temAlteracoesNaoSalvas = true;
    const card = document.getElementById("qtd_" + id).closest('.card');
    const btn = card.querySelector('.save');

    btn.style.display = "block";
    card.classList.add('nao-salvo');
}

// ================= SELECT =================
function criarSelect(id, valorAtual, opcoes) {
    const idSeguro = id.replace(/^(cam_|cor_|pad_)/, '');
    return `
        <select id="${id}" onchange="mostrarBotaoSalvar('${idSeguro}')">
            <option value="">Selecione...</option>
            ${opcoes.map(op => `<option ${op === valorAtual ? 'selected' : ''}>${op}</option>`).join('')}
        </select>
    `;
}

// ================= ESPECIAIS =================
function gerarCheckboxesEspeciais(selecionadas = [], prefixo = 'n') {
    const container = document.getElementById(prefixo + '_especiais_container');
    container.innerHTML = '';

    todasEspeciais.forEach(tag => {
        container.innerHTML += `
            <label>
                <input type="checkbox" value="${tag}" ${selecionadas.includes(tag) ? 'checked' : ''} onchange="atualizarEspeciais('${prefixo}')">
                ${tag}
            </label>
        `;
    });
}

function atualizarEspeciais(prefixo) {
    const selecionadas = [...document.querySelectorAll(`#${prefixo}_especiais_container input:checked`)].map(cb => cb.value);

    if (prefixo === 'n') {
        plantaEditando.especiais = selecionadas;
    } else {
        document.getElementById(`esp_${prefixo}`).value = selecionadas.join(', ');
        mostrarBotaoSalvar(prefixo);
    }
}

// ================= MODAL =================
function abrirModal() {
    plantaEditando = { especiais: [] };

    document.getElementById('n_nome').value = '';
    document.getElementById('n_qtd').value = 0;
    document.getElementById('img_nova').style.display = "none";
    document.getElementById('placeholder_nova').style.display = "flex";
    document.getElementById('n_midia').value = '';
    document.getElementById('n_camadas_container').innerHTML = criarSelect('n_camadas', '', getOpcoesUnicas('camadas'));
    document.getElementById('n_cores_container').innerHTML = criarSelect('n_cores', '', getOpcoesUnicas('cores'));
    document.getElementById('n_padrao_container').innerHTML = criarSelect('n_padrao', '', getOpcoesUnicas('padrao'));

    gerarCheckboxesEspeciais([], 'n');

    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

// ================= FILTRO =================
function filtrar(v) {
    filtro = v.toLowerCase();
    render();
}

// ================= RENDER =================
function render() {
    const el = document.getElementById("lista");
    el.innerHTML = "";

    const itens = dados
        .filter(d => d.nome.toLowerCase().includes(filtro))
        .sort((a, b) => a.nome.localeCompare(b.nome));

    itens.forEach(d => {
        const id = d.nome.replace(/\W/g, "_");
        const img = d.midia || "imagens/sem-foto.jpg";

        el.innerHTML += `
        <div class="card">

            <div class="img-container">
                <img src="${img}" class="img">

                <label class="edit-badge">
                    <input type="file" class="file-input" accept="image/*" onchange="uploadFoto('${d.nome}', this)">
                    ✎
                </label>
            </div>

            <h4>${d.nome}</h4>

            <label>Quantidade</label>
            <input id="qtd_${id}" type="number" value="${d.qtd}" oninput="mostrarBotaoSalvar('${id}')">

            <label>Camadas</label>
            ${criarSelect(`cam_${id}`, d.camadas, getOpcoesUnicas('camadas'))}

            <label>Cores</label>
            ${criarSelect(`cor_${id}`, d.cores, getOpcoesUnicas('cores'))}

            <label>Padrão</label>
            ${criarSelect(`pad_${id}`, d.padrao, getOpcoesUnicas('padrao'))}

            <label>Especiais</label>
            <div id="esp_${id}_container">
                ${todasEspeciais.map(tag => `
                    <label>
                        <input type="checkbox" value="${tag}" ${d.especiais?.includes(tag) ? 'checked' : ''} onchange="atualizarEspeciais('${id}')">
                        ${tag}
                    </label>
                `).join('')}
            </div>

            <input id="esp_${id}" value="${d.especiais || ''}" type="hidden">

            <div class="actions">
                <button class="save" onclick="salvar('${d.nome}')" style="display:none;">Salvar</button>
                <button class="del" onclick="excluir('${d.nome}')">Excluir</button>
            </div>

        </div>
        `;
    });
}

// ================= CRUD =================
async function carregar() {
    const res = await fetch(URL + "?action=get");
    const json = await res.json();

    dados = Object.keys(json).map(nome => ({
        nome,
        ...json[nome]
    }));

    render();
}

async function salvar(nome) {
    const id = nome.replace(/\W/g, "_");
    const imgEl = document.getElementById("qtd_" + id).closest('.card').querySelector('img');
    const midiaId = imgEl.src.includes('id=')? imgEl.src.split('id=')[1] : '';

    await fetch(URL, {
        method: "POST",
        body: new URLSearchParams({
            action: "update",
            nome,
            qtd: document.getElementById("qtd_" + id).value,
            camadas: document.getElementById("cam_" + id).value,
            cores: document.getElementById("cor_" + id).value,
            padrao: document.getElementById("pad_" + id).value,
            especiais: document.getElementById("esp_" + id).value,
            midia: midiaId // <- agora salva a foto também
        })
    });

    toast("Salvo!");
    carregar();
}

async function uploadFotoNova(input) {
    const file = input.files[0];
    if (!file) return;

    document.getElementById('overlay_nova').style.display = "block";

    try {
        const base64Data = await fileToBase64(file);

        const res = await fetch(URL, {
            method: "POST",
            body: new URLSearchParams({
                action: "upload",
                nome: "nova_temp",
                data: base64Data,
                mimeType: file.type
            })
        });

        const result = await res.json();

        if (result.success) {
            document.getElementById('img_nova').src = `https://drive.google.com/thumbnail?sz=w600&id=${result.id}`;
            document.getElementById('img_nova').style.display = "block";
            document.getElementById('placeholder_nova').style.display = "none";
            document.getElementById('n_midia').value = result.id; // <- salva o ID
        } else {
            toast("Erro: " + result.error);
        }
    } catch (e) {
        toast("Erro de conexão");
    }

    document.getElementById('overlay_nova').style.display = "none";
}

async function criar() {
    const nome = document.getElementById("n_nome").value.trim();
    if (!nome) return toast("Digite o nome");

    await fetch(URL, {
        method: "POST",
        body: new URLSearchParams({
            action: "create",
            nome,
            qtd: document.getElementById("n_qtd").value,
            camadas: document.getElementById("n_camadas").value,
            cores: document.getElementById("n_cores").value,
            padrao: document.getElementById("n_padrao").value,
            especiais: plantaEditando.especiais.join(', '),
            midia: document.getElementById('n_midia').value // <- agora envia a foto
        })
    });

    toast("Criado!");
    fecharModal();
    carregar();
}

    function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = error => reject(error);
  });
}

// ================= INIT =================
carregar();
</script>
</body>
</html>
