<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Gravatá Rosas do Deserto</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: #f8f5f0;
  margin: 0;
  padding: 20px;
  color: #3a3618;
}
.container {
  max-width: 500px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.1);
}
h1 {
  margin: 0 0 25px 0;
  font-size: 22px;
  text-align: center;
}
label {
  display: block;
  margin-bottom: 6px;
  font-weight: 500;
  font-size: 14px;
}
input {
  width: 100%;
  padding: 12px;
  border: 2px solid #ddd;
  border-radius: 8px;
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  margin-bottom: 18px;
}
input:focus {
  outline: none;
  border-color: #3a3618;
}
button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(180deg, #434019 0%, #3a3618 100%);
  color: white;
  border: none;
  border-radius: 30px;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
}
button:active {
  transform: translateY(2px);
  box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
}
.msg {
  margin-top: 20px;
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  font-size: 14px;
  display: none;
}
.msg.sucesso {
  background: #d4edda;
  color: #155724;
  display: block;
}
.voltar {
  display: block;
  text-align: center;
  margin-top: 20px;
  color: #3a3618;
  text-decoration: none;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Admin - Atualizar Estoque</h1>
  
  <label>Nome da Variedade (ID)</label>
  <input type="text" id="nome" placeholder="Ex: ROSA NOVA" autocomplete="off">
  
  <label>Quantidade em Estoque</label>
  <input type="number" id="qtd" placeholder="Ex: 5" min="0">
  
  <button onclick="abrirIssue()">Salvar no Catálogo</button>
  
  <div id="msg" class="msg"></div>
  
  <a href="catalogo/" class="voltar">← Voltar ao catálogo</a>
</div>

<script>
function abrirIssue(){
  const nome = document.getElementById("nome").value.trim().toUpperCase();
  const qtd = parseInt(document.getElementById("qtd").value);
  
  if(!nome || isNaN(qtd) || qtd < 0){
    alert("Preencha nome e quantidade válida");
    return;
  }
  
  const titulo = encodeURIComponent(`[ADMIN] ${nome}: ${qtd}`);
  const body = encodeURIComponent(`nome: ${nome}\nqtd: ${qtd}`);
  const url = `https://github.com/gravatarosasdodeserto/gravatarosasdodeserto-catalogo/issues/new?title=${titulo}&body=${body}&labels=admin`;
  
  window.open(url, "_blank");
  
  document.getElementById("msg").textContent = "✅ Issue aberta. Clica em 'Submit new issue' pra confirmar.";
  document.getElementById("msg").className = "msg sucesso";
  document.getElementById("nome").value = "";
  document.getElementById("qtd").value = "";
}
</script>

</body>
</html>
