<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Gravatá Rosas</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { box-sizing: border-box; }
body { font-family: 'Poppins', sans-serif; background: #f8f5f0; margin: 0; padding: 20px; }
.container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 6px 14px rgba(0,0,0,0.1); }
h1 { color: #3a3618; margin-top: 0; }
.login, .painel { display: none; }
.ativo { display: block; }
input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 2px solid #3a3618; font-family: 'Poppins'; }
button { background: #434019; color: white; font-weight: 600; cursor: pointer; border: none; }
button:active { transform: translateY(1px); }
label { font-weight: 500; font-size: 14px; color: #3a3618; display: block; margin-top: 12px; }
#preview { display: flex; gap: 10px; margin: 10px 0; }
#preview img, #preview video { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; background: #eee; }
.tabela { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
.tabela th, .tabela td { border: 1px solid #ddd; padding: 8px; text-align: left; }
.tabela th { background: #f3efe9; }
.erro { color: #c00; font-size: 13px; }
.ok { color: #080; font-size: 13px; }
</style>
</head>
<body>

<div class="container">
  <div class="login ativo" id="telaLogin">
    <h1>Login Admin</h1>
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
    <p id="erroLogin" class="erro"></p>
  </div>

  <div class="painel" id="telaPainel">
    <h1>Cadastrar Nova ID</h1>
    <button onclick="sair()" style="background:#999; margin-bottom:20px;">Sair</button>
    
    <label>Nome da ID *</label>
    <input type="text" id="nomeId" placeholder="Ex: ROSA VERMELHA">

    <label>Estoque *</label>
    <input type="number" id="estoque" value="0" min="0">

    <label>Foto JPG 800x800 *</label>
    <input type="file" id="foto" accept="image/jpeg">
    
    <label>Vídeo MP4 800x800 *</label>
    <input type="file" id="video" accept="video/mp4">

    <div id="preview"></div>
    <p id="msg" class="erro"></p>

    <button onclick="adicionarItem()">Adicionar e Gerar Arquivos</button>

    <h2>Itens Cadastrados Agora</h2>
    <table class="tabela" id="tabelaItens">
      <thead><tr><th>ID</th><th>Estoque</th><th>Foto</th><th>Vídeo</th></tr></thead>
      <tbody></tbody>
    </table>

    <button onclick="baixarZip()" style="background:#1a5d1a; margin-top:20px;">Baixar .zip com flores.json + imagens</button>
    <p class="ok">Depois é só descompactar e subir tudo pro GitHub substituindo os arquivos.</p>
  </div>
</div>

<script>
// CONFIGURA AQUI SEU LOGIN E SENHA
const USUARIO_CORRETO = "admin";
const SENHA_CORRETA = "gravata123";

let floresAtuais = [];
let novosItens = [];
let arquivosZip = {};

fetch('flores.json').then(r => r.json()).then(d => floresAtuais = d).catch(()=>{});

function fazerLogin(){
  let u = document.getElementById('usuario').value;
  let s = document.getElementById('senha').value;
  if(u === USUARIO_CORRETO && s === SENHA_CORRETA){
    document.getElementById('telaLogin').classList.remove('ativo');
    document.getElementById('telaPainel').classList.add('ativo');
    document.getElementById('erroLogin').innerText = "";
  } else {
    document.getElementById('erroLogin').innerText = "Usuário ou senha incorretos";
  }
}

function sair(){
  document.getElementById('telaPainel').classList.remove('ativo');
  document.getElementById('telaLogin').classList.add('ativo');
}

function slug(nome){
  return nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ /g, "-").replace(/[()]/g, "");
}

async function redimensionarImagem(file, size = 800){
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      canvas.toBlob(resolve, 'image/jpeg', 0.9);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function adicionarItem(){
  const msg = document.getElementById('msg');
  msg.innerText = "";
  msg.className = "erro";
  
  const nome = document.getElementById('nomeId').value.trim().toUpperCase();
  const estoque = parseInt(document.getElementById('estoque').value) || 0;
  const fotoFile = document.getElementById('foto').files[0];
  const videoFile = document.getElementById('video').files[0];

  if(!nome || !fotoFile || !videoFile) return msg.innerText = "Preencha todos os campos *";
  if(floresAtuais.find(f => f.id === nome) || novosItens.find(f => f.id === nome)) return msg.innerText = "Essa ID já existe";

  msg.innerText = "Processando imagem...";
  
  const fotoBlob = await redimensionarImagem(fotoFile, 800);
  const nomeArquivo = slug(nome);
  const caminhoFoto = `imagens/${nomeArquivo}.jpg`;
  const caminhoVideo = `imagens/${nomeArquivo}.mp4`;

  const novoItem = { id: nome, estoque: estoque, foto: caminhoFoto, video: caminhoVideo };
  novosItens.push(novoItem);
  
  arquivosZip[caminhoFoto] = fotoBlob;
  arquivosZip[caminhoVideo] = videoFile;

  // Preview
  document.getElementById('preview').innerHTML = `
    <img src="${URL.createObjectURL(fotoBlob)}">
    <video src="${URL.createObjectURL(videoFile)}" muted loop></video>
  `;

  // Tabela
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${nome}</td><td>${estoque}</td><td>${nomeArquivo}.jpg</td><td>${nomeArquivo}.mp4</td>`;
  document.querySelector('#tabelaItens tbody').appendChild(tr);

  msg.className = "ok";
  msg.innerText = "Adicionado! Clique em 'Baixar .zip' quando terminar de cadastrar.";
  
  // Limpa form
  document.getElementById('nomeId').value = "";
  document.getElementById('estoque').value = "0";
  document.getElementById('foto').value = "";
  document.getElementById('video').value = "";
}

async function baixarZip(){
  if(novosItens.length === 0) return alert("Cadastre pelo menos 1 item");
  
  const zip = new JSZip();
  const jsonFinal = [...floresAtuais, ...novosItens];
  zip.file("flores.json", JSON.stringify(jsonFinal, null, 2));
  
  const imgFolder = zip.folder("imagens");
  for(let path in arquivosZip){
    imgFolder.file(path.replace('imagens/',''), arquivosZip[path]);
  }

  const blob = await zip.generateAsync({type:"blob"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "atualizacao_catalogo.zip";
  a.click();
}
</script>

</body>
</html>
