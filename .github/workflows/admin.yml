name: Admin Catálogo

on:
  repository_dispatch:
    types: [atualizar-catalogo]

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Atualizar index.html
        run: |
          NOME="${{ github.event.client_payload.nome }}"
          QTD="${{ github.event.client_payload.qtd }}"
          
          # Remove linha antiga se existir
          sed -i "/data-nome=\"$NOME\"/d" index.html
          
          # Adiciona nova linha antes do </tbody>
          sed -i "/<\/tbody>/i \  <tr data-nome=\"$NOME\"><td>$NOME</td><td>$QTD</td></tr>" index.html
      
      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Atualiza estoque: ${{ github.event.client_payload.nome }}" || exit 0
          git push
