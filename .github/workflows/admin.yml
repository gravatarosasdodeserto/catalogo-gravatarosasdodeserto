name: Admin Catálogo via Issues

on:
  issues:
    types: [opened]

jobs:
  atualizar:
    if: contains(github.event.issue.labels.*.name, 'admin')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Extrair dados da issue
        id: dados
        run: |
          BODY="${{ github.event.issue.body }}"
          NOME=$(echo "$BODY" | grep "nome:" | cut -d: -f2 | xargs)
          QTD=$(echo "$BODY" | grep "qtd:" | cut -d: -f2 | xargs)
          echo "nome=$NOME" >> $GITHUB_OUTPUT
          echo "qtd=$QTD" >> $GITHUB_OUTPUT
          
      - name: Atualizar catalogo/index.html
        run: |
          NOME="${{ steps.dados.outputs.nome }}"
          QTD="${{ steps.dados.outputs.qtd }}"
          
          echo "Atualizando $NOME para $QTD"
          
          sed -i "/\"$NOME\"/d" catalogo/index.html
          
          if ! grep -q "\"$NOME\"" catalogo/index.html; then
            sed -i "/\/\/ LINHA-INSERCAO-FLORES/i \"$NOME\"," catalogo/index.html
          fi
          
          sed -i "/\/\/ LINHA-INSERCAO-ESTOQUE/i \  \"$NOME\": $QTD," catalogo/index.html
          
          git diff catalogo/index.html
      
      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalogo/index.html
          git commit -m "Admin: ${{ steps.dados.outputs.nome }} (${{ steps.dados.outputs.qtd }} un)" || exit 0
          git push
      
      - name: Fechar issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Catálogo atualizado!\n\n**${{ steps.dados.outputs.nome }}**: ${{ steps.dados.outputs.qtd }} unidades\n\nAguarde 1-2min e recarregue o site.`
            })
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            })
