name: Admin Catálogo

on:
  repository_dispatch:
    types: [atualizar-catalogo]

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Atualizar catalogo/index.html
        run: |
          NOME="${{ github.event.client_payload.nome }}"
          QTD="${{ github.event.client_payload.qtd }}"
          
          echo "Arquivo: catalogo/index.html"
          
          # Remove linhas antigas se existir
          sed -i "/\"$NOME\"/d" catalogo/index.html
          
          # Insere no array flores se não existir
          if ! grep -q "\"$NOME\"" catalogo/index.html; then
            echo "Adicionando $NOME ao array flores..."
            sed -i "/\/\/ LINHA-INSERCAO-FLORES/i \"$NOME\"," catalogo/index.html
          fi
          
          # Insere/atualiza no objeto estoque
          echo "Atualizando estoque de $NOME para $QTD..."
          sed -i "/\/\/ LINHA-INSERCAO-ESTOQUE/i \  \"$NOME\": $QTD," catalogo/index.html
          
          echo "Diff:"
          git diff catalogo/index.html
      
      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalogo/index.html
          git commit -m "Atualiza: ${{ github.event.client_payload.nome }} (${{ github.event.client_payload.qtd }} un)" || echo "Nada pra commitar"
          git push
