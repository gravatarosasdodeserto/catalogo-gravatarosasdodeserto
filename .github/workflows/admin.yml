name: Admin Catálogo

on:
  repository_dispatch:
    types: [atualizar-catalogo]

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Atualizar catalogo/index.html
        run: |
          NOME="${{ github.event.client_payload.nome }}"
          QTD="${{ github.event.client_payload.qtd }}"
          
          echo "Arquivo: catalogo/index.html"
          ls -la catalogo/index.html
          
          echo "Removendo linha antiga de $NOME..."
          sed -i "/\"$NOME\":/d" catalogo/index.html
          
          echo "Inserindo nova linha..."
          sed -i "/\/\/ LINHA-INSERCAO-ACTION/i \  \"$NOME\": $QTD," catalogo/index.html
          
          echo "Diff:"
          git diff catalogo/index.html
      
      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalogo/index.html
          git commit -m "Atualiza estoque: ${{ github.event.client_payload.nome }}" || echo "Nada pra commitar"
          git push
