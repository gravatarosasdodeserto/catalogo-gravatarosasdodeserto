name: Admin Catálogo

on:
  repository_dispatch:
    types: [atualizar-catalogo]

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Atualizar index.html
        run: |
          NOME="${{ github.event.client_payload.nome }}"
          QTD="${{ github.event.client_payload.qtd }}"
          
          echo "Atualizando $NOME para $QTD unidades..."
          
          # Remove linha antiga se existir
          sed -i "/\"$NOME\":/d" index.html
          
          # Insere nova linha no objeto estoque
          sed -i "/\/\/ LINHA-INSERCAO-ACTION/i \  \"$NOME\": $QTD," index.html
          
          echo "Diff:"
          git diff index.html
      
      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Atualiza estoque: ${{ github.event.client_payload.nome }}" || echo "Nada pra commitar"
          git push
